const getWeekRangeString = (dateObj) => {
  const current = new Date(dateObj);
  const day = current.getDay();
  const diff = current.getDate() - day + (day === 0 ? -6 : 1);
  const monday = new Date(current.setDate(diff));
  const sunday = new Date(current.setDate(monday.getDate() + 6));
  return `${monday.toLocaleDateString("en-US",{month:"short",day:"numeric"})} - ${sunday.toLocaleDateString("en-US",{month:"short",day:"numeric"})}`;
};

// ── Image compression helper (resize before upload to save storage) ──
function compressImage(file, maxDim = 1024, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) { height = height * (maxDim/width); width = maxDim; }
        else if (height > maxDim) { width = width * (maxDim/height); height = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        canvas.toBlob((blob) => {
          const fr = new FileReader();
          fr.onload = () => resolve({ blob, dataUrl: fr.result, base64: fr.result.split(",")[1] });
          fr.readAsDataURL(blob);
        }, 'image/jpeg', quality);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function uploadPhoto(userId, blob, prefix) {
  const fileName = `${userId}/${prefix}_${Date.now()}.jpg`;
  const { error } = await supabase.storage.from('diet-photos').upload(fileName, blob, { contentType: 'image/jpeg' });
  if (error) { console.error('Upload failed:', error); return null; }
  const { data } = supabase.storage.from('diet-photos').getPublicUrl(fileName);
  return data.publicUrl;
}

function AuthScreen({ onAuthed }) {
  const [mode, setMode] = useState("login"); // login | signup
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const [info, setInfo] = useState("");

  const C = THEMES.dark;

  const submit = async () => {
    setError(""); setInfo("");
    if (!email.trim() || !password) { setError("Please enter email and password."); return; }
    if (password.length < 6) { setError("Password must be at least 6 characters."); return; }
    setLoading(true);
    try {
      if (mode === "signup") {
        const { data, error } = await supabase.auth.signUp({ email: email.trim(), password });
        if (error) throw error;
        if (data.user && !data.session) {
          setInfo("Check your email to confirm your account, then log in.");
          setMode("login");
        } else if (data.session) {
          onAuthed(data.session);
        }
      } else {
        const { data, error } = await supabase.auth.signInWithPassword({ email: email.trim(), password });
        if (error) throw error;
        onAuthed(data.session);
      }
    } catch (err) {
      setError(err.message || "Something went wrong.");
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{ minHeight:"100vh", background:C.bg, color:C.text, fontFamily:"'DM Sans',-apple-system,sans-serif", display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
      <style>{`
        .inp{background:${C.surface};border:1px solid ${C.border};border-radius:12px;padding:12px 14px;color:${C.text};font-family:'DM Sans',sans-serif;font-size:15px;width:100%;outline:none;transition:border-color .2s;box-sizing:border-box}
        .inp:focus{border-color:${C.pinkDim}}
        .inp::placeholder{color:${C.textDim}}
        .pink-btn{background:linear-gradient(135deg,${C.pinkDim},#9d174d);color:#fff;border:none;border-radius:12px;padding:13px 20px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;width:100%;box-shadow:0 4px 16px rgba(184,40,92,.28)}
        .pink-btn:disabled{opacity:.6;cursor:not-allowed}
        .link-btn{background:none;border:none;color:${C.pink};font-size:13px;cursor:pointer;text-decoration:underline;font-family:'DM Sans',sans-serif}
      `}</style>
      <div style={{ width:"100%", maxWidth:380 }}>
        <div style={{ textAlign:"center", marginBottom:28 }}>
          <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:32, fontWeight:800, color:C.pink, letterSpacing:"-0.04em" }}>NutriLog <span style={{ fontSize:16, fontStyle:"italic", fontWeight:300, color:C.textMuted }}>pro</span></div>
          <div style={{ fontSize:13, color:C.textMuted, marginTop:6 }}>{mode === "login" ? "Welcome back" : "Create your account"}</div>
        </div>
        <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:18, padding:24 }}>
          <div style={{ display:"flex", flexDirection:"column", gap:12, marginBottom:16 }}>
            <input className="inp" type="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} autoComplete="email" />
            <input className="inp" type="password" placeholder="Password (min 6 characters)" value={password} onChange={e=>setPassword(e.target.value)} autoComplete={mode==="login"?"current-password":"new-password"} onKeyDown={e=>e.key==="Enter"&&submit()} />
          </div>
          {error && <div style={{ fontSize:13, color:C.red, marginBottom:12, fontStyle:"italic" }}>{error}</div>}
          {info && <div style={{ fontSize:13, color:C.green, marginBottom:12, fontStyle:"italic" }}>{info}</div>}
          <button className="pink-btn" onClick={submit} disabled={loading}>
            {loading ? "Please wait..." : mode==="login" ? "Log In" : "Sign Up"}
          </button>
          <div style={{ textAlign:"center", marginTop:16 }}>
            {mode === "login" ? (
              <span style={{ fontSize:13, color:C.textMuted }}>No account? <button className="link-btn" onClick={()=>{setMode("signup");setError("");setInfo("");}}>Sign up</button></span>
            ) : (
              <span style={{ fontSize:13, color:C.textMuted }}>Already have an account? <button className="link-btn" onClick={()=>{setMode("login");setError("");setInfo("");}}>Log in</button></span>
            )}
          </div>
        </div>
        <div style={{ textAlign:"center", fontSize:11, color:C.textDim, marginTop:16 }}>Your data is private and only visible to you.</div>
      </div>
    </div>
  );
}

const DataAPI = {
  async getDayData(userId, dateKey) {
    const [mealsRes, workoutsRes, drinksRes] = await Promise.all([
      supabase.from('meals').select('*').eq('user_id', userId).eq('log_date', dateKey).order('logged_at'),
      supabase.from('workouts').select('*').eq('user_id', userId).eq('log_date', dateKey).order('logged_at'),
      supabase.from('drink_logs').select('*').eq('user_id', userId).eq('log_date', dateKey).order('logged_at')
    ]);
    return {
      meals: mealsRes.data || [],
      workouts: workoutsRes.data || [],
      drinks: drinksRes.data || []
    };
  },

  async getRangeData(userId, startDate, endDate) {
    const [mealsRes, workoutsRes, drinksRes] = await Promise.all([
      supabase.from('meals').select('*').eq('user_id', userId).gte('log_date', startDate).lte('log_date', endDate),
      supabase.from('workouts').select('*').eq('user_id', userId).gte('log_date', startDate).lte('log_date', endDate),
      supabase.from('drink_logs').select('*').eq('user_id', userId).gte('log_date', startDate).lte('log_date', endDate)
    ]);
    return { meals: mealsRes.data || [], workouts: workoutsRes.data || [], drinks: drinksRes.data || [] };
  },

  async addMeal(userId, meal) {
    const { data, error } = await supabase.from('meals').insert({ user_id: userId, ...meal }).select().single();
    if (error) throw error;
    return data;
  },
  async deleteMeal(id) {
    const { error } = await supabase.from('meals').delete().eq('id', id);
    if (error) throw error;
  },
  async updateMeal(id, patch) {
    const { error } = await supabase.from('meals').update(patch).eq('id', id);
    if (error) throw error;
  },

  async addWorkout(userId, workout) {
    const { data, error } = await supabase.from('workouts').insert({ user_id: userId, ...workout }).select().single();
    if (error) throw error;
    return data;
  },
  async deleteWorkout(id) {
    const { error } = await supabase.from('workouts').delete().eq('id', id);
    if (error) throw error;
  },
  async updateWorkout(id, patch) {
    const { error } = await supabase.from('workouts').update(patch).eq('id', id);
    if (error) throw error;
  },

  async addDrink(userId, drink) {
    const { data, error } = await supabase.from('drink_logs').insert({ user_id: userId, ...drink }).select().single();
    if (error) throw error;
    return data;
  },
  async deleteDrink(id) {
    const { error } = await supabase.from('drink_logs').delete().eq('id', id);
    if (error) throw error;
  },

  async getTargets(userId) {
    const { data } = await supabase.from('user_targets').select('*').eq('user_id', userId).maybeSingle();
    if (!data) return DEFAULT_TARGETS;
    return { calories: data.calories, protein: data.protein, carbs: data.carbs, fat: data.fat };
  },
  async setTargets(userId, targets) {
    const { error } = await supabase.from('user_targets').upsert({ user_id: userId, ...targets, updated_at: new Date().toISOString() });
    if (error) throw error;
  }
};

function MealCard({ meal, onRemove, onEdit, readonly, theme, onSlotChange }) {
  const isDark = theme !== "light";
  const cardBg = isDark ? "#1a1a1f" : "#ffffff";
  const cardBgDragging = isDark ? "#212126" : "#f7f4f6";
  const textColor = isDark ? "#f3f1f4" : "#1d1b1f";
  const textMuted = isDark ? "#8b8794" : "#6f6a73";
  const btnColor = isDark ? "#454249" : "#aaa5ab";
  const pinkColor = isDark ? "#e8447a" : "#c4205f";
  const hasItems = Array.isArray(meal.items) && meal.items.length > 0;
  const [expanded, setExpanded] = useState(false);
  const [dragY, setDragY] = useState(0);
  const [isDragging, setIsDragging] = useState(false);
  const dragRef = useRef({ active:false, startY:0, longPressTimer:null, triggered:false });

  const clearLongPress = () => { clearTimeout(dragRef.current.longPressTimer); };

  const onPointerDown = (e) => {
    if (readonly || !onSlotChange) return;
    const startY = e.touches ? e.touches[0].clientY : e.clientY;
    dragRef.current.triggered = false;
    dragRef.current.longPressTimer = setTimeout(() => {
      dragRef.current.active = true;
      dragRef.current.startY = startY;
      setIsDragging(true);
      if (navigator.vibrate) navigator.vibrate(12);
      document.body.style.userSelect = "none";
    }, 400);
  };
  const onPointerMove = (e) => {
    if (!dragRef.current.active) return;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    const delta = y - dragRef.current.startY;
    // Follow the finger smoothly, with slight resistance past the trigger threshold
    const THRESHOLD = 56;
    const clamped = Math.abs(delta) <= THRESHOLD ? delta : THRESHOLD * Math.sign(delta) + (delta - THRESHOLD*Math.sign(delta)) * 0.25;
    setDragY(clamped);
    if (!dragRef.current.triggered && Math.abs(delta) > THRESHOLD) {
      dragRef.current.triggered = true;
      if (navigator.vibrate) navigator.vibrate(8);
      onSlotChange(delta > 0 ? 1 : -1);
    }
  };
  const onPointerUp = () => {
    clearLongPress();
    dragRef.current.active = false;
    setIsDragging(false);
    setDragY(0);
    document.body.style.userSelect = "";
  };

  return (
    <div
      className="animate-pop"
      style={{
        padding:"12px 14px", marginBottom:8, borderRadius:18,
        background: isDragging ? cardBgDragging : cardBg,
        border:`1px solid ${isDragging ? (isDark?"#454249":"#aaa5ab") : (isDark?"#26262d":"#e8e4e8")}`,
        cursor: onSlotChange && !readonly ? (isDragging?"grabbing":"grab") : "default",
        touchAction: onSlotChange && !readonly ? "none" : "auto",
        transform: `translateY(${dragY}px) scale(${isDragging?1.02:1})`,
        boxShadow: isDragging ? "0 8px 24px rgba(0,0,0,0.18)" : "none",
        transition: isDragging ? "border-color .15s, background .15s" : "transform .25s cubic-bezier(.2,.8,.2,1), box-shadow .25s",
        position: "relative", zIndex: isDragging ? 10 : 1
      }}
      onMouseDown={onPointerDown} onMouseMove={onPointerMove} onMouseUp={onPointerUp} onMouseLeave={onPointerUp}
      onTouchStart={onPointerDown} onTouchMove={onPointerMove} onTouchEnd={onPointerUp}
    >
      <div style={{ display:"flex", alignItems:"flex-start", gap:10 }}>

function MacroDonutChart({ consumed, theme }) {
  const totalGrams = consumed.protein + consumed.carbs + consumed.fat;
  const pPct = totalGrams ? (consumed.protein/totalGrams)*100 : 0;
  const cPct = totalGrams ? (consumed.carbs/totalGrams)*100 : 0;
  const fPct = totalGrams ? (consumed.fat/totalGrams)*100 : 0;
  const radius = 35;
  const circ = 2*Math.PI*radius;
  const pLen = (pPct/100)*circ;
  const cLen = (cPct/100)*circ;
  const fLen = (fPct/100)*circ;
  const isDark = theme !== "light";
  const innerBg = isDark ? "#212126" : "#f7f4f6";
  const strokeBg = isDark ? "#26262d" : "#e8e4e8";
  const textMain = isDark ? "#f3f1f4" : "#1d1b1f";
  const textSub = isDark ? "#8b8794" : "#6f6a73";
  const proteinC = isDark ? "#a98fe0" : "#7752c9";
  const carbsC = isDark ? "#e8a4bd" : "#b8366b";
  const fatC = isDark ? "#e0a868" : "#b9740f";
  return (
    <div style={{ position:"relative", width:"120px", height:"120px" }}>
      <svg width="100%" height="100%" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r={radius} fill="transparent" stroke={innerBg} strokeWidth="7" />
        {totalGrams > 0 ? (
          <React.Fragment>
            <circle cx="50" cy="50" r={radius} fill="transparent" stroke={proteinC} strokeWidth="7" strokeLinecap="round" strokeDasharray={`${pLen} ${circ}`} strokeDashoffset="0" transform="rotate(-90 50 50)" />
            <circle cx="50" cy="50" r={radius} fill="transparent" stroke={carbsC} strokeWidth="7" strokeLinecap="round" strokeDasharray={`${cLen} ${circ}`} strokeDashoffset={-pLen} transform="rotate(-90 50 50)" />
            <circle cx="50" cy="50" r={radius} fill="transparent" stroke={fatC} strokeWidth="7" strokeLinecap="round" strokeDasharray={`${fLen} ${circ}`} strokeDashoffset={-(pLen+cLen)} transform="rotate(-90 50 50)" />
          </React.Fragment>
        ) : (
          <circle cx="50" cy="50" r={radius} fill="transparent" stroke={strokeBg} strokeWidth="8" />
        )}
      </svg>
      <div style={{ position:"absolute", top:"50%", left:"50%", transform:"translate(-50%,-50%)", textAlign:"center" }}>
        <div style={{ fontSize:"16px", fontWeight:"800", fontFamily:"'DM Sans',sans-serif", color:textMain }}>{totalGrams>0?`${Math.round(totalGrams)}g`:"0g"}</div>
        <div style={{ fontSize:"9px", color:textSub, fontFamily:"'DM Sans',sans-serif", letterSpacing:"0.02em" }}>total</div>
      </div>
    </div>
  );
}

// ── Simple SVG bar chart: consumed vs burned per day, with target line ──
function TrendChart({ days, target, theme }) {
  const isDark = theme !== "light";
  const gridColor = isDark ? "#26262d" : "#e8e4e8";
  const textColor = isDark ? "#8b8794" : "#6f6a73";
  const consumedColor = isDark ? "#e8447a" : "#c4205f";
  const burnedColor = isDark ? "#5ec9a0" : "#1f8a63";
  if (!days.length) return <div style={{ fontSize:12, color:textColor, textAlign:"center", padding:"20px 0" }}>Not enough data yet</div>;

  const maxVal = Math.max(target, ...days.map(d=>d.consumed), ...days.map(d=>d.burned), 100) * 1.15;
  const w = 320, h = 140, padBottom = 20, padTop = 6;
  const barW = (w / days.length) * 0.62;
  const gap = (w / days.length) - barW;
  const targetY = padTop + (1 - target/maxVal) * (h-padBottom-padTop);

  return (
    <svg viewBox={`0 0 ${w} ${h+18}`} style={{ width:"100%", height:"auto" }}>
      <line x1="0" y1={targetY} x2={w} y2={targetY} stroke={textColor} strokeWidth="1" strokeDasharray="3,3" opacity="0.5" />
      {days.map((d,i) => {
        const x = i * (barW+gap) + gap/2;
        const consH = (d.consumed/maxVal) * (h-padBottom-padTop);
        const burnH = (d.burned/maxVal) * (h-padBottom-padTop);
        const baseY = h - padBottom;
        return (
          <g key={i}>
            <rect x={x} y={baseY-consH} width={barW*0.46} height={consH} fill={consumedColor} rx="2" />
            <rect x={x+barW*0.5} y={baseY-burnH} width={barW*0.46} height={burnH} fill={burnedColor} rx="2" />
            <text x={x+barW/2} y={h+14} textAnchor="middle" fontSize="9" fill={textColor} fontFamily="'DM Sans',sans-serif">{d.label}</text>
          </g>
        );
      })}
    </svg>
  );
}

  useEffect(() => {

          DataAPI.getDayData(userId, today),
          DataAPI.getTargets(userId)
        ]);
        setDayData(day);
        setBaseTargets(targets);
      } catch (err) {
        setError("Failed to load data: " + err.message);
      } finally {
        setLoading(false);
      }
    })();

  const refreshToday = async () => {
    const day = await DataAPI.getDayData(userId, today);
    setDayData(day);
  };

  const mealTotals = dayData.meals.reduce((a,m) => ({ calories:a.calories+Number(m.calories), protein:a.protein+Number(m.protein), carbs:a.carbs+Number(m.carbs), fat:a.fat+Number(m.fat) }), { calories:0, protein:0, carbs:0, fat:0 });
  const drinkTotals = (dayData.drinks||[]).reduce((a,d) => ({ calories:a.calories+Number(d.calories||0), protein:a.protein+Number(d.protein||0), carbs:a.carbs+Number(d.carbs||0), fat:a.fat+Number(d.fat||0) }), { calories:0, protein:0, carbs:0, fat:0 });
  const consumed = { calories: mealTotals.calories+drinkTotals.calories, protein: mealTotals.protein+drinkTotals.protein, carbs: mealTotals.carbs+drinkTotals.carbs, fat: mealTotals.fat+drinkTotals.fat };
  const burned = (dayData.workouts||[]).reduce((a,w) => a+Number(w.calories), 0);

  const computeTargetsLocal = (burnedKcal) => {
    const bonus = Math.floor(burnedKcal/100);
    return { calories:baseTargets.calories+(100*bonus), protein:baseTargets.protein*(1+(0.0556*bonus)), carbs:baseTargets.carbs+(13.64*bonus), fat:baseTargets.fat*(1+(0.053*bonus)) };
  };

  const targets = computeTargetsLocal(burned);
  const net = consumed.calories - burned;
  const deficit = net < targets.calories;
  const totalDrinkMl = (dayData.drinks||[]).reduce((s,d) => s + Number(d.amount_ml||0), 0);
  const drinkCalories = (dayData.drinks||[]).reduce((s,d) => s + Number(d.calories||0), 0);
  const achievedMilestone = WATER_MILESTONES.slice().reverse().find(m => totalDrinkMl >= m.ml) || null;

  const addDrink = async (preset) => {
    try {
      const d = await DataAPI.addDrink(userId, {
        log_date: today, drink_type: preset.drink_type, amount_ml: preset.amount_ml,
        calories: preset.calories||0, protein: preset.protein||0, carbs: preset.carbs||0, fat: preset.fat||0,
        sugar_g: preset.sugar_g||0, logged_at: new Date().toISOString()
      });
      setDayData(prev => ({ ...prev, drinks: [...(prev.drinks||[]), d] }));
    } catch (err) { setError("Failed to log drink: " + err.message); }
  };
  const addCustomDrink = async () => {
    const ml = parseFloat(customDrinkMl);
    if (!ml || ml<=0) { setError("Enter a valid amount in ml."); return; }
    try {
      const d = await DataAPI.addDrink(userId, {
        log_date: today, drink_type: customDrinkName.trim()||"Other", amount_ml: ml,
        calories: parseFloat(customDrinkCal)||0, protein: parseFloat(customDrinkProt)||0,
        carbs: parseFloat(customDrinkCarb)||0, fat: parseFloat(customDrinkFat)||0,
        sugar_g: 0, logged_at: new Date().toISOString()
      });
      setDayData(prev => ({ ...prev, drinks: [...(prev.drinks||[]), d] }));
      setCustomDrinkName(""); setCustomDrinkMl(""); setCustomDrinkCal(""); setCustomDrinkProt(""); setCustomDrinkCarb(""); setCustomDrinkFat(""); setDrinkRatePer100ml(null);
    } catch (err) { setError("Failed to log drink: " + err.message); }
  };
  const suggestDrinkNutrition = async () => {
    setError(null);
    if (!customDrinkName.trim()) { setError("Type a drink name first."); return; }
    setIsSuggestingDrink(true);
    try {
      const ml = parseFloat(customDrinkMl) || 250;
      const raw = await callGemini({
        contents:[{ role:"user", parts:[{ text:`Estimate nutrition for exactly ${ml}ml of "${customDrinkName}". Be precise and consistent — base your numbers on standard nutrition data for this drink type scaled to ${ml}ml. Output ONLY raw JSON, no code fences: {"calories":number,"protein":number,"carbs":number,"fat":number}` }] }]
      });
      const m = JSON.parse(raw.replace(/```json|```/gi,"").trim());
      // Store the per-100ml rate so the form can rescale correctly if the user edits ml afterward
      const rate = { cal: (m.calories||0)/ml*100, prot: (m.protein||0)/ml*100, carb: (m.carbs||0)/ml*100, fat: (m.fat||0)/ml*100 };
      setDrinkRatePer100ml(rate);
      setCustomDrinkCal(Math.round(m.calories||0).toString());
      setCustomDrinkProt(Math.round((m.protein||0)*10)/10 + "");
      setCustomDrinkCarb(Math.round((m.carbs||0)*10)/10 + "");
      setCustomDrinkFat(Math.round((m.fat||0)*10)/10 + "");
      if (!customDrinkMl) setCustomDrinkMl(ml.toString());
    } catch (err) { setError("AI suggestion failed: " + err.message); }
    finally { setIsSuggestingDrink(false); }
  };
  const onCustomDrinkMlChange = (val) => {
    setCustomDrinkMl(val);
    // If we have an AI-derived rate, rescale the macro fields live so they always tally with the amount
    if (drinkRatePer100ml) {
      const ml = parseFloat(val) || 0;
      setCustomDrinkCal(Math.round(drinkRatePer100ml.cal * ml / 100).toString());
      setCustomDrinkProt((Math.round(drinkRatePer100ml.prot * ml / 100 * 10)/10).toString());
      setCustomDrinkCarb((Math.round(drinkRatePer100ml.carb * ml / 100 * 10)/10).toString());
      setCustomDrinkFat((Math.round(drinkRatePer100ml.fat * ml / 100 * 10)/10).toString());

  const removeDrink = async (id) => {
    setDayData(d => ({ ...d, drinks: (d.drinks||[]).filter(x=>x.id!==id) }));

  };
  const adjustWater = (delta) => {
    if (delta > 0) addDrink({ drink_type:"Water", amount_ml:delta, calories:0, sugar_g:0 });
    // negative adjust: remove the most recent water entry if it roughly matches, else ignore
    else {

  const openTargetModal = () => {

  const triggerQuickAdd = async (item) => {
    try {
      const meal = await DataAPI.addMeal(userId, {
        log_date: today, slot: activeSlot, name: item.name, calories: item.calories,
        protein: item.protein, carbs: item.carbs, fat: item.fat, confidence: "quick-log",
        logged_at: new Date().toISOString()
      });
      setDayData(d => ({ ...d, meals: [...d.meals, meal] }));
    } catch (err) { setError("Failed to add: " + err.message); }
  };

  // ── AI calls (Gemini, BYO key) ──
  const callGemini = async (body) => {
    const key = geminiKey.trim();
    if (!key) throw new Error("No API key set. Open Settings (gear icon) and paste your Gemini API key.");
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;
    const res = await fetch(url, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body) });
    if (!res.ok) {
      const errBody = await res.json().catch(() => ({}));
      const msg = errBody?.error?.message || `HTTP ${res.status}`;
      if (msg.includes("allowlist")) throw new Error("KEY_RESTRICTED");
      throw new Error(msg);
    }
    const data = await res.json();
    return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
  };

  const suggestManualDiet = async () => {
    setError(null);
    if (!manualDesc.trim()) { setError("Please write a food description first"); return; }
    setIsSuggesting(true);
    try {
      const raw = await callGemini({
        contents:[{ role:"user", parts:[{ text:`Analyze this food: "${manualDesc}". Output ONLY raw JSON, no code fences: {"calories":number,"protein":number,"carbs":number,"fat":number}` }] }]
      });
      const metrics = JSON.parse(raw.replace(/```json|```/gi,"").trim());
      setManualCal(metrics.calories?.toString()||"0");
      setManualProt(metrics.protein?.toString()||"0");
      setManualCarb(metrics.carbs?.toString()||"0");
      setManualFat(metrics.fat?.toString()||"0");
    } catch(err) {
      if (err.message === "KEY_RESTRICTED") setError("⚠️ Your key has domain restrictions. See Settings for a fix.");
      else setError("AI failed: " + err.message);
    } finally { setIsSuggesting(false); }
  };

  const analyzeImage = useCallback(async (file, type) => {
    if (!file) return;
    setError(null); setAnalysisType(type); setAnalyzing(true);
    let statusTimer = null;
    if (type === "meal") {
      const messages = ["Reading your photo...", "Identifying ingredients...", "Estimating portion sizes...", "Calculating calories & macros...", "Almost done..."];
      let idx = 0;
      setAnalyzeStatusMsg(messages[0]);
      statusTimer = setInterval(() => { idx = Math.min(idx+1, messages.length-1); setAnalyzeStatusMsg(messages[idx]); }, 2200);
    }
    try {
      const { dataUrl, base64, blob } = await compressImage(file, 1024, 0.75);
      const prompt = type === "meal"
        ? `You are a careful nutrition estimator. Look at this food photo and identify each distinct visible component (e.g. chicken, mashed potato, egg, salad, sauce). For each component, estimate a realistic portion size based on what's visible on the plate (use standard serving sizes as a reference point — e.g. a typical chicken thigh is ~120-150g, a scoop of mashed potato is ~150g — do not assume oversized restaurant portions unless the plate clearly shows one). Estimate calories and macros for each component based on that portion size. IMPORTANT: the overall "calories"/"protein"/"carbs"/"fat" fields MUST equal the exact sum of the "items" array values — do not estimate the total separately. Output ONLY raw JSON, no code fences: {"name":"overall meal name","calories":number,"protein":number,"carbs":number,"fat":number,"items":[{"item":"chicken","grams_estimate":number,"calories":number,"protein":number,"carbs":number,"fat":number}],"confidence":"high"}`
        : `Apple Watch workout summary. Output ONLY raw JSON, no code fences: {"calories":number,"activity":"activity name","duration":"45 min","heartRate":null}`;
      const raw = await callGemini({
        contents:[{ role:"user", parts:[{ text:prompt },{ inlineData:{ mimeType:"image/jpeg", data:base64 } }] }]
      });
      const parsed = JSON.parse(raw.replace(/```json|```/gi,"").trim());
      // Safety net: if itemized breakdown exists, the displayed/saved total is ALWAYS
      // recomputed as the exact sum of items — never trust two independently-estimated numbers.
      if (Array.isArray(parsed.items) && parsed.items.length > 0) {
        parsed.calories = parsed.items.reduce((s,it)=>s+Number(it.calories||0),0);
        parsed.protein  = parsed.items.reduce((s,it)=>s+Number(it.protein||0),0);
        parsed.carbs    = parsed.items.reduce((s,it)=>s+Number(it.carbs||0),0);
        parsed.fat      = parsed.items.reduce((s,it)=>s+Number(it.fat||0),0);
      }
      setPendingEntry({ ...parsed, type, image: dataUrl, _blob: blob });
    } catch(err) {
      if (err.message === "KEY_RESTRICTED") setError("⚠️ Your key has domain restrictions. See Settings for a fix.");
      else setError("Image analysis failed: " + err.message);
    } finally {
      if (statusTimer) clearInterval(statusTimer);
      setAnalyzing(false);
    }
  }, [geminiKey]);

  const confirmEntry = async () => {
    if (!pendingEntry) return;
    setSavingEntry(true);
    try {
      let imageUrl = null;
      if (pendingEntry._blob) {
        imageUrl = await uploadPhoto(userId, pendingEntry._blob, pendingEntry.type);
      }
      if (pendingEntry.type === "meal") {
        const meal = await DataAPI.addMeal(userId, {
          log_date: today, slot: activeSlot, name: pendingEntry.name, calories: pendingEntry.calories,
          protein: pendingEntry.protein||0, carbs: pendingEntry.carbs||0, fat: pendingEntry.fat||0,
          confidence: pendingEntry.confidence||"high", image_url: imageUrl,
          items: Array.isArray(pendingEntry.items) ? pendingEntry.items : null,
          logged_at: new Date().toISOString()
        });
        setDayData(d => ({ ...d, meals: [...d.meals, meal] }));
      } else {
        const w = await DataAPI.addWorkout(userId, {
          log_date: today, activity: pendingEntry.activity||"Workout", calories: pendingEntry.calories,
          duration: pendingEntry.duration, heart_rate: pendingEntry.heartRate, image_url: imageUrl, logged_at: new Date().toISOString()
        });
        setDayData(d => ({ ...d, workouts: [...(d.workouts||[]), w] }));
      }
      setPendingEntry(null);
    } catch (err) {
      setError("Failed to save: " + err.message);
    } finally {
      setSavingEntry(false);
    }
  };

  const addManualMeal = async () => {
    const cal = parseFloat(manualCal);
    if (!cal||cal<=0) return;
    try {
      const meal = await DataAPI.addMeal(userId, {
        log_date: today, slot: activeSlot, name: manualDesc||"Manual entry", calories: cal,
        protein: parseFloat(manualProt)||0, carbs: parseFloat(manualCarb)||0, fat: parseFloat(manualFat)||0,
        confidence: "manual", logged_at: new Date().toISOString()
      });
      setDayData(d => ({ ...d, meals: [...d.meals, meal] }));
      setManualCal(""); setManualDesc(""); setManualProt(""); setManualCarb(""); setManualFat("");
    } catch (err) { setError("Failed to add meal: " + err.message); }
  };

  const applyStepConversion = () => {
    const steps = parseFloat(stepCount);
    if (!steps || steps<=0) { setError("Enter a valid step count."); return; }
    const kcal = Math.round(steps * 0.04);
    setManualBurn(kcal.toString());
    if (!manualWorkoutDesc.trim()) setManualWorkoutDesc(`${steps.toLocaleString()} steps`);
  };
  const addManualBurn = async () => {
    const cal = parseFloat(manualBurn);
    if (!cal||cal<=0) return;
    try {
      const w = await DataAPI.addWorkout(userId, {
        log_date: today, activity: manualWorkoutDesc.trim() || "Manual workout", calories: cal, duration: "—",
        description: manualWorkoutDesc.trim() || null, logged_at: new Date().toISOString()
      });
      setDayData(d => ({ ...d, workouts: [...(d.workouts||[]), w] }));
      setManualBurn(""); setManualWorkoutDesc(""); setStepCount("");

  };

  const removeMeal = async (id) => {
    setDayData(d => ({ ...d, meals: d.meals.filter(m=>m.id!==id) }));

  };
  const removeMealFromHistory = async (id) => {
    setHistDayData(d => ({ ...d, meals: d.meals.filter(m=>m.id!==id) }));
    try { await DataAPI.deleteMeal(id); } catch (err) { setError("Failed to delete: " + err.message); }
  };
  const removeWorkoutFromHistory = async (id) => {
    setHistDayData(d => ({ ...d, workouts: (d.workouts||[]).filter(w=>w.id!==id) }));
    try { await DataAPI.deleteWorkout(id); } catch (err) { setError("Failed to delete: " + err.message); }
  };

  const addBackdatedEntry = async () => {
    const amount = parseFloat(backdateAmount);
    if (!amount || amount<=0) { setError("Enter a valid amount."); return; }
    try {
      if (backdateType === "meal") {
        const meal = await DataAPI.addMeal(userId, {
          log_date: historyDate, slot: backdateSlot, name: backdateDesc.trim()||"Logged meal", calories: amount,

        });

      } else if (backdateType === "workout") {

          log_date: historyDate, activity: backdateDesc.trim()||"Workout", calories: amount, duration:"—",

        });
        setHistDayData(d => ({ ...d, workouts: [...(d.workouts||[]), w] }));
        if (historyDate === today) setDayData(d => ({ ...d, workouts: [...(d.workouts||[]), w] }));
      } else {
        const d2 = await DataAPI.addDrink(userId, {
          log_date: historyDate, drink_type: backdateDesc.trim()||"Water", amount_ml: amount, calories:0, sugar_g:0,
          logged_at: new Date(historyDate+"T12:00:00").toISOString()
        });
        setHistDayData(d => ({ ...d, drinks: [...(d.drinks||[]), d2] }));
        if (historyDate === today) setDayData(d => ({ ...d, drinks: [...(d.drinks||[]), d2] }));
      }
      setBackdateDesc(""); setBackdateAmount("");
    } catch (err) { setError("Failed to add entry: " + err.message); }
  };

  const exportCSV = () => {
    const rows = [["Date","Type","Name","Calories","Protein(g)","Carbs(g)","Fat(g)","Amount(ml)","Notes"]];
    histRangeData.meals.forEach(m => rows.push([m.log_date,"Meal",m.name,m.calories,m.protein,m.carbs,m.fat,"",m.slot||""]));
    histRangeData.workouts.forEach(w => rows.push([w.log_date,"Workout",w.activity,-Math.abs(w.calories),"","","","",w.description||w.duration||""]));
    (histRangeData.drinks||[]).forEach(d => rows.push([d.log_date,"Drink",d.drink_type,d.calories||0,d.protein||0,d.carbs||0,d.fat||0,d.amount_ml,""]));
    rows.sort((a,b) => a[0]<b[0] ? -1 : a[0]>b[0] ? 1 : 0);
    const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `nutrilog_export_${todayKey()}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };
  const changeMealSlot = async (mealId, direction) => {
    const idx = SLOTS.indexOf(dayData.meals.find(m=>m.id===mealId)?.slot);
    if (idx === -1) return;
    const newIdx = Math.max(0, Math.min(SLOTS.length-1, idx + direction));
    const newSlot = SLOTS[newIdx];
    if (newSlot === SLOTS[idx]) return;
    setDayData(d => ({ ...d, meals: d.meals.map(m => m.id===mealId ? {...m, slot:newSlot} : m) }));
    try { await DataAPI.updateMeal(mealId, { slot: newSlot }); } catch (err) { setError("Failed to move meal: " + err.message); refreshToday(); }
  };
  const removeWorkout = async (id) => {
    setDayData(d => ({ ...d, workouts: (d.workouts||[]).filter(w=>w.id!==id) }));
    try { await DataAPI.deleteWorkout(id); } catch (err) { setError("Failed to delete: " + err.message); refreshToday(); }
  };

  const commitEdit = async () => {
    if (!editingItem) return;
    try {
      if (editingItem.type === "meal") {
        await DataAPI.updateMeal(editingItem.id, { name: editingItem.name, calories: editingItem.calories, protein: editingItem.protein, carbs: editingItem.carbs, fat: editingItem.fat });
        setDayData(d => ({ ...d, meals: d.meals.map(m => m.id===editingItem.id ? {...m,...editingItem} : m) }));
      } else {
        await DataAPI.updateWorkout(editingItem.id, { activity: editingItem.activity, calories: editingItem.calories, duration: editingItem.duration, heart_rate: editingItem.heartRate, description: editingItem.description });
        setDayData(d => ({ ...d, workouts: (d.workouts||[]).map(w => w.id===editingItem.id ? {...w,...editingItem} : w) }));
      }
      setEditingItem(null);
    } catch (err) { setError("Failed to update: " + err.message); }
  };

  const pct = (v,t) => Math.min(100, Math.round((v/t)*100));
  const todayQuote = MOTIVATIONAL_QUOTES[new Date().getDate() % MOTIVATIONAL_QUOTES.length];

  // ── Load range data for Dashboard analytics + History tab ──
  useEffect(() => {
    if (activeTab !== "history" && activeTab !== "today") return;
    if (activeTab === "history" && historyView === "day") {
      DataAPI.getDayData(userId, historyDate).then(setHistDayData).catch(()=>{});
    }
    const end = new Date();
    const start = new Date();
    start.setDate(start.getDate() - 180); // ~6 months, matches storage retention goal
    DataAPI.getRangeData(userId, start.toISOString().slice(0,10), end.toISOString().slice(0,10)).then(setHistRangeData).catch(()=>{});
  }, [activeTab, historyView, historyDate, userId]);

  const histConsumed = histDayData.meals.reduce((a,m)=>a+Number(m.calories),0) + (histDayData.drinks||[]).reduce((a,d)=>a+Number(d.calories||0),0);
  const histBurned = (histDayData.workouts||[]).reduce((a,w)=>a+Number(w.calories),0);
  const histTargets = computeTargetsLocal(histBurned);

  const last7Days = (() => {
    const byDate = {};
    histRangeData.meals.forEach(m => { (byDate[m.log_date] ||= {cons:0,burn:0,water:0}).cons += Number(m.calories||0); });
    histRangeData.workouts.forEach(w => { (byDate[w.log_date] ||= {cons:0,burn:0,water:0}).burn += Number(w.calories||0); });
    (histRangeData.drinks||[]).forEach(d => { const e = (byDate[d.log_date] ||= {cons:0,burn:0,water:0}); e.water += Number(d.amount_ml||0); e.cons += Number(d.calories||0); });
    const out = [];
    for (let i=6;i>=0;i--) {
      const d = new Date(); d.setDate(d.getDate()-i);
      const key = d.toISOString().slice(0,10);
      const entry = byDate[key] || {cons:0,burn:0,water:0};
      out.push({ label: d.toLocaleDateString("en-US",{weekday:"short"}).slice(0,1), consumed: entry.cons, burned: entry.burn, water: entry.water, key });
    }
    return out;
  })();

  const last30Stats = (() => {
    const byDate = {};
    histRangeData.meals.forEach(m => { (byDate[m.log_date] ||= {cons:0,burn:0,water:0}).cons += Number(m.calories||0); });
    histRangeData.workouts.forEach(w => { (byDate[w.log_date] ||= {cons:0,burn:0,water:0}).burn += Number(w.calories||0); });
    (histRangeData.drinks||[]).forEach(d => { const e = (byDate[d.log_date] ||= {cons:0,burn:0,water:0}); e.water += Number(d.amount_ml||0); e.cons += Number(d.calories||0); });
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-30);
    const cutoffKey = cutoff.toISOString().slice(0,10);
    const relevant = Object.keys(byDate).filter(k => k >= cutoffKey);
    const days = relevant.length || 1;
    const totalCons = relevant.reduce((s,k)=>s+byDate[k].cons,0);
    const totalBurn = relevant.reduce((s,k)=>s+byDate[k].burn,0);
    const totalWater = relevant.reduce((s,k)=>s+byDate[k].water,0);
    const deficitDays = relevant.filter(k => (byDate[k].cons - byDate[k].burn) < baseTargets.calories).length;
    return { avgConsumed: Math.round(totalCons/days), avgBurned: Math.round(totalBurn/days), avgWater: Math.round(totalWater/days), daysTracked: relevant.length, deficitDays };
  })();

  // ── Consecutive-day streak: counts back from yesterday (today is still in progress) ──
  const streakCount = (() => {
    const byDate = {};
    histRangeData.meals.forEach(m => { byDate[m.log_date] = (byDate[m.log_date]||0) + Number(m.calories||0); });
    histRangeData.workouts.forEach(w => { byDate[w.log_date] = (byDate[w.log_date]||0) - Number(w.calories||0); });
    (histRangeData.drinks||[]).forEach(d => { byDate[d.log_date] = (byDate[d.log_date]||0) + Number(d.calories||0); });
    let streak = 0;
    for (let i=1; i<=180; i++) {
      const d = new Date(); d.setDate(d.getDate()-i);
      const key = d.toISOString().slice(0,10);
      if (byDate[key] === undefined) break; // no data logged that day — streak ends
      if (byDate[key] <= baseTargets.calories) streak++;
      else break;
    }
    return streak;
  })();

  const hydrationMessage = (() => {
    if (achievedMilestone && achievedMilestone.ml > 2000) return achievedMilestone.comment;
    if (totalDrinkMl >= 2000) return "🎉 Daily goal reached — your body thanks you!";
    if (totalDrinkMl >= 1500) return "Almost there — just a bit more to hit 2L today.";
    if (totalDrinkMl >= 750) return "Good progress — keep sipping through the day.";
    if (totalDrinkMl > 0) return "Off to a start — try to drink a glass every hour or two.";
    return "Log your first drink to start tracking today's hydration.";
  })();

  const weeksData = (() => {
    const groups = {};
    const byDate = {};
    histRangeData.meals.forEach(m => { (byDate[m.log_date] ||= {meals:[],workouts:[],water:0,drinkCal:0}).meals.push(m); });
    histRangeData.workouts.forEach(w => { (byDate[w.log_date] ||= {meals:[],workouts:[],water:0,drinkCal:0}).workouts.push(w); });
    (histRangeData.drinks||[]).forEach(d => { const e = (byDate[d.log_date] ||= {meals:[],workouts:[],water:0,drinkCal:0}); e.water = (e.water||0) + Number(d.amount_ml||0); e.drinkCal = (e.drinkCal||0) + Number(d.calories||0); });
    Object.keys(byDate).forEach(k => {
      const date = new Date(k+"T00:00:00"); if (isNaN(date.getTime())) return;
      const range = getWeekRangeString(date);
      if (!groups[range]) groups[range] = { days:[], totalConsumed:0, totalBurned:0, totalWater:0, daysTracked:0 };
      const dData = byDate[k];
      const cons = dData.meals.reduce((s,m)=>s+Number(m.calories),0) + (dData.drinkCal||0);
      const burn = dData.workouts.reduce((s,w)=>s+Number(w.calories),0);
      groups[range].days.push({ key:k, dateStr:date.toLocaleDateString("en-US",{weekday:'short',day:'numeric'}), consumed:cons, burned:burn, water:dData.water });
      groups[range].totalConsumed+=cons; groups[range].totalBurned+=burn; groups[range].totalWater+=dData.water; groups[range].daysTracked+=1;
    });
    return groups;
  })();

  const monthsData = (() => {
    const groups = {};
    const byDate = {};
    histRangeData.meals.forEach(m => { (byDate[m.log_date] ||= {meals:[],workouts:[],water:0,drinkCal:0,drinkProt:0,drinkCarb:0,drinkFat:0}).meals.push(m); });
    histRangeData.workouts.forEach(w => { (byDate[w.log_date] ||= {meals:[],workouts:[],water:0,drinkCal:0,drinkProt:0,drinkCarb:0,drinkFat:0}).workouts.push(w); });
    (histRangeData.drinks||[]).forEach(d => { const e = (byDate[d.log_date] ||= {meals:[],workouts:[],water:0,drinkCal:0,drinkProt:0,drinkCarb:0,drinkFat:0}); e.water = (e.water||0) + Number(d.amount_ml||0); e.drinkCal = (e.drinkCal||0) + Number(d.calories||0); e.drinkProt = (e.drinkProt||0) + Number(d.protein||0); e.drinkCarb = (e.drinkCarb||0) + Number(d.carbs||0); e.drinkFat = (e.drinkFat||0) + Number(d.fat||0); });
    Object.keys(byDate).forEach(k => {
      const date = new Date(k+"T00:00:00"); if (isNaN(date.getTime())) return;
      const label = date.toLocaleDateString("en-US",{month:"long",year:"numeric"});
      if (!groups[label]) groups[label] = { days:[], totalConsumed:0, totalBurned:0, totalProtein:0, totalCarbs:0, totalFat:0, totalWater:0, totalWorkouts:0 };
      const dData = byDate[k];
      const cons = dData.meals.reduce((s,m)=>s+Number(m.calories),0) + (dData.drinkCal||0);
      const burn = dData.workouts.reduce((s,w)=>s+Number(w.calories),0);
      groups[label].days.push({ key:k, dateStr:date.toLocaleDateString("en-US",{month:'short',day:'numeric'}), consumed:cons, burned:burn, water:dData.water });
      groups[label].totalConsumed += cons;
      groups[label].totalBurned += burn;
      groups[label].totalProtein += dData.meals.reduce((s,m)=>s+Number(m.protein),0) + (dData.drinkProt||0);
      groups[label].totalCarbs += dData.meals.reduce((s,m)=>s+Number(m.carbs),0) + (dData.drinkCarb||0);
      groups[label].totalFat += dData.meals.reduce((s,m)=>s+Number(m.fat),0) + (dData.drinkFat||0);
      groups[label].totalWater += dData.water;
      groups[label].totalWorkouts += dData.workouts.length;
    });
    return groups;
  })();

  const C = THEMES[theme];

  if (loading) {
    return (
      <div style={{ minHeight:"100vh", background:C.bg, display:"flex", alignItems:"center", justifyContent:"center" }}>
        <div className="auth-spin" style={{ width:32, height:32, border:`3px solid ${C.border}`, borderTopColor:C.pink, borderRadius:"50%" }} />
      </div>
    );
  }

  return (
    <div style={{ minHeight:"100vh", background:C.bg, color:C.text, fontFamily:"'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" }}>
      <style>{`
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{width:3px}
        ::-webkit-scrollbar-thumb{background:${C.border};border-radius:6px}
        input,textarea{outline:none;font-family:inherit}
        .card{background:${C.card};border:1px solid ${C.border};border-radius:18px;transition:all .25s ease-out}
        .card:hover{border-color:${C.borderGlow};box-shadow:0 4px 16px ${theme==='dark'?'rgba(232,68,122,0.08)':'rgba(196,32,95,0.06)'}}
        .pink-btn{background:linear-gradient(135deg,${C.pinkDim},#9d174d);color:${C.text};border:none;border-radius:12px;padding:10px 20px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:.02em;transition:opacity .2s,transform .15s;box-shadow:0 4px 16px rgba(184,40,92,.28)}
        .pink-btn:hover{opacity:.88;transform:translateY(-1px)}

                          <div key={l} style={{ background:C.surface, padding:"8px 10px", borderRadius:12, textAlign:"center", border:theme==='light'?"1px solid #e8e4e8":"none" }}>
                            <div style={{ fontSize:9, color:C.textMuted, fontWeight:"700", fontFamily:"'DM Sans',sans-serif" }}>{l}</div>
                            <div style={{ fontSize:16, fontFamily:"'DM Sans',sans-serif", color:c, fontWeight:"800", marginTop:2 }}>{v}</div>
                          </div>
                        ))}
                      </div>
                      {isExpanded && (
                        <div style={{ marginTop:14, borderTop:`1px solid ${C.border}`, paddingTop:10 }}>
                          <div style={{ fontSize:11, fontWeight:"700", color:C.textMuted, marginBottom:8, fontFamily:"'DM Sans',sans-serif" }}>WEEKLY BREAKDOWN</div>
                          {w.days.map(d => (
                            <div key={d.key} className="hist-sub-row">
                              <span style={{ fontWeight:"700" }}>{d.dateStr}</span>
                              <span style={{ color:C.textMuted }}>Cons: <span style={{ color:C.pink, fontWeight:"700" }}>{Math.round(d.consumed)}</span> | Burn: <span style={{ color:C.green, fontWeight:"700" }}>{Math.round(d.burned)}</span> | Water: <span style={{ color:"#38bdf8", fontWeight:"700" }}>{d.water}ml</span></span>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}

            {historyView==="month" && (
              <div className="fade">
                {Object.keys(monthsData).length===0 ? (
                  <div style={{ textAlign:"center", padding:"40px 20px", color:C.textDim, fontStyle:"italic" }}>No monthly records found</div>
                ) : Object.keys(monthsData).map(mLabel => {
                  const m = monthsData[mLabel];
                  const daysTracked = m.days.length;
                  const avgCons = Math.round(m.totalConsumed/daysTracked);
                  const avgProt = Math.round(m.totalProtein/daysTracked);
                  const avgCarb = Math.round(m.totalCarbs/daysTracked);
                  const avgFat  = Math.round(m.totalFat/daysTracked);
                  const avgWater = Math.round(m.totalWater/daysTracked);
                  const isExpanded = expandedMonth===mLabel;
                  return (
                    <div key={mLabel} className="card" style={{ padding:"16px", marginBottom:14 }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", cursor:"pointer" }} onClick={() => setExpandedMonth(isExpanded?null:mLabel)}>
                        <div>
                          <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:16, fontWeight:"800", color:C.text }}>{mLabel}</div>
                          <div style={{ fontSize:12, color:C.textMuted, marginTop:4 }}>{daysTracked} total day(s) active</div>
                        </div>
                        <div style={{ fontSize:15, color:C.pink }}>{isExpanded?"▲":"▼"}</div>
                      </div>
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginTop:12 }}>
                        <div style={{ background:C.surface, padding:"8px 10px", borderRadius:12, border:theme==='light'?"1px solid #e8e4e8":"none" }}>
                          <div style={{ fontSize:9, color:C.textMuted, textAlign:"center", fontWeight:"700", fontFamily:"'DM Sans',sans-serif" }}>MONTHLY DAILY AVG</div>
                          <div style={{ fontSize:16, fontFamily:"'DM Sans',sans-serif", color:C.pink, fontWeight:"800", textAlign:"center", marginTop:4 }}>{avgCons} kcal</div>
                        </div>
                        <div style={{ background:C.surface, padding:"8px 10px", borderRadius:12, border:theme==='light'?"1px solid #e8e4e8":"none" }}>
                          <div style={{ fontSize:9, color:C.textMuted, textAlign:"center", fontWeight:"700", fontFamily:"'DM Sans',sans-serif" }}>TOTAL WORKOUTS</div>
                          <div style={{ fontSize:16, fontFamily:"'DM Sans',sans-serif", color:C.green, fontWeight:"800", textAlign:"center", marginTop:4 }}>{m.totalWorkouts} sessions</div>
                        </div>
                      </div>
                      <div style={{ marginTop:12, display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:6, borderTop:`1px solid ${C.border}`, paddingTop:10 }}>
                        {[["🥩 PRO",C.protein,avgProt+"g"],["🍞 CARB",C.carbs,avgCarb+"g"],["🥑 FAT",C.fat,avgFat+"g"],["💧 H2O","#38bdf8",avgWater+"ml"]].map(([l,c,v]) => (
                          <div key={l} style={{ textAlign:"center" }}>
                            <div style={{ fontSize:9, color:c, fontWeight:"700", fontFamily:"'DM Sans',sans-serif" }}>{l}</div>
                            <div style={{ fontSize:13, fontWeight:"700" }}>{v}</div>
                          </div>
                        ))}
                      </div>
                      {isExpanded && (
                        <div style={{ marginTop:14, borderTop:`1px solid ${C.border}`, paddingTop:10 }}>
                          <div style={{ fontSize:11, fontWeight:"700", color:C.textMuted, marginBottom:8, fontFamily:"'DM Sans',sans-serif" }}>DAILY SESSIONS</div>
                          {m.days.map(d => (
                            <div key={d.key} className="hist-sub-row">
                              <span style={{ fontWeight:"700" }}>{d.dateStr}</span>
                              <span style={{ color:C.textMuted }}>Net: <span style={{ color:C.pink, fontWeight:"700" }}>{Math.round(d.consumed-d.burned)} kcal</span> | Water: <span style={{ color:"#38bdf8", fontWeight:"700" }}>{d.water}ml</span></span>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}
      </div>

      {editingItem && (
        <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, backgroundColor:"rgba(10,10,13,0.55)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000, padding:"16px", backdropFilter:"blur(6px)" }}>
          <div className="card fade" style={{ width:"100%", maxWidth:"420px", padding:"20px", background:C.surface, borderColor:C.border }}>
            <div style={{ fontSize:18, fontWeight:"800", color:C.pink, marginBottom:16, fontFamily:"'DM Sans',sans-serif" }}>Modify Entry Data</div>
            <div style={{ display:"flex", flexDirection:"column", gap:12, marginBottom:20 }}>
              <div>
                <label style={{ fontSize:11, fontWeight:"700", color:C.textMuted, display:"block", marginBottom:4 }}>{editingItem.type==="meal"?"Meal Title":"Activity Name"}</label>
                <input className="inp" value={editingItem.name||editingItem.activity||""} onChange={e=>setEditingItem({...editingItem,name:e.target.value,activity:e.target.value})} />
              </div>
              <div>
                <label style={{ fontSize:11, fontWeight:"700", color:C.textMuted, display:"block", marginBottom:4 }}>🔥 Calories (kcal)</label>
                <input className="inp" type="number" value={editingItem.calories||""} onChange={e=>setEditingItem({...editingItem,calories:parseFloat(e.target.value)||0})} />
              </div>
              {editingItem.type==="meal" && (
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
                  <div><label style={{ fontSize:10, color:C.textMuted, fontWeight:"700", display:"block", marginBottom:4 }}>🥩 PRO (g)</label><input className="inp" type="number" value={editingItem.protein||0} onChange={e=>setEditingItem({...editingItem,protein:parseFloat(e.target.value)||0})} /></div>
                  <div><label style={{ fontSize:10, color:C.textMuted, fontWeight:"700", display:"block", marginBottom:4 }}>🍞 CARB (g)</label><input className="inp" type="number" value={editingItem.carbs||0} onChange={e=>setEditingItem({...editingItem,carbs:parseFloat(e.target.value)||0})} /></div>
                  <div><label style={{ fontSize:10, color:C.textMuted, fontWeight:"700", display:"block", marginBottom:4 }}>🥑 FAT (g)</label><input className="inp" type="number" value={editingItem.fat||0} onChange={e=>setEditingItem({...editingItem,fat:parseFloat(e.target.value)||0})} /></div>
                </div>
              )}
              {editingItem.type==="workout" && (
                <React.Fragment>
                  <div><label style={{ fontSize:11, fontWeight:"700", color:C.textMuted, display:"block", marginBottom:4 }}>📝 Description</label><input className="inp" value={editingItem.description||""} onChange={e=>setEditingItem({...editingItem,description:e.target.value})} placeholder="What did you do?" /></div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                    <div><label style={{ fontSize:11, fontWeight:"700", color:C.textMuted, display:"block", marginBottom:4 }}>🕒 Duration</label><input className="inp" value={editingItem.duration||""} onChange={e=>setEditingItem({...editingItem,duration:e.target.value})} /></div>
                    <div><label style={{ fontSize:11, fontWeight:"700", color:C.textMuted, display:"block", marginBottom:4 }}>❤️ Heart Rate</label><input className="inp" value={editingItem.heartRate||""} onChange={e=>setEditingItem({...editingItem,heartRate:e.target.value})} /></div>
                  </div>
                </React.Fragment>
              )}
            </div>
            <div style={{ display:"flex", gap:8 }}>
              <button className="ghost-btn" style={{ flex:1 }} onClick={() => setEditingItem(null)}>Cancel</button>
              <button className="pink-btn" style={{ flex:1.5 }} onClick={commitEdit}>Save Changes</button>
            </div>
          </div>
        </div>
      )}

      {showTargetModal && (
        <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, backgroundColor:"rgba(10,10,13,0.55)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000, padding:"16px", backdropFilter:"blur(6px)" }}>
          <div className="card fade" style={{ width:"100%", maxWidth:"420px", padding:"20px", background:C.surface, borderColor:C.border }}>
            <div style={{ fontSize:18, fontWeight:"800", color:C.pink, marginBottom:12, fontFamily:"'DM Sans',sans-serif" }}>Configure Baseline Goals</div>
            <div style={{ fontSize:13, fontStyle:"italic", color:C.textMuted, marginBottom:16 }}>Set your base daily nutrient values. Active workouts dynamically scale these targets!</div>
            <div style={{ display:"flex", flexDirection:"column", gap:12, marginBottom:20 }}>
              <div><label style={{ fontSize:11, fontWeight:"700", color:C.textMuted, display:"block", marginBottom:4 }}>⚡ Daily Calories Target (kcal)</label><input className="inp" type="number" value={tempCal} onChange={e=>setTempCal(e.target.value)} /></div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
                <div><label style={{ fontSize:10, color:C.textMuted, fontWeight:"700", display:"block", marginBottom:4 }}>🥩 PRO (g)</label><input className="inp" type="number" value={tempProt} onChange={e=>setTempProt(e.target.value)} /></div>
                <div><label style={{ fontSize:10, color:C.textMuted, fontWeight:"700", display:"block", marginBottom:4 }}>🍞 CARB (g)</label><input className="inp" type="number" value={tempCarb} onChange={e=>setTempCarb(e.target.value)} /></div>
                <div><label style={{ fontSize:10, color:C.textMuted, fontWeight:"700", display:"block", marginBottom:4 }}>🥑 FAT (g)</label><input className="inp" type="number" value={tempFat} onChange={e=>setTempFat(e.target.value)} /></div>
              </div>
            </div>
            <div style={{ display:"flex", gap:8 }}>
              <button className="ghost-btn" style={{ flex:1 }} onClick={() => setShowTargetModal(false)}>Cancel</button>
              <button className="pink-btn" style={{ flex:1.5 }} onClick={saveCustomTargets}>Save Custom Goals</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ════════════════════════════════════════════════════════════
// ROOT — handles auth session state
// ════════════════════════════════════════════════════════════
function Root() {
  const [session, setSession] = useState(undefined); // undefined = checking, null = logged out

  useEffect(() => {
    supabase.auth.getSession().then(({ data }) => setSession(data.session));
    const { data: listener } = supabase.auth.onAuthStateChange((_event, sess) => setSession(sess));
    return () => listener.subscription.unsubscribe();
  }, []);

  if (session === undefined) {
    return (
      <div style={{ minHeight:"100vh", background:"#0a0a0d", display:"flex", alignItems:"center", justifyContent:"center" }}>
        <div className="auth-spin" style={{ width:32, height:32, border:"3px solid #26262d", borderTopColor:"#e8447a", borderRadius:"50%" }} />
      </div>
    );
  }
  if (!session) {
    return <AuthScreen onAuthed={setSession} />;
  }
  return <NutriLogPro session={session} onLogout={() => supabase.auth.signOut()} />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Root />);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
        
    </script>
</body>

                  {isSuggesting ? <div className="spin" style={{ width:14, height:14, border:`2px solid ${C.border}`, borderTopColor:C.pink, borderRadius:"50%" }} /> : L("✨ Suggest","✨ AI建议")}
                </button>
              </div>
              <div style={{ display:"flex", gap:8, marginBottom:14 }}>
                <div style={{ flex:1 }}>
                  <label style={{ fontSize:10, color:C.textMuted, display:"block", marginBottom:4, fontWeight:"700" }}>🔥 {L("TOTAL KCAL","总热量")}</label>
                  <input className="inp" type="number" value={manualCal} onChange={e=>setManualCal(e.target.value)} placeholder="0" />
                </div>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:14 }}>
                <div><label style={{ fontSize:10, color:C.textMuted, display:"block", marginBottom:4, fontWeight:"700" }}>🥩 {L("PROTEIN (g)","蛋白质 (g)")}</label><input className="inp" type="number" value={manualProt} onChange={e=>setManualProt(e.target.value)} placeholder="0" /></div>
                <div><label style={{ fontSize:10, color:C.textMuted, display:"block", marginBottom:4, fontWeight:"700" }}>🍞 {L("CARBS (g)","碳水 (g)")}</label><input className="inp" type="number" value={manualCarb} onChange={e=>setManualCarb(e.target.value)} placeholder="0" /></div>
                <div><label style={{ fontSize:10, color:C.textMuted, display:"block", marginBottom:4, fontWeight:"700" }}>🥑 {L("FAT (g)","脂肪 (g)")}</label><input className="inp" type="number" value={manualFat} onChange={e=>setManualFat(e.target.value)} placeholder="0" /></div>
              </div>
              <div style={{ fontSize:10, color:C.textMuted, fontWeight:"700", letterSpacing:"0.05em", marginBottom:8 }}>{L("ALSO TRACK (OPTIONAL)","其他记录 (可选)")}</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:14 }}>
                <div><label style={{ fontSize:10, color:C.textMuted, display:"block", marginBottom:4, fontWeight:"700" }}>🍬 {L("SUGAR (g)","糖 (g)")}</label><input className="inp" type="number" value={manualSugar} onChange={e=>setManualSugar(e.target.value)} placeholder="0" /></div>
                <div><label style={{ fontSize:10, color:C.textMuted, display:"block", marginBottom:4, fontWeight:"700" }}>🧂 {L("SODIUM (mg)","钠 (mg)")}</label><input className="inp" type="number" value={manualSodium} onChange={e=>setManualSodium(e.target.value)} placeholder="0" /></div>
                <div><label style={{ fontSize:10, color:C.textMuted, display:"block", marginBottom:4, fontWeight:"700" }}>🌾 {L("FIBER (g)","纤维 (g)")}</label><input className="inp" type="number" value={manualFiber} onChange={e=>setManualFiber(e.target.value)} placeholder="0" /></div>
              </div>
              <div style={{ display:"flex", gap:8 }}>
                <button className="pink-btn" style={{ flex:1 }} onClick={addManualMeal}>+ {L("Add Meal","添加餐食")}</button>
                <button className="ghost-btn" title={L("Save as favorite for quick re-logging","收藏以便快速再次记录")} style={{ padding:"10px 14px", borderColor:C.pink, color:C.pink, fontSize:16 }}
                  onClick={() => {
                    const cal = parseFloat(manualCal);
                    if (!cal||cal<=0) { setError(L("Enter calories before saving a favorite.","请先输入热量再收藏。")); return; }
                    saveFavorite("meal", { name: manualDesc.trim()||"Manual entry", calories: cal, protein: parseFloat(manualProt)||0, carbs: parseFloat(manualCarb)||0, fat: parseFloat(manualFat)||0, sugar_g: parseFloat(manualSugar)||0, sodium_mg: parseFloat(manualSodium)||0, fiber_g: parseFloat(manualFiber)||0, default_slot: activeSlot });
                  }}>☆</button>
              </div>

                    <div style={{ fontSize:12, fontWeight:"800", color:C.pink, marginBottom:8, letterSpacing:"0.02em" }}>{release.date}</div>
                    <ul style={{ fontSize:12, color:C.text, lineHeight:1.7, paddingLeft:16, margin:0 }}>
                      {release.items.map((item,i) => <li key={i} style={{ marginBottom:4 }}>{item}</li>)}
                    </ul>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ════════════════════════════════════════════════════════════
// ROOT — handles auth session state
// ════════════════════════════════════════════════════════════
function Root() {
  const [session, setSession] = useState(undefined); // undefined = checking, null = logged out
  const [authError, setAuthError] = useState(null);

  useEffect(() => {
    let settled = false;
    const timeout = setTimeout(() => {
      if (settled) return;
      // Known supabase-js bug: getSession() can hang indefinitely with no error/network log.
      // Workaround: check localStorage directly for a cached session token before giving up.
      try {
        const storageKey = Object.keys(localStorage).find(k => k.startsWith('sb-') && k.endsWith('-auth-token'));
        if (storageKey) {
          const cached = JSON.parse(localStorage.getItem(storageKey));
          if (cached?.access_token && cached?.user) {
            settled = true;
            setSession(cached);
            return;
          }
        }
      } catch (e) { /* fall through to error state */ }
      setAuthError("Connection to Supabase timed out after 10s. This can happen due to a known Supabase client issue — try reloading. If it persists, check your internet connection or Supabase project status.");
    }, 10000);

    supabase.auth.getSession()
      .then(({ data, error }) => {
        settled = true;
        clearTimeout(timeout);
        if (error) { setAuthError(error.message); return; }
        setAuthError(null); // clear a stale timeout error if this resolved late
        setSession(data.session);
      })
      .catch((err) => {
        settled = true;
        clearTimeout(timeout);
        setAuthError(err.message || String(err));
      });

    const { data: listener } = supabase.auth.onAuthStateChange((_event, sess) => setSession(sess));
    return () => { clearTimeout(timeout); listener.subscription.unsubscribe(); };
  }, []);

  if (authError) {
    const C = THEMES.dark;
    return (
      <div style={{ minHeight:"100vh", background:C.bg, color:C.text, display:"flex", alignItems:"center", justifyContent:"center", padding:20, textAlign:"center", fontFamily:"-apple-system,sans-serif" }}>
        <div>
          <div style={{ fontSize:15, fontWeight:700, marginBottom:10, color:C.red }}>⚠️ {(localStorage.getItem("nutrilog_lang")||"en")==="zh" ? "连接失败" : "Couldn't connect"}</div>
          <div style={{ fontSize:13, color:C.textMuted, marginBottom:16, maxWidth:320 }}>{authError}</div>
          <button onClick={() => window.location.reload()} style={{ background:C.pink, color:"#fff", border:"none", borderRadius:10, padding:"10px 20px", fontSize:14, cursor:"pointer" }}>{(localStorage.getItem("nutrilog_lang")||"en")==="zh" ? "重试" : "Retry"}</button>
        </div>
      </div>
    );
  }

  if (session === undefined) {
    const C = THEMES.dark;
    return (
      <div style={{ minHeight:"100vh", background:C.bg, display:"flex", alignItems:"center", justifyContent:"center" }}>
        <div className="auth-spin" style={{ width:32, height:32, border:`3px solid ${C.border}66`, borderTopColor:C.pink, borderRadius:"50%" }} />
      </div>
    );
  }
  if (!session) {
    return <AuthScreen onAuthed={setSession} />;
  }
  return <NutriLogPro session={session} onLogout={() => supabase.auth.signOut()} />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Root />);

    </script>
</body>

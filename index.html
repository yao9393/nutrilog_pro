// translate(lang, key) — falls back to English, then to the raw key, so a missing
// translation never renders blank while more strings are added in future passes.
function translate(lang, key) {
  return STRINGS[lang]?.[key] ?? STRINGS.en[key] ?? key;
}

// Slot names are always stored in English as DB keys — this only affects display.
function slotLabel(slot, lang) {
  return translate(lang, `slot_${slot}`);
}

// Appended to Gemini prompts so AI-generated meal names / suggestions come back
// in the user's selected display language.
function geminiLangInstruction(lang) {
  return lang === "zh" ? " Respond in Simplified Chinese." : "";
}

// Shared meal-photo analysis prompt — used for the initial photo capture, the pending-entry
// "Retry AI" button, and the edit-modal "AI Retry" button, so the estimation logic can't drift
// out of sync between the three entry points.
function buildMealAnalysisPrompt(lang) {
  return `You are a careful nutrition estimator. Look at this food photo and identify each distinct visible component (e.g. chicken, mashed potato, egg, salad, sauce). For each component, estimate a realistic portion size based on what's visible on the plate (use standard serving sizes as a reference point — e.g. a typical chicken thigh is ~120-150g, a scoop of mashed potato is ~150g — do not assume oversized restaurant portions unless the plate clearly shows one). Estimate calories, macros, sugar, sodium, and fiber for each component based on that portion size. IMPORTANT: the overall "calories"/"protein"/"carbs"/"fat"/"sugar"/"sodium"/"fiber" fields MUST equal the exact sum of the "items" array values — do not estimate the total separately. Output ONLY raw JSON, no code fences: {"name":"overall meal name","calories":number,"protein":number,"carbs":number,"fat":number,"sugar":number,"sodium":number,"fiber":number,"items":[{"item":"chicken","grams_estimate":number,"calories":number,"protein":number,"carbs":number,"fat":number,"sugar":number,"sodium":number,"fiber":number}],"confidence":"high"}${geminiLangInstruction(lang)}`;
}

// Parses a raw Gemini meal-analysis response and, when an itemized breakdown is present, always
// recomputes the totals as the exact sum of items — never trusts two independently-estimated
// numbers to already agree.
function parseMealAnalysis(raw) {
  const parsed = JSON.parse(raw.replace(/```json|```/gi,"").trim());
  if (Array.isArray(parsed.items) && parsed.items.length > 0) {
    parsed.calories = parsed.items.reduce((s,it)=>s+Number(it.calories||0),0);
    parsed.protein  = parsed.items.reduce((s,it)=>s+Number(it.protein||0),0);
    parsed.carbs    = parsed.items.reduce((s,it)=>s+Number(it.carbs||0),0);
    parsed.fat      = parsed.items.reduce((s,it)=>s+Number(it.fat||0),0);
    parsed.sugar    = parsed.items.reduce((s,it)=>s+Number(it.sugar||0),0);
    parsed.sodium   = parsed.items.reduce((s,it)=>s+Number(it.sodium||0),0);
    parsed.fiber    = parsed.items.reduce((s,it)=>s+Number(it.fiber||0),0);
  }
  return parsed;
}

function todayKey(cutoffHour) {
  const now = new Date();
  // If a cutoff hour is set (e.g. 2am for late-night supper), treat times before
  // that hour as still belonging to the previous day.
  if (cutoffHour && now.getHours() < cutoffHour) {
    now.setDate(now.getDate() - 1);
  }
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}
function localDateKey(dateObj) {
  const y = dateObj.getFullYear();
  const m = String(dateObj.getMonth()+1).padStart(2,'0');
  const d = String(dateObj.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}
// Returns the Monday of the calendar week containing dateKey (as a "YYYY-MM-DD" string).
// Used to look up which weekly plan snapshot was active for a given date.
// Gamified C -> SSS grade scale (never drops to a failing grade) with +/- refinement within each
// tier. Used by both the weekly report card and the Achievements best-week/best-month lookups.
function gradeForScore(score, C) {
  const bands = [95, 85, 75, 60, 45, 0];
  const bases = ["SSS","SS","S","A","B","C"];
  const idx = bands.findIndex(b => score >= b);
  const ceiling = idx > 0 ? bands[idx-1] : 100;
  const floor = bands[idx];
  const span = ceiling - floor || 1;
  const pos = (score - floor) / span;
  const suffix = pos >= 0.67 ? "+" : pos >= 0.34 ? "" : "-";
  // A single, theme-matching accent color for every grade (rather than a different color per
  // tier) — the letter itself already communicates rank, and this way the badge always suits
  // whichever mood palette is selected instead of mixing in colors that may clash with it.
  return { grade: bases[idx] + suffix, color: C.pink, base: bases[idx] };
}

// Smooth piecewise-linear interpolation between (x, score) anchor points — used so each nutrient's
// scoring curve is just a short list of "at this %, give this score" points instead of error-prone
// nested if/else, and stays monotonic (no accidental dips) between them.
function interpolateScore(x, points) {
  if (x <= points[0][0]) return points[0][1];
  const last = points[points.length-1];
  if (x >= last[0]) return last[1];
  for (let i=0; i<points.length-1; i++) {
    const [x1,y1] = points[i], [x2,y2] = points[i+1];
    if (x >= x1 && x <= x2) {
      const t = (x-x1)/(x2-x1);
      return Math.round(y1 + (y2-y1)*t);
    }
  }
  return last[1];
}

// Calories: scored on "offPct" (0 = exactly on target; negative = achieving further in the healthy
// direction than the plan required — e.g. eating even less on a cut; positive = drifting the wrong
// way — e.g. eating more on a cut). Rewards exceeding the plan up to a point (-20, i.e. 20% further
// in the healthy direction), but caps the reward there rather than continuing to reward more extreme
// under/over-eating indefinitely. Crosses into C territory once off by +20 (120% of target) in the
// unhealthy direction, per "if higher than 120%, rate as C — ask them to recalibrate their plan."
const CAL_CURVE = [[-20,100],[-10,90],[0,70],[20,20],[40,0]];

// Higher-is-better nutrients (protein, fiber): meeting target is solid, exceeding it generously
// ("breaking the limit", 125%+) maxes out at SSS.
const HIGHER_BETTER_CURVE = [[0,10],[80,64],[100,80],[125,100]];

// Lower-is-better nutrients (sugar, fat, sodium): staying comfortably under target/limit (80% or
// less) maxes out at SSS; drifting over climbs down through the grades, reaching C around 120%.
const LOWER_BETTER_CURVE = [[0,100],[80,100],[100,75],[120,45],[140,10]];

// Workout: scored on average daily calories burned (not just "did you log anything"). 0-250kcal
// (roughly just daily steps/incidental movement) is locked to the C-B range — still counts for
// something, since rest days are a legitimate part of training, not a failure — then scales up
// smoothly through the grades, reaching SSS at 700kcal+.
const WORKOUT_CURVE = [[0,25],[250,58],[400,75],[550,88],[700,100]];

function getMondayKey(dateKey) {
  const d = new Date(dateKey+"T00:00:00");
  const dow = d.getDay(); // 0=Sun..6=Sat
  const offset = dow === 0 ? -6 : 1 - dow;
  d.setDate(d.getDate() + offset);
  return localDateKey(d);
}

function blankDayStats() {

}
// ISO-ish week number for a given Monday-anchored date — used by the streak widget, workout
// trend, previous-week analysis, and plan trend blocks (previously the same IIFE copy-pasted
// four times).
function getWeekNumOf(monday) {
  const onejan = new Date(monday.getFullYear(),0,1);
  return Math.ceil((((monday - onejan) / 86400000) + onejan.getDay()+1) / 7);
}
// Simple 20-100 "closer to target is better, either direction" score from a deviation
// percentage — used for the carbs category score (previously duplicated in two places).
function deviationScore(devPct) {
  return Math.max(20, Math.min(100, Math.round(100 - Math.abs(devPct)*1.5)));
}

function formatMealFlag(meal, lang) {

  const parts = [];
  if (meal.flag_occasion) parts.push(meal.flag_occasion === "work" ? (lang==="zh"?"工作":"Work") : (lang==="zh"?"个人":"Personal"));

// ── BMR (Mifflin-St Jeor) + activity multiplier → daily calorie target ──
const ACTIVITY_MULTIPLIERS = { sedentary:1.2, light:1.375, moderate:1.55, active:1.725, very_active:1.9 };
// Protein and fat both scale with activity level (reusing the same field already driving TDEE),
// not just goal — someone training hard needs meaningfully more protein for repair/growth than a
// sedentary person at the same weight and goal, and correspondingly less room is needed for fat
// (freeing calories toward protein/carbs instead). Protein g/kg stays within the ISSN-cited
// 1.6-2.2 g/kg evidence range throughout; fat % stays within the 20-35% AMDR range.
const PROTEIN_PER_KG_BY_ACTIVITY = { sedentary:1.4, light:1.6, moderate:1.8, active:2.0, very_active:2.2 };
const FAT_PCT_BY_ACTIVITY = { sedentary:0.30, light:0.27, moderate:0.25, active:0.22, very_active:0.20 };
function macroProfileForActivity(activityLevel, isGain) {
  const base = PROTEIN_PER_KG_BY_ACTIVITY[activityLevel] || 1.8;
  const proteinPerKg = Math.min(2.2, base + (isGain ? 0.2 : 0)); // gain gets a small bump, capped at the evidence ceiling
  const fatPct = FAT_PCT_BY_ACTIVITY[activityLevel] || 0.25;
  return { proteinPerKg, fatPct };
}
const ACTIVITY_LABELS = { sedentary:"Sedentary (little/no exercise)", light:"Light (1-3 days/week)", moderate:"Moderate (3-5 days/week)", active:"Active (6-7 days/week)", very_active:"Very active (physical job/2x day)" };
const ACTIVITY_LABELS_ZH = { sedentary:"久坐 (几乎不运动)", light:"轻度 (每周1-3天)", moderate:"中度 (每周3-5天)", active:"活跃 (每周6-7天)", very_active:"非常活跃 (体力工作/每天2次)" };
function activityLabel(key, lang) { return (lang==="zh" ? ACTIVITY_LABELS_ZH : ACTIVITY_LABELS)[key]; }
function calcBMRTargets({ gender, heightCm, birthYear, weightKg, activityLevel, goal }) {
  if (!gender || !heightCm || !weightKg) return null;
  const age = birthYear ? (new Date().getFullYear() - birthYear) : 30;
  const bmr = gender === "male"
    ? 10*weightKg + 6.25*heightCm - 5*age + 5
    : 10*weightKg + 6.25*heightCm - 5*age - 161;
  const tdee = bmr * (ACTIVITY_MULTIPLIERS[activityLevel] || 1.55);
  const calorieAdjust = goal === "lose" ? -500 : goal === "gain" ? 300 : 0;
  const calories = Math.max(1200, Math.round(tdee + calorieAdjust));
  // Protein and fat both scale with activity level, not just goal (see macroProfileForActivity) —
  // someone training hard needs meaningfully more protein than a sedentary person at the same
  // weight/goal, with fat giving up room to make space for it. Fat is a % of calories, not fixed
  // grams — a fixed-gram baseline looked fine at moderate calories but became an unreasonably
  // small % share at high intake (e.g. just 13% of calories at 4000kcal) while risking crowding
  // out carbs at very low intake.
  const { proteinPerKg, fatPct } = macroProfileForActivity(activityLevel, goal === "gain");
  const minFatPerKg = 0.5; // hard floor for essential-fatty-acid/hormonal health at very low calories
  const protein = Math.round(proteinPerKg * weightKg);
  const fat = Math.max(Math.round(minFatPerKg * weightKg), Math.round((calories*fatPct)/9));
  const carbs = Math.round(Math.max(0, calories - protein*4 - fat*9)/4);
  return { calories, protein, carbs, fat, bmr: Math.round(bmr), tdee: Math.round(tdee) };
}

// Returns a `key` instead of a hardcoded color so the caller can look up the right
// color from the current palette (see BMI_CATEGORY_COLOR_KEY below).
function calcBMI(weightKg, heightCm) {
  if (!weightKg || !heightCm) return null;
  const heightM = heightCm / 100;
  const bmi = weightKg / (heightM*heightM);
  let category, key;
  if (bmi < 18.5) { category = "Underweight"; key = "under"; }
  else if (bmi < 25) { category = "Healthy range"; key = "healthy"; }
  else if (bmi < 30) { category = "Overweight"; key = "over"; }
  else { category = "Obese range"; key = "obese"; }
  return { value: Math.round(bmi*10)/10, category, key };
}
// Reverse of per-component grams editing: change the TOTAL calories, and every component's
// grams+kcal plus every macro scales down (or up) by the same ratio to match. fieldNames lets
// the same function serve both PendingCard's field names (sugar/sodium/fiber) and the saved-meal
// edit modal's DB column names (sugar_g/sodium_mg/fiber_g).
function scaleMealToTotal(data, newTotal, fieldNames) {
  const { sugarKey="sugar", sodiumKey="sodium", fiberKey="fiber" } = fieldNames || {};
  const oldTotal = data.calories || 0;
  const roundedNew = Math.max(0, Math.round(newTotal || 0));
  if (!oldTotal || oldTotal <= 0) return { ...data, calories: roundedNew };
  const ratio = roundedNew / oldTotal;
  const scaledItems = Array.isArray(data.items) ? data.items.map(it => ({
    ...it,
    calories: Math.round((it.calories||0) * ratio),
    grams_estimate: it.grams_estimate ? Math.round(it.grams_estimate * ratio) : it.grams_estimate,
  })) : data.items;
  const out = { ...data, calories: roundedNew, items: scaledItems };
  out.protein = Math.round((data.protein||0) * ratio * 10) / 10;
  out.carbs = Math.round((data.carbs||0) * ratio * 10) / 10;
  out.fat = Math.round((data.fat||0) * ratio * 10) / 10;
  out[sugarKey] = Math.round((data[sugarKey]||0) * ratio * 10) / 10;
  out[sodiumKey] = Math.round((data[sodiumKey]||0) * ratio);
  out[fiberKey] = Math.round((data[fiberKey]||0) * ratio * 10) / 10;
  return out;
}
// Maps a BMI category key to the palette color key that should represent it.
const BMI_CATEGORY_COLOR_KEY = { under:"water", healthy:"green", over:"caution", obese:"red" };
// ── Recommended daily water intake, personalized by body weight (~33ml/kg, standard guidance) ──
function calcWaterTarget(weightKg, activityLevel, workoutBurnedKcal) {
  const base = weightKg ? weightKg * 33 : 2000; // fallback to 2000ml if no weight logged yet
  const activityBonus = { sedentary:0, light:150, moderate:300, active:500, very_active:700 }[activityLevel] || 300;
  // Extra hydration for today's actual logged workouts — roughly 500ml per 350kcal burned through
  // exercise, a standard sports-science rule of thumb (replacing sweat losses), on top of the
  // baseline activity-level bonus above.
  const workoutBonus = workoutBurnedKcal ? Math.round((workoutBurnedKcal / 350) * 500) : 0;
  const target = Math.round((base + activityBonus + workoutBonus) / 50) * 50; // round to nearest 50ml
  return Math.max(1500, Math.min(target, 5000)); // sensible floor/ceiling
}
// Small, CAPPED sodium allowance bump for real sweat/electrolyte loss from today's workouts —
// deliberately not proportional to burned calories the way carbs/protein are, since sodium need
// doesn't keep climbing indefinitely the way fuel/repair needs do. Caps at +800mg regardless of
// how much was burned.
function sodiumWorkoutBonus(burnedKcal) {
  if (!burnedKcal) return 0;
  return Math.min(800, Math.round((burnedKcal/350) * 300));
}

const getWeekRangeString = (dateObj) => {
  const current = new Date(dateObj);
  const day = current.getDay();
  const diff = current.getDate() - day + (day === 0 ? -6 : 1);
  const monday = new Date(current.setDate(diff));
  const sunday = new Date(current.setDate(monday.getDate() + 6));
  return `${monday.toLocaleDateString("en-US",{month:"short",day:"numeric"})} - ${sunday.toLocaleDateString("en-US",{month:"short",day:"numeric"})}`;
};

// ── Image compression helper (resize before upload to save storage) ──
function compressImage(file, maxDim = 1024, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) { height = height * (maxDim/width); width = maxDim; }
        else if (height > maxDim) { width = width * (maxDim/height); height = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        canvas.toBlob((blob) => {
          const fr = new FileReader();
          fr.onload = () => resolve({ blob, dataUrl: fr.result, base64: fr.result.split(",")[1] });
          fr.readAsDataURL(blob);
        }, 'image/jpeg', quality);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function uploadPhoto(userId, blob, prefix) {
  const fileName = `${userId}/${prefix}_${Date.now()}.jpg`;
  const { error } = await supabase.storage.from('diet-photos').upload(fileName, blob, { contentType: 'image/jpeg' });
  if (error) { console.error('Upload failed:', error); return null; }
  const { data } = supabase.storage.from('diet-photos').getPublicUrl(fileName);
  return data.publicUrl;
}

const ProgressBar = React.memo(function ProgressBar({ val, target, color, theme, mode, unit, accentLabel, C }) {
  const p = Math.min(100, Math.round((val/target)*100));
  const actualPct = target ? (val/target)*100 : 0;
  const bg = C.cardHover;
  const textMuted = C.textMuted;
  const u = unit || "kcal";
  let overColor, statusLabel;
  if (mode === "gain-band") {
    // For gain-weight plans — under-eating is the concern; hitting/exceeding target is the win
    overColor = actualPct >= 100 ? C.green : actualPct >= 80 ? C.caution : C.red;
    statusLabel = actualPct >= 100 ? `${Math.round(val-target)} over goal 🎉` : `${Math.round(target-val)} more to go`;
  } else if (mode === "caution-band") {
    // For things with a real ceiling (calories) — going over is something to watch, escalating past 120%
    overColor = actualPct <= 100 ? C.green : actualPct <= 120 ? C.caution : C.red;
    statusLabel = actualPct <= 100 ? `${Math.round(target-val)} left` : actualPct <= 120 ? `${Math.round(val-target)} over (fine)` : `${Math.round(val-target)} over (caution)`;
  } else {
    // For things where more is simply better (water) — exceeding target is good news, not a warning
    overColor = accentLabel ? color : C.green;
    statusLabel = target-val>0 ? `${Math.round(target-val)} left` : `${Math.round(val-target)} over goal 🎉`;
  }
  // Bar fill width is always capped at 100% so the bar never overflows visually.
  // The displayed percentage text is the real, uncapped value, and its position
  // tracks the right edge of the fill (so at 80% it sits near the right, not dead-center).
  const labelInside = p >= 14; // enough room to fit text inside the fill
  return (
    <div>
      <div style={{ position:"relative", height:12, background:bg, borderRadius:6, overflow:"hidden" }}>
        <div style={{ height:"100%", width:`${p}%`, background:`linear-gradient(90deg, color-mix(in srgb, ${color} 100%, white 35%), color-mix(in srgb, ${color} 100%, black 15%))`, borderRadius:6, transition:"width .6s ease", boxShadow:`0 0 6px ${color}40` }} />
        <div style={{
          position:"absolute", top:0, bottom:0, display:"flex", alignItems:"center",
          left: labelInside ? "auto" : `calc(${p}% + 6px)`,
          right: labelInside ? `calc(${100-p}% + 6px)` : "auto",
          fontSize:10, fontWeight:"800",
          color: labelInside ? "#fff" : C.text,
          textShadow: labelInside ? "0 1px 2px rgba(0,0,0,0.5)" : "none",
          letterSpacing:"0.01em", whiteSpace:"nowrap"
        }}>
          {Math.round(actualPct)}%
        </div>
      </div>
      <div style={{ display:"flex", justifyContent:"space-between", marginTop:4 }}>
        <span style={{ fontSize:11, color:textMuted }}>of {Math.round(target)} {u}</span>
        <span style={{ fontSize:11, color:overColor, fontWeight:"600" }}>{statusLabel}</span>
      </div>
    </div>
  );
});

// Shared "flag this meal" editor — same toggle + occasion/location/comment fields used both
// inside the meal edit modal (flag any meal directly) and inside the daily-login streak's red
// circle picker (pick which meal caused a missed day, then fill in the same fields). One
// component so the two entry points can never visually or behaviorally drift apart.
// Lets the person crop out background clutter (plate edge, table, hands) from a just-taken
// photo before it becomes the entry's photo — a tighter frame around just the food noticeably
// helps "AI Photo Search" focus on what matters. Pointer events (not separate mouse/touch
// handlers) so drag-to-move and drag-corner-to-resize both work on desktop and mobile alike.
// Fullscreen enlarged photo viewer — tap anywhere (backdrop, image, or the × button) to close.
// Deliberately simple: no pinch-zoom or swipe, just "see it bigger," since that's all Gallery
// and the Best Meal feed's small thumbnails actually need.
function PhotoLightbox({ src, onClose }) {

function PhotoCropModal({ imageDataUrl, onConfirm, onSkip, onCancel, C, lang }) {
  const imgRef = useRef();
  const [imgLoaded, setImgLoaded] = useState(false);
  const [natural, setNatural] = useState({ w:0, h:0 });
  const [display, setDisplay] = useState({ w:0, h:0 });
  const [box, setBox] = useState(null); // {x,y,w,h} in CSS px, relative to the image's own top-left
  const dragRef = useRef(null);

  const clampBox = (b, dispW, dispH) => {
    let { x, y, w, h } = b;
    const minSize = 40;
    w = Math.max(minSize, Math.min(w, dispW));
    h = Math.max(minSize, Math.min(h, dispH));
    x = Math.max(0, Math.min(x, dispW - w));
    y = Math.max(0, Math.min(y, dispH - h));
    return { x, y, w, h };
  };

  const onImgLoad = (e) => {
    const img = e.target;
    const rect = img.getBoundingClientRect();
    setNatural({ w: img.naturalWidth, h: img.naturalHeight });
    setDisplay({ w: rect.width, h: rect.height });
    const inset = 0.08;
    setBox({ x: rect.width*inset, y: rect.height*inset, w: rect.width*(1-2*inset), h: rect.height*(1-2*inset) });
    setImgLoaded(true);
  };

  const handlePointerDown = (mode) => (e) => {
    e.preventDefault();
    e.stopPropagation();
    try { e.target.setPointerCapture(e.pointerId); } catch(_) {}
    dragRef.current = { mode, startX: e.clientX, startY: e.clientY, startBox: { ...box } };
  };
  const handlePointerMove = (e) => {
    if (!dragRef.current || !box) return;
    const { mode, startX, startY, startBox } = dragRef.current;
    const dx = e.clientX - startX, dy = e.clientY - startY;
    let next = { ...startBox };
    if (mode === "move") {
      next.x = startBox.x + dx;
      next.y = startBox.y + dy;
    } else {
      if (mode.includes("w")) { next.x = startBox.x + dx; next.w = startBox.w - dx; }
      if (mode.includes("e")) { next.w = startBox.w + dx; }
      if (mode.includes("n")) { next.y = startBox.y + dy; next.h = startBox.h - dy; }
      if (mode.includes("s")) { next.h = startBox.h + dy; }
    }
    setBox(clampBox(next, display.w, display.h));
  };
  const handlePointerUp = () => { dragRef.current = null; };

  const performCrop = () => {
    if (!box || !imgRef.current) return;
    const scaleX = natural.w / display.w;
    const scaleY = natural.h / display.h;
    const sx = box.x*scaleX, sy = box.y*scaleY, sw = box.w*scaleX, sh = box.h*scaleY;
    const canvas = document.createElement("canvas");
    canvas.width = Math.max(1, Math.round(sw));
    canvas.height = Math.max(1, Math.round(sh));
    const ctx = canvas.getContext("2d");
    ctx.drawImage(imgRef.current, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
    canvas.toBlob((blob) => {
      const reader = new FileReader();
      reader.onload = () => onConfirm({ blob, dataUrl: reader.result, base64: reader.result.split(",")[1] });
      reader.readAsDataURL(blob);
    }, "image/jpeg", 0.85);
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.88)", zIndex:2000, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:16 }}>
      <div style={{ fontSize:15, fontWeight:"700", color:"#fff", marginBottom:14, fontFamily:"'DM Sans',sans-serif" }}>{lang==="zh" ? "裁剪照片" : "Crop your photo"}</div>
      <div
        style={{ position:"relative", maxWidth:"92vw", maxHeight:"58vh", touchAction:"none", lineHeight:0 }}
        onPointerMove={handlePointerMove}
        onPointerUp={handlePointerUp}
        onPointerCancel={handlePointerUp}
      >
        <img
          ref={imgRef} src={imageDataUrl} alt="" onLoad={onImgLoad} draggable={false}
          style={{ display:"block", maxWidth:"92vw", maxHeight:"58vh", userSelect:"none", pointerEvents:"none" }}
        />
        {imgLoaded && box && (
          <React.Fragment>
            <div style={{ position:"absolute", left:0, top:0, width:"100%", height:box.y, background:"rgba(0,0,0,0.6)" }} />
            <div style={{ position:"absolute", left:0, top:box.y+box.h, width:"100%", height: Math.max(0, display.h-box.y-box.h), background:"rgba(0,0,0,0.6)" }} />
            <div style={{ position:"absolute", left:0, top:box.y, width:box.x, height:box.h, background:"rgba(0,0,0,0.6)" }} />
            <div style={{ position:"absolute", left:box.x+box.w, top:box.y, width:Math.max(0, display.w-box.x-box.w), height:box.h, background:"rgba(0,0,0,0.6)" }} />
            <div
              onPointerDown={handlePointerDown("move")}
              style={{ position:"absolute", left:box.x, top:box.y, width:box.w, height:box.h, border:`2px solid ${C.pink}`, boxSizing:"border-box", cursor:"move", touchAction:"none" }}
            />
            {[["nw",box.x,box.y],["ne",box.x+box.w,box.y],["sw",box.x,box.y+box.h],["se",box.x+box.w,box.y+box.h]].map(([mode,hx,hy]) => (
              <div
                key={mode}
                onPointerDown={handlePointerDown(mode)}
                style={{ position:"absolute", left:hx-11, top:hy-11, width:22, height:22, borderRadius:"50%", background:C.pink, border:"2.5px solid #fff", cursor:`${mode}-resize`, touchAction:"none", boxShadow:"0 1px 4px rgba(0,0,0,0.4)" }}
              />
            ))}
          </React.Fragment>
        )}
      </div>
      <div style={{ fontSize:11, color:"rgba(255,255,255,0.55)", marginTop:12, textAlign:"center", maxWidth:300 }}>
        {lang==="zh" ? "拖动边角调整范围，拖动中间移动位置 —— 裁掉多余背景可提升识别准确度" : "Drag the corners to resize, drag the middle to move — cropping out background helps AI accuracy"}
      </div>
      <div style={{ display:"flex", gap:8, marginTop:16, width:"100%", maxWidth:360 }}>
        <button className="ghost-btn" style={{ flex:1, color:"#fff", borderColor:"rgba(255,255,255,0.35)", padding:"10px", fontSize:12.5 }} onClick={onCancel}>{lang==="zh"?"取消":"Cancel"}</button>
        <button className="ghost-btn" style={{ flex:1, color:"#fff", borderColor:"rgba(255,255,255,0.35)", padding:"10px", fontSize:12.5 }} onClick={onSkip}>{lang==="zh"?"使用原图":"Use Full Photo"}</button>
        <button className="pink-btn" style={{ flex:1.2, padding:"10px", fontSize:12.5 }} disabled={!imgLoaded} onClick={performCrop}>✂️ {lang==="zh"?"裁剪":"Crop"}</button>
      </div>
    </div>
  );
}

const MealCard = React.memo(function MealCard({ meal, onRemove, onEdit, readonly, theme, C, onSlotChange, onSaveFavorite, isFavorited, lang }) {
  const cardBg = C.card;
  const cardBgDragging = C.cardHover;
  const textColor = C.text;
  const textMuted = C.textMuted;
  const btnColor = C.textDim;
  const pinkColor = C.pink;
  const proteinColor = C.protein;
  const carbsColor = C.carbs;
  const fatColor = C.fat;
  const sugarColor = C.sugar;
  const sodiumColor = C.sodium;
  const fiberColor = C.fiber;
  const hasItems = Array.isArray(meal.items) && meal.items.length > 0;
  const [expanded, setExpanded] = useState(false);
  const [dragY, setDragY] = useState(0);
  const [isDragging, setIsDragging] = useState(false);
  const dragRef = useRef({ active:false, startY:0, longPressTimer:null, triggered:false });

  const clearLongPress = () => { clearTimeout(dragRef.current.longPressTimer); };

  const onPointerDown = (e) => {
    if (readonly || !onSlotChange) return;
    const startY = e.touches ? e.touches[0].clientY : e.clientY;
    dragRef.current.triggered = false;
    dragRef.current.longPressTimer = setTimeout(() => {
      dragRef.current.active = true;
      dragRef.current.startY = startY;
      setIsDragging(true);
      if (navigator.vibrate) navigator.vibrate(12);
      document.body.style.userSelect = "none";
    }, 400);
  };
  const onPointerMove = (e) => {
    if (!dragRef.current.active) return;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    const delta = y - dragRef.current.startY;
    // Follow the finger smoothly, with slight resistance past the trigger threshold
    const THRESHOLD = 56;
    const clamped = Math.abs(delta) <= THRESHOLD ? delta : THRESHOLD * Math.sign(delta) + (delta - THRESHOLD*Math.sign(delta)) * 0.25;
    setDragY(clamped);
    if (!dragRef.current.triggered && Math.abs(delta) > THRESHOLD) {
      dragRef.current.triggered = true;
      if (navigator.vibrate) navigator.vibrate(8);
      onSlotChange(meal.id, delta > 0 ? 1 : -1);
    }
  };
  const onPointerUp = () => {
    clearLongPress();
    dragRef.current.active = false;
    setIsDragging(false);
    setDragY(0);
    document.body.style.userSelect = "";
  };

  const [menuOpen, setMenuOpen] = useState(false);
  const hasMacros = (meal.protein!==undefined&&meal.protein!==null) || (meal.carbs!==undefined&&meal.carbs!==null) || (meal.fat!==undefined&&meal.fat!==null) || (meal.sugar_g!==undefined&&meal.sugar_g!==null) || (meal.sodium_mg!==undefined&&meal.sodium_mg!==null) || (meal.fiber_g!==undefined&&meal.fiber_g!==null);

  return (
    <div
      className="animate-pop"
      style={{
        padding:"12px 14px", marginBottom:8, borderRadius:18,
        background: isDragging ? cardBgDragging : cardBg,
        border:`1px solid ${isDragging ? C.textDim : `${C.border}66`}`,
        cursor: onSlotChange && !readonly ? (isDragging?"grabbing":"grab") : "default",
        touchAction: onSlotChange && !readonly ? "none" : "auto",
        transform: `translateY(${dragY}px) scale(${isDragging?1.02:1})`,
        boxShadow: isDragging ? "0 8px 24px rgba(0,0,0,0.18)" : "none",
        transition: isDragging ? "border-color .15s, background .15s" : "transform .25s cubic-bezier(.2,.8,.2,1), box-shadow .25s",
        position: "relative", zIndex: isDragging ? 10 : 1
      }}
      onMouseDown={onPointerDown} onMouseMove={onPointerMove} onMouseUp={onPointerUp} onMouseLeave={onPointerUp}
      onTouchStart={onPointerDown} onTouchMove={onPointerMove} onTouchEnd={onPointerUp}
    >
      <div style={{ display:"flex", alignItems:"flex-start", gap:10 }}>
        {meal.image_url && <img src={meal.image_url} alt={meal.name} style={{ width:50, height:50, borderRadius:12, objectFit:"cover", flexShrink:0 }} />}
        {/* Name gets the full remaining width and wraps onto up to 2 lines instead of truncating into the calories column */}
        <div style={{ flex:1, minWidth:0 }} onClick={() => hasItems && setExpanded(!expanded)}>
          <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:14, fontWeight:"600", color:textColor, marginBottom:2, display:"-webkit-box", WebkitLineClamp:2, WebkitBoxOrient:"vertical", overflow:"hidden", lineHeight:1.3 }}>
            {meal.name}{hasItems && <span style={{ fontSize:10, color:btnColor, marginLeft:6 }}>{expanded ? "▲" : "▼"}</span>}
          </div>
          <div style={{ fontSize:11, color:textMuted }}>{meal.logged_at ? new Date(meal.logged_at).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}) : ""}{meal.confidence==="manual"?" · manual entry":meal.confidence?` · ${meal.confidence} confidence`:""}</div>
          {meal.flagged && <div style={{ fontSize:11, color:C.red, marginTop:3, fontStyle:"italic" }}>🚩 {formatMealFlag(meal, lang)}</div>}
        </div>
        {/* Calories + a single overflow menu, stacked vertically so they don't crowd the name row */}
        <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:4, flexShrink:0, position:"relative" }}>
          <div style={{ display:"flex", alignItems:"center", gap:6 }}>
            <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:16, color:pinkColor, fontWeight:"800" }}>{Math.round(meal.calories)}</div>
          </div>
          {!readonly && (
            <React.Fragment>
              <button onClick={() => setMenuOpen(!menuOpen)} style={{ background:"none", border:"none", color:btnColor, fontSize:16, cursor:"pointer", padding:"2px 4px", lineHeight:1 }}>⋯</button>
              {menuOpen && (
                <React.Fragment>
                  <div onClick={() => setMenuOpen(false)} style={{ position:"fixed", inset:0, zIndex:19 }} />
                  <div className="fade" style={{ position:"absolute", top:"100%", right:0, zIndex:20, background:cardBg, border:`1px solid ${C.border}`, borderRadius:12, boxShadow:"0 6px 20px rgba(0,0,0,0.18)", overflow:"hidden", minWidth:130 }}>
                    {onSaveFavorite && (
                      <button onClick={() => { onSaveFavorite(meal); setMenuOpen(false); }} style={{ display:"flex", alignItems:"center", gap:8, width:"100%", background:"none", border:"none", padding:"9px 12px", fontSize:12.5, color: isFavorited?pinkColor:textColor, cursor:"pointer", whiteSpace:"nowrap" }}>
                        <span style={{ fontSize:14 }}>{isFavorited?"★":"☆"}</span> {isFavorited?"Saved":"Save favorite"}
                      </button>
                    )}
                    {onEdit && (
                      <button onClick={() => { onEdit(meal); setMenuOpen(false); }} style={{ display:"flex", alignItems:"center", gap:8, width:"100%", background:"none", border:"none", padding:"9px 12px", fontSize:12.5, color:textColor, cursor:"pointer", whiteSpace:"nowrap" }}>
                        <span style={{ fontSize:13 }}>✏️</span> Edit
                      </button>
                    )}
                    <button onClick={() => { onRemove(meal.id); setMenuOpen(false); }} style={{ display:"flex", alignItems:"center", gap:8, width:"100%", background:"none", border:"none", padding:"9px 12px", fontSize:12.5, color:C.red, cursor:"pointer", whiteSpace:"nowrap" }}>
                      <span style={{ fontSize:13 }}>×</span> Remove
                    </button>
                  </div>
                </React.Fragment>
              )}
            </React.Fragment>
          )}
        </div>
      </div>
      {/* Macros always shown in their own clean row, regardless of whether the meal has an expandable ingredient breakdown */}
      {hasMacros && (
        <div style={{ display:"flex", gap:10, flexWrap:"wrap", marginTop:10, paddingTop:10, borderTop:`1px dashed ${C.border}66` }}>
          {(meal.protein!==undefined&&meal.protein!==null) && <span style={{ fontSize:11, color:proteinColor, fontWeight:"600" }}>P 🥩 {Math.round(meal.protein)}g</span>}
          {(meal.carbs!==undefined&&meal.carbs!==null) && <span style={{ fontSize:11, color:carbsColor, fontWeight:"600" }}>C 🍞 {Math.round(meal.carbs)}g</span>}
          {(meal.fat!==undefined&&meal.fat!==null) && <span style={{ fontSize:11, color:fatColor, fontWeight:"600" }}>F 🥑 {Math.round(meal.fat)}g</span>}
          {(meal.sugar_g!==undefined&&meal.sugar_g!==null) && <span style={{ fontSize:11, color:sugarColor, fontWeight:"600" }}>S 🍬 {Math.round(meal.sugar_g)}g</span>}
          {(meal.sodium_mg!==undefined&&meal.sodium_mg!==null) && <span style={{ fontSize:11, color:sodiumColor, fontWeight:"600" }}>NA 🧂 {Math.round(meal.sodium_mg)}mg</span>}
          {(meal.fiber_g!==undefined&&meal.fiber_g!==null) && <span style={{ fontSize:11, color:fiberColor, fontWeight:"600" }}>Fbr 🌾 {Math.round(meal.fiber_g)}g</span>}
        </div>
      )}
      {hasItems && expanded && (
        <div className="fade" style={{ marginTop:10, paddingTop:10, borderTop:`1px dashed ${C.border}66` }}>
          <div style={{ fontSize:10, color:textMuted, fontWeight:"700", letterSpacing:"0.05em", marginBottom:6 }}>{lang==="zh" ? "这餐包含什么" : "WHAT'S IN THIS MEAL"}</div>
          {meal.items.slice().sort((a,b)=>(b.calories||0)-(a.calories||0)).map((it,idx) => (
            <div key={idx} style={{ display:"flex", justifyContent:"space-between", padding:"4px 0" }}>
              <span style={{ fontSize:12, color:textColor, textTransform:"capitalize" }}>{it.item}</span>
              <span style={{ fontSize:12, color:pinkColor, fontWeight:"600" }}>{Math.round(it.calories||0)} kcal</span>
            </div>
          ))}
        </div>
      )}
      {onSlotChange && !readonly && !isDragging && (
        <div style={{ textAlign:"center", fontSize:9, color:btnColor, marginTop:6, fontStyle:"italic" }}>{lang==="zh" ? "长按并上下拖动可更改用餐时段" : "hold & drag up/down to change meal time"}</div>
      )}
      {isDragging && (
        <div style={{ textAlign:"center", fontSize:10, color:pinkColor, marginTop:6, fontWeight:"600" }}>{lang==="zh" ? "松开以放下" : "release to drop"}</div>
      )}
    </div>
  );
});

// ── Simple SVG bar chart: consumed vs burned per day, with target line ──
const TrendChart = React.memo(function TrendChart({ days, target, theme, C }) {
  const textColor = C.textMuted;
  const consumedColor = C.pink;
  const burnedColor = C.chartBurned;
  if (!days.length) return <div style={{ fontSize:12, color:textColor, textAlign:"center", padding:"20px 0" }}>{(localStorage.getItem("nutrilog_lang")||"en")==="zh" ? "数据还不够" : "Not enough data yet"}</div>;

  const maxVal = Math.max(target, ...days.map(d=>d.consumed), ...days.map(d=>d.burned), 100) * 1.15;
  const w = 320, h = 140, padBottom = 20, padTop = 6;
  const barW = (w / days.length) * 0.62;
  const gap = (w / days.length) - barW;
  const targetY = padTop + (1 - target/maxVal) * (h-padBottom-padTop);

  return (
    <svg viewBox={`0 0 ${w} ${h+18}`} style={{ width:"100%", height:"auto" }}>
      <line x1="0" y1={targetY} x2={w} y2={targetY} stroke={textColor} strokeWidth="1" strokeDasharray="3,3" opacity="0.5" />
      {days.map((d,i) => {
        const x = i * (barW+gap) + gap/2;
        const consH = (d.consumed/maxVal) * (h-padBottom-padTop);
        const burnH = (d.burned/maxVal) * (h-padBottom-padTop);
        const baseY = h - padBottom;
        return (
          <g key={i}>
            <rect x={x} y={baseY-consH} width={barW*0.46} height={consH} fill={consumedColor} rx="2" />
            <rect x={x+barW*0.5} y={baseY-burnH} width={barW*0.46} height={burnH} fill={burnedColor} rx="2" />
            <text x={x+barW/2} y={h+14} textAnchor="middle" fontSize="9" fill={textColor} fontFamily="'DM Sans',sans-serif">{d.label}</text>
          </g>
        );
      })}
    </svg>
  );
});

// ── Simple SVG line chart: weekly burned calories trend, going up = motivating ──
// ── Weight & BMI trend chart ──
// Unlike the generic LineChart (which stamps a full "Jul 5"-style label under EVERY point —
// fine for the ~6 points in the workout weekly trend, but a crowded mess once weight history
// fills in up to 30 daily points), this uses a proper two-row axis: day-of-month numbers on
// the first row, and one month name per month centered over that month's own span of points
// on the second — so "1 2 3 ... 30 31" reads as one continuous timeline with "June" and "July"
// landing exactly where each month actually sits, even when a range straddles both. A Y-axis
// also shows the actual data max/min so the person can read their range at a glance.
const WeightBMIChart = React.memo(function WeightBMIChart({ points, color, C, lang }) {
  const textColor = C.textMuted;
  const gridColor = `${C.border}66`;
  if (!points.length) return <div style={{ fontSize:12, color:textColor, textAlign:"center", padding:"20px 0" }}>{lang==="zh" ? "数据还不够" : "Not enough data yet"}</div>;

  const w = 320, h = 120, padBottom = 30, padTop = 10, padLeft = 30, padRight = 10;
  const vals = points.map(p => p.value);
  const dataMax = Math.max(...vals);
  const dataMin = Math.min(...vals);
  const range = Math.max(dataMax - dataMin, 0.1);
  const maxVal = dataMax + range*0.15;
  const minVal = Math.max(0, dataMin - range*0.15);
  const scaleY = v => padTop + (1 - (v-minVal)/(maxVal-minVal)) * (h-padBottom-padTop);
  const stepX = (w - padLeft - padRight) / Math.max(1, points.length-1);
  const coords = points.map((p,i) => ({ x: padLeft + i*stepX, y: scaleY(p.value), ...p }));
  const pathD = coords.map((c,i) => `${i===0?"M":"L"} ${c.x},${c.y}`).join(" ");
  const areaD = `${pathD} L ${coords[coords.length-1].x},${h-padBottom} L ${coords[0].x},${h-padBottom} Z`;

  // Group points by calendar month so each month's label can be centered over the midpoint of
  // ITS OWN points, not just placed under one arbitrary date.
  const monthGroups = [];
  coords.forEach(c => {
    const d = new Date(c.dateKey+"T00:00:00");
    const key = `${d.getFullYear()}-${d.getMonth()}`;
    let g = monthGroups.find(g => g.key === key);
    if (!g) { g = { key, label: d.toLocaleDateString(lang==="zh"?"zh-CN":"en-US", {month:"long"}), xs:[] }; monthGroups.push(g); }
    g.xs.push(c.x);
  });
  const monthLabels = monthGroups.map(g => ({ label: g.label, x: (Math.min(...g.xs) + Math.max(...g.xs)) / 2 }));

  const fmt = v => Number.isInteger(v) ? String(v) : v.toFixed(1);

  return (
    <svg viewBox={`0 0 ${w} ${h+16}`} style={{ width:"100%", height:"auto" }}>
      <line x1={padLeft} y1={h-padBottom} x2={w-padRight} y2={h-padBottom} stroke={gridColor} strokeWidth="1" />
      <path d={areaD} fill={color} opacity="0.08" />
      <path d={pathD} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
      {coords.map((c,i) => (
        <g key={i}>
          <circle cx={c.x} cy={c.y} r="3" fill={color} />
          {/* Row 1: day-of-month number, one per point */}
          <text x={c.x} y={h-padBottom+11} textAnchor="middle" fontSize="7.5" fill={textColor} fontFamily="'DM Sans',sans-serif">{new Date(c.dateKey+"T00:00:00").getDate()}</text>
        </g>
      ))}
      {/* Row 2: one month label, centered over that month's own points */}
      {monthLabels.map((m,i) => (
        <text key={i} x={m.x} y={h-padBottom+23} textAnchor="middle" fontSize="9" fontWeight="700" fill={textColor} fontFamily="'DM Sans',sans-serif">{m.label}</text>
      ))}
      {/* Y-axis: actual data max/min, positioned at their real height on the line */}
      <text x={2} y={scaleY(dataMax)-4} textAnchor="start" fontSize="9" fontWeight="700" fill={textColor} fontFamily="'DM Sans',sans-serif">{fmt(dataMax)}</text>
      <text x={2} y={scaleY(dataMin)+11} textAnchor="start" fontSize="9" fontWeight="700" fill={textColor} fontFamily="'DM Sans',sans-serif">{fmt(dataMin)}</text>
    </svg>
  );
});

const LineChart = React.memo(function LineChart({ points, color, theme, minScaleFloor, C }) {
  const textColor = C.textMuted;
  const gridColor = `${C.border}66`;
  if (!points.length) return <div style={{ fontSize:12, color:textColor, textAlign:"center", padding:"20px 0" }}>{(localStorage.getItem("nutrilog_lang")||"en")==="zh" ? "数据还不够" : "Not enough data yet"}</div>;

  const w = 320, h = 120, padBottom = 20, padTop = 10, padX = 8;
  const vals = points.map(p=>p.burned);
  const dataMax = Math.max(...vals, minScaleFloor!==undefined ? 0 : 100);
  const dataMin = minScaleFloor!==undefined ? Math.min(...vals) : 0;
  const range = Math.max(dataMax - dataMin, 1);
  const maxVal = minScaleFloor!==undefined ? dataMax + range*0.15 : dataMax * 1.2;
  const minVal = minScaleFloor!==undefined ? Math.max(0, dataMin - range*0.15) : 0;
  const stepX = (w - padX*2) / Math.max(1, points.length-1);
  const coords = points.map((p,i) => ({
    x: padX + i*stepX,
    y: padTop + (1 - (p.burned-minVal)/(maxVal-minVal)) * (h-padBottom-padTop),
    label: p.label, val: p.burned
  }));
  const pathD = coords.map((c,i) => `${i===0?"M":"L"} ${c.x},${c.y}`).join(" ");
  const areaD = `${pathD} L ${coords[coords.length-1].x},${h-padBottom} L ${coords[0].x},${h-padBottom} Z`;

  return (
    <svg viewBox={`0 0 ${w} ${h+18}`} style={{ width:"100%", height:"auto" }}>
      <line x1={padX} y1={h-padBottom} x2={w-padX} y2={h-padBottom} stroke={gridColor} strokeWidth="1" />
      <path d={areaD} fill={color} opacity="0.08" />
      <path d={pathD} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
      {coords.map((c,i) => (
        <g key={i}>
          <circle cx={c.x} cy={c.y} r="3.5" fill={color} />
          <text x={c.x} y={h+14} textAnchor="middle" fontSize="9" fill={textColor} fontFamily="'DM Sans',sans-serif">{c.label}</text>
        </g>
      ))}
    </svg>
  );
});

function detectWorkoutType(text) {

  if (/(push.?up|sit.?up|squat|lunge|plank|burpee|hiit|strength|weight|gym|dumbbell|bench)/.test(t)) return "strength";
  if (/(cycle|cycling|bike|biking|spin)/.test(t)) return "cycling";
  if (/(swim|pool)/.test(t)) return "swimming";
  if (/(yoga|stretch|pilates)/.test(t)) return "yoga";

}

// HOOK — Favorites (save/reuse meals, drinks, workouts)
// ════════════════════════════════════════════════════════════
function useFavorites({ userId, today, activeSlot, setDayData, setError, L }) {
  const [favMeals, setFavMeals] = useState([]);
  const [favDrinks, setFavDrinks] = useState([]);
  const [favWorkouts, setFavWorkouts] = useState([]);

  const refreshFavorites = async () => {
    try {
      const [m, d, w] = await Promise.all([
        DataAPI.getFavorites(userId, "meal"),
        DataAPI.getFavorites(userId, "drink"),
        DataAPI.getFavorites(userId, "workout")
      ]);
      setFavMeals(m); setFavDrinks(d); setFavWorkouts(w);
    } catch (err) { /* favorites are non-critical, fail silently */ }
  };

  const saveFavorite = async (type, payload) => {
    try {
      const fav = await DataAPI.addFavorite(userId, { type, ...payload });
      if (type==="meal") setFavMeals(f => [fav, ...f]);
      else if (type==="drink") setFavDrinks(f => [fav, ...f]);
      else setFavWorkouts(f => [fav, ...f]);
    } catch (err) { setError(L("Failed to save favorite: ","收藏失败：") + err.message); }
  };

  const removeFavorite = async (type, id) => {
    if (type==="meal") setFavMeals(f => f.filter(x=>x.id!==id));
    else if (type==="drink") setFavDrinks(f => f.filter(x=>x.id!==id));
    else setFavWorkouts(f => f.filter(x=>x.id!==id));
    try { await DataAPI.deleteFavorite(id); } catch (err) { setError(L("Failed to remove favorite: ","移除收藏失败：") + err.message); refreshFavorites(); }
  };

  // Re-logs a saved favorite as today's entry, using the same insert shape as the manual-add flows.
  const useFavoriteMeal = async (fav) => {
    try {
      const meal = await DataAPI.addMeal(userId, {
        log_date: today, slot: fav.default_slot || activeSlot, name: fav.name, calories: fav.calories||0,
        protein: fav.protein||0, carbs: fav.carbs||0, fat: fav.fat||0,
        sugar_g: fav.sugar_g||0, sodium_mg: fav.sodium_mg||0, fiber_g: fav.fiber_g||0,
        confidence: "favorite", logged_at: new Date().toISOString()
      });
      setDayData(d => ({ ...d, meals: [...d.meals, meal] }));
      DataAPI.touchFavorite(fav.id).catch(() => { /* non-critical, ignore */ });
      setFavMeals(f => f.map(x => x.id===fav.id ? { ...x, use_count:(x.use_count||0)+1 } : x));
    } catch (err) { setError(L("Failed to log favorite: ","记录收藏项失败：") + err.message); }
  };
  const useFavoriteDrink = async (fav) => {
    try {
      const d = await DataAPI.addDrink(userId, {
        log_date: today, drink_type: fav.drink_type || fav.name, amount_ml: fav.amount_ml||0,
        calories: fav.calories||0, protein: fav.protein||0, carbs: fav.carbs||0, fat: fav.fat||0,
        sugar_g: fav.sugar_g||0, sodium_mg: fav.sodium_mg||0, fiber_g: fav.fiber_g||0, logged_at: new Date().toISOString()
      });
      setDayData(prev => ({ ...prev, drinks: [...(prev.drinks||[]), d] }));
      DataAPI.touchFavorite(fav.id).catch(() => { /* non-critical, ignore */ });
      setFavDrinks(f => f.map(x => x.id===fav.id ? { ...x, use_count:(x.use_count||0)+1 } : x));
    } catch (err) { setError(L("Failed to log favorite: ","记录收藏项失败：") + err.message); }
  };
  const useFavoriteWorkout = async (fav) => {
    try {
      const w = await DataAPI.addWorkout(userId, {
        log_date: today, activity: fav.activity || fav.name, calories: fav.calories||0,
        duration: fav.duration || "—", description: fav.description || null, logged_at: new Date().toISOString()
      });
      setDayData(d => ({ ...d, workouts: [...(d.workouts||[]), w] }));
      DataAPI.touchFavorite(fav.id).catch(() => { /* non-critical, ignore */ });
      setFavWorkouts(f => f.map(x => x.id===fav.id ? { ...x, use_count:(x.use_count||0)+1 } : x));
    } catch (err) { setError(L("Failed to log favorite: ","记录收藏项失败：") + err.message); }
  };

  return {
    favMeals, favDrinks, favWorkouts,
    refreshFavorites, saveFavorite, removeFavorite,
    useFavoriteMeal, useFavoriteDrink, useFavoriteWorkout
  };
}

// ════════════════════════════════════════════════════════════
// HOOK — Gemini API client (rate limiting, retries, error mapping)
// ════════════════════════════════════════════════════════════
// Reads/writes a simple daily usage counter in localStorage, keyed by today's date so it resets
// naturally each day with no server involvement. This is OUR OWN count of requests made through
// this app — Google doesn't expose a "check remaining quota" endpoint, so this is an estimate
// (it can't see usage from other apps on the same key), not a live sync with Google's real counter.
// Google's RPD (requests-per-day) quotas reset at midnight Pacific time specifically — this
// computes how long that actually is from right now, in the user's own local time, so error
// messages can say "in about 3h 20m" instead of just "at midnight Pacific," which most people
// can't quickly convert in their head.
function pacificResetCountdown() {
  const now = new Date();
  // Get the current wall-clock time as it reads in Los Angeles, then find the next local midnight
  // there — this naturally accounts for Pacific/Daylight time without hardcoding a fixed UTC offset.
  const pacificNowStr = now.toLocaleString("en-US", { timeZone: "America/Los_Angeles" });
  const pacificNow = new Date(pacificNowStr);
  const nextMidnightPacific = new Date(pacificNow);
  nextMidnightPacific.setHours(24, 0, 0, 0);
  const diffMs = nextMidnightPacific - pacificNow;
  const resetLocal = new Date(now.getTime() + diffMs);
  const hours = Math.floor(diffMs / 3600000);
  const mins = Math.round((diffMs % 3600000) / 60000);
  const countdownText = hours > 0 ? `${hours}h ${mins}m` : `${mins}m`;
  const clockText = resetLocal.toLocaleTimeString([], { hour:"numeric", minute:"2-digit" });
  return { countdownText, clockText };
}

function getAiUsageToday() {
  const key = `nutrilog_ai_usage_${todayKey(0)}`;
  return parseInt(localStorage.getItem(key) || "0", 10);
}
function incrementAiUsageToday() {
  const key = `nutrilog_ai_usage_${todayKey(0)}`;
  const next = getAiUsageToday() + 1;
  localStorage.setItem(key, String(next));
  return next;
}

// Tracks cumulative uploaded image size per day (post-compression — this is the actual size sent
// over the wire, not the original photo size), so the user can plan around real-world MB usage
// rather than an abstract request count. Photos are compressed before ever reaching this point
// (see compressImage), which is why these numbers are typically small (~100-300KB per photo).
function getAiBytesToday() {
  const key = `nutrilog_ai_bytes_${todayKey(0)}`;
  return parseInt(localStorage.getItem(key) || "0", 10);
}
function addAiBytesToday(bytes) {
  const key = `nutrilog_ai_bytes_${todayKey(0)}`;
  const next = getAiBytesToday() + Math.max(0, bytes||0);
  localStorage.setItem(key, String(next));
  return next;
}

// Separate counter for Claude (Anthropic) usage, since it's a genuinely independent provider/quota
// from Gemini — tracking them separately makes it clear which provider is actually doing the work.
function getClaudeUsageToday() {
  const key = `nutrilog_claude_usage_${todayKey(0)}`;
  return parseInt(localStorage.getItem(key) || "0", 10);
}
function incrementClaudeUsageToday() {
  const key = `nutrilog_claude_usage_${todayKey(0)}`;
  const next = getClaudeUsageToday() + 1;
  localStorage.setItem(key, String(next));
  return next;
}

function useGeminiClient(geminiKey, fallbackKey, dailyLimit, anthropicKey) {
  // One attempt against a single key — used for both the primary key and, on quota exhaustion,
  // the optional fallback key (which only helps if it's from a genuinely separate Google Cloud
  // project — Google enforces quota per-project, so a second key in the *same* project shares
  // the same bucket and wouldn't add any headroom).
  const attemptWithKey = async (key, body) => {
    const now = Date.now();
    const minGapMs = 4200;
    const waitMs = Math.max(0, (window.__lastGeminiCallAt||0) + minGapMs - now);
    if (waitMs > 0) await new Promise(r => setTimeout(r, waitMs));
    window.__lastGeminiCallAt = Date.now();

    const model = "gemini-2.5-flash-lite"; // higher free-tier RPM/RPD than 2.5-flash, plenty capable for this use case
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;

    const maxRetries = 1; // reduced further — each attempt now has its own timeout below, so total
    // worst-case wait time stays bounded (roughly 2×15s + one short backoff) instead of open-ended.
    let lastErr = null;
    for (let attempt = 0; attempt <= maxRetries; attempt++) {
      try {
        // Photo analysis (image + a detailed itemized JSON breakdown) genuinely takes longer than
        // a simple text prompt — 5s was cutting off plenty of requests that would have succeeded
        // fine given a bit more room. That aggressive timeout made sense when a stuck request left
        // the whole screen looking frozen; now the card shows the photo immediately with a visible,
        // honest "AI is analyzing..." indicator, so there's no need to race to fail — 12s gives
        // real analysis time to complete while still catching a genuinely hung connection.
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 12000);
        let res;
        try {
          res = await fetch(url, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body), signal: controller.signal });
        } finally {
          clearTimeout(timeoutId);
        }
        if (res.ok) {
          const data = await res.json();
          window.__geminiRateLimitStreak = 0; // a success means we're not actually stuck — reset
          return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
        }
        const errBody = await res.json().catch(() => ({}));
        const msg = errBody?.error?.message || `HTTP ${res.status}`;
        if (msg.includes("allowlist")) throw new Error("KEY_RESTRICTED");
        if (res.status === 429) {
          // Google's quota errors include a structured `details` array (QuotaFailure with a
          // quotaId/quotaMetric, and often a RetryInfo with an exact retryDelay) — checking that
          // is far more reliable than guessing from the free-text message, which doesn't always
          // literally contain the word "day" even when it genuinely is the daily cap.
          const details = errBody?.error?.details || [];
          const quotaDetail = details.find(d => (d["@type"]||"").includes("QuotaFailure"));
          const quotaText = [msg, ...(quotaDetail?.violations||[]).map(v => `${v.quotaId||""} ${v.quotaMetric||""}`)].join(" ");
          const retryInfo = details.find(d => (d["@type"]||"").includes("RetryInfo"));
          const retrySecondsFromApi = retryInfo?.retryDelay ? parseInt(retryInfo.retryDelay) : null;

          const isDailyQuota = /day/i.test(quotaText);
          if (isDailyQuota) throw new Error("QUOTA_EXHAUSTED");

          // Track rate-limit hits ACROSS separate calls (not just this call's own retries). If this
          // keeps recurring across several different user actions even after waiting, it's not
          // really a "brief burst" — the message below escalates once this streak builds up.
          window.__geminiRateLimitStreak = (window.__geminiRateLimitStreak||0) + 1;

          // This is a genuinely different situation from a timeout above — the server responded
          // quickly, it's just asking us to wait briefly, so one short retry is still worthwhile.
          if (attempt < maxRetries) {
            const backoff = retrySecondsFromApi ? retrySecondsFromApi*1000 : 1500;
            await new Promise(r => setTimeout(r, Math.min(backoff, 3000)));
            lastErr = new Error("RATE_LIMITED");
            lastErr.retrySeconds = retrySecondsFromApi;
            continue;
          }
          const e = new Error("RATE_LIMITED");
          e.retrySeconds = retrySecondsFromApi;
          throw e;
        }
        throw new Error(msg);
      } catch (err) {
        if (err.message === "KEY_RESTRICTED" || err.message === "QUOTA_EXHAUSTED") throw err;
        if (err.name === "AbortError") throw new Error("TIMED_OUT"); // fail immediately, no retry
        lastErr = err;
        if (attempt >= maxRetries) throw err;
      }
    }
    throw lastErr || new Error("Request failed after retries");
  };

  // Extracts the plain prompt text + optional image from the Gemini-shaped `body` every call site
  // already builds, and sends it to Claude instead — this way callers never need to know which
  // provider actually served their request; they always get back the same plain text response.
  const attemptWithClaude = async (apiKey, body) => {
    const parts = body?.contents?.[0]?.parts || [];
    const promptText = parts.find(p => p.text)?.text || "";
    const imagePart = parts.find(p => p.inlineData)?.inlineData;
    const content = [];
    if (imagePart) content.push({ type:"image", source:{ type:"base64", media_type: imagePart.mimeType || "image/jpeg", data: imagePart.data } });
    content.push({ type:"text", text: promptText });

    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 12000);
    let res;
    try {
      res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-haiku-4-5-20251001",
          max_tokens: 1024,
          messages: [{ role:"user", content }]
        }),
        signal: controller.signal
      });
    } catch (err) {
      if (err.name === "AbortError") throw new Error("Claude request timed out — your connection may be slow or unstable right now.");
      throw err;
    } finally {
      clearTimeout(timeoutId);
    }
    if (!res.ok) {
      const errBody = await res.json().catch(() => ({}));
      const msg = errBody?.error?.message || `HTTP ${res.status}`;
      if (res.status === 429) throw new Error("CLAUDE_RATE_LIMITED");
      throw new Error("Claude: " + msg);
    }
    const data = await res.json();
    return (data.content || []).map(c => c.text || "").join("");
  };

  const callGemini = async (body) => {
    const key = (geminiKey||"").trim();
    const claudeKey = (anthropicKey||"").trim();
    if (!key && !claudeKey) throw new Error("No API key set. Open Settings (gear icon) and paste your Gemini API key.");

    // The daily limit in Settings is a soft, INFORMATIONAL cap only — it warns in the UI once
    // passed (see the budget indicator above the entry card) but never blocks a request. It's
    // this app's own estimate of usage (Google doesn't expose a "check remaining quota"
    // endpoint), and different accounts can have very different real headroom — e.g. a paid or
    // shared/pooled Google account may have far more room than the default 15/day guess. Only a
    // genuine Google-side error below (QUOTA_EXHAUSTED / RATE_LIMITED) still triggers the
    // fallback-key or Claude path — this local counter no longer does on its own.
    if (!key) {
      if (claudeKey) {
        const result = await attemptWithClaude(claudeKey, body);
        incrementClaudeUsageToday();
        return result;
      }
      throw new Error("No API key set. Open Settings (gear icon) and paste your Gemini API key.");
    }

    try {
      const result = await attemptWithKey(key, body);
      incrementAiUsageToday();
      return result;
    } catch (err) {
      // Only worth trying the Gemini fallback key for a genuine daily-quota block — it only helps
      // if it's from a truly separate Google Cloud project (same-project keys share one bucket).
      const fbKey = (fallbackKey||"").trim();
      if (err.message === "QUOTA_EXHAUSTED" && fbKey) {
        try {
          const result = await attemptWithKey(fbKey, body);
          incrementAiUsageToday();
          return result;
        } catch (fbErr) { /* fall through to Claude below if configured */ }
      }
      // Gemini (and its fallback key, if any) didn't work out — try Claude before giving up
      // entirely, for either a daily-quota block or a persistent rate-limit situation.
      if ((err.message === "QUOTA_EXHAUSTED" || err.message === "RATE_LIMITED") && claudeKey) {
        const result = await attemptWithClaude(claudeKey, body);
        incrementClaudeUsageToday();
        return result;
      }
      throw err;
    }
  };

  const friendlyGeminiError = (err) => {
    if (err.message === "KEY_RESTRICTED") return "⚠️ Your key has domain restrictions. See Settings for a fix.";
    if (err.message === "TIMED_OUT") return "AI is taking longer than usual to respond right now — this can happen when it's busy, not necessarily your connection. Tap 🔄 Retry AI in a moment, or fill in values by hand.";
    if (err.message === "QUOTA_EXHAUSTED") {
      const { countdownText, clockText } = pacificResetCountdown();
      return `You've used up today's free AI quota. It resets in about ${countdownText} (around ${clockText} your time) — manual entry works meanwhile. If this happens often, enabling billing on your Google AI Studio project removes the daily cap entirely (Gemini Flash-Lite costs a fraction of a cent per request), or add a Claude key in Settings as a second provider.`;
    }
    if (err.message === "CLAUDE_RATE_LIMITED") return "Claude is rate-limited right now too — please wait a bit and try again, or use manual entry.";
    if (err.message === "RATE_LIMITED") {
      const streak = window.__geminiRateLimitStreak || 0;
      if (streak >= 4) {
        const { countdownText } = pacificResetCountdown();
        return `AI requests keep getting rate-limited even after waiting — that usually means your key's free daily limit is nearly used up, not a brief burst (it would fully reset in about ${countdownText}, if so). Manual entry works in the meantime; you can check your actual usage at aistudio.google.com, enable billing to remove the daily cap, or add a Claude key in Settings as a second provider.`;
      }
      const waitText = err.retrySeconds ? `about ${err.retrySeconds}s` : "a few seconds";
      return `AI is getting a lot of requests right now — please wait ${waitText} and try again.`;
    }
    return "AI failed: " + err.message;
  };

  return { callGemini, friendlyGeminiError };
}

// HOOK — Manual meal entry form (+ AI nutrition suggest)
// ════════════════════════════════════════════════════════════
function useManualMealForm({ userId, today, activeSlot, setDayData, setError, callGemini, friendlyGeminiError, L }) {
  const [manualCal, setManualCal] = useState("");
  const [manualDesc, setManualDesc] = useState("");
  const [manualProt, setManualProt] = useState("");
  const [manualCarb, setManualCarb] = useState("");
  const [manualFat, setManualFat] = useState("");
  const [manualSugar, setManualSugar] = useState("");
  const [manualSodium, setManualSodium] = useState("");
  const [manualFiber, setManualFiber] = useState("");
  const [manualFlagged, setManualFlagged] = useState(false);
  const [manualFlagOccasion, setManualFlagOccasion] = useState(null);
  const [manualFlagLocation, setManualFlagLocation] = useState("");
  const [manualFlagComment, setManualFlagComment] = useState("");
  const [isSuggesting, setIsSuggesting] = useState(false);
  // The photo attached at the start of logging is shared across all three methods (AI Photo
  // Search, AI Text Search, Manual) — captured once, then the person picks how the NUMBERS get
  // filled in. Only "AI Photo Search" actually sends it to the AI; the other two just carry it
  // along for the Gallery.
  const [entryPhoto, setEntryPhoto] = useState(null); // { blob, previewUrl, base64 } | null
  const [entryPhotoUploading, setEntryPhotoUploading] = useState(false);
  // A photo, once compressed, goes here FIRST so it can be cropped before becoming the actual
  // entryPhoto — cropping out background clutter (plate edge, table, hands) noticeably helps
  // "AI Photo Search" focus on the food itself. { dataUrl, blob, base64 } | null
  const [cropSource, setCropSource] = useState(null);

  const attachEntryPhoto = async (file) => {
    if (!file) return;
    setError(null);
    try {
      const { dataUrl, blob, base64 } = await compressImage(file, 1024, 0.75);
      setCropSource({ dataUrl, blob, base64 });
    } catch (err) {
      setError(L("Couldn't process that photo — please try again.","无法处理该照片，请重试。"));
    }
  };
  const clearEntryPhoto = () => setEntryPhoto(null);
  // Called when the crop modal's "Crop" button produces a result.
  const confirmCrop = (result) => { setEntryPhoto({ blob: result.blob, previewUrl: result.dataUrl, base64: result.base64 }); setCropSource(null); };
  // "Use Full Photo" — keep the compressed original, uncropped.
  const skipCrop = () => { setEntryPhoto({ blob: cropSource.blob, previewUrl: cropSource.dataUrl, base64: cropSource.base64 }); setCropSource(null); };
  // Cancel — abandon the photo entirely, back to no-photo state.
  const cancelCrop = () => setCropSource(null);

  const suggestManualDiet = async () => {
    setError(null);
    if (!manualDesc.trim()) { setError(L("Please write a food description first","请先填写食物描述")); return; }
    setIsSuggesting(true);
    try {
      const raw = await callGemini({
        contents:[{ role:"user", parts:[{ text:`Analyze this food: "${manualDesc}". Output ONLY raw JSON, no code fences: {"calories":number,"protein":number,"carbs":number,"fat":number,"sugar":number,"sodium":number,"fiber":number}` }] }]
      });
      const metrics = JSON.parse(raw.replace(/```json|```/gi,"").trim());
      setManualCal(metrics.calories?.toString()||"0");
      setManualProt(metrics.protein?.toString()||"0");
      setManualCarb(metrics.carbs?.toString()||"0");
      setManualFat(metrics.fat?.toString()||"0");
      setManualSugar(metrics.sugar?.toString()||"0");
      setManualSodium(metrics.sodium?.toString()||"0");
      setManualFiber(metrics.fiber?.toString()||"0");
    } catch(err) {
      setError(friendlyGeminiError(err));
    } finally { setIsSuggesting(false); }
  };

  const addManualMeal = async () => {
    const cal = parseFloat(manualCal);
    if (!cal||cal<=0) return;
    let imageUrl = null;
    if (entryPhoto) {
      setEntryPhotoUploading(true);
      try {
        imageUrl = await uploadPhoto(userId, entryPhoto.blob, "meal");
      } catch (err) {
        // Photo upload failing shouldn't block logging the meal itself — same principle as the
        // AI-analysis path: the log always goes through, a missing photo is the worst case.
        setError(L("Meal saved, but the photo failed to upload.","餐食已保存，但照片上传失败。"));
      } finally {
        setEntryPhotoUploading(false);
      }
    }
    try {
      const meal = await DataAPI.addMeal(userId, {
        log_date: today, slot: activeSlot, name: manualDesc||"Manual entry", calories: cal,
        protein: parseFloat(manualProt)||0, carbs: parseFloat(manualCarb)||0, fat: parseFloat(manualFat)||0,
        sugar_g: parseFloat(manualSugar)||0, sodium_mg: parseFloat(manualSodium)||0, fiber_g: parseFloat(manualFiber)||0,
        confidence: "manual", image_url: imageUrl, logged_at: new Date().toISOString(),
        flagged: !!manualFlagged, flag_occasion: manualFlagged ? (manualFlagOccasion||null) : null,
        flag_location: manualFlagged ? (manualFlagLocation||null) : null, flag_comment: manualFlagged ? (manualFlagComment||null) : null
      });
      setDayData(d => ({ ...d, meals: [...d.meals, meal] }));
      setManualCal(""); setManualDesc(""); setManualProt(""); setManualCarb(""); setManualFat("");
      setManualSugar(""); setManualSodium(""); setManualFiber(""); setEntryPhoto(null);
      setManualFlagged(false); setManualFlagOccasion(null); setManualFlagLocation(""); setManualFlagComment("");
    } catch (err) { setError(L("Failed to add meal: ","添加餐食失败：") + err.message); }
  };

  return {
    manualCal, setManualCal, manualDesc, setManualDesc, manualProt, setManualProt,
    manualCarb, setManualCarb, manualFat, setManualFat, manualSugar, setManualSugar,
    manualSodium, setManualSodium, manualFiber, setManualFiber,
    manualFlagged, setManualFlagged, manualFlagOccasion, setManualFlagOccasion,
    manualFlagLocation, setManualFlagLocation, manualFlagComment, setManualFlagComment,
    isSuggesting, suggestManualDiet, addManualMeal,
    entryPhoto, attachEntryPhoto, clearEntryPhoto, entryPhotoUploading, setEntryPhoto,
    cropSource, confirmCrop, skipCrop, cancelCrop
  };
}

// HOOK — Custom drink form (+ AI nutrition suggest, live ml rescaling)
// ════════════════════════════════════════════════════════════
function useCustomDrinkForm({ userId, today, setDayData, setError, callGemini, friendlyGeminiError, L }) {
  const [customDrinkName, setCustomDrinkName] = useState("");
  const [customDrinkMl, setCustomDrinkMl] = useState("");
  const [customDrinkCal, setCustomDrinkCal] = useState("");
  const [customDrinkProt, setCustomDrinkProt] = useState("");
  const [customDrinkCarb, setCustomDrinkCarb] = useState("");
  const [customDrinkFat, setCustomDrinkFat] = useState("");
  const [customDrinkSugar, setCustomDrinkSugar] = useState("");
  const [customDrinkSodium, setCustomDrinkSodium] = useState("");
  const [isSuggestingDrink, setIsSuggestingDrink] = useState(false);
  const [drinkRatePer100ml, setDrinkRatePer100ml] = useState(null);

  const addCustomDrink = async () => {
    const ml = parseFloat(customDrinkMl);
    if (!ml || ml<=0) { setError(L("Enter a valid amount in ml.","请输入有效的毫升数。")); return; }
    try {
      const d = await DataAPI.addDrink(userId, {
        log_date: today, drink_type: customDrinkName.trim()||"Other", amount_ml: ml,
        calories: parseFloat(customDrinkCal)||0, protein: parseFloat(customDrinkProt)||0,
        carbs: parseFloat(customDrinkCarb)||0, fat: parseFloat(customDrinkFat)||0,
        sugar_g: parseFloat(customDrinkSugar)||0, sodium_mg: parseFloat(customDrinkSodium)||0, fiber_g: 0,
        logged_at: new Date().toISOString()
      });
      setDayData(prev => ({ ...prev, drinks: [...(prev.drinks||[]), d] }));
      setCustomDrinkName(""); setCustomDrinkMl(""); setCustomDrinkCal(""); setCustomDrinkProt(""); setCustomDrinkCarb(""); setCustomDrinkFat(""); setCustomDrinkSugar(""); setCustomDrinkSodium(""); setDrinkRatePer100ml(null);
    } catch (err) { setError(L("Failed to log drink: ","记录饮品失败：") + err.message); }
  };

  const suggestDrinkNutrition = async () => {
    setError(null);
    if (!customDrinkName.trim()) { setError(L("Type a drink name first.","请先输入饮品名称。")); return; }
    setIsSuggestingDrink(true);
    try {
      const ml = parseFloat(customDrinkMl) || 250;
      const raw = await callGemini({
        contents:[{ role:"user", parts:[{ text:`Estimate nutrition for exactly ${ml}ml of "${customDrinkName}". Be precise and consistent — base your numbers on standard nutrition data for this drink type scaled to ${ml}ml. Output ONLY raw JSON, no code fences: {"calories":number,"protein":number,"carbs":number,"fat":number,"sugar":number,"sodium":number}` }] }]
      });
      const m = JSON.parse(raw.replace(/```json|```/gi,"").trim());
      // Store the per-100ml rate so the form can rescale correctly if the user edits ml afterward
      const rate = { cal: (m.calories||0)/ml*100, prot: (m.protein||0)/ml*100, carb: (m.carbs||0)/ml*100, fat: (m.fat||0)/ml*100, sugar: (m.sugar||0)/ml*100, sodium: (m.sodium||0)/ml*100 };
      setDrinkRatePer100ml(rate);
      setCustomDrinkCal(Math.round(m.calories||0).toString());
      setCustomDrinkProt(Math.round((m.protein||0)*10)/10 + "");
      setCustomDrinkCarb(Math.round((m.carbs||0)*10)/10 + "");
      setCustomDrinkFat(Math.round((m.fat||0)*10)/10 + "");
      setCustomDrinkSugar(Math.round((m.sugar||0)*10)/10 + "");
      setCustomDrinkSodium(Math.round(m.sodium||0).toString());
      if (!customDrinkMl) setCustomDrinkMl(ml.toString());
    } catch (err) { setError(friendlyGeminiError(err)); }
    finally { setIsSuggestingDrink(false); }
  };

  const onCustomDrinkMlChange = (val) => {
    setCustomDrinkMl(val);
    // If we have an AI-derived rate, rescale the macro fields live so they always tally with the amount
    if (drinkRatePer100ml) {
      const ml = parseFloat(val) || 0;
      setCustomDrinkCal(Math.round(drinkRatePer100ml.cal * ml / 100).toString());
      setCustomDrinkProt((Math.round(drinkRatePer100ml.prot * ml / 100 * 10)/10).toString());
      setCustomDrinkCarb((Math.round(drinkRatePer100ml.carb * ml / 100 * 10)/10).toString());
      setCustomDrinkFat((Math.round(drinkRatePer100ml.fat * ml / 100 * 10)/10).toString());
      if (drinkRatePer100ml.sugar !== undefined) setCustomDrinkSugar((Math.round(drinkRatePer100ml.sugar * ml / 100 * 10)/10).toString());
      if (drinkRatePer100ml.sodium !== undefined) setCustomDrinkSodium(Math.round(drinkRatePer100ml.sodium * ml / 100).toString());
    }
  };

  return {
    customDrinkName, setCustomDrinkName, customDrinkMl, setCustomDrinkMl, customDrinkCal, setCustomDrinkCal,
    customDrinkProt, setCustomDrinkProt, customDrinkCarb, setCustomDrinkCarb, customDrinkFat, setCustomDrinkFat,
    customDrinkSugar, setCustomDrinkSugar, customDrinkSodium, setCustomDrinkSodium,
    isSuggestingDrink, drinkRatePer100ml, setDrinkRatePer100ml,
    addCustomDrink, suggestDrinkNutrition, onCustomDrinkMlChange
  };
}

// ════════════════════════════════════════════════════════════
// HOOK — Manual workout entry form (+ step conversion, AI calorie suggest)
// ════════════════════════════════════════════════════════════
function useManualWorkoutForm({ userId, today, setDayData, setError, callGemini, friendlyGeminiError, currentWeightForCalc, L }) {
  const [manualBurn, setManualBurn] = useState("");
  const [manualWorkoutDesc, setManualWorkoutDesc] = useState("");
  const [stepCount, setStepCount] = useState("");
  const [isSuggestingWorkout, setIsSuggestingWorkout] = useState(false);

  const applyStepConversion = () => {
    const steps = parseFloat(stepCount);
    if (!steps || steps<=0) { setError(L("Enter a valid step count.","请输入有效的步数。")); return; }
    const kcal = Math.round(steps * 0.04);
    setManualBurn(kcal.toString());
    if (!manualWorkoutDesc.trim()) setManualWorkoutDesc(`${steps.toLocaleString()} steps`);
  };

  const suggestWorkoutCalories = async () => {
    setError(null);
    if (!manualWorkoutDesc.trim()) { setError(L("Describe the activity first (e.g. push ups 30 times).","请先描述运动内容（例如：俯卧撑30次）。")); return; }
    setIsSuggestingWorkout(true);
    try {
      const weightKg = currentWeightForCalc || 70;
      const raw = await callGemini({
        contents:[{ role:"user", parts:[{ text:`Estimate calories burned for this activity: "${manualWorkoutDesc}". Assume a person weighing approximately ${weightKg}kg. Output ONLY raw JSON, no code fences: {"calories":number}` }] }]
      });
      const m = JSON.parse(raw.replace(/```json|```/gi,"").trim());
      setManualBurn(Math.round(m.calories||0).toString());
    } catch (err) { setError(friendlyGeminiError(err)); }
    finally { setIsSuggestingWorkout(false); }
  };

  const addManualBurn = async () => {
    const cal = parseFloat(manualBurn);
    if (!cal||cal<=0) return;
    try {
      const w = await DataAPI.addWorkout(userId, {
        log_date: today, activity: manualWorkoutDesc.trim() || "Manual workout", calories: cal, duration: "—",
        description: manualWorkoutDesc.trim() || null, logged_at: new Date().toISOString()
      });
      setDayData(d => ({ ...d, workouts: [...(d.workouts||[]), w] }));
      setManualBurn(""); setManualWorkoutDesc(""); setStepCount("");
    } catch (err) { setError(L("Failed to add workout: ","添加运动失败：") + err.message); }
  };

  return {
    manualBurn, setManualBurn, manualWorkoutDesc, setManualWorkoutDesc, stepCount, setStepCount,
    isSuggestingWorkout, applyStepConversion, suggestWorkoutCalories, addManualBurn
  };
}

const COACH_MACRO_EMOJI = { kcal:"🔥", protein:"🥩", carbs:"🍞", fat:"🥑", fiber:"🌾", sugar:"🍬", sodium:"🧂" };
const COACH_MACRO_LABELS = {
  protein: { en:"Protein", zh:"蛋白质" }, carbs: { en:"Carbs", zh:"碳水" }, fat: { en:"Fat", zh:"脂肪" },
  sugar: { en:"Sugar", zh:"糖" }, sodium: { en:"Sodium", zh:"钠" }, fiber: { en:"Fiber", zh:"纤维" },
};
// Renders a Coach tip as rows grouped by macro (e.g. "🍬 Sugar: order less sweet...") instead of
// one paragraph — reused by both Diet Coach and Drink Coach cards.
function CoachTipRows({ tips, C, lang }) {
  if (!tips || tips.length === 0) return null;
  return (
    <div style={{ marginTop:10, display:"flex", flexDirection:"column", gap:6 }}>
      {tips.map((t, i) => {
        const meta = COACH_MACRO_LABELS[t.macro];
        const color = C[t.macro] || C.gold;
        return (
          <div key={i} style={{ fontSize:12, background:C.pinkGlow, borderRadius:8, padding:"8px 10px", lineHeight:1.4, display:"flex", gap:6 }}>
            <span style={{ flexShrink:0 }}>{COACH_MACRO_EMOJI[t.macro] || "💡"}</span>
            <span>
              {meta && <strong style={{ color }}>{lang==="zh"?meta.zh:meta.en}: </strong>}
              <span style={{ color:C.text }}>{lang==="zh" ? (t.text_zh||t.text) : t.text}</span>
            </span>
          </div>
        );
      })}
    </div>
  );
}

// Reusable dish-illustration archetypes — same idea as WorkoutIllustration

                      return (
                        <button key={tier.label} onClick={() => { applyCalorieTier(tdee.tdee, tier.delta); setShowTierPicker(false); }} className="slot-btn" style={{ fontSize:10, padding:"8px 4px", borderColor: isActive?C.pinkDim:C.border, background: isActive?C.pinkGlow:"transparent", color: isActive?C.pink:C.textMuted }}>
                          {tier.label}<br/><span style={{ fontSize:9, opacity:0.8 }}>{tier.delta===0?"±0":(tier.delta>0?"+":"")+tier.delta}</span>
                        </button>
                      );
                    })}
                  </div>
                  <div style={{ display:"flex", gap:8, alignItems:"flex-end", marginTop:10 }}>
                    <div style={{ flex:1 }}>
                      <label style={{ fontSize:10, color:C.textMuted, fontWeight:"700", display:"block", marginBottom:4 }}>{T("main_own_adjustment")}</label>
                      <input className="inp" type="number" placeholder={T("main_own_adjustment_placeholder")} value={customDeltaInput} onChange={e=>setCustomDeltaInput(e.target.value)} />
                    </div>
                    <button className="pink-btn" style={{ flexShrink:0 }} onClick={() => { applyCustomDelta(tdee.tdee); setShowTierPicker(false); }}>{T("common_set")}</button>
                  </div>
                  <div style={{ fontSize:11, color:C.textMuted, fontStyle:"italic", marginTop:10 }}>
                    {T("main_workout_bonus_note")}
                  </div>
                </div>
              );
            })()}

            {customDeltaWarning && (
              <div className="card fade" style={{ marginBottom:14, padding:"12px 16px", background:`${C.caution}18`, borderColor:C.caution }}>
                <div style={{ fontSize:12, color:C.text, lineHeight:1.6 }}>⚠️ {customDeltaWarning}</div>
                <button onClick={()=>setCustomDeltaWarning(null)} className="ghost-btn" style={{ width:"100%", marginTop:8, fontSize:11, padding:"6px" }}>{T("common_got_it")}</button>
              </div>
            )}

            {planConfirmation && (
              <div className="card fade" style={{ marginBottom:14, padding:"14px 16px", background:C.pinkDeep, borderColor:C.pinkDim }}>
                <div style={{ fontSize:13, fontWeight:"700", color:C.pink, marginBottom:8 }}>{T("main_plan_set_title")}</div>
                <div style={{ fontSize:12, color:C.text, lineHeight:1.7 }}>
                  {T("main_plan_set_body1")} <strong>{planConfirmation.calories} kcal</strong>, {T("main_plan_set_body2")} <strong>{planConfirmation.protein}g {T("main_plan_set_body3")}</strong> <strong>{planConfirmation.carbs}g {T("main_plan_set_body4")}</strong> <strong>{planConfirmation.fat}g {T("main_plan_set_body5")}</strong> <strong>{planConfirmation.waterNeeded}ml {T("main_plan_set_body6")}</strong>
                </div>
                <button onClick={()=>setPlanConfirmation(null)} className="ghost-btn" style={{ width:"100%", marginTop:10, fontSize:11, padding:"6px" }}>{T("common_got_it")}</button>
              </div>
            )}

            {weekCoaching && (
              <div className="card" style={{ padding:"14px 16px", marginBottom:14, background:C.pinkDeep, borderColor:C.pinkDim }}>
                <div style={{ fontSize:12, fontWeight:"700", color:C.pink, marginBottom:6 }}>🧑‍🏫 {L("Coach's Note","教练笔记")}</div>
                <div style={{ fontSize:13, color:C.text, fontWeight:"700", lineHeight:1.6 }}>{weekCoaching.focusLine}</div>
                <div style={{ fontSize:12, color:C.textMuted, marginTop:8 }}>{weekCoaching.closer}</div>
              </div>
            )}

            {previousWeekAnalysis && (() => {
              const a = previousWeekAnalysis;
              const planLabel = a.planDelta < 0
                ? L(`Deficit ${a.planDelta}`, `缺口 ${a.planDelta}`)
                : a.planDelta > 0
                ? L(`Surplus +${a.planDelta}`, `盈余 +${a.planDelta}`)
                : L("Maintain","维持");
              const macroLabel = { protein:L("protein","蛋白质"), carbs:L("carbs","碳水"), fat:L("fat","脂肪") };

              // One comment per subject (calories/protein/carbs/fat/water/workout), shown only
              // when that subject is tapped in the grid below — keeps the card compact by default
              // while still making the "why" available on demand.
              const subjectComments = {
                calories: a.categoryScores.calories < 45
                  ? L(`Averaged ${a.avgCalPct}% of target — that's a significant miss. Worth recalibrating your weekly plan if this keeps happening.`, `本周平均为目标的 ${a.avgCalPct}% —— 偏差较大，如持续如此，建议重新调整您的每周计划。`)
                  : !a.calStatus
                  ? L(`Nice control — averaged ${a.avgCalPct}% of target across the week.`, `控制得宜 —— 本周平均为目标的 ${a.avgCalPct}%。`)
                  : L(`Ran ${Math.round(a.calOverPct)}% over target on average this week.`, `本周平均超出目标 ${Math.round(a.calOverPct)}%。`),
                protein: L(`Averaged ${Math.round((a.macroDev.protein||0)+100)}% of your protein target — the higher, the better.`, `蛋白质平均达标 ${Math.round((a.macroDev.protein||0)+100)}% —— 摄入越高越好。`),
                carbs: (() => {
                  const dev = a.macroDev.carbs;
                  return Math.abs(dev) <= 10
                    ? L("Right on target across the week.","本周基本符合目标。")
                    : L(`${dev>0?"Over":"Under"} target by ${Math.round(Math.abs(dev))}% on average.`, `平均${dev>0?"超出":"低于"}目标 ${Math.round(Math.abs(dev))}%。`);
                })(),
                fat: L(`Averaged ${Math.round((a.macroDev.fat||0)+100)}% of your fat limit — the lower, the better.`, `脂肪平均为限额的 ${Math.round((a.macroDev.fat||0)+100)}% —— 摄入越低越好。`),
                sugar: a.avgSugarPct===null ? L("No sugar limit set.","未设定糖分限额。") : L(`Averaged ${a.avgSugarPct}% of your sugar limit — the lower, the better.`, `糖分平均为限额的 ${a.avgSugarPct}% —— 摄入越低越好。`),
                sodium: a.avgSodiumPct===null ? L("No sodium limit set.","未设定钠限额。") : L(`Averaged ${a.avgSodiumPct}% of your sodium limit — staying under is best.`, `钠平均为限额的 ${a.avgSodiumPct}% —— 保持在限额以下最理想。`),
                fiber: a.avgFiberPct===null ? L("No fiber target set.","未设定纤维目标。") : L(`Averaged ${a.avgFiberPct}% of your fiber target — the higher, the better.`, `纤维平均达标 ${a.avgFiberPct}% —— 摄入越高越好。`),
                water: L(`Averaged ${Math.round(a.waterRatioPct)}% of your water goal (hit it fully on ${a.waterHitDays} of ${a.tracked} days).`, `平均达成饮水目标的 ${Math.round(a.waterRatioPct)}%（完全达标 ${a.waterHitDays}/${a.tracked} 天）。`),
                workout: L(`Averaged ${Math.round(a.avgWorkoutBurn)} kcal burned per day (logged a workout on ${a.workoutDays} of ${a.tracked} days).`, `平均每天燃烧 ${Math.round(a.avgWorkoutBurn)} 千卡（${a.workoutDays}/${a.tracked} 天记录了运动）。`),
              };

              const Dot = ({color}) => <span style={{ display:"inline-block", width:11, height:11, borderRadius:"50%", background:color, margin:"0 2px", verticalAlign:"middle" }} />;

              // Only mentions the tiers that actually happened — saying "and were close 0 times"
              // when a count is zero reads oddly, so each clause is included only if count > 0.
              const achieveParts = [];
              if (a.tierCounts.green > 0) achieveParts.push(<React.Fragment key="g">{L("hit your target ","达标 ")}<Dot color={C.green}/>{a.tierCounts.green}{L(" time"+(a.tierCounts.green===1?"":"s")," 次")}</React.Fragment>);
              if (a.tierCounts.yellow > 0) achieveParts.push(<React.Fragment key="y">{L("were close ","接近目标 ")}<Dot color={C.caution}/>{a.tierCounts.yellow}{L(" time"+(a.tierCounts.yellow===1?"":"s")," 次")}</React.Fragment>);
              const achieveLine = achieveParts.length === 0
                ? L(`You didn't quite hit your target last week — that's okay, this week is a new start!`, `上周没能达标 —— 没关系，新的一周重新开始！`)
                : (
                  <React.Fragment>
                    {L("You ","上周")}
                    {achieveParts.map((part,i) => <React.Fragment key={i}>{i>0 && L(" and ","，")}{part}</React.Fragment>)}
                    {L(" last week!!","！！")}
                  </React.Fragment>
                );

              // Gamified C→SSS scale (instead of a traditional C-F school scale) so even a rough
              // week still lands on a grade that feels okay, not punishing — the floor is C, not F.
              // The composite averages all 6 tracked categories: calories, the 3 macros, water,
              // and workout — a "report card" across the whole week, not just calories.
              const gradeFor = (score) => gradeForScore(score, C);
              const cs = a.categoryScores;
              const compositeScore = Math.round((cs.calories + cs.protein + cs.carbs + cs.fat + cs.sugar + cs.sodium + cs.fiber + cs.water + cs.workout) / 9);
              const { grade, color:gradeColor } = gradeFor(compositeScore);
              const subjects = [
                { key:"calories", label:L("Calories","热量"), icon:"🔥", score:cs.calories },
                { key:"protein", label:L("Protein","蛋白质"), icon:"🥩", score:cs.protein },
                { key:"carbs", label:L("Carbs","碳水"), icon:"🍞", score:cs.carbs },
                { key:"fat", label:L("Fat","脂肪"), icon:"🥑", score:cs.fat },
                { key:"sugar", label:L("Sugar","糖分"), icon:"🍬", score:cs.sugar },
                { key:"sodium", label:L("Sodium","钠"), icon:"🧂", score:cs.sodium },
                { key:"fiber", label:L("Fiber","纤维"), icon:"🌾", score:cs.fiber },
                { key:"water", label:L("Water","饮水"), icon:"💧", score:cs.water },
                { key:"workout", label:L("Workout","运动"), icon:"🏃", score:cs.workout },
              ];

              let comment;
              if (a.tone === "perfect" || a.tone === "good") {
                comment = L("Great job staying consistent this week.", "这周保持得非常稳定，做得很好。");
              } else if (a.tone === "mixed") {
                comment = L("You had a mixed week, but that's ok — sometimes you miss the target. Here's a closer look:", "这周表现有起有落，没关系，有时会偏离目标 —— 一起来看看细节：");
              } else {
                comment = L("This was a tough week, but every week is a fresh start. Here's a closer look:", "这周比较艰难，但每周都是新的开始 —— 一起来看看细节：");
              }

              return (
                <div className="card" style={{ padding:"16px", marginBottom:14, overflow:"hidden" }}>
                  <div style={{ marginBottom:14 }}>
                    <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:16, fontWeight:"800", color:C.pink, marginBottom:4 }}>📋 {L("Last Week Report Card","上周成绩单")}</div>
                    <div style={{ fontSize:11, color:C.textMuted, fontWeight:"700" }}>{L("Week","第")} {a.weekNum}{lang==="zh"?"周":""}: {planLabel}</div>
                  </div>

                  <div style={{ display:"flex", alignItems:"center", gap:16, marginBottom:16 }}>
                    {/* Diamond "gem" badge with a gradient + glow, letter in white on top — closer
                        to a mobile-game rank badge than a plain circled letter. */}
                    <div style={{ position:"relative", width:80, height:80, flexShrink:0 }}>
                      <div style={{
                        position:"absolute", inset:8, borderRadius:14,
                        background:`linear-gradient(135deg, color-mix(in srgb, ${gradeColor} 100%, white 35%), ${gradeColor})`,
                        transform:"rotate(45deg)",
                        boxShadow:`0 0 18px ${gradeColor}80, inset 0 0 10px rgba(255,255,255,0.35)`
                      }} />
                      <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center" }}>
                        <span style={{
                          fontFamily:"'Russo One',sans-serif",
                          fontSize: grade.length>=4 ? 15 : grade.length===3 ? 19 : 26,
                          color:"#fff", display:"inline-block", transform:"skewX(-8deg)",
                          WebkitTextStroke: `1px ${theme==="dark" ? "#ffffff" : "#000000"}`,
                          textShadow:"0 0 6px rgba(255,255,255,0.9), 0 1px 3px rgba(0,0,0,0.35)"
                        }}>{grade}</span>
                      </div>
                      {grade.startsWith("SS") && <span style={{ position:"absolute", top:-2, left:0, fontSize:16 }}>⭐</span>}
                    </div>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:14, fontWeight:"800", color:C.text }}>{achieveLine}</div>
                      <div style={{ fontSize:11, color:C.textDim, marginTop:2 }}>{L("Overall score: ","总体评分：")}{compositeScore}%</div>
                    </div>
                  </div>

                  <div style={{ fontSize:13, color:C.textMuted, lineHeight:1.6, marginBottom:14 }}>{comment}</div>

                  <div style={{ display:"grid", gridTemplateColumns:"repeat(3, 1fr)", gap:8 }}>
                    {subjects.map(s => {
                      const sub = gradeFor(s.score);
                      const isOpen = reportCardSubject === s.key;
                      return (
                        <div key={s.key} onClick={() => setReportCardSubject(isOpen ? null : s.key)} style={{ background:C.surface, borderRadius:12, padding:"8px 6px", textAlign:"center", cursor:"pointer", border:`1px solid ${isOpen ? sub.color : "transparent"}`, transition:"all .15s" }}>
                          <div style={{ fontSize:10, color:C.textMuted, fontWeight:"700" }}>{s.icon} {s.label}</div>
                          <div style={{ fontSize:15, fontWeight:"800", color:sub.color, fontFamily:"'DM Sans',sans-serif", marginTop:2 }}>{sub.grade}</div>
                        </div>
                      );
                    })}
                  </div>

                  {reportCardSubject && (
                    <div className="fade" style={{ marginTop:10, fontSize:12, color:C.textMuted, background:C.surface, borderRadius:12, padding:"10px 12px", lineHeight:1.6 }}>
                      {subjects.find(s=>s.key===reportCardSubject)?.icon} {subjectComments[reportCardSubject]}
                    </div>
                  )}
                </div>
              );
            })()}
          </div>
        )}

        {activeTab==="today" && (
          <div className="fade">
            <div className="card" style={{ padding:"18px 16px", marginBottom:14 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                <span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:16, fontWeight:"800", color:C.pink }}>⚖️ {L("Weight & BMI","体重与 BMI")}</span>
                {!showWeightReminder && !todayWeight && (
                  <button className="ghost-btn" style={{ fontSize:11, padding:"4px 10px" }} onClick={()=>setShowWeightReminder(true)}>+ {L("Log today","记录今天")}</button>
                )}
              </div>
              {weightHistory.length === 0 ? (
                <div style={{ fontSize:13, fontStyle:"italic", color:C.textDim, textAlign:"center", padding:"16px 0" }}>{L("Log your weight to start tracking your trend and BMI.","记录体重，开始追踪趋势与 BMI。")}</div>
              ) : (
                <React.Fragment>
                  <div style={{ display:"grid", gridTemplateColumns: bmiInfo ? "1fr 1fr" : "1fr", gap:10, marginBottom:14 }}>
                    <div style={{ background:C.surface, borderRadius:12, padding:"12px 10px", textAlign:"center" }}>
                      <div style={{ fontSize:10, letterSpacing:".1em", color:C.textMuted, marginBottom:4, fontWeight:"700" }}>{L("CURRENT WEIGHT","当前体重")}</div>
                      <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:22, fontWeight:"800", color:C.pink, lineHeight:1 }}>{currentWeightForCalc}</div>
                      <div style={{ fontSize:10, color:C.textDim, fontWeight:"500" }}>kg</div>
                    </div>
                    {bmiInfo && (
                      <div style={{ background:C.surface, borderRadius:12, padding:"12px 10px", textAlign:"center" }}>
                        <div style={{ fontSize:10, letterSpacing:".1em", color:C.textMuted, marginBottom:4, fontWeight:"700" }}>BMI</div>
                        <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:22, fontWeight:"800", color:C[BMI_CATEGORY_COLOR_KEY[bmiInfo.key]], lineHeight:1 }}>{bmiInfo.value}</div>
                        <div style={{ fontSize:10, color:C[BMI_CATEGORY_COLOR_KEY[bmiInfo.key]], fontWeight:"600" }}>{bmiInfo.category}</div>
                      </div>
                    )}
                  </div>
                  {!bmiInfo && <div style={{ fontSize:11, color:C.textMuted, fontStyle:"italic", marginBottom:10 }}>{L("Add your height in your Profile (👤 on Main) to see your BMI.","在主页的个人资料 (👤) 中填写身高，即可查看 BMI。")}</div>}
                  {weightHistory.length > 1 && (
                    <WeightBMIChart points={weightHistory.slice(-30).map(w => ({ dateKey: w.log_date, value: w.weight_kg }))} color={C.pink} C={C} lang={lang} />
                  )}
                  {weightTrendMessage && (
                    <div style={{ fontSize:12, color:C.textMuted, fontStyle:"italic", textAlign:"center", marginTop:10 }}>{weightTrendMessage}</div>
                  )}
                </React.Fragment>
              )}
            </div>
            <div className="card-primary" style={{ padding:"20px 18px", marginBottom:14 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                <span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:18, fontWeight:"800", color:C.pink }}>🔥 {L("Today's Calorie Balance","今日热量平衡")}</span>
              </div>
              {(() => {
                // Plan status: this week's fixed deficit/surplus delta (see "Your Weekly Diet Plan"),
                // e.g. picking "Deficit: Starter" fixes delta at -200 for the week — while the actual
                // calorie target (used in targets.calories below) still recalculates daily from TDEE,
                // since TDEE itself moves with logged weight.
                const todayPlan = targetsForWeek(today);
                const planDelta = (todayPlan.delta !== null && todayPlan.delta !== undefined)
                  ? todayPlan.delta
                  : (tdeeInfo ? Math.round(baseTargets.calories - tdeeInfo.tdee) : 0);
                const planAbs = Math.abs(planDelta);
                let planComment;
                if (!tdeeInfo || planAbs < 50) {
                  planComment = L("Right on target — nicely balanced today!", "非常接近目标 —— 今天保持得很平衡！");
                } else if (planDelta < 0) {
                  planComment = planAbs <= 300
                    ? L("Great start — stay consistent and the results will follow!", "良好的开端 —— 保持稳定，成果自然会到来！")
                    : planAbs <= 600
                    ? L("A solid, sustainable deficit — keep this pace up.", "稳健且可持续的热量缺口 —— 保持这个节奏。")
                    : L("That's a hardcore deficit — impressive discipline! Just make sure you're still fueling enough to sustain it.", "这是相当硬核的热量缺口 —— 自律令人佩服！但也要确保摄入足够，才能长久坚持。");
                } else {
                  planComment = planAbs <= 300
                    ? L("A small surplus — no big deal if that's part of your plan.", "略有盈余 —— 如果这是计划的一部分，无需担心。")
                    : planAbs <= 600
                    ? L("A meaningful surplus — great if you're building, otherwise ease off a little.", "较明显的热量盈余 —— 增肌期很不错，否则可以稍微收一收。")
                    : L("A big surplus — no stress, just rebalance over the next few days.", "盈余较大 —— 别有压力，接下来几天调整回来就好。");
                }
                const planLabel = planDelta < 0
                  ? L(`Calorie deficit: ${planAbs} kcal`, `热量缺口：${planAbs} 千卡`)
                  : planDelta > 0
                  ? L(`Calorie surplus: +${planAbs} kcal`, `热量盈余：+${planAbs} 千卡`)
                  : L("Maintain", "维持");

                // Live status: how today's actual net calories compare to the boosted target right now.
                const calBarPct = targets.calories ? (net/targets.calories)*100 : 0;
                const calBarWidth = Math.min(100, Math.max(0, calBarPct));
                const calLabelInside = calBarWidth >= 14;
                const over = calBarPct - 100;
                let liveColor, liveLabel, liveComment;
                if (over > 20) {
                  liveColor = C.red;
                  liveLabel = L(`Over target: ${Math.round(over)}%`, `超出目标：${Math.round(over)}%`);
                  liveComment = L("You're over target today — that's okay, tomorrow's a fresh start to bounce back!", "今天超出了目标 —— 没关系，明天又是新的开始，重新出发！");
                } else if (over > 0) {
                  liveColor = C.caution;
                  liveLabel = L(`Over target: ${Math.round(over)}%`, `超出目标：${Math.round(over)}%`);
                  liveComment = L("You're doing fine — slightly over, but let's aim a touch closer tomorrow.", "表现还不错 —— 略微超出，明天再靠近目标一点点。");
                } else {
                  liveColor = C.green;
                  liveLabel = L(`Within target: ${Math.round(calBarPct)}%`, `未超目标：${Math.round(calBarPct)}%`);
                  liveComment = L("Awesome! Right on track — keep this momentum going!", "太棒了！完全在节奏上 —— 保持这股势头！");
                }

                return (
                  <div>
                    <div style={{ fontSize:12, lineHeight:1.5, marginBottom:10 }}>
                      <div style={{ color: planDelta < 0 ? C.green : planDelta > 0 ? C.caution : C.text, fontWeight:"700" }}>{planLabel}</div>
                      <div style={{ color:C.textMuted, marginTop:2 }}>{planComment}</div>
                    </div>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4, fontSize:12 }}>
                      <span style={{ fontWeight:"700", color:C.pink }}>🔥 {L("Calories","热量")}</span>
                      <span style={{ color:C.text }}>{Math.round(net)} / {Math.round(targets.calories)} kcal</span>
                    </div>
                    <div style={{ position:"relative", height:12, background:C.border, borderRadius:6, overflow:"hidden" }}>
                      <div style={{ height:"100%", width:`${calBarWidth}%`, background:`linear-gradient(90deg, color-mix(in srgb, ${C.pink} 100%, white 35%), color-mix(in srgb, ${C.pink} 100%, black 15%))`, borderRadius:6, transition:"width .5s ease" }} />
                      <div style={{
                        position:"absolute", top:0, bottom:0, display:"flex", alignItems:"center",
                        left: calLabelInside ? "auto" : `calc(${calBarWidth}% + 6px)`,
                        right: calLabelInside ? `calc(${100-calBarWidth}% + 6px)` : "auto",
                        fontSize:10, fontWeight:"800",
                        color: calLabelInside ? "#fff" : C.text,
                        textShadow: calLabelInside ? "0 1px 2px rgba(0,0,0,0.5)" : "none",
                        whiteSpace:"nowrap"
                      }}>
                        {Math.round(calBarPct)}%
                      </div>
                    </div>
                    <div style={{ fontSize:12, lineHeight:1.5, marginTop:10 }}>
                      <div style={{ color:liveColor, fontWeight:"700" }}>{liveLabel}</div>
                      <div style={{ color:C.textMuted, marginTop:2 }}>{liveComment}</div>
                    </div>
                  </div>
                );
              })()}
            </div>
            <div className="card-primary" style={{ padding:"20px 18px", marginBottom:14 }}>
              <div style={{ marginBottom:14 }}>
                <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:18, fontWeight:"800", color:C.pink, marginBottom:4 }}>⚖️ {L("Nutrients","营养素")}</div>
                <div style={{ fontSize:11, fontStyle:"italic", color:C.textMuted, fontWeight:"500" }}>{L("Fat & Sugar & Sodium: stay under · Protein, Carbs & Fiber: aim to reach","脂肪、糖、钠：控制在目标以下 · 蛋白质、碳水、纤维：争取达到目标")}</div>
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
                {[
                  { label:T("common_protein"), key:"protein", color:C.protein, target:targets.protein, icon:"🥩", unit:"g", isCap:false, val:consumed.protein },
                  { label:T("common_carbs"), key:"carbs", color:C.carbs, target:targets.carbs, icon:"🍞", unit:"g", isCap:false, val:consumed.carbs },
                  { label:T("common_fat"), key:"fat", color:C.fat, target:targets.fat, icon:"🥑", unit:"g", isCap:true, val:consumed.fat },

// ROOT — handles auth session state
// ════════════════════════════════════════════════════════════
function Root() {
  const [session, setSession] = useState(undefined); // undefined = checking, null = logged out
  const [authError, setAuthError] = useState(null);

  useEffect(() => {
    let settled = false;
    const timeout = setTimeout(() => {
      if (settled) return;
      // Known supabase-js bug: getSession() can hang indefinitely with no error/network log.
      // Workaround: check localStorage directly for a cached session token before giving up.
      try {
        const storageKey = Object.keys(localStorage).find(k => k.startsWith('sb-') && k.endsWith('-auth-token'));
        if (storageKey) {
          const cached = JSON.parse(localStorage.getItem(storageKey));
          if (cached?.access_token && cached?.user) {
            settled = true;
            setSession(cached);
            return;
          }
        }
      } catch (e) { /* fall through to error state */ }
      setAuthError("Connection to Supabase timed out after 10s. This can happen due to a known Supabase client issue — try reloading. If it persists, check your internet connection or Supabase project status.");
    }, 10000);

    supabase.auth.getSession()
      .then(({ data, error }) => {
        settled = true;
        clearTimeout(timeout);
        if (error) { setAuthError(error.message); return; }
        setAuthError(null); // clear a stale timeout error if this resolved late
        setSession(data.session);
      })
      .catch((err) => {
        settled = true;
        clearTimeout(timeout);
        setAuthError(err.message || String(err));
      });

    const { data: listener } = supabase.auth.onAuthStateChange((_event, sess) => setSession(sess));
    return () => { clearTimeout(timeout); listener.subscription.unsubscribe(); };
  }, []);

  if (authError) {
    const C = THEMES.dark;
    return (
      <div style={{ minHeight:"100vh", background:C.bg, color:C.text, display:"flex", alignItems:"center", justifyContent:"center", padding:20, textAlign:"center", fontFamily:"-apple-system,sans-serif" }}>
        <div>
          <div style={{ fontSize:15, fontWeight:700, marginBottom:10, color:C.red }}>⚠️ {(localStorage.getItem("nutrilog_lang")||"en")==="zh" ? "连接失败" : "Couldn't connect"}</div>
          <div style={{ fontSize:13, color:C.textMuted, marginBottom:16, maxWidth:320 }}>{authError}</div>
          <button onClick={() => window.location.reload()} style={{ background:C.pink, color:"#fff", border:"none", borderRadius:10, padding:"10px 20px", fontSize:14, cursor:"pointer" }}>{(localStorage.getItem("nutrilog_lang")||"en")==="zh" ? "重试" : "Retry"}</button>
        </div>
      </div>
    );
  }

  if (session === undefined) {
    const C = THEMES.dark;
    return (
      <div style={{ minHeight:"100vh", background:C.bg, display:"flex", alignItems:"center", justifyContent:"center" }}>
        <div className="auth-spin" style={{ width:32, height:32, border:`3px solid ${C.border}66`, borderTopColor:C.pink, borderRadius:"50%" }} />
      </div>
    );
  }
  if (!session) {
    return <AuthScreen onAuthed={setSession} />;
  }
  return <NutriLogPro session={session} onLogout={() => supabase.auth.signOut()} />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Root />);

    </script>
    <script>
      // The Babel STANDALONE LIBRARY itself (not just running it) is a multi-hundred-KB download
      // and parse cost, separate from — and bigger than — the JSX transform it performs. The
      // previous fix only cached the transform's OUTPUT but still force-loaded the library
      // unconditionally via a static <script> tag, which is why it didn't feel any faster: the
      // biggest cost was never actually skipped. This version loads Babel dynamically, and ONLY
      // when there's no cached compile to fall back on — a cache hit now skips Babel entirely,
      // both the download and the transform.
      (function () {
        var sourceEl = document.getElementById('app-source');
        var source = sourceEl.textContent;

        // Fast, synchronous, dependency-free fingerprint (FNV-1a) — deliberately not
        // crypto.subtle.digest, since that's unavailable in insecure contexts like a bare
        // file:// page, and this only needs to change when the source changes, not be
        // cryptographically unguessable.
        function fingerprint(str) {
          var hash = 0x811c9dc5;
          for (var i = 0; i < str.length; i++) {
            hash ^= str.charCodeAt(i);
            hash = Math.imul(hash, 0x01000193);
          }
          return (hash >>> 0).toString(16);
        }

        var cacheKey = "nutrilog_compiled_" + fingerprint(source);
        var compiled = null;
        try { compiled = localStorage.getItem(cacheKey); } catch (e) { /* storage unavailable — fine, just skip caching */ }

        function runCompiled(code) {
          var scriptEl = document.createElement("script");
          scriptEl.textContent = code;
          document.body.appendChild(scriptEl);
        }

        if (compiled) {
          // Cache hit: Babel is never even downloaded on this load.
          runCompiled(compiled);
          return;
        }

        // Cache miss: load Babel now, transform, cache the result, then run it.
        var babelScript = document.createElement("script");
        babelScript.src = "https://unpkg.com/@babel/standalone@7.29.7/babel.min.js";
        babelScript.onload = function () {
          var code = Babel.transform(source, { presets: [["react", { runtime: "classic" }]] }).code;
          try {
            // Drop any previously cached compile first — the hash only changes when the
            // source does, so an old entry is guaranteed stale and would just sit there
            // taking up space otherwise.
            for (var i = localStorage.length - 1; i >= 0; i--) {
              var k = localStorage.key(i);
              if (k && k.indexOf("nutrilog_compiled_") === 0 && k !== cacheKey) localStorage.removeItem(k);
            }
            localStorage.setItem(cacheKey, code);
          } catch (e) { /* localStorage full or unavailable — this load still works, just uncached */ }
          runCompiled(code);
        };
        babelScript.onerror = function () {
          var el = document.getElementById('boot-error');
          if (el) el.textContent = "Failed to load the Babel compiler — check your internet connection and refresh.";
        };
        document.head.appendChild(babelScript);
      })();
    </script>

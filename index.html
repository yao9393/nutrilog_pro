  })();

  const last30Stats = (() => {
    const byDate = {};
    histRangeData.meals.forEach(m => { (byDate[m.log_date] ||= {cons:0,burn:0,water:0}).cons += Number(m.calories||0); });
    histRangeData.workouts.forEach(w => { (byDate[w.log_date] ||= {cons:0,burn:0,water:0}).burn += Number(w.calories||0); });
    (histRangeData.drinks||[]).forEach(d => { const e = (byDate[d.log_date] ||= {cons:0,burn:0,water:0}); e.water += Number(d.amount_ml||0); e.cons += Number(d.calories||0); });
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-30);
    const cutoffKey = localDateKey(cutoff);
    const relevant = Object.keys(byDate).filter(k => k >= cutoffKey);
    const days = relevant.length || 1;
    const totalCons = relevant.reduce((s,k)=>s+byDate[k].cons,0);
    const totalBurn = relevant.reduce((s,k)=>s+byDate[k].burn,0);
    const totalWater = relevant.reduce((s,k)=>s+byDate[k].water,0);
    const deficitDays = relevant.filter(k => (byDate[k].cons - byDate[k].burn) < baseTargets.calories).length;
    return { avgConsumed: Math.round(totalCons/days), avgBurned: Math.round(totalBurn/days), avgWater: Math.round(totalWater/days), daysTracked: relevant.length, deficitDays };
  })();

  // ── This calendar week (Mon–Sun) calorie target hit/miss, for the streak dots on Main ──
  const streakWeek = (() => {
    const byDate = {};
    histRangeData.meals.forEach(m => { byDate[m.log_date] = (byDate[m.log_date]||0) + Number(m.calories||0); });
    histRangeData.workouts.forEach(w => { byDate[w.log_date] = (byDate[w.log_date]||0) - Number(w.calories||0); });
    (histRangeData.drinks||[]).forEach(d => { byDate[d.log_date] = (byDate[d.log_date]||0) + Number(d.calories||0); });
    const todayKeyStr = todayKey(baseTargets.day_cutoff_hour);
    const now = new Date();
    const dow = now.getDay(); // 0=Sun..6=Sat
    const mondayOffset = dow === 0 ? -6 : 1 - dow; // days to subtract/add to reach this week's Monday
    const monday = new Date(now); monday.setDate(now.getDate() + mondayOffset);

    const days = [];
    for (let i=0; i<7; i++) {
      const d = new Date(monday); d.setDate(monday.getDate()+i);
      const key = localDateKey(d);
      const isToday = key === todayKeyStr;
      const isFuture = d > now && !isToday;
      const dayNet = isToday ? net : byDate[key];
      // Today is always shown as "in progress" (pending) even once some calories are logged,
      // since the day isn't over yet — only past days get a final pass/fail checkmark.
      const evaluated = !isFuture && !isToday && dayNet !== undefined;
      // Goal-aware deviation: for "lose", going over target is bad (deviation = how far over).
      // For "gain", going under target is bad (deviation = how far under). "maintain" treats over as bad.
      const target = baseTargets.calories || 1;
      const deviation = evaluated
        ? (baseTargets.goal === "gain" ? (target - dayNet) / target : (dayNet - target) / target)
        : 0;
      days.push({
        key, isToday, isFuture,
        net: dayNet, deviation,
        label: d.toLocaleDateString("en-US",{weekday:"short"}).slice(0,1),
        hasData: evaluated,
        hit: evaluated && deviation <= 0
      });
    }

    const weekNum = (() => {
      const onejan = new Date(monday.getFullYear(),0,1);
      return Math.ceil((((monday - onejan) / 86400000) + onejan.getDay()+1) / 7);
    })();
    const sunday = new Date(monday); sunday.setDate(monday.getDate()+6);
    const dateRangeLabel = (() => {
      const sameMonth = monday.getMonth() === sunday.getMonth();
      const sameYear = monday.getFullYear() === sunday.getFullYear();
      const startDay = monday.getDate();
      const endDay = sunday.getDate();
      const startMonth = monday.toLocaleDateString("en-US",{month:"long"});
      const endMonth = sunday.toLocaleDateString("en-US",{month:"long"});
      const startYear = monday.getFullYear();
      const endYear = sunday.getFullYear();
      if (sameMonth) return `${startDay} - ${endDay} ${startMonth}`;
      if (sameYear) return `${startDay} ${startMonth} - ${endDay} ${endMonth}`;
      return `${startDay} ${startMonth} ${startYear} - ${endDay} ${endMonth} ${endYear}`;
    })();

    const tracked = days.filter(d => d.hasData);
    const hits = tracked.filter(d => d.hit).length;
    const isWeekOver = days.every(d => d.hasData || d.isFuture) && !days.some(d=>d.isToday && !d.hasData);
    const sundayEnd = new Date(sunday); sundayEnd.setHours(23,59,59,999);
    const weekComplete = new Date() > sundayEnd;

    let message = "";
    if (tracked.length === 0) {
      message = L("New week, fresh start — let's log today!","新的一周，全新开始 —— 今天就开始记录吧！");
    } else if (hits === 7 && weekComplete) {
      const perfect = [
        L("Perfect streak! Discipline is the key to the best results.","完美打卡！自律是最好成果的关键。"),
        L("Flawless week — this is what consistency looks like.","无懈可击的一周 —— 这就是坚持的样子。"),
        L("7 for 7! You're building a habit that lasts.","7 天全勤！你正在养成一个持久的习惯。")
      ];
      message = perfect[Math.floor(Math.random()*perfect.length)];
    } else if (weekComplete) {
      const ratio = hits / 7;
      if (ratio >= 0.7) {
        const good = [
          L("Great effort this week, let's keep it up next week!","这周表现很棒，下周继续保持！"),
          L("Strong week overall — keep the momentum going.","整体表现出色 —— 保持这股势头。"),
          L("Solid consistency — you're close to a perfect week.","坚持得很稳 —— 距离完美一周只差一点。")
        ];
        message = good[Math.floor(Math.random()*good.length)];
      } else if (ratio >= 0.4) {
        const mid = [
          L("Not bad, try harder next week!","还不错，下周再加把劲！"),
          L("A mixed week — small tweaks will get you there.","有起有落的一周 —— 小小调整就能做到。"),
          L("Decent progress, let's tighten it up next week.","进展尚可，下周再抓紧一些。")
        ];
        message = mid[Math.floor(Math.random()*mid.length)];
      } else {
        const low = [
          L("Tough week — every day is a fresh chance to reset.","艰难的一周 —— 每一天都是重新开始的机会。"),
          L("Don't be discouraged, consistency builds over time.","别灰心，坚持是日积月累的。"),
          L("A rough patch, but next week is a clean slate.","低谷只是暂时的，下周又是崭新的开始。")
        ];
        message = low[Math.floor(Math.random()*low.length)];
      }
    } else {
      message = hits === tracked.length ? L("On track so far — keep it going!","目前一切顺利 —— 继续保持！") : L("Mixed start — you can still turn this week around.","开局有起伏 —— 这周仍有机会扭转局面。");
    }

    return { days, weekNum, dateRangeLabel, hits, tracked: tracked.length, message };
  })();
  const streakCount = (() => {
    const byDate = {};
    histRangeData.meals.forEach(m => { byDate[m.log_date] = (byDate[m.log_date]||0) + Number(m.calories||0); });
    histRangeData.workouts.forEach(w => { byDate[w.log_date] = (byDate[w.log_date]||0) - Number(w.calories||0); });
    (histRangeData.drinks||[]).forEach(d => { byDate[d.log_date] = (byDate[d.log_date]||0) + Number(d.calories||0); });
    let streak = 0;
    const target = baseTargets.calories || 1;
    // Goal-aware, matching streakWeek's "hit" logic above: for a gain goal, staying AT or
    // ABOVE target is the win; for lose/maintain, staying AT or BELOW target is the win.
    for (let i=1; i<=180; i++) {
      const d = new Date(); d.setDate(d.getDate()-i);
      const key = localDateKey(d);
      if (byDate[key] === undefined) break; // no data logged that day — streak ends
      const hit = baseTargets.goal === "gain" ? byDate[key] >= target : byDate[key] <= target;
      if (hit) streak++;
      else break;
    }
    return streak;
  })();

  const hydrationMessage = (() => {
    if (achievedMilestone) return achievedMilestone.comment;
    const pct = waterTarget ? (totalDrinkMl/waterTarget)*100 : 0;
    if (pct > 0) return L(`${Math.round(pct)}% of today's ${waterTarget}ml goal — keep going!`, `已达成今日 ${waterTarget}ml 目标的 ${Math.round(pct)}% —— 继续加油！`);
    return L(`Log your first drink to start tracking today's hydration (goal: ${waterTarget}ml).`, `记录第一杯水，开始追踪今天的饮水量吧（目标：${waterTarget}ml）。`);
  })();

  const weeksData = (() => {
    const groups = {};
    const byDate = {};
    histRangeData.meals.forEach(m => { (byDate[m.log_date] ||= {meals:[],workouts:[],water:0,drinkCal:0}).meals.push(m); });
    histRangeData.workouts.forEach(w => { (byDate[w.log_date] ||= {meals:[],workouts:[],water:0,drinkCal:0}).workouts.push(w); });
    (histRangeData.drinks||[]).forEach(d => { const e = (byDate[d.log_date] ||= {meals:[],workouts:[],water:0,drinkCal:0}); e.water = (e.water||0) + Number(d.amount_ml||0); e.drinkCal = (e.drinkCal||0) + Number(d.calories||0); });
    Object.keys(byDate).forEach(k => {
      const date = new Date(k+"T00:00:00"); if (isNaN(date.getTime())) return;
      const range = getWeekRangeString(date);
      if (!groups[range]) groups[range] = { days:[], totalConsumed:0, totalBurned:0, totalWater:0, daysTracked:0 };
      const dData = byDate[k];
      const cons = dData.meals.reduce((s,m)=>s+Number(m.calories),0) + (dData.drinkCal||0);
      const burn = dData.workouts.reduce((s,w)=>s+Number(w.calories),0);
      groups[range].days.push({ key:k, dateStr:date.toLocaleDateString("en-US",{weekday:'short',day:'numeric'}), consumed:cons, burned:burn, water:dData.water });
      groups[range].totalConsumed+=cons; groups[range].totalBurned+=burn; groups[range].totalWater+=dData.water; groups[range].daysTracked+=1;
    });
    return groups;
  })();

  // ── Workout weekly trend: last 6 calendar weeks, chronological, for the dashboard chart ──
  const workoutWeeklyTrend = (() => {
    const byDate = {};
    histRangeData.workouts.forEach(w => { byDate[w.log_date] = (byDate[w.log_date]||0) + Number(w.calories||0); });
    const weeks = [];
    const now = new Date();
    const curDay = now.getDay();
    const mondayOffset = curDay === 0 ? -6 : 1 - curDay;
    for (let w=5; w>=0; w--) {
      const monday = new Date(now);
      monday.setDate(now.getDate() + mondayOffset - (w*7));
      let total = 0;
      for (let d=0; d<7; d++) {
        const day = new Date(monday); day.setDate(monday.getDate()+d);
        if (day > now) continue;
        total += byDate[localDateKey(day)] || 0;
      }
      const weekNum = (() => {
        const onejan = new Date(monday.getFullYear(),0,1);
        return Math.ceil((((monday - onejan) / 86400000) + onejan.getDay()+1) / 7);
      })();
      weeks.push({ label: lang==="zh" ? `第${weekNum}周` : `Week ${weekNum}`, burned: Math.round(total) });
    }
    return weeks;
  })();

  const monthsData = (() => {
    const groups = {};
    const byDate = {};
    histRangeData.meals.forEach(m => { (byDate[m.log_date] ||= {meals:[],workouts:[],water:0,drinkCal:0,drinkProt:0,drinkCarb:0,drinkFat:0}).meals.push(m); });
    histRangeData.workouts.forEach(w => { (byDate[w.log_date] ||= {meals:[],workouts:[],water:0,drinkCal:0,drinkProt:0,drinkCarb:0,drinkFat:0}).workouts.push(w); });
    (histRangeData.drinks||[]).forEach(d => { const e = (byDate[d.log_date] ||= {meals:[],workouts:[],water:0,drinkCal:0,drinkProt:0,drinkCarb:0,drinkFat:0}); e.water = (e.water||0) + Number(d.amount_ml||0); e.drinkCal = (e.drinkCal||0) + Number(d.calories||0); e.drinkProt = (e.drinkProt||0) + Number(d.protein||0); e.drinkCarb = (e.drinkCarb||0) + Number(d.carbs||0); e.drinkFat = (e.drinkFat||0) + Number(d.fat||0); });
    Object.keys(byDate).forEach(k => {
      const date = new Date(k+"T00:00:00"); if (isNaN(date.getTime())) return;
      const label = date.toLocaleDateString("en-US",{month:"long",year:"numeric"});
      if (!groups[label]) groups[label] = { days:[], totalConsumed:0, totalBurned:0, totalProtein:0, totalCarbs:0, totalFat:0, totalWater:0, totalWorkouts:0 };
      const dData = byDate[k];
      const cons = dData.meals.reduce((s,m)=>s+Number(m.calories),0) + (dData.drinkCal||0);
      const burn = dData.workouts.reduce((s,w)=>s+Number(w.calories),0);
      groups[label].days.push({ key:k, dateStr:date.toLocaleDateString("en-US",{month:'short',day:'numeric'}), consumed:cons, burned:burn, water:dData.water });
      groups[label].totalConsumed += cons;
      groups[label].totalBurned += burn;
      groups[label].totalProtein += dData.meals.reduce((s,m)=>s+Number(m.protein),0) + (dData.drinkProt||0);
      groups[label].totalCarbs += dData.meals.reduce((s,m)=>s+Number(m.carbs),0) + (dData.drinkCarb||0);
      groups[label].totalFat += dData.meals.reduce((s,m)=>s+Number(m.fat),0) + (dData.drinkFat||0);
      groups[label].totalWater += dData.water;
      groups[label].totalWorkouts += dData.workouts.length;
    });
    return groups;
  })();

  // Every palette is now a "mono family" theme — shared components read all accent
  // colors from palette keys instead of hardcoded hexes (the _pink flag gates this).
  const C = useMemo(() => ({ ...(PALETTES[palette] || PALETTES.sweet)[theme], _pink: true }), [palette, theme]);

  if (loading) {
    return (
      <div style={{ minHeight:"100vh", background:C.bg, display:"flex", alignItems:"center", justifyContent:"center" }}>
        <div className="auth-spin" style={{ width:32, height:32, border:`3px solid ${C.border}`, borderTopColor:C.pink, borderRadius:"50%" }} />
      </div>
    );
  }

  return (
    <div style={{ minHeight:"100vh", background:C.bg, color:C.text, fontFamily:"'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" }}>
      <style>{`
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{width:3px}
        ::-webkit-scrollbar-thumb{background:${C.border};border-radius:6px}
        input,textarea{outline:none;font-family:inherit}
        .card{background:${C.card};border:1px solid ${C.border};border-radius:18px;transition:all .25s ease-out}
        .card:hover{border-color:${C.borderGlow};box-shadow:0 4px 16px ${theme==='dark'?'rgba(232,68,122,0.08)':'rgba(196,32,95,0.06)'}}
        .card-primary{background:${theme==='dark'?`linear-gradient(165deg, ${C.card}, #16161b)`:`linear-gradient(165deg, ${C.card}, #fdfcfd)`};border:1px solid ${C.border};border-radius:20px;box-shadow:0 2px 14px ${theme==='dark'?'rgba(0,0,0,0.25)':'rgba(40,30,40,0.06)'};transition:all .25s ease-out}
        .card-primary:hover{border-color:${C.borderGlow};box-shadow:0 6px 22px ${theme==='dark'?'rgba(232,68,122,0.1)':'rgba(196,32,95,0.08)'}}
        .card-nested{background:${theme==='dark'?C.bg:`${C.border}22`};border:1px solid ${theme==='dark'?'transparent':C.border};border-radius:14px;transition:all .2s ease-out}
        .pink-btn{background:linear-gradient(135deg,${C.pink},${C.pinkDim});color:${C.onAccent||"#fff"};border:none;border-radius:12px;padding:10px 20px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:.02em;transition:opacity .2s,transform .15s;box-shadow:0 4px 16px ${C.pinkDim}47}
        .pink-btn:hover{opacity:.88;transform:translateY(-1px)}
        .pink-btn:disabled{opacity:.5;cursor:not-allowed}
        .ghost-btn{background:transparent;color:${C.textMuted};border:1px solid ${C.border};border-radius:12px;padding:10px 18px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .2s}
        .ghost-btn:hover{border-color:${C.pinkDim};color:${C.pink}}
        .tab{background:none;border:none;color:${C.textMuted};font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;padding:8px 10px;border-radius:12px;transition:all .2s;letter-spacing:.02em}
        .tab.on{color:${C.pink};background:${C.pinkDeep};border-bottom:2px solid ${C.pinkDim}}
        .tab:hover{color:${C.text}}
        .slot-btn{background:transparent;border:1px solid ${C.border};border-radius:12px;padding:7px 14px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:${C.textMuted};cursor:pointer;transition:all .2s}
        .slot-btn.on{background:${C.pinkGlow};border-color:${C.pinkDim};color:${C.pink}}
        .inp{background:${C.surface};border:1px solid ${C.border};border-radius:12px;padding:10px 14px;color:${C.text};font-family:'DM Sans',sans-serif;font-size:14px;width:100%;transition:border-color .2s}
        .inp:focus{border-color:${C.pinkDim}}
        .inp::placeholder{color:${C.textDim}}
        .upload-zone{border:1.5px dashed ${C.border};border-radius:18px;padding:22px;text-align:center;cursor:pointer;transition:all .25s;background:${C.card}}
        .upload-zone:hover{border-color:${C.pinkDim};background:${C.pinkDeep}}
        .wave-box{position:relative;width:100%;height:100px;background:${theme==='dark'?'#0f172a':'#e0f2fe'};border-radius:18px;overflow:hidden;border:1px solid ${C.border}}
        .wave{position:absolute;bottom:0;left:0;width:200%;height:100%;background:linear-gradient(0deg,${C.waterDeep} 0%,${C.water} 100%);border-top-left-radius:40% 60%;border-top-right-radius:60% 40%;animation:waveShift 12s linear infinite;opacity:0.85;transition:top 0.6s ease-out}
        .wave-overlay{position:absolute;bottom:0;left:-50%;width:200%;height:100%;background:#0ea5e9;border-top-left-radius:50% 45%;border-top-right-radius:45% 50%;animation:waveShift 8s linear infinite reverse;opacity:0.5;transition:top 0.6s ease-out}
        @keyframes waveShift{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        @keyframes tabIn{from{opacity:0;transform:translateY(6px) scale(.99)}to{opacity:1;transform:translateY(0) scale(1)}}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes progressSlide{0%{transform:translateX(-150%)}100%{transform:translateX(350%)}}
        .animate-pop{animation:fadeUp .25s cubic-bezier(0.175,0.885,0.32,1.275) forwards}
        .fade{animation:tabIn .3s cubic-bezier(0.22,1,0.36,1) forwards}
        .spin{animation:spin .7s linear infinite}
        .hist-sub-row{display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-bottom:1px dashed ${C.border}}
      `}</style>

      <div style={{ background:C.surface, borderBottom:`1px solid ${C.border}`, padding:"18px 20px 0", position:"sticky", top:0, zIndex:50, backdropFilter:"blur(12px)" }}>
        <div style={{ maxWidth:500, margin:"0 auto" }}>
          <div style={{ display:"flex", alignItems:"baseline", gap:8, marginBottom:14 }}>
            <span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:26, fontWeight:800, color:C.pink, letterSpacing:"-0.04em", lineHeight:1 }}>{T("app_name")}</span>
            <span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:13, fontStyle:"italic", fontWeight:300, color:C.textMuted, letterSpacing:".04em" }}>{T("app_tagline")}</span>
            <div style={{ marginLeft:"auto", position:"relative" }}>
              <div onClick={() => setShowSettings(!showSettings)} style={{ fontSize:16, cursor:"pointer", userSelect:"none", padding:"7px 11px", borderRadius:12, background:showSettings?C.pinkGlow:C.pinkDeep, border:`1px solid ${showSettings?C.pinkDim:C.border}`, color:C.pink }}>
                ⚙️
              </div>

              {showSettings && (
                <React.Fragment>
                  <div onClick={() => setShowSettings(false)} style={{ position:"fixed", inset:0, zIndex:49 }} />
                  <div className="card fade" style={{ position:"absolute", top:"calc(100% + 8px)", right:0, zIndex:50, width:280, maxHeight:"70vh", overflowY:"auto", padding:14, background:C.card, borderColor:C.border, boxShadow:"0 8px 28px rgba(0,0,0,0.22)" }}>
                    <div style={{ fontSize:11, color:C.textMuted, marginBottom:12 }}>{T("logged_in_as")} <strong style={{color:C.text}}>{userEmail}</strong></div>

                    <div style={{ fontSize:10, fontWeight:"700", color:C.textDim, letterSpacing:"0.07em", marginBottom:6 }}>{T("settings_theme").toUpperCase()}</div>
                    <div style={{ display:"flex", gap:8, marginBottom:14 }}>
                      <button onClick={() => setTheme("dark")} className={theme==="dark"?"":"ghost-btn"} style={theme==="dark"?{ flex:1, background:C.pinkGlow, border:`1px solid ${C.pinkDim}`, color:C.pink, borderRadius:12, padding:"8px", fontSize:12.5, fontWeight:"700", cursor:"pointer" }:{ flex:1, fontSize:12.5, padding:"8px" }}>🌙 {T("settings_theme_dark")}</button>
                      <button onClick={() => setTheme("light")} className={theme==="light"?"":"ghost-btn"} style={theme==="light"?{ flex:1, background:C.pinkGlow, border:`1px solid ${C.pinkDim}`, color:C.pink, borderRadius:12, padding:"8px", fontSize:12.5, fontWeight:"700", cursor:"pointer" }:{ flex:1, fontSize:12.5, padding:"8px" }}>☀️ {T("settings_theme_light")}</button>
                    </div>

                    <div style={{ fontSize:10, fontWeight:"700", color:C.textDim, letterSpacing:"0.07em", marginBottom:6 }}>{T("settings_color").toUpperCase()}</div>
                    <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginBottom:14 }}>
                      {Object.entries(PALETTES).map(([key, pal]) => {
                        const previewColor = pal[theme].pink;
                        const isActive = palette === key;
                        return (
                          <button key={key} onClick={() => setPalette(key)} title={pal.label} style={{ width:34, height:34, borderRadius:"50%", background:previewColor, border: isActive ? `2px solid ${previewColor}` : "2px solid transparent", boxShadow: isActive ? `0 0 0 3px ${previewColor}44` : "none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", fontSize:14 }}>
                            {isActive ? "✓" : pal.emoji}
                          </button>
                        );
                      })}
                    </div>

                    <div style={{ fontSize:10, fontWeight:"700", color:C.textDim, letterSpacing:"0.07em", marginBottom:6 }}>{T("settings_language").toUpperCase()}</div>
                    <div style={{ display:"flex", gap:8, marginBottom:14 }}>
                      <button onClick={() => setLang("en")} className={lang==="en"?"":"ghost-btn"} style={lang==="en"?{ flex:1, background:C.pinkGlow, border:`1px solid ${C.pinkDim}`, color:C.pink, borderRadius:12, padding:"8px", fontSize:12.5, fontWeight:"700", cursor:"pointer" }:{ flex:1, fontSize:12.5, padding:"8px" }}>English</button>
                      <button onClick={() => setLang("zh")} className={lang==="zh"?"":"ghost-btn"} style={lang==="zh"?{ flex:1, background:C.pinkGlow, border:`1px solid ${C.pinkDim}`, color:C.pink, borderRadius:12, padding:"8px", fontSize:12.5, fontWeight:"700", cursor:"pointer" }:{ flex:1, fontSize:12.5, padding:"8px" }}>中文</button>
                    </div>

                    <div onClick={() => setAiSettingsOpen(!aiSettingsOpen)} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", cursor:"pointer", padding:"8px 0", borderTop:`1px solid ${C.border}` }}>
                      <span style={{ fontSize:11, fontWeight:"700", color:C.pink, fontFamily:"'DM Sans',sans-serif", letterSpacing:"0.05em" }}>⚙️ {T("settings_ai_settings").toUpperCase()}</span>
                      <span style={{ fontSize:10, color:C.textMuted }}>{aiSettingsOpen ? "▲" : "▼"}</span>
                    </div>
                    {aiSettingsOpen && (
                      <div className="fade" style={{ marginBottom:10 }}>
                        <input type="password" className="inp" placeholder={T("settings_api_key_placeholder")} value={geminiKey} onChange={e => setGeminiKey(e.target.value)} style={{ marginBottom:10, marginTop:8 }} />
                        <div style={{ background:C.surface, borderRadius:12, padding:"10px 12px", border:`1px solid ${C.border}` }}>
                          <div style={{ fontSize:11, fontWeight:"700", color:C.pink, marginBottom:6, fontFamily:"'DM Sans',sans-serif" }}>📋 {T("settings_get_key_title").toUpperCase()}</div>
                          <div style={{ fontSize:11, color:C.textMuted, lineHeight:"1.7" }}>
                            1️⃣ {T("settings_get_key_step1")}<br/>
                            2️⃣ {T("settings_get_key_step2")}<br/>
                            3️⃣ {T("settings_get_key_step3")}
                          </div>
                        </div>
                      </div>
                    )}

                    <div onClick={() => setCutoffSettingsOpen(!cutoffSettingsOpen)} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", cursor:"pointer", padding:"8px 0", borderTop:`1px solid ${C.border}`, marginBottom: cutoffSettingsOpen ? 0 : 14 }}>
                      <span style={{ fontSize:11, fontWeight:"700", color:C.pink, fontFamily:"'DM Sans',sans-serif", letterSpacing:"0.05em" }}>🌙 {T("settings_cutoff_title").toUpperCase()}</span>
                      <span style={{ display:"flex", alignItems:"center", gap:6 }}>
                        <span style={{ fontSize:10, color:C.textMuted }}>{dayCutoffHour===0 ? "12:00 AM" : `${dayCutoffHour}:00 AM`}</span>
                        <span style={{ fontSize:10, color:C.textMuted }}>{cutoffSettingsOpen ? "▲" : "▼"}</span>
                      </span>
                    </div>
                    {cutoffSettingsOpen && (
                      <div className="fade" style={{ background:C.surface, borderRadius:12, padding:"10px 12px", border:`1px solid ${C.border}`, marginBottom:14, marginTop:8 }}>
                        <div style={{ fontSize:11, color:C.textMuted, lineHeight:"1.6", marginBottom:8 }}>
                          {T("settings_cutoff_desc")} <strong style={{color:C.text}}>{dayCutoffHour===0 ? "12:00 AM" : `${dayCutoffHour}:00 AM`}</strong>. {T("settings_cutoff_note")}
                        </div>
                        <select className="inp" value={dayCutoffHour} onChange={e=>updateDayCutoff(parseInt(e.target.value))}>
                          <option value={0}>{T("settings_cutoff_midnight")}</option>
                          <option value={1}>1:00 AM</option>
                          <option value={2}>2:00 AM</option>
                          <option value={3}>3:00 AM</option>
                          <option value={4}>4:00 AM</option>
                        </select>
                        <div style={{ fontSize:10, color:C.textDim, marginTop:6, fontStyle:"italic" }}>{T("settings_cutoff_hint")}</div>
                      </div>
                    )}

                    <button className="ghost-btn" style={{ width:"100%", marginBottom:8 }} onClick={() => { setShowSettings(false); setShowAboutModal(true); }}>ℹ️ {T("settings_about")}</button>
                    <button className="ghost-btn" style={{ width:"100%" }} onClick={onLogout}>{T("settings_logout")}</button>
                  </div>
                </React.Fragment>
              )}
            </div>
          </div>

          <div style={{ display:"flex", gap:2, overflowX:"auto", WebkitOverflowScrolling:"touch" }}>
            {TABS.map(tb => (
              <button key={tb} className={`tab ${activeTab===tb?"on":""}`} onClick={() => setActiveTab(tb)}>{T(`tab_${tb}`)}</button>
            ))}
          </div>
        </div>
      </div>

      <div style={{ maxWidth:500, margin:"0 auto", padding:"22px 16px 100px" }}>
        {error && (
          <div className="fade" style={{ background:"rgba(251,113,133,0.1)", border:`1px solid ${C.red}`, borderRadius:12, padding:"10px 14px", marginBottom:14, fontSize:13, color:C.red, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <span>{error}</span>
            <button onClick={()=>setError(null)} style={{ background:"none", border:"none", color:C.red, cursor:"pointer", fontSize:16 }}>×</button>
          </div>
        )}

        {activeTab==="main" && (
          <div className="fade">
            <div className="card-primary animate-pop" style={{ padding:"16px", marginBottom:14 }}>
              <div style={{ display:"flex", alignItems:"center", gap:14 }}>
                <div onClick={() => avatarRef.current?.click()} style={{ position:"relative", cursor:"pointer", flexShrink:0 }}>
                  <input ref={avatarRef} type="file" accept="image/*" style={{ display:"none" }} onChange={e=>uploadAvatar(e.target.files[0])} />
                  {baseTargets.avatar_url ? (
                    <img src={baseTargets.avatar_url} alt="Profile" style={{ width:56, height:56, borderRadius:"50%", objectFit:"cover", border:`2px solid ${C.pink}` }} />
                  ) : (
                    <div style={{ width:56, height:56, borderRadius:"50%", background:C.pinkGlow, border:`2px solid ${C.pinkDim}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:22 }}>
                      {baseTargets.gender === "female" ? "👩" : baseTargets.gender === "male" ? "👨" : "🙂"}
                    </div>
                  )}
                  <div style={{ position:"absolute", bottom:-2, right:-2, width:20, height:20, borderRadius:"50%", background:C.pink, display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, border:`2px solid ${C.surface}` }}>
                    {avatarUploading ? <div className="spin" style={{ width:8, height:8, border:"1.5px solid #fff", borderTopColor:"transparent", borderRadius:"50%" }} /> : "📷"}
                  </div>
                </div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:12, color:C.textMuted }}>{getGreeting(lang)}{baseTargets.display_name?",":""}</div>
                  <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:19, fontWeight:"800", color:C.text, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                    {baseTargets.display_name || T("main_welcome")}
                  </div>
                </div>
                <button onClick={openTargetModal} title="Edit profile" style={{ background:C.pinkDeep, border:`1px solid ${C.border}`, borderRadius:12, color:C.pink, fontSize:16, cursor:"pointer", padding:"7px 11px", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center" }}>👤</button>
              </div>
              <div style={{ borderTop:`1px solid ${C.border}`, marginTop:12, paddingTop:10, fontStyle:"italic", textAlign:"center", fontSize:12, color:C.textMuted }}>
                "{lang==="zh" ? (todayQuote.quote_zh||todayQuote.quote) : todayQuote.quote}"{todayQuote.author ? <React.Fragment> — <strong style={{ color:C.pink }}>{todayQuote.author}</strong></React.Fragment> : null}

            {showWeightReminder && (
              <div className="card fade" style={{ padding:"14px 16px", marginBottom:14, background:C.pinkDeep, borderColor:C.pinkDim }}>

                  <div style={{ fontSize:13, fontWeight:"700", color:C.text }}>{T("main_log_weight_title")}</div>

                  <input className="inp" type="number" placeholder={T("main_weight_placeholder")} value={weightInput} onChange={e=>setWeightInput(e.target.value)} style={{ flex:1 }} onKeyDown={e=>e.key==="Enter"&&saveWeight()} />

                </div>
                <div style={{ fontSize:10, color:C.textMuted, marginTop:6, fontStyle:"italic" }}>{T("main_weight_note")}</div>
              </div>
            )}

            <div className="card animate-pop" style={{ padding:"16px 18px", marginBottom:14, background:C.pinkDeep, borderColor:C.pinkDim }}>
              <div style={{ marginBottom:18 }}>
                <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:16, fontWeight:"800", color:C.text, marginBottom:4 }}>{T("main_daily_login")}</div>
                <div style={{ display:"flex", alignItems:"baseline", justifyContent:"space-between" }}>
                  <span style={{ fontSize:12, color:C.pink, fontWeight:"700" }}>{T("main_week")} {streakWeek.weekNum}</span>
                  <span style={{ fontSize:11, color:C.textMuted, fontWeight:"600" }}>{streakWeek.dateRangeLabel}</span>
                </div>
              </div>
              <div style={{ position:"relative", margin:"0 4px 8px" }}>
                {/* Bar sits at the exact vertical center of the 32px circles (16px from top of this row), and each
                    segment spans from one circle's center to the next circle's center so it visually "flows"
                    from day to day rather than floating as separate chips under each dot. */}
                <div style={{ position:"absolute", left:16, right:16, top:16, height:6, borderRadius:3, background:C.cardHover, transform:"translateY(-50%)", zIndex:0, display:"flex", overflow:"hidden" }}>
                  {streakWeek.days.slice(0,6).map((day,i) => {
                    // Colour the segment by the earlier (left) day's result, since that's the day "flowing into" the next.
                    const segColor = !day.hasData ? "transparent"
                      : day.hit ? C.green
                      : day.deviation <= 0.20 ? C.caution
                      : C.red;
                    return <div key={day.key} style={{ flex:1, background:segColor }} />;
                  })}
                </div>
                <div style={{ position:"relative", display:"flex", justifyContent:"space-between", alignItems:"center", zIndex:1 }}>
                  {streakWeek.days.map(day => {
                  // Tiered result colour: green = hit target, yellow = within 20% tolerance band, red = beyond that.
                  const resultColor = !day.hasData ? null
                    : day.hit ? C.green
                    : day.deviation <= 0.20 ? C.caution
                    : C.red;
                  const neutral = C.border;
                  const isPending = !day.hasData; // today (not yet evaluated) or future day
                  return (
                    <div key={day.key} style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:8, flex:1, position:"relative", zIndex:1 }}>
                      <div style={{
                        width:32, height:32, borderRadius:"50%",
                        display:"flex", alignItems:"center", justifyContent:"center",
                        background: isPending ? C.surface : resultColor,
                        border: isPending ? `2px solid ${day.isToday?C.pink:neutral}` : "none",
                        boxShadow: day.isToday
                          ? `0 0 0 5px ${C.pink}26`
                          : (!isPending ? `0 0 6px ${resultColor}55` : "none"),
                        transition:"all .3s ease"
                      }}>
                        {isPending ? (
                          <span style={{ fontSize:12, fontWeight:"800", color:day.isToday?C.pink:C.textDim }}>{day.label}</span>
                        ) : (
                          <span style={{ fontSize:14, fontWeight:"900", color:"#fff", lineHeight:1 }}>✓</span>
                        )}
                      </div>
                      <span style={{ fontSize:10, color:day.isToday?C.pink:C.textDim, fontWeight:"700" }}>{day.label}</span>
                    </div>
                  );
                })}
                </div>
              </div>
              <div style={{ fontSize:12, color:C.textMuted, fontStyle:"italic", textAlign:"center", marginTop:10, lineHeight:1.4 }}>{streakWeek.message}</div>
            </div>

            {streakCount > 0 && (
              <div className="card" style={{ padding:"12px 16px", marginBottom:14, background:C.pinkDeep, borderColor:C.pinkDim, display:"flex", alignItems:"center", gap:10 }}>
                <div style={{ fontSize:22 }}>🔥</div>
                <div style={{ fontSize:12, color:C.textMuted }}><span style={{ color:C.pink, fontWeight:"800" }}>{streakCount} day{streakCount===1?"":"s"}</span> streak — you've hit your calorie target {streakCount} day{streakCount===1?"":"s"} in a row.</div>
              </div>
            )}

            {(() => {
              const tdee = tdeeInfo;
              const profileIncomplete = !baseTargets.gender || !baseTargets.height_cm || !currentWeightForCalc;
              const showPicker = profileIncomplete || !baseTargets.plan_active || showTierPicker;

              if (profileIncomplete) {
                return (
                  <div className="card" style={{ padding:"18px 16px", marginBottom:14 }}>
                    <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:16, fontWeight:"800", color:C.pink, marginBottom:6 }}>{T("main_plan_title")}</div>
                    <div style={{ fontSize:12, color:C.textMuted, fontStyle:"italic", padding:"10px 0" }}>
                      {T("main_plan_incomplete")}
                    </div>
                  </div>
                );
              }

              if (!showPicker) {
                // Plan is active — show the compact "Today's Plan" summary instead of the picker
                return (
                  <div className="card" style={{ padding:"18px 16px", marginBottom:14 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
                      <span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:16, fontWeight:"800", color:C.pink }}>{T("main_todays_plan")}</span>
                      <div style={{ display:"flex", gap:6 }}>
                        <button onClick={openPlanEditor} style={{ background:"none", border:"none", color:C.textMuted, fontSize:16, cursor:"pointer", padding:4 }}>✏️</button>
                        <button onClick={()=>setShowTierPicker(true)} className="ghost-btn" style={{ fontSize:10, padding:"4px 10px" }}>{T("common_change_plan")}</button>
                      </div>
                    </div>
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
                      <div style={{ background:C.surface, borderRadius:12, padding:"12px 10px", textAlign:"center" }}>
                        <div style={{ fontSize:10, letterSpacing:".08em", color:C.textMuted, marginBottom:4, fontWeight:"700" }}>🔥 {T("main_calories_label")}</div>
                        <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:22, fontWeight:"800", color:C.pink, lineHeight:1 }}>{Math.round(baseTargets.calories)}</div>
                        <div style={{ fontSize:10, color:C.textDim }}>{T("main_kcal_day")}</div>
                      </div>
                      <div style={{ background:C.surface, borderRadius:12, padding:"12px 10px", textAlign:"center" }}>
                        <div style={{ fontSize:10, letterSpacing:".08em", color:C.textMuted, marginBottom:4, fontWeight:"700" }}>💧 {T("main_water_label")}</div>
                        <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:22, fontWeight:"800", color:C.water, lineHeight:1 }}>{waterTarget}</div>
                        <div style={{ fontSize:10, color:C.textDim }}>{T("main_ml_day")}</div>
                      </div>
                    </div>
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
                      {[[T("common_protein"),baseTargets.protein,C.protein,"🥩"],[T("common_carbs"),baseTargets.carbs,C.carbs,"🍞"],[T("common_fat"),baseTargets.fat,C.fat,"🥑"]].map(([l,v,c,ic]) => (
                        <div key={l} style={{ background:C.surface, borderRadius:12, padding:"8px", textAlign:"center" }}>
                          <div style={{ fontSize:9, color:C.textMuted, fontWeight:"700" }}>{ic} {l.toUpperCase()}</div>
                          <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:15, fontWeight:"700", color:c }}>{Math.round(v)}g</div>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              }

              return (
                <div className="card" style={{ padding:"18px 16px", marginBottom:14 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                    <span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:16, fontWeight:"800", color:C.pink }}>{T("main_plan_title")}</span>
                    {baseTargets.plan_active && <button onClick={()=>setShowTierPicker(false)} className="ghost-btn" style={{ fontSize:10, padding:"4px 10px" }}>{T("common_cancel")}</button>}
                  </div>
                  <div style={{ fontSize:12, color:C.textMuted, marginBottom:14 }}>
                    {T("main_tdee_desc")} <strong style={{color:C.text}}>{tdee.tdee} kcal/day</strong> {T("main_tdee_desc2")}
                  </div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:6, marginBottom:8 }}>
                    {[
                      { label:T("main_tier_maintain"), delta:0 },
                      { label:T("main_tier_lose_starter"), delta:-200 },
                      { label:T("main_tier_lose_steady"), delta:-350 },
                      { label:T("main_tier_lose_committed"), delta:-500 },
                      { label:T("main_tier_gain_starter"), delta:200 },
                      { label:T("main_tier_gain_steady"), delta:350 },
                    ].map(tier => {
                      const isActive = Math.round(baseTargets.calories) === Math.round(tdee.tdee + tier.delta);
                      return (
                        <button key={tier.label} onClick={() => { applyCalorieTier(tdee.tdee, tier.delta); setShowTierPicker(false); }} className="slot-btn" style={{ fontSize:10, padding:"8px 4px", borderColor: isActive?C.pinkDim:C.border, background: isActive?C.pinkGlow:"transparent", color: isActive?C.pink:C.textMuted }}>
                          {tier.label}<br/><span style={{ fontSize:9, opacity:0.8 }}>{tier.delta===0?"±0":(tier.delta>0?"+":"")+tier.delta}</span>
                        </button>
                      );
                    })}
                  </div>
                  <div style={{ display:"flex", gap:8, alignItems:"flex-end", marginTop:10 }}>
                    <div style={{ flex:1 }}>
                      <label style={{ fontSize:10, color:C.textMuted, fontWeight:"700", display:"block", marginBottom:4 }}>{T("main_own_adjustment")}</label>
                      <input className="inp" type="number" placeholder={T("main_own_adjustment_placeholder")} value={customDeltaInput} onChange={e=>setCustomDeltaInput(e.target.value)} />
                    </div>
                    <button className="pink-btn" style={{ flexShrink:0 }} onClick={() => { applyCustomDelta(tdee.tdee); setShowTierPicker(false); }}>{T("common_set")}</button>
                  </div>
                  {customDeltaWarning && (
                    <div style={{ fontSize:11, color: C.caution, marginTop:8, lineHeight:1.5 }}>⚠️ {customDeltaWarning}</div>
                  )}
                  <div style={{ fontSize:11, color:C.textMuted, fontStyle:"italic", marginTop:10 }}>
                    {T("main_workout_bonus_note")}
                  </div>
                </div>
              );
            })()}

            {planConfirmation && (
              <div className="card fade" style={{ marginBottom:14, padding:"14px 16px", background:C.pinkDeep, borderColor:C.pinkDim }}>
                <div style={{ fontSize:13, fontWeight:"700", color:C.pink, marginBottom:8 }}>{T("main_plan_set_title")}</div>
                <div style={{ fontSize:12, color:C.text, lineHeight:1.7 }}>
                  {T("main_plan_set_body1")} <strong>{planConfirmation.calories} kcal</strong>, {T("main_plan_set_body2")} <strong>{planConfirmation.protein}g {T("main_plan_set_body3")}</strong> <strong>{planConfirmation.carbs}g {T("main_plan_set_body4")}</strong> <strong>{planConfirmation.fat}g {T("main_plan_set_body5")}</strong> <strong>{planConfirmation.waterNeeded}ml {T("main_plan_set_body6")}</strong>
                </div>
                <button onClick={()=>setPlanConfirmation(null)} className="ghost-btn" style={{ width:"100%", marginTop:10, fontSize:11, padding:"6px" }}>{T("common_got_it")}</button>
              </div>
            )}
          </div>
        )}

        {activeTab==="today" && (
          <div className="fade">
            {(() => {
              const winBoxes = [
                {
                  key:"calories", label:L("Calories","热量"), icon:"🔥",
                  status: (() => {
                    if (consumed.calories===0 && burned===0) return "neutral";
                    const pct = (net / targets.calories) * 100;
                    if (isGainPlan) {
                      if (pct >= 80) return "good";
                      return "caution";
                    }
                    if (pct <= 100) return "good";
                    if (pct <= 120) return "caution";
                    return "bad";
                  })(),
                  detail: (() => {
                    const pct = targets.calories ? (net / targets.calories) * 100 : 0;
                    if (isGainPlan) {
                      if (pct >= 100) return L(`Great — you've hit your ${Math.round(targets.calories)} kcal goal today.`, `太棒了 —— 今天已达成 ${Math.round(targets.calories)} 千卡的目标。`);
                      if (pct >= 80) return L(`${Math.round(targets.calories-net)} kcal left to fully hit your gain target.`, `还差 ${Math.round(targets.calories-net)} 千卡即可完全达成增重目标。`);
                      return L(`${Math.round(targets.calories-net)} kcal short of your gain target — you still need to eat some more.`, `距离增重目标还差 ${Math.round(targets.calories-net)} 千卡 —— 还需要多吃一些。`);
                    }
                    if (pct <= 100) return L(`${Math.round(targets.calories-net)} kcal of headroom left today.`, `今天还剩 ${Math.round(targets.calories-net)} 千卡的空间。`);
                    if (pct <= 120) return L(`${Math.round(net-targets.calories)} kcal over — still within a fine range (up to 120%).`, `超出 ${Math.round(net-targets.calories)} 千卡 —— 仍在可接受范围内 (120%以内)。`);
                    return L(`${Math.round(net-targets.calories)} kcal over — that's over-consumption (120%+).`, `超出 ${Math.round(net-targets.calories)} 千卡 —— 已属于过量摄入 (超过120%)。`);
                  })(),
                  advice: (() => {
                    const pct = targets.calories ? (net / targets.calories) * 100 : 0;
                    if (isGainPlan) {
                      if (pct >= 100) return L("Nice work — that's what fuels the gains!", "做得好 —— 这正是增重所需的动力！");
                      if (pct >= 80) return L("Add a snack or a bigger portion to close the gap.", "加一份小食或加大份量来补齐差距。");
                      return L("You're under your gain target — try an extra meal or a calorie-dense snack today.", "目前低于增重目标 —— 今天可以尝试加餐或吃一份高热量小食。");
                    }
                    if (pct <= 100) return L("Nice pacing — keep it up!", "节奏很好 —— 继续保持！");
                    if (pct <= 120) return L("A little over, but no need for caution yet — just keep an eye on it.", "略有超出，但还不需要担心 —— 留意一下即可。");
                    return L("Caution: that's a meaningful over-consumption. Try a lighter next meal, or log a workout to balance it out.", "注意：这已属于明显的过量摄入。下一餐可以吃得清淡些，或记录一次运动来平衡一下。");
                  })()
                },
                {
                  key:"hydration", label:L("Hydration","饮水"), icon:"💧",
                  status: totalDrinkMl===0 ? "neutral" : totalDrinkMl >= waterTarget ? "good" : "bad",
                  detail: totalDrinkMl >= waterTarget
                    ? L(`Goal hit — ${totalDrinkMl}ml of ${waterTarget}ml.`, `目标达成 —— 已喝 ${totalDrinkMl}ml，目标 ${waterTarget}ml。`)
                    : L(`${waterTarget-totalDrinkMl}ml left to reach your ${waterTarget}ml goal.`, `距离 ${waterTarget}ml 的目标还差 ${waterTarget-totalDrinkMl}ml。`),
                  advice: totalDrinkMl >= waterTarget ? L("Great hydration today!", "今天补水做得很好！") : L("Drink more water — try a glass now.", "多喝点水 —— 现在就喝一杯吧。")
                },
                {
                  key:"workout", label:L("Workout","运动"), icon:"🏃",
                  status: (dayData.workouts||[]).length > 0 ? "good" : "neutral",
                  detail: (dayData.workouts||[]).length > 0
                    ? L(`${(dayData.workouts||[]).length} workout(s) logged, ${burned} kcal burned.`, `已记录 ${(dayData.workouts||[]).length} 次运动，消耗 ${burned} 千卡。`)
                    : L("No workout logged yet today.", "今天还没有记录运动。"),
                  advice: (dayData.workouts||[]).length > 0 ? L("Awesome work today!", "今天表现很棒！") : L("Let's workout a bit — even a short walk counts.", "动一动吧 —— 哪怕只是短暂散步也算数。")
                },
              ];
              const colorsFor = (status, key) => {
                const dotColor = {
                  good: C.green,
                  caution: C.caution,
                  bad: C.red,
                  neutral: C.textDim
                }[status];
                return { bg: C.card, border: C.border, dot: dotColor, text: dotColor };
              };
              const activeBox = winBoxes.find(b => b.key === expandedWinBox);
              return (
                <React.Fragment>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:8 }}>
                    {winBoxes.map((box) => {
                      const colors = colorsFor(box.status, box.key);
                      return (
                        <div key={box.key} onClick={() => setExpandedWinBox(expandedWinBox===box.key ? null : box.key)} style={{
                          background:colors.bg,
                          border:`1px solid ${expandedWinBox===box.key?colors.dot:colors.border}`,
                          borderRadius:14, padding:"10px 6px", textAlign:"center", cursor:"pointer",
                          boxShadow: box.status !== "neutral" ? `0 0 14px 2px ${colors.dot}55` : "none",
                          transition:"all .15s"
                        }}>
                          <div style={{ fontSize:18, lineHeight:1, marginBottom:4 }}>{box.icon}</div>
                          <div style={{ fontSize:10, fontWeight:"700", color:C.text }}>{box.label}</div>
                        </div>
                      );
                    })}
                  </div>
                  {activeBox && (
                    <div className="card fade" style={{ padding:"12px 14px", marginBottom:14, background:C.card, borderColor:C.border }}>
                      <div style={{ fontSize:13, fontWeight:"700", color:colorsFor(activeBox.status, activeBox.key).text, marginBottom:4 }}>{activeBox.detail}</div>
                      <div style={{ fontSize:12, color:C.textMuted, fontStyle:"italic" }}>{activeBox.advice}</div>
                    </div>
                  )}
                </React.Fragment>
              );
            })()}

            <div className="card-primary" style={{ padding:"20px 18px", marginBottom:14 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                <span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:18, fontWeight:"800", color:C.pink }}>🔥 {L("Today's Calorie Balance","今日热量平衡")}</span>
              </div>
              {(() => {
                // Plan status: tallies with "Your Calorie Plan" (baseTargets.calories set some fixed
                // delta from TDEE, e.g. picking "Deficit: Starter" sets -200). This is a fixed number
                // reflecting the plan chosen, not a live figure.
                const planDelta = tdeeInfo ? Math.round(baseTargets.calories - tdeeInfo.tdee) : 0;
                const planAbs = Math.abs(planDelta);
                let planComment;
                if (!tdeeInfo || planAbs < 50) {
                  planComment = L("Right on target — nicely balanced today!", "非常接近目标 —— 今天保持得很平衡！");
                } else if (planDelta < 0) {
                  planComment = planAbs <= 300
                    ? L("Great start — stay consistent and the results will follow!", "良好的开端 —— 保持稳定，成果自然会到来！")
                    : planAbs <= 600
                    ? L("A solid, sustainable deficit — keep this pace up.", "稳健且可持续的热量缺口 —— 保持这个节奏。")
                    : L("That's a hardcore deficit — impressive discipline! Just make sure you're still fueling enough to sustain it.", "这是相当硬核的热量缺口 —— 自律令人佩服！但也要确保摄入足够，才能长久坚持。");
                } else {
                  planComment = planAbs <= 300
                    ? L("A small surplus — no big deal if that's part of your plan.", "略有盈余 —— 如果这是计划的一部分，无需担心。")
                    : planAbs <= 600
                    ? L("A meaningful surplus — great if you're building, otherwise ease off a little.", "较明显的热量盈余 —— 增肌期很不错，否则可以稍微收一收。")
                    : L("A big surplus — no stress, just rebalance over the next few days.", "盈余较大 —— 别有压力，接下来几天调整回来就好。");
                }
                const planLabel = planDelta < 0
                  ? L(`Calorie deficit: ${planAbs} kcal`, `热量缺口：${planAbs} 千卡`)
                  : planDelta > 0
                  ? L(`Calorie surplus: +${planAbs} kcal`, `热量盈余：+${planAbs} 千卡`)
                  : L("Maintain", "维持");

                // Live status: how today's actual net calories compare to the boosted target right now.
                const calBarPct = targets.calories ? (net/targets.calories)*100 : 0;
                const calBarWidth = Math.min(100, Math.max(0, calBarPct));
                const calLabelInside = calBarWidth >= 14;
                const over = calBarPct - 100;
                let liveColor, liveLabel, liveComment;
                if (over > 20) {
                  liveColor = C.red;
                  liveLabel = L(`Over target: ${Math.round(over)}%`, `超出目标：${Math.round(over)}%`);
                  liveComment = L("You're over target today — that's okay, tomorrow's a fresh start to bounce back!", "今天超出了目标 —— 没关系，明天又是新的开始，重新出发！");
                } else if (over > 0) {
                  liveColor = C.caution;
                  liveLabel = L(`Over target: ${Math.round(over)}%`, `超出目标：${Math.round(over)}%`);
                  liveComment = L("You're doing fine — slightly over, but let's aim a touch closer tomorrow.", "表现还不错 —— 略微超出，明天再靠近目标一点点。");
                } else {
                  liveColor = C.green;
                  liveLabel = L(`Within target: ${Math.round(calBarPct)}%`, `未超目标：${Math.round(calBarPct)}%`);
                  liveComment = L("Awesome! Right on track — keep this momentum going!", "太棒了！完全在节奏上 —— 保持这股势头！");
                }

                return (
                  <div>
                    <div style={{ fontSize:12, lineHeight:1.5, marginBottom:10 }}>
                      <div style={{ color: planDelta < 0 ? C.green : planDelta > 0 ? C.caution : C.text, fontWeight:"700" }}>{planLabel}</div>
                      <div style={{ color:C.textMuted, marginTop:2 }}>{planComment}</div>
                    </div>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4, fontSize:12 }}>
                      <span style={{ fontWeight:"700", color:C.pink }}>🔥 {L("Calories","热量")}</span>
                      <span style={{ color:C.text }}>{Math.round(net)} / {Math.round(targets.calories)} kcal</span>
                    </div>
                    <div style={{ position:"relative", height:12, background:C.border, borderRadius:6, overflow:"hidden" }}>
                      <div style={{ height:"100%", width:`${calBarWidth}%`, background:`linear-gradient(90deg, color-mix(in srgb, ${C.pink} 100%, white 35%), color-mix(in srgb, ${C.pink} 100%, black 15%))`, borderRadius:6, transition:"width .5s ease" }} />
                      <div style={{
                        position:"absolute", top:0, bottom:0, display:"flex", alignItems:"center",
                        left: calLabelInside ? "auto" : `calc(${calBarWidth}% + 6px)`,
                        right: calLabelInside ? `calc(${100-calBarWidth}% + 6px)` : "auto",
                        fontSize:10, fontWeight:"800",
                        color: calLabelInside ? "#fff" : C.text,
                        textShadow: calLabelInside ? "0 1px 2px rgba(0,0,0,0.5)" : "none",
                        whiteSpace:"nowrap"
                      }}>
                        {Math.round(calBarPct)}%
                      </div>
                    </div>
                    <div style={{ fontSize:12, lineHeight:1.5, marginTop:10 }}>
                      <div style={{ color:liveColor, fontWeight:"700" }}>{liveLabel}</div>
                      <div style={{ color:C.textMuted, marginTop:2 }}>{liveComment}</div>
                    </div>
                  </div>
                );
              })()}
            </div>
            <div className="card-primary" style={{ padding:"20px 18px", marginBottom:14 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
                <span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:18, fontWeight:"800", color:C.pink }}>⚖️ {L("Macro Nutrients","宏量营养素")}</span>
                <span style={{ fontSize:11, fontStyle:"italic", color:C.textMuted, fontWeight:"500" }}>{L("% and grams","百分比与克数")}</span>
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
                {[{label:T("common_protein"),key:"protein",color:C.protein,target:targets.protein,icon:"🥩"},{label:T("common_carbs"),key:"carbs",color:C.carbs,target:targets.carbs,icon:"🍞"},{label:T("common_fat"),key:"fat",color:C.fat,target:targets.fat,icon:"🥑"}].map(({label,key,color,target,icon}) => {
                  const realPct = target ? (consumed[key]/target)*100 : 0;
                  const barWidth = Math.min(100, realPct); // bar fill always caps at 100% — the real value is shown separately as text
                  const labelInside = barWidth >= 14;
                  return (
                    <div key={key}>
                      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4, fontSize:12 }}>
                        <span style={{ fontWeight:"700", color }}>{icon} {label}</span>
                        <span style={{ color:C.text }}>{Math.round(consumed[key])} / {Math.round(target)}g</span>
                      </div>
                      <div style={{ position:"relative", height:12, background:C.border, borderRadius:6, overflow:"hidden" }}>
                        <div style={{ height:"100%", width:`${barWidth}%`, background:`linear-gradient(90deg, color-mix(in srgb, ${color} 100%, white 35%), color-mix(in srgb, ${color} 100%, black 15%))`, borderRadius:6, transition:"width .5s ease" }} />
                        <div style={{
                          position:"absolute", top:0, bottom:0, display:"flex", alignItems:"center",
                          left: labelInside ? "auto" : `calc(${barWidth}% + 6px)`,
                          right: labelInside ? `calc(${100-barWidth}% + 6px)` : "auto",
                          fontSize:10, fontWeight:"800",
                          color: labelInside ? "#fff" : C.text,
                          textShadow: labelInside ? "0 1px 2px rgba(0,0,0,0.5)" : "none",
                          whiteSpace:"nowrap"
                        }}>
                          {Math.round(realPct)}%
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="card" style={{ padding:"18px 16px", marginBottom:14 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
                <span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:16, fontWeight:"800", color:C.pink }}>🧪 {L("Secondary nutrients","次要营养素")}</span>
                <span style={{ fontSize:11, fontStyle:"italic", color:C.textMuted }}>{L("Sugar & sodium: stay under · Fiber: aim to reach","糖与钠：控制在目标以下 · 纤维：争取达到目标")}</span>
              </div>
              {[
                { label:L("Sugar","糖"), icon:"🍬", val:consumed.sugar, target:baseTargets.sugar_limit_g||50, unit:"g", isCap:true },
                { label:L("Sodium","钠"), icon:"🧂", val:consumed.sodium, target:baseTargets.sodium_limit_mg||2300, unit:"mg", isCap:true },
                { label:L("Fiber","纤维"), icon:"🌾", val:consumed.fiber, target:baseTargets.fiber_target_g||25, unit:"g", isCap:false },
              ].map(({label,icon,val,target,unit,isCap}) => {
                const realPct = target ? (val/target)*100 : 0;
                // The bar fill always caps at 100% width — once over the limit it simply shows full,
                // never overflowing or looking broken. The real, uncapped % is shown as text instead,
                // so going from 200% over to 400% over still reads correctly even though the bar is maxed.
                const barWidth = Math.min(100, realPct);
                const labelInside = barWidth >= 14;
                const over = isCap && val > target;
                // Sweet Pink: bar fill stays in the pink family — the over-limit warning lives in the
                // red text label instead. Other palettes keep their original green/red fill for now.
                const barColor = over ? C.pinkDim : C.pink;
                return (
                  <div key={label} style={{ marginBottom:12 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4, fontSize:12 }}>
                      <span style={{ fontWeight:"700", color:C.text }}>{icon} {label}</span>
                      <span style={{ color: over?C.red:C.textMuted }}>{Math.round(val)} / {Math.round(target)}{unit} {isCap ? (over?L("(over limit)","(超出限额)"):"") : (val>=target?L("(goal met!)","(已达标!)"):"")}</span>
                    </div>
                    <div style={{ position:"relative", height:12, background:C.border, borderRadius:6, overflow:"hidden" }}>
                      <div style={{ height:"100%", width:`${barWidth}%`, background:barColor, borderRadius:6, transition:"width .5s ease" }} />
                      <div style={{
                        position:"absolute", top:0, bottom:0, display:"flex", alignItems:"center",
                        left: labelInside ? "auto" : `calc(${barWidth}% + 6px)`,
                        right: labelInside ? `calc(${100-barWidth}% + 6px)` : "auto",
                        fontSize:10, fontWeight:"800",
                        color: labelInside ? "#fff" : C.text,
                        textShadow: labelInside ? "0 1px 2px rgba(0,0,0,0.5)" : "none",
                        whiteSpace:"nowrap"
                      }}>
                        {Math.round(realPct)}%
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>

            <div className="card-primary" style={{ padding:"20px 18px", marginBottom:14, background: totalDrinkMl>=waterTarget ? `${C.water}12` : C.card }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
                <span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:18, fontWeight:"800", color:C.water }}>💧 {L("Hydration","饮水")}</span>
                <span style={{ fontSize:11, fontStyle:"italic", color:C.textMuted, fontWeight:"500" }}>{totalDrinkMl} / {waterTarget} ml</span>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:14 }}>
                {[
                  { label:L("Logged","已喝"), val:`${totalDrinkMl}`, unit:"ml" },
                  { label:L("Remaining","剩余"), val: totalDrinkMl>=waterTarget ? "0" : `${waterTarget-totalDrinkMl}`, unit:"ml" },
                  { label:L("Cups (250ml)","杯数 (250ml)"), val: `${Math.floor(totalDrinkMl/250)}`, unit:L("cups","杯") },

                  <div key={label} style={{ background:C.surface, borderRadius:12, padding:"12px 10px", textAlign:"center" }}>
                    <div style={{ fontSize:10, letterSpacing:".1em", color:C.textMuted, marginBottom:4, fontWeight:"700" }}>{label.toUpperCase()}</div>
                    <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:22, fontWeight:"800", color:C.water, lineHeight:1 }}>{val}</div>
                    <div style={{ fontSize:10, color:C.textDim, fontWeight:"500" }}>{unit}</div>
                  </div>
                ))}
              </div>

                {waterMilestones.map(m => (
                  <div key={m.pct} style={{ flex:1, textAlign:"center", padding:"6px 4px", borderRadius:10, background: totalDrinkMl>=m.ml ? `${C.water}1f` : C.surface, border:`1px solid ${totalDrinkMl>=m.ml?C.water:C.border}` }}>
                    <div style={{ fontSize:10, fontWeight:"700", color: totalDrinkMl>=m.ml ? C.water : C.textMuted }}>{m.label}</div>
                  </div>
                ))}
              </div>
              <div style={{ fontSize:12, color:C.textMuted, fontStyle:"italic", textAlign:"center", marginTop:10 }}>
                {hydrationMessage}
              </div>
            </div>

            <div className="card" style={{ padding:"18px 16px", marginBottom:14 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>

                <span style={{ fontSize:11, fontStyle:"italic", color:C.textMuted }}>{L("Calories burned per week","每周消耗热量")}</span>
              </div>
              <LineChart points={workoutWeeklyTrend} color={C.workoutAccent} theme={theme} C={C} />
              <div style={{ marginTop:14, borderTop:`1px solid ${C.border}`, paddingTop:10 }}>
                {workoutWeeklyTrend.slice().reverse().map((w,i) => (
                  <div key={i} className="hist-sub-row">
                    <span style={{ fontWeight:"700", color:C.textMuted }}>{w.label}</span>
                    <span style={{ color:C.workoutAccent, fontWeight:"700" }}>{w.burned} kcal</span>
                  </div>
                ))}
              </div>
              {workoutWeeklyTrend[5].burned > workoutWeeklyTrend[4].burned && workoutWeeklyTrend[4].burned > 0 && (
                <div style={{ fontSize:12, color:C.workoutAccent, fontWeight:"600", textAlign:"center", marginTop:10 }}>📈 {L("Trending up from last week — nice work!","比上周有所提升 —— 做得好！")}</div>
              )}
            </div>

            <div className="card" style={{ padding:"18px 16px", marginBottom:14 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                <span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:16, fontWeight:"800", color:C.pink }}>⚖️ {L("Weight & BMI","体重与 BMI")}</span>
                {!showWeightReminder && !todayWeight && (
                  <button className="ghost-btn" style={{ fontSize:11, padding:"4px 10px" }} onClick={()=>setShowWeightReminder(true)}>+ {L("Log today","记录今天")}</button>
                )}
              </div>
              {weightHistory.length === 0 ? (
                <div style={{ fontSize:13, fontStyle:"italic", color:C.textDim, textAlign:"center", padding:"16px 0" }}>{L("Log your weight to start tracking your trend and BMI.","记录体重，开始追踪趋势与 BMI。")}</div>
              ) : (
                <React.Fragment>
                  <div style={{ display:"grid", gridTemplateColumns: bmiInfo ? "1fr 1fr" : "1fr", gap:10, marginBottom:14 }}>
                    <div style={{ background:C.surface, borderRadius:12, padding:"12px 10px", textAlign:"center" }}>
                      <div style={{ fontSize:10, letterSpacing:".1em", color:C.textMuted, marginBottom:4, fontWeight:"700" }}>{L("CURRENT WEIGHT","当前体重")}</div>
                      <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:22, fontWeight:"800", color:C.pink, lineHeight:1 }}>{currentWeightForCalc}</div>
                      <div style={{ fontSize:10, color:C.textDim, fontWeight:"500" }}>kg</div>
                    </div>
                    {bmiInfo && (
                      <div style={{ background:C.surface, borderRadius:12, padding:"12px 10px", textAlign:"center" }}>
                        <div style={{ fontSize:10, letterSpacing:".1em", color:C.textMuted, marginBottom:4, fontWeight:"700" }}>BMI</div>
                        <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:22, fontWeight:"800", color:C[BMI_CATEGORY_COLOR_KEY[bmiInfo.key]], lineHeight:1 }}>{bmiInfo.value}</div>

                      </div>
                    )}
                  </div>
                  {!bmiInfo && <div style={{ fontSize:11, color:C.textMuted, fontStyle:"italic", marginBottom:10 }}>{L("Add your height in your Profile (👤 on Main) to see your BMI.","在主页的个人资料 (👤) 中填写身高，即可查看 BMI。")}</div>}
                  {weightHistory.length > 1 && (
                    <LineChart points={weightHistory.slice(-30).map(w => ({ label: new Date(w.log_date+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}), burned: w.weight_kg }))} color={C.pink} theme={theme} minScaleFloor={0} C={C} />
                  )}
                  {weightTrendMessage && (
                    <div style={{ fontSize:12, color:C.textMuted, fontStyle:"italic", textAlign:"center", marginTop:10 }}>{weightTrendMessage}</div>
                  )}
                </React.Fragment>
              )}
            </div>

            <div className="card" style={{ padding:"18px 16px", marginBottom:14 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                <span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:16, fontWeight:"800", color:C.pink }}>📈 {L("Last 7 Days","最近 7 天")}</span>
                <div style={{ display:"flex", gap:10, fontSize:10, color:C.textMuted }}>
                  <span><span style={{ display:"inline-block", width:8, height:8, borderRadius:2, background:C.pink, marginRight:4 }}></span>{L("Consumed","摄入")}</span>
                  <span><span style={{ display:"inline-block", width:8, height:8, borderRadius:2, background:C.green, marginRight:4 }}></span>{L("Burned","消耗")}</span>
                </div>
              </div>
              <TrendChart days={last7Days} target={targets.calories} theme={theme} C={C} />
            </div>

            <div className="card" style={{ padding:"18px 16px", marginBottom:14 }}>
              <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:16, fontWeight:"800", color:C.pink, marginBottom:14 }}>{L("Last 30 Days, At a Glance","近 30 天概览")}</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:10 }}>
                {[
                  { label:L("Avg Consumed","平均摄入"), icon:"🔥", val:`${last30Stats.avgConsumed}`, unit:L("kcal/day","千卡/天"), color:C.pink },
                  { label:L("Avg Water","平均饮水"), icon:"💧", val:`${last30Stats.avgWater}`, unit:L("ml/day","毫升/天"), color:C.water },
                  { label:L("Avg Burned","平均消耗"), icon:"🏃", val:`${last30Stats.avgBurned}`, unit:L("kcal/day","千卡/天"), color:C.workoutAccent },
                ].map(({label,icon,val,unit,color}) => (
                  <div key={label} style={{ background:C.surface, borderRadius:12, padding:"10px 8px", textAlign:"center" }}>
                    <div style={{ fontSize:9, color:C.textMuted, letterSpacing:".04em", fontWeight:"700", marginBottom:3 }}>{icon} {label.toUpperCase()}</div>
                    <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:18, fontWeight:"800", color, lineHeight:1 }}>{val}</div>
                    <div style={{ fontSize:9, color:C.textDim }}>{unit}</div>
                  </div>
                ))}
              </div>
              <div style={{ fontSize:11, color:C.textMuted, fontStyle:"italic", textAlign:"center" }}>
                {last30Stats.daysTracked===0 ? L("Start logging to see your trends here.","开始记录后即可在此查看趋势。") : L(`Based on ${last30Stats.daysTracked} tracked day(s) in the last 30.`, `基于近 30 天中 ${last30Stats.daysTracked} 天的记录数据。`)}
              </div>
            </div>

            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:14 }}>
              {[{label:L("Meals Logged","已记录餐次"),val:dayData.meals.length,color:C.pink},{label:L("Workouts Tracked","已记录运动"),val:(dayData.workouts||[]).length,color:C.workoutAccent}].map(({label,val,color}) => (
                <div key={label} className="card" style={{ padding:"16px" }}>
                  <div style={{ fontSize:10, color:C.textMuted, letterSpacing:".1em", marginBottom:6, fontWeight:"700" }}>{label.toUpperCase()}</div>
                  <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:32, fontWeight:"800", color }}>{val}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {activeTab==="meal" && (
          <div className="fade">
            {!geminiKey.trim() && (
              <div className="card fade" style={{ padding:"12px 14px", marginBottom:14, background:C.pinkDeep, borderColor:C.pinkDim, display:"flex", justifyContent:"space-between", alignItems:"center", gap:10 }}>
                <div style={{ fontSize:12, color:C.textMuted, lineHeight:"1.5" }}>✨ <strong style={{color:C.text}}>{L("AI photo scan & suggestions","AI 拍照识别与建议")}</strong> {L("need a free Gemini key, set up once.","需要一个免费的 Gemini 密钥，只需设置一次。")}</div>
                <button className="ghost-btn" style={{ flexShrink:0, padding:"6px 12px", fontSize:12 }} onClick={() => setShowSettings(true)}>{L("Set up","去设置")}</button>
              </div>
            )}
            <div style={{ marginBottom:14 }}>
              <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:15, fontWeight:"700", color:C.textMuted, marginBottom:8 }}>{L("Log a meal for...","为以下用餐时段记录...")}</div>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                {SLOTS.map(s => (<button key={s} className={`slot-btn ${activeSlot===s?"on":""}`} onClick={() => setActiveSlot(s)}>{SLOT_ICONS[s]} {slotLabel(s, lang)}</button>))}
              </div>
            </div>
            {favMeals.length > 0 && (
              <div className="card" style={{ padding:12, marginBottom:12 }}>
                <div style={{ fontSize:11, fontWeight:"700", color:C.text, letterSpacing:"0.05em", marginBottom:8, fontFamily:"'DM Sans',sans-serif", display:"flex", alignItems:"center", gap:6 }}>★ {L("MY FAVORITES","我的收藏")}</div>
                <div style={{ display:"flex", gap:8, overflowX:"auto", WebkitOverflowScrolling:"touch", paddingBottom:4 }}>
                  {favMeals.map(fav => (
                    <div key={fav.id} className="ghost-btn animate-pop" style={{ display:"flex", alignItems:"center", gap:6, padding:"6px 10px", whiteSpace:"nowrap", flexShrink:0, fontSize:12, fontWeight:"500", cursor:"pointer" }} onClick={() => useFavoriteMeal(fav)}>
                      <span>{fav.name} ({Math.round(fav.calories)} kcal)</span>
                      <span onClick={(e)=>{e.stopPropagation(); removeFavorite("meal", fav.id);}} style={{ color:C.textDim, fontSize:14, padding:"0 0 0 2px" }}>×</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
            <div className="upload-zone" style={{ marginBottom:10 }} onClick={() => !analyzing && foodRef.current?.click()} onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();analyzeImage(e.dataTransfer.files[0],"meal")}}>

                <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:10, width:"100%" }}>
                  <div style={{ width:"70%", maxWidth:200, height:6, background:C.border, borderRadius:6, overflow:"hidden" }}>
                    <div style={{ height:"100%", width:"40%", background:`linear-gradient(90deg, transparent, ${C.pink}, transparent)`, borderRadius:6, animation:"progressSlide 1.3s ease-in-out infinite" }} />
                  </div>
                  <span style={{ fontStyle:"italic", color:C.textMuted, fontSize:13 }}>{analyzeStatusMsg}</span>
                </div>
              ) : (
                <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:8 }}>
                  <div style={{ fontSize:28 }}>📸</div>
                  <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:16, fontWeight:"700", color:C.text }}>{L("Add a photo of your","添加")} {slotLabel(activeSlot, lang)}{L("","照片")}</div>
                  <div style={{ fontSize:12, fontStyle:"italic", color:C.textMuted }}>{L("Take a photo or choose from your library — AI estimates calories & macros","拍照或从相册选择 —— AI 将自动估算热量与营养素")}</div>
                </div>
              )}
            </div>
            <div className="card" style={{ padding:"14px 14px", marginBottom:14 }}>
              <div style={{ display:"flex", gap:8, marginBottom:8 }}>

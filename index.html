function todayKey(cutoffHour) {
  const now = new Date();
  // If a cutoff hour is set (e.g. 2am for late-night supper), treat times before
  // that hour as still belonging to the previous day.
  if (cutoffHour && now.getHours() < cutoffHour) {
    now.setDate(now.getDate() - 1);
  }
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}
function localDateKey(dateObj) {
  const y = dateObj.getFullYear();
  const m = String(dateObj.getMonth()+1).padStart(2,'0');
  const d = String(dateObj.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}

// ── BMR (Mifflin-St Jeor) + activity multiplier → daily calorie target ──
const ACTIVITY_MULTIPLIERS = { sedentary:1.2, light:1.375, moderate:1.55, active:1.725, very_active:1.9 };
const ACTIVITY_LABELS = { sedentary:"Sedentary (little/no exercise)", light:"Light (1-3 days/week)", moderate:"Moderate (3-5 days/week)", active:"Active (6-7 days/week)", very_active:"Very active (physical job/2x day)" };
const ACTIVITY_LABELS_ZH = { sedentary:"久坐 (几乎不运动)", light:"轻度 (每周1-3天)", moderate:"中度 (每周3-5天)", active:"活跃 (每周6-7天)", very_active:"非常活跃 (体力工作/每天2次)" };
function activityLabel(key, lang) { return (lang==="zh" ? ACTIVITY_LABELS_ZH : ACTIVITY_LABELS)[key]; }
function calcBMRTargets({ gender, heightCm, birthYear, weightKg, activityLevel, goal }) {
  if (!gender || !heightCm || !weightKg) return null;
  const age = birthYear ? (new Date().getFullYear() - birthYear) : 30;
  const bmr = gender === "male"
    ? 10*weightKg + 6.25*heightCm - 5*age + 5
    : 10*weightKg + 6.25*heightCm - 5*age - 161;
  const tdee = bmr * (ACTIVITY_MULTIPLIERS[activityLevel] || 1.55);
  const calorieAdjust = goal === "lose" ? -500 : goal === "gain" ? 300 : 0;
  const calories = Math.max(1200, Math.round(tdee + calorieAdjust));
  // Standard macro split: 30% protein, 40% carbs, 30% fat (reasonable general default)
  const protein = Math.round((calories*0.30)/4);
  const carbs = Math.round((calories*0.40)/4);
  const fat = Math.round((calories*0.30)/9);
  return { calories, protein, carbs, fat, bmr: Math.round(bmr), tdee: Math.round(tdee) };
}

// Returns a `key` instead of a hardcoded color so the caller can look up the right
// color from the current palette (see BMI_CATEGORY_COLOR_KEY below).
function calcBMI(weightKg, heightCm) {
  if (!weightKg || !heightCm) return null;
  const heightM = heightCm / 100;
  const bmi = weightKg / (heightM*heightM);
  let category, key;
  if (bmi < 18.5) { category = "Underweight"; key = "under"; }
  else if (bmi < 25) { category = "Healthy range"; key = "healthy"; }
  else if (bmi < 30) { category = "Overweight"; key = "over"; }
  else { category = "Obese range"; key = "obese"; }
  return { value: Math.round(bmi*10)/10, category, key };
}
// Maps a BMI category key to the palette color key that should represent it.
const BMI_CATEGORY_COLOR_KEY = { under:"water", healthy:"green", over:"caution", obese:"red" };
// ── Recommended daily water intake, personalized by body weight (~33ml/kg, standard guidance) ──
function calcWaterTarget(weightKg, activityLevel, workoutBurnedKcal) {
  const base = weightKg ? weightKg * 33 : 2000; // fallback to 2000ml if no weight logged yet
  const activityBonus = { sedentary:0, light:150, moderate:300, active:500, very_active:700 }[activityLevel] || 300;
  // Extra hydration for today's actual logged workouts — roughly 500ml per 350kcal burned through
  // exercise, a standard sports-science rule of thumb (replacing sweat losses), on top of the
  // baseline activity-level bonus above.
  const workoutBonus = workoutBurnedKcal ? Math.round((workoutBurnedKcal / 350) * 500) : 0;
  const target = Math.round((base + activityBonus + workoutBonus) / 50) * 50; // round to nearest 50ml
  return Math.max(1500, Math.min(target, 5000)); // sensible floor/ceiling
}

const getWeekRangeString = (dateObj) => {
  const current = new Date(dateObj);
  const day = current.getDay();
  const diff = current.getDate() - day + (day === 0 ? -6 : 1);
  const monday = new Date(current.setDate(diff));
  const sunday = new Date(current.setDate(monday.getDate() + 6));
  return `${monday.toLocaleDateString("en-US",{month:"short",day:"numeric"})} - ${sunday.toLocaleDateString("en-US",{month:"short",day:"numeric"})}`;
};

// ── Image compression helper (resize before upload to save storage) ──
function compressImage(file, maxDim = 1024, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) { height = height * (maxDim/width); width = maxDim; }
        else if (height > maxDim) { width = width * (maxDim/height); height = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        canvas.toBlob((blob) => {
          const fr = new FileReader();
          fr.onload = () => resolve({ blob, dataUrl: fr.result, base64: fr.result.split(",")[1] });
          fr.readAsDataURL(blob);
        }, 'image/jpeg', quality);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function uploadPhoto(userId, blob, prefix) {
  const fileName = `${userId}/${prefix}_${Date.now()}.jpg`;
  const { error } = await supabase.storage.from('diet-photos').upload(fileName, blob, { contentType: 'image/jpeg' });
  if (error) { console.error('Upload failed:', error); return null; }
  const { data } = supabase.storage.from('diet-photos').getPublicUrl(fileName);
  return data.publicUrl;
}

function AuthScreen({ onAuthed }) {
  const [mode, setMode] = useState("login"); // login | signup
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const [info, setInfo] = useState("");

  const C = THEMES.dark;
  // Auth screen renders before the main app, so read the saved language directly.
  const lang = localStorage.getItem("nutrilog_lang") || "en";
  const L = (en, zh) => lang === "zh" ? zh : en;

  const submit = async () => {
    setError(""); setInfo("");
    if (!email.trim() || !password) { setError(L("Please enter email and password.","请输入邮箱和密码。")); return; }
    if (password.length < 6) { setError(L("Password must be at least 6 characters.","密码至少需要 6 个字符。")); return; }
    setLoading(true);
    try {
      if (mode === "signup") {
        const { data, error } = await supabase.auth.signUp({ email: email.trim(), password });
        if (error) throw error;
        if (data.user && !data.session) {
          setInfo(L("Check your email to confirm your account, then log in.","请查收邮件确认账号，然后登录。"));
          setMode("login");
        } else if (data.session) {
          onAuthed(data.session);
        }
      } else {
        const { data, error } = await supabase.auth.signInWithPassword({ email: email.trim(), password });
        if (error) throw error;
        onAuthed(data.session);
      }
    } catch (err) {
      setError(err.message || L("Something went wrong.","出了点问题。"));
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{ minHeight:"100vh", background:C.bg, color:C.text, fontFamily:"'DM Sans',-apple-system,sans-serif", display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
      <style>{`
        .inp{background:${C.surface};border:1px solid ${C.border};border-radius:12px;padding:12px 14px;color:${C.text};font-family:'DM Sans',sans-serif;font-size:15px;width:100%;outline:none;transition:border-color .2s;box-sizing:border-box}
        .inp:focus{border-color:${C.pinkDim}}
        .inp::placeholder{color:${C.textDim}}
        .pink-btn{background:linear-gradient(135deg,${C.pink},${C.pinkDim});color:${C.onAccent||"#fff"};border:none;border-radius:12px;padding:13px 20px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;width:100%;box-shadow:0 4px 16px ${C.pinkDim}47}
        .pink-btn:disabled{opacity:.6;cursor:not-allowed}
        .link-btn{background:none;border:none;color:${C.pink};font-size:13px;cursor:pointer;text-decoration:underline;font-family:'DM Sans',sans-serif}
      `}</style>
      <div style={{ width:"100%", maxWidth:380 }}>
        <div style={{ textAlign:"center", marginBottom:28 }}>
          <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:32, fontWeight:800, color:C.pink, letterSpacing:"-0.04em" }}>{L("NutriLog","营养日志")} <span style={{ fontSize:16, fontStyle:"italic", fontWeight:300, color:C.textMuted }}>{L("pro","专业版")}</span></div>
          <div style={{ fontSize:13, color:C.textMuted, marginTop:6 }}>{mode === "login" ? L("Welcome back","欢迎回来") : L("Create your account","创建您的账号")}</div>
        </div>
        <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:18, padding:24 }}>
          <div style={{ display:"flex", flexDirection:"column", gap:12, marginBottom:16 }}>
            <input className="inp" type="email" placeholder={L("Email","邮箱")} value={email} onChange={e=>setEmail(e.target.value)} autoComplete="email" onKeyDown={e=>e.key==="Enter"&&submit()} />
            <input className="inp" type="password" placeholder={L("Password (min 6 characters)","密码（至少 6 个字符）")} value={password} onChange={e=>setPassword(e.target.value)} autoComplete={mode==="login"?"current-password":"new-password"} onKeyDown={e=>e.key==="Enter"&&submit()} />
          </div>
          {error && <div style={{ fontSize:13, color:C.red, marginBottom:12, fontStyle:"italic" }}>{error}</div>}
          {info && <div style={{ fontSize:13, color:C.green, marginBottom:12, fontStyle:"italic" }}>{info}</div>}
          <button className="pink-btn" onClick={submit} disabled={loading}>
            {loading ? L("Please wait...","请稍候...") : mode==="login" ? L("Log In","登录") : L("Sign Up","注册")}
          </button>
          <div style={{ textAlign:"center", marginTop:16 }}>
            {mode === "login" ? (
              <span style={{ fontSize:13, color:C.textMuted }}>{L("No account?","还没有账号？")} <button className="link-btn" onClick={()=>{setMode("signup");setError("");setInfo("");}}>{L("Sign up","注册")}</button></span>
            ) : (
              <span style={{ fontSize:13, color:C.textMuted }}>{L("Already have an account?","已有账号？")} <button className="link-btn" onClick={()=>{setMode("login");setError("");setInfo("");}}>{L("Log in","登录")}</button></span>
            )}
          </div>
        </div>
        <div style={{ textAlign:"center", fontSize:11, color:C.textDim, marginTop:16 }}>{L("Your data is private and only visible to you.","您的数据完全私密，仅您本人可见。")}</div>
      </div>
    </div>
  );
}

    const { data, error } = await supabase.from('user_targets').select('*').eq('user_id', userId).maybeSingle();
    if (error) throw error;
    if (!data) return { ...DEFAULT_TARGETS, gender:null, height_cm:null, birth_year:null, activity_level:'moderate', auto_calc:false, goal:'maintain', display_name:null, avatar_url:null, day_cutoff_hour:0, plan_active:false, plan_goal_kg:null, plan_weeks:null, plan_daily_exercise_kcal:0, sugar_limit_g:50, sodium_limit_mg:2300, fiber_target_g:25, water_target_ml:null };
    return {
      calories: data.calories, protein: data.protein, carbs: data.carbs, fat: data.fat,
      gender: data.gender, height_cm: data.height_cm, birth_year: data.birth_year,
      activity_level: data.activity_level||'moderate', auto_calc: !!data.auto_calc, goal: data.goal||'maintain',
      display_name: data.display_name||null, avatar_url: data.avatar_url||null,
      day_cutoff_hour: data.day_cutoff_hour ?? 0,
      plan_active: !!data.plan_active, plan_goal_kg: data.plan_goal_kg||null, plan_weeks: data.plan_weeks||null,
      plan_daily_exercise_kcal: data.plan_daily_exercise_kcal||0,
      sugar_limit_g: data.sugar_limit_g||50, sodium_limit_mg: data.sodium_limit_mg||2300, fiber_target_g: data.fiber_target_g||25,
      water_target_ml: data.water_target_ml||null
    };
  },
  async setTargets(userId, targets) {
    const { error } = await supabase.from('user_targets').upsert({ user_id: userId, ...targets, updated_at: new Date().toISOString() });
    if (error) throw error;
  },

  async getWeightLog(userId, dateKey) {
    const { data, error } = await supabase.from('weight_logs').select('*').eq('user_id', userId).eq('log_date', dateKey).maybeSingle();
    if (error) throw error;
    return data || null;
  },
  async getWeightRange(userId, startDate, endDate) {
    const { data, error } = await supabase.from('weight_logs').select('*').eq('user_id', userId).gte('log_date', startDate).lte('log_date', endDate).order('log_date');
    if (error) throw error;
    return data || [];
  },
  async setWeight(userId, dateKey, weightKg) {
    const { error } = await supabase.from('weight_logs').upsert(
      { user_id: userId, log_date: dateKey, weight_kg: weightKg, logged_at: new Date().toISOString() },
      { onConflict: 'user_id,log_date' }
    );
    if (error) throw error;
  },

  async getFavorites(userId, type) {
    const { data, error } = await supabase.from('favorites').select('*').eq('user_id', userId).eq('type', type).order('use_count', { ascending: false }).order('last_used_at', { ascending: false, nullsFirst: false });
    if (error) throw error;
    return data || [];
  },
  async addFavorite(userId, fav) {
    const { data, error } = await supabase.from('favorites').insert({ user_id: userId, ...fav }).select().single();
    if (error) throw error;
    return data;
  },
  async deleteFavorite(id) {
    const { error } = await supabase.from('favorites').delete().eq('id', id);
    if (error) throw error;
  },
  async touchFavorite(id) {
    // Read the current count fresh rather than trusting a value the caller captured earlier —
    // two rapid taps on the same favorite would otherwise both read the same stale count and
    // one increment would be lost.
    const { data: cur, error: selErr } = await supabase.from('favorites').select('use_count').eq('id', id).single();
    if (selErr) throw selErr;
    const { error } = await supabase.from('favorites').update({ use_count: (cur?.use_count||0)+1, last_used_at: new Date().toISOString() }).eq('id', id);
    if (error) throw error;
  }
};

const StatusBanner = React.memo(function StatusBanner({ net, target, deficit, burned, large, theme, C }) {

  const successBg = `${C.green}14`;
  const successBorder = `${C.green}40`;

  const successSub = `${C.green}bb`;

  return (

      </div>

});

const ProgressBar = React.memo(function ProgressBar({ val, target, color, theme, mode, unit, accentLabel, C }) {
  const p = Math.min(100, Math.round((val/target)*100));
  const actualPct = target ? (val/target)*100 : 0;
  const bg = C.cardHover;
  const textMuted = C.textMuted;
  const u = unit || "kcal";
  let overColor, statusLabel;
  if (mode === "gain-band") {
    // For gain-weight plans — under-eating is the concern; hitting/exceeding target is the win
    overColor = actualPct >= 100 ? C.green : actualPct >= 80 ? C.caution : C.red;
    statusLabel = actualPct >= 100 ? `${Math.round(val-target)} over goal 🎉` : `${Math.round(target-val)} more to go`;
  } else if (mode === "caution-band") {
    // For things with a real ceiling (calories) — going over is something to watch, escalating past 120%
    overColor = actualPct <= 100 ? C.green : actualPct <= 120 ? C.caution : C.red;
    statusLabel = actualPct <= 100 ? `${Math.round(target-val)} left` : actualPct <= 120 ? `${Math.round(val-target)} over (fine)` : `${Math.round(val-target)} over (caution)`;
  } else {
    // For things where more is simply better (water) — exceeding target is good news, not a warning
    overColor = accentLabel ? color : C.green;
    statusLabel = target-val>0 ? `${Math.round(target-val)} left` : `${Math.round(val-target)} over goal 🎉`;
  }
  // Bar fill width is always capped at 100% so the bar never overflows visually.
  // The displayed percentage text is the real, uncapped value, and its position
  // tracks the right edge of the fill (so at 80% it sits near the right, not dead-center).
  const labelInside = p >= 14; // enough room to fit text inside the fill
  return (
    <div>
      <div style={{ position:"relative", height:12, background:bg, borderRadius:6, overflow:"hidden" }}>
        <div style={{ height:"100%", width:`${p}%`, background:`linear-gradient(90deg, color-mix(in srgb, ${color} 100%, white 35%), color-mix(in srgb, ${color} 100%, black 15%))`, borderRadius:6, transition:"width .6s ease", boxShadow:`0 0 6px ${color}40` }} />
        <div style={{
          position:"absolute", top:0, bottom:0, display:"flex", alignItems:"center",
          left: labelInside ? "auto" : `calc(${p}% + 6px)`,
          right: labelInside ? `calc(${100-p}% + 6px)` : "auto",
          fontSize:10, fontWeight:"800",
          color: labelInside ? "#fff" : C.text,
          textShadow: labelInside ? "0 1px 2px rgba(0,0,0,0.5)" : "none",
          letterSpacing:"0.01em", whiteSpace:"nowrap"
        }}>
          {Math.round(actualPct)}%
        </div>
      </div>
      <div style={{ display:"flex", justifyContent:"space-between", marginTop:4 }}>
        <span style={{ fontSize:11, color:textMuted }}>of {Math.round(target)} {u}</span>
        <span style={{ fontSize:11, color:overColor, fontWeight:"600" }}>{statusLabel}</span>
      </div>
    </div>
  );
});

    // Follow the finger smoothly, with slight resistance past the trigger threshold
    const THRESHOLD = 56;

    setDragY(clamped);

const MacroDonutChart = React.memo(function MacroDonutChart({ consumed, theme, C }) {
  const totalGrams = consumed.protein + consumed.carbs + consumed.fat;
  const pPct = totalGrams ? (consumed.protein/totalGrams)*100 : 0;
  const cPct = totalGrams ? (consumed.carbs/totalGrams)*100 : 0;
  const fPct = totalGrams ? (consumed.fat/totalGrams)*100 : 0;
  const radius = 35;
  const circ = 2*Math.PI*radius;
  const pLen = (pPct/100)*circ;
  const cLen = (cPct/100)*circ;
  const fLen = (fPct/100)*circ;
  const innerBg = C.cardHover;
  const strokeBg = `${C.border}66`;
  const textMain = C.text;
  const textSub = C.textMuted;
  const proteinC = C.protein;
  const carbsC = C.carbs;
  const fatC = C.fat;
  return (
    <div style={{ position:"relative", width:"120px", height:"120px" }}>
      <svg width="100%" height="100%" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r={radius} fill="transparent" stroke={innerBg} strokeWidth="7" />
        {totalGrams > 0 ? (
          <React.Fragment>
            <circle cx="50" cy="50" r={radius} fill="transparent" stroke={proteinC} strokeWidth="7" strokeLinecap="round" strokeDasharray={`${pLen} ${circ}`} strokeDashoffset="0" transform="rotate(-90 50 50)" />
            <circle cx="50" cy="50" r={radius} fill="transparent" stroke={carbsC} strokeWidth="7" strokeLinecap="round" strokeDasharray={`${cLen} ${circ}`} strokeDashoffset={-pLen} transform="rotate(-90 50 50)" />
            <circle cx="50" cy="50" r={radius} fill="transparent" stroke={fatC} strokeWidth="7" strokeLinecap="round" strokeDasharray={`${fLen} ${circ}`} strokeDashoffset={-(pLen+cLen)} transform="rotate(-90 50 50)" />
          </React.Fragment>
        ) : (
          <circle cx="50" cy="50" r={radius} fill="transparent" stroke={strokeBg} strokeWidth="8" />
        )}
      </svg>

        <div style={{ fontSize:"9px", color:textSub, fontFamily:"'DM Sans',sans-serif", letterSpacing:"0.02em" }}>total</div>
      </div>
    </div>

});

// ── Simple SVG bar chart: consumed vs burned per day, with target line ──
const TrendChart = React.memo(function TrendChart({ days, target, theme, C }) {
  const textColor = C.textMuted;
  const consumedColor = C.pink;
  const burnedColor = C.chartBurned;
  if (!days.length) return <div style={{ fontSize:12, color:textColor, textAlign:"center", padding:"20px 0" }}>{(localStorage.getItem("nutrilog_lang")||"en")==="zh" ? "数据还不够" : "Not enough data yet"}</div>;

  const maxVal = Math.max(target, ...days.map(d=>d.consumed), ...days.map(d=>d.burned), 100) * 1.15;
  const w = 320, h = 140, padBottom = 20, padTop = 6;
  const barW = (w / days.length) * 0.62;
  const gap = (w / days.length) - barW;
  const targetY = padTop + (1 - target/maxVal) * (h-padBottom-padTop);

  return (
    <svg viewBox={`0 0 ${w} ${h+18}`} style={{ width:"100%", height:"auto" }}>
      <line x1="0" y1={targetY} x2={w} y2={targetY} stroke={textColor} strokeWidth="1" strokeDasharray="3,3" opacity="0.5" />
      {days.map((d,i) => {
        const x = i * (barW+gap) + gap/2;
        const consH = (d.consumed/maxVal) * (h-padBottom-padTop);
        const burnH = (d.burned/maxVal) * (h-padBottom-padTop);
        const baseY = h - padBottom;
        return (
          <g key={i}>
            <rect x={x} y={baseY-consH} width={barW*0.46} height={consH} fill={consumedColor} rx="2" />
            <rect x={x+barW*0.5} y={baseY-burnH} width={barW*0.46} height={burnH} fill={burnedColor} rx="2" />
            <text x={x+barW/2} y={h+14} textAnchor="middle" fontSize="9" fill={textColor} fontFamily="'DM Sans',sans-serif">{d.label}</text>
          </g>
        );
      })}
    </svg>
  );
});

// ── Simple SVG line chart: weekly burned calories trend, going up = motivating ──
const LineChart = React.memo(function LineChart({ points, color, theme, minScaleFloor, C }) {
  const textColor = C.textMuted;
  const gridColor = `${C.border}66`;
  if (!points.length) return <div style={{ fontSize:12, color:textColor, textAlign:"center", padding:"20px 0" }}>{(localStorage.getItem("nutrilog_lang")||"en")==="zh" ? "数据还不够" : "Not enough data yet"}</div>;

  const w = 320, h = 120, padBottom = 20, padTop = 10, padX = 8;
  const vals = points.map(p=>p.burned);
  const dataMax = Math.max(...vals, minScaleFloor!==undefined ? 0 : 100);
  const dataMin = minScaleFloor!==undefined ? Math.min(...vals) : 0;
  const range = Math.max(dataMax - dataMin, 1);
  const maxVal = minScaleFloor!==undefined ? dataMax + range*0.15 : dataMax * 1.2;
  const minVal = minScaleFloor!==undefined ? Math.max(0, dataMin - range*0.15) : 0;
  const stepX = (w - padX*2) / Math.max(1, points.length-1);
  const coords = points.map((p,i) => ({
    x: padX + i*stepX,
    y: padTop + (1 - (p.burned-minVal)/(maxVal-minVal)) * (h-padBottom-padTop),
    label: p.label, val: p.burned
  }));
  const pathD = coords.map((c,i) => `${i===0?"M":"L"} ${c.x},${c.y}`).join(" ");
  const areaD = `${pathD} L ${coords[coords.length-1].x},${h-padBottom} L ${coords[0].x},${h-padBottom} Z`;

  return (
    <svg viewBox={`0 0 ${w} ${h+18}`} style={{ width:"100%", height:"auto" }}>
      <line x1={padX} y1={h-padBottom} x2={w-padX} y2={h-padBottom} stroke={gridColor} strokeWidth="1" />
      <path d={areaD} fill={color} opacity="0.08" />
      <path d={pathD} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
      {coords.map((c,i) => (
        <g key={i}>
          <circle cx={c.x} cy={c.y} r="3.5" fill={color} />
          <text x={c.x} y={h+14} textAnchor="middle" fontSize="9" fill={textColor} fontFamily="'DM Sans',sans-serif">{c.label}</text>
        </g>
      ))}
    </svg>
  );
});

// ── Lightweight illustrative icon matched to the workout description ──
// (No real photo/AI image generation — a simple themed graphic, fast and free)
function detectWorkoutType(text) {
  const t = (text||"").toLowerCase();
  if (/(run|jog|sprint|marathon)/.test(t)) return "running";
  if (/(push.?up|sit.?up|squat|lunge|plank|burpee|hiit|strength|weight|gym|dumbbell|bench)/.test(t)) return "strength";
  if (/(cycle|cycling|bike|biking|spin)/.test(t)) return "cycling";
  if (/(swim|pool)/.test(t)) return "swimming";
  if (/(yoga|stretch|pilates)/.test(t)) return "yoga";
  if (/(walk|hike|step)/.test(t)) return "walking";
  return "general";
}
const WorkoutIllustration = React.memo(function WorkoutIllustration({ description, color, size }) {

});

// HOOK — Favorites (save/reuse meals, drinks, workouts)
// ════════════════════════════════════════════════════════════
function useFavorites({ userId, today, activeSlot, setDayData, setError, L }) {
  const [favMeals, setFavMeals] = useState([]);
  const [favDrinks, setFavDrinks] = useState([]);
  const [favWorkouts, setFavWorkouts] = useState([]);
  const [favDrawerOpen, setFavDrawerOpen] = useState({ meal:false, drink:false, workout:false });

  const refreshFavorites = async () => {
    try {
      const [m, d, w] = await Promise.all([
        DataAPI.getFavorites(userId, "meal"),
        DataAPI.getFavorites(userId, "drink"),
        DataAPI.getFavorites(userId, "workout")
      ]);
      setFavMeals(m); setFavDrinks(d); setFavWorkouts(w);
    } catch (err) { /* favorites are non-critical, fail silently */ }
  };

  const saveFavorite = async (type, payload) => {
    try {
      const fav = await DataAPI.addFavorite(userId, { type, ...payload });
      if (type==="meal") setFavMeals(f => [fav, ...f]);
      else if (type==="drink") setFavDrinks(f => [fav, ...f]);
      else setFavWorkouts(f => [fav, ...f]);
    } catch (err) { setError(L("Failed to save favorite: ","收藏失败：") + err.message); }
  };

  const removeFavorite = async (type, id) => {
    if (type==="meal") setFavMeals(f => f.filter(x=>x.id!==id));
    else if (type==="drink") setFavDrinks(f => f.filter(x=>x.id!==id));
    else setFavWorkouts(f => f.filter(x=>x.id!==id));
    try { await DataAPI.deleteFavorite(id); } catch (err) { setError(L("Failed to remove favorite: ","移除收藏失败：") + err.message); refreshFavorites(); }
  };

  // Re-logs a saved favorite as today's entry, using the same insert shape as the manual-add flows.
  const useFavoriteMeal = async (fav) => {
    try {
      const meal = await DataAPI.addMeal(userId, {
        log_date: today, slot: fav.default_slot || activeSlot, name: fav.name, calories: fav.calories||0,
        protein: fav.protein||0, carbs: fav.carbs||0, fat: fav.fat||0,
        sugar_g: fav.sugar_g||0, sodium_mg: fav.sodium_mg||0, fiber_g: fav.fiber_g||0,
        confidence: "favorite", logged_at: new Date().toISOString()
      });
      setDayData(d => ({ ...d, meals: [...d.meals, meal] }));
      DataAPI.touchFavorite(fav.id).catch(() => { /* non-critical, ignore */ });
      setFavMeals(f => f.map(x => x.id===fav.id ? { ...x, use_count:(x.use_count||0)+1 } : x));
    } catch (err) { setError(L("Failed to log favorite: ","记录收藏项失败：") + err.message); }
  };
  const useFavoriteDrink = async (fav) => {
    try {
      const d = await DataAPI.addDrink(userId, {
        log_date: today, drink_type: fav.drink_type || fav.name, amount_ml: fav.amount_ml||0,
        calories: fav.calories||0, protein: fav.protein||0, carbs: fav.carbs||0, fat: fav.fat||0,
        sugar_g: fav.sugar_g||0, sodium_mg: fav.sodium_mg||0, fiber_g: fav.fiber_g||0, logged_at: new Date().toISOString()
      });
      setDayData(prev => ({ ...prev, drinks: [...(prev.drinks||[]), d] }));
      DataAPI.touchFavorite(fav.id).catch(() => { /* non-critical, ignore */ });
      setFavDrinks(f => f.map(x => x.id===fav.id ? { ...x, use_count:(x.use_count||0)+1 } : x));
    } catch (err) { setError(L("Failed to log favorite: ","记录收藏项失败：") + err.message); }
  };
  const useFavoriteWorkout = async (fav) => {
    try {
      const w = await DataAPI.addWorkout(userId, {
        log_date: today, activity: fav.activity || fav.name, calories: fav.calories||0,
        duration: fav.duration || "—", description: fav.description || null, logged_at: new Date().toISOString()
      });
      setDayData(d => ({ ...d, workouts: [...(d.workouts||[]), w] }));
      DataAPI.touchFavorite(fav.id).catch(() => { /* non-critical, ignore */ });
      setFavWorkouts(f => f.map(x => x.id===fav.id ? { ...x, use_count:(x.use_count||0)+1 } : x));
    } catch (err) { setError(L("Failed to log favorite: ","记录收藏项失败：") + err.message); }
  };

  return {
    favMeals, favDrinks, favWorkouts, favDrawerOpen, setFavDrawerOpen,
    refreshFavorites, saveFavorite, removeFavorite,
    useFavoriteMeal, useFavoriteDrink, useFavoriteWorkout
  };
}

// HOOK — Gemini API client (rate limiting, retries, error mapping)
// ════════════════════════════════════════════════════════════
function useGeminiClient(geminiKey) {
  const callGemini = async (body) => {
    const key = geminiKey.trim();
    if (!key) throw new Error("No API key set. Open Settings (gear icon) and paste your Gemini API key.");

    // Global request spacing: ensures we never fire requests faster than ~1 every 4s,
    // which keeps us safely under typical free-tier RPM limits even with rapid back-to-back uploads.
    const now = Date.now();
    const minGapMs = 4200;
    const waitMs = Math.max(0, (window.__lastGeminiCallAt||0) + minGapMs - now);
    if (waitMs > 0) await new Promise(r => setTimeout(r, waitMs));
    window.__lastGeminiCallAt = Date.now();

    const model = "gemini-2.5-flash-lite"; // higher free-tier RPM/RPD than 2.5-flash, plenty capable for this use case
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;

    const maxRetries = 3;
    let lastErr = null;
    for (let attempt = 0; attempt <= maxRetries; attempt++) {
      try {
        const res = await fetch(url, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body) });
        if (res.ok) {
          const data = await res.json();
          return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
        }
        const errBody = await res.json().catch(() => ({}));
        const msg = errBody?.error?.message || `HTTP ${res.status}`;
        if (msg.includes("allowlist")) throw new Error("KEY_RESTRICTED");
        if (res.status === 429) {
          // Distinguish "burst too fast, retry shortly" from "out of daily quota entirely"
          const isDailyQuota = /day|daily|RESOURCE_EXHAUSTED.*per.?day/i.test(msg);
          if (isDailyQuota) throw new Error("QUOTA_EXHAUSTED");
          if (attempt < maxRetries) {
            const backoff = 1500 * Math.pow(2, attempt); // 1.5s, 3s, 6s
            await new Promise(r => setTimeout(r, backoff));
            lastErr = new Error("RATE_LIMITED");
            continue;
          }
          throw new Error("RATE_LIMITED");
        }
        throw new Error(msg);
      } catch (err) {
        if (err.message === "KEY_RESTRICTED" || err.message === "QUOTA_EXHAUSTED") throw err;
        lastErr = err;
        if (attempt >= maxRetries) throw err;
      }
    }
    throw lastErr || new Error("Request failed after retries");
  };

  const friendlyGeminiError = (err) => {
    if (err.message === "KEY_RESTRICTED") return "⚠️ Your key has domain restrictions. See Settings for a fix.";
    if (err.message === "QUOTA_EXHAUSTED") return "You've used up today's free AI quota. It resets at midnight Pacific time — manual entry still works in the meantime!";
    if (err.message === "RATE_LIMITED") return "AI is getting a lot of requests right now — please wait a few seconds and try again.";
    return "AI failed: " + err.message;
  };

  return { callGemini, friendlyGeminiError };
}

// HOOK — Manual meal entry form (+ AI nutrition suggest)
// ════════════════════════════════════════════════════════════
function useManualMealForm({ userId, today, activeSlot, setDayData, setError, callGemini, friendlyGeminiError, L }) {
  const [manualCal, setManualCal] = useState("");
  const [manualDesc, setManualDesc] = useState("");
  const [manualProt, setManualProt] = useState("");
  const [manualCarb, setManualCarb] = useState("");
  const [manualFat, setManualFat] = useState("");
  const [manualSugar, setManualSugar] = useState("");
  const [manualSodium, setManualSodium] = useState("");
  const [manualFiber, setManualFiber] = useState("");
  const [isSuggesting, setIsSuggesting] = useState(false);

  const suggestManualDiet = async () => {
    setError(null);
    if (!manualDesc.trim()) { setError(L("Please write a food description first","请先填写食物描述")); return; }
    setIsSuggesting(true);
    try {
      const raw = await callGemini({
        contents:[{ role:"user", parts:[{ text:`Analyze this food: "${manualDesc}". Output ONLY raw JSON, no code fences: {"calories":number,"protein":number,"carbs":number,"fat":number,"sugar":number,"sodium":number,"fiber":number}` }] }]
      });
      const metrics = JSON.parse(raw.replace(/```json|```/gi,"").trim());
      setManualCal(metrics.calories?.toString()||"0");
      setManualProt(metrics.protein?.toString()||"0");
      setManualCarb(metrics.carbs?.toString()||"0");
      setManualFat(metrics.fat?.toString()||"0");
      setManualSugar(metrics.sugar?.toString()||"0");
      setManualSodium(metrics.sodium?.toString()||"0");
      setManualFiber(metrics.fiber?.toString()||"0");
    } catch(err) {
      setError(friendlyGeminiError(err));
    } finally { setIsSuggesting(false); }
  };

  const addManualMeal = async () => {
    const cal = parseFloat(manualCal);
    if (!cal||cal<=0) return;
    try {
      const meal = await DataAPI.addMeal(userId, {
        log_date: today, slot: activeSlot, name: manualDesc||"Manual entry", calories: cal,
        protein: parseFloat(manualProt)||0, carbs: parseFloat(manualCarb)||0, fat: parseFloat(manualFat)||0,
        sugar_g: parseFloat(manualSugar)||0, sodium_mg: parseFloat(manualSodium)||0, fiber_g: parseFloat(manualFiber)||0,
        confidence: "manual", logged_at: new Date().toISOString()
      });
      setDayData(d => ({ ...d, meals: [...d.meals, meal] }));
      setManualCal(""); setManualDesc(""); setManualProt(""); setManualCarb(""); setManualFat("");
      setManualSugar(""); setManualSodium(""); setManualFiber("");
    } catch (err) { setError(L("Failed to add meal: ","添加餐食失败：") + err.message); }
  };

  return {
    manualCal, setManualCal, manualDesc, setManualDesc, manualProt, setManualProt,
    manualCarb, setManualCarb, manualFat, setManualFat, manualSugar, setManualSugar,
    manualSodium, setManualSodium, manualFiber, setManualFiber,
    isSuggesting, suggestManualDiet, addManualMeal
  };
}

// HOOK — Custom drink form (+ AI nutrition suggest, live ml rescaling)
// ════════════════════════════════════════════════════════════
function useCustomDrinkForm({ userId, today, setDayData, setError, callGemini, friendlyGeminiError, L }) {
  const [customDrinkName, setCustomDrinkName] = useState("");
  const [customDrinkMl, setCustomDrinkMl] = useState("");
  const [customDrinkCal, setCustomDrinkCal] = useState("");
  const [customDrinkProt, setCustomDrinkProt] = useState("");
  const [customDrinkCarb, setCustomDrinkCarb] = useState("");
  const [customDrinkFat, setCustomDrinkFat] = useState("");
  const [customDrinkSugar, setCustomDrinkSugar] = useState("");
  const [customDrinkSodium, setCustomDrinkSodium] = useState("");
  const [isSuggestingDrink, setIsSuggestingDrink] = useState(false);
  const [drinkRatePer100ml, setDrinkRatePer100ml] = useState(null);

  const addCustomDrink = async () => {
    const ml = parseFloat(customDrinkMl);
    if (!ml || ml<=0) { setError(L("Enter a valid amount in ml.","请输入有效的毫升数。")); return; }
    try {
      const d = await DataAPI.addDrink(userId, {
        log_date: today, drink_type: customDrinkName.trim()||"Other", amount_ml: ml,
        calories: parseFloat(customDrinkCal)||0, protein: parseFloat(customDrinkProt)||0,
        carbs: parseFloat(customDrinkCarb)||0, fat: parseFloat(customDrinkFat)||0,
        sugar_g: parseFloat(customDrinkSugar)||0, sodium_mg: parseFloat(customDrinkSodium)||0, fiber_g: 0,
        logged_at: new Date().toISOString()
      });
      setDayData(prev => ({ ...prev, drinks: [...(prev.drinks||[]), d] }));
      setCustomDrinkName(""); setCustomDrinkMl(""); setCustomDrinkCal(""); setCustomDrinkProt(""); setCustomDrinkCarb(""); setCustomDrinkFat(""); setCustomDrinkSugar(""); setCustomDrinkSodium(""); setDrinkRatePer100ml(null);
    } catch (err) { setError(L("Failed to log drink: ","记录饮品失败：") + err.message); }
  };

  const suggestDrinkNutrition = async () => {
    setError(null);
    if (!customDrinkName.trim()) { setError(L("Type a drink name first.","请先输入饮品名称。")); return; }
    setIsSuggestingDrink(true);
    try {
      const ml = parseFloat(customDrinkMl) || 250;
      const raw = await callGemini({
        contents:[{ role:"user", parts:[{ text:`Estimate nutrition for exactly ${ml}ml of "${customDrinkName}". Be precise and consistent — base your numbers on standard nutrition data for this drink type scaled to ${ml}ml. Output ONLY raw JSON, no code fences: {"calories":number,"protein":number,"carbs":number,"fat":number,"sugar":number,"sodium":number}` }] }]
      });
      const m = JSON.parse(raw.replace(/```json|```/gi,"").trim());
      // Store the per-100ml rate so the form can rescale correctly if the user edits ml afterward
      const rate = { cal: (m.calories||0)/ml*100, prot: (m.protein||0)/ml*100, carb: (m.carbs||0)/ml*100, fat: (m.fat||0)/ml*100, sugar: (m.sugar||0)/ml*100, sodium: (m.sodium||0)/ml*100 };
      setDrinkRatePer100ml(rate);
      setCustomDrinkCal(Math.round(m.calories||0).toString());
      setCustomDrinkProt(Math.round((m.protein||0)*10)/10 + "");
      setCustomDrinkCarb(Math.round((m.carbs||0)*10)/10 + "");
      setCustomDrinkFat(Math.round((m.fat||0)*10)/10 + "");
      setCustomDrinkSugar(Math.round((m.sugar||0)*10)/10 + "");
      setCustomDrinkSodium(Math.round(m.sodium||0).toString());
      if (!customDrinkMl) setCustomDrinkMl(ml.toString());
    } catch (err) { setError(friendlyGeminiError(err)); }
    finally { setIsSuggestingDrink(false); }
  };

  const onCustomDrinkMlChange = (val) => {
    setCustomDrinkMl(val);
    // If we have an AI-derived rate, rescale the macro fields live so they always tally with the amount
    if (drinkRatePer100ml) {
      const ml = parseFloat(val) || 0;
      setCustomDrinkCal(Math.round(drinkRatePer100ml.cal * ml / 100).toString());
      setCustomDrinkProt((Math.round(drinkRatePer100ml.prot * ml / 100 * 10)/10).toString());
      setCustomDrinkCarb((Math.round(drinkRatePer100ml.carb * ml / 100 * 10)/10).toString());
      setCustomDrinkFat((Math.round(drinkRatePer100ml.fat * ml / 100 * 10)/10).toString());
      if (drinkRatePer100ml.sugar !== undefined) setCustomDrinkSugar((Math.round(drinkRatePer100ml.sugar * ml / 100 * 10)/10).toString());
      if (drinkRatePer100ml.sodium !== undefined) setCustomDrinkSodium(Math.round(drinkRatePer100ml.sodium * ml / 100).toString());
    }
  };

  return {
    customDrinkName, setCustomDrinkName, customDrinkMl, customDrinkCal, setCustomDrinkCal,
    customDrinkProt, setCustomDrinkProt, customDrinkCarb, setCustomDrinkCarb, customDrinkFat, setCustomDrinkFat,
    customDrinkSugar, setCustomDrinkSugar, customDrinkSodium, setCustomDrinkSodium,
    isSuggestingDrink, drinkRatePer100ml, setDrinkRatePer100ml,
    addCustomDrink, suggestDrinkNutrition, onCustomDrinkMlChange
  };
}

// HOOK — Manual workout entry form (+ step conversion, AI calorie suggest)
// ════════════════════════════════════════════════════════════
function useManualWorkoutForm({ userId, today, setDayData, setError, callGemini, friendlyGeminiError, currentWeightForCalc, L }) {
  const [manualBurn, setManualBurn] = useState("");
  const [manualWorkoutDesc, setManualWorkoutDesc] = useState("");
  const [stepCount, setStepCount] = useState("");
  const [isSuggestingWorkout, setIsSuggestingWorkout] = useState(false);

  const applyStepConversion = () => {
    const steps = parseFloat(stepCount);
    if (!steps || steps<=0) { setError(L("Enter a valid step count.","请输入有效的步数。")); return; }
    const kcal = Math.round(steps * 0.04);
    setManualBurn(kcal.toString());
    if (!manualWorkoutDesc.trim()) setManualWorkoutDesc(`${steps.toLocaleString()} steps`);
  };

  const suggestWorkoutCalories = async () => {
    setError(null);
    if (!manualWorkoutDesc.trim()) { setError(L("Describe the activity first (e.g. push ups 30 times).","请先描述运动内容（例如：俯卧撑30次）。")); return; }
    setIsSuggestingWorkout(true);
    try {
      const weightKg = currentWeightForCalc || 70;
      const raw = await callGemini({
        contents:[{ role:"user", parts:[{ text:`Estimate calories burned for this activity: "${manualWorkoutDesc}". Assume a person weighing approximately ${weightKg}kg. Output ONLY raw JSON, no code fences: {"calories":number}` }] }]
      });
      const m = JSON.parse(raw.replace(/```json|```/gi,"").trim());
      setManualBurn(Math.round(m.calories||0).toString());
    } catch (err) { setError(friendlyGeminiError(err)); }
    finally { setIsSuggestingWorkout(false); }
  };

  const addManualBurn = async () => {
    const cal = parseFloat(manualBurn);
    if (!cal||cal<=0) return;
    try {
      const w = await DataAPI.addWorkout(userId, {
        log_date: today, activity: manualWorkoutDesc.trim() || "Manual workout", calories: cal, duration: "—",
        description: manualWorkoutDesc.trim() || null, logged_at: new Date().toISOString()
      });
      setDayData(d => ({ ...d, workouts: [...(d.workouts||[]), w] }));
      setManualBurn(""); setManualWorkoutDesc(""); setStepCount("");
    } catch (err) { setError(L("Failed to add workout: ","添加运动失败：") + err.message); }
  };

  return {
    manualBurn, setManualBurn, manualWorkoutDesc, setManualWorkoutDesc, stepCount, setStepCount,
    isSuggestingWorkout, applyStepConversion, suggestWorkoutCalories, addManualBurn
  };
}

  const refreshToday = async () => {

  const mealTotals = dayData.meals.reduce((a,m) => ({ calories:a.calories+Number(m.calories), protein:a.protein+Number(m.protein), carbs:a.carbs+Number(m.carbs), fat:a.fat+Number(m.fat), sugar:a.sugar+Number(m.sugar_g||0), sodium:a.sodium+Number(m.sodium_mg||0), fiber:a.fiber+Number(m.fiber_g||0) }), { calories:0, protein:0, carbs:0, fat:0, sugar:0, sodium:0, fiber:0 });
  const drinkTotals = (dayData.drinks||[]).reduce((a,d) => ({ calories:a.calories+Number(d.calories||0), protein:a.protein+Number(d.protein||0), carbs:a.carbs+Number(d.carbs||0), fat:a.fat+Number(d.fat||0), sugar:a.sugar+Number(d.sugar_g||0), sodium:a.sodium+Number(d.sodium_mg||0), fiber:a.fiber+Number(d.fiber_g||0) }), { calories:0, protein:0, carbs:0, fat:0, sugar:0, sodium:0, fiber:0 });
  const consumed = { calories: mealTotals.calories+drinkTotals.calories, protein: mealTotals.protein+drinkTotals.protein, carbs: mealTotals.carbs+drinkTotals.carbs, fat: mealTotals.fat+drinkTotals.fat, sugar: mealTotals.sugar+drinkTotals.sugar, sodium: mealTotals.sodium+drinkTotals.sodium, fiber: mealTotals.fiber+drinkTotals.fiber };
  const burned = (dayData.workouts||[]).reduce((a,w) => a+Number(w.calories), 0);

  // Workout boost: burning calories raises your daily allowance. Extra calories are distributed
  // across macros using the same 30/40/30 (protein/carbs/fat) split as the BMR calculator,
  // so the boosted target stays nutritionally consistent with the base targets.
  const computeTargetsLocal = (burnedKcal) => {
    const extraCalories = burnedKcal; // 1:1 — burn 100kcal, get 100kcal more allowance
    const extraProtein = (extraCalories * 0.30) / 4; // 4 kcal/g protein
    const extraCarbs   = (extraCalories * 0.40) / 4; // 4 kcal/g carbs
    const extraFat     = (extraCalories * 0.30) / 9; // 9 kcal/g fat
    return {
      calories: baseTargets.calories + extraCalories,
      protein: baseTargets.protein + extraProtein,
      carbs: baseTargets.carbs + extraCarbs,
      fat: baseTargets.fat + extraFat
    };
  };

  const targets = computeTargetsLocal(burned);
  const net = consumed.calories - burned;
  const deficit = net < targets.calories;
  const totalDrinkMl = (dayData.drinks||[]).reduce((s,d) => s + Number(d.amount_ml||0), 0);
  const drinkCalories = (dayData.drinks||[]).reduce((s,d) => s + Number(d.calories||0), 0);
  const currentWeightForCalc = todayWeight || (weightHistory.length ? weightHistory[weightHistory.length-1].weight_kg : null);
  const tdeeInfo = calcBMRTargets({ gender: baseTargets.gender, heightCm: baseTargets.height_cm, birthYear: baseTargets.birth_year, weightKg: currentWeightForCalc, activityLevel: baseTargets.activity_level, goal:"maintain" });
  const isGainPlan = tdeeInfo ? baseTargets.calories > tdeeInfo.tdee : false;
  const waterTarget = baseTargets.water_target_ml || calcWaterTarget(currentWeightForCalc, baseTargets.activity_level, burned);
  const waterMilestones = getWaterMilestones(waterTarget, lang);
  const achievedMilestone = waterMilestones.slice().reverse().find(m => totalDrinkMl >= m.ml) || null;

  const addDrink = async (preset) => {
    try {

        log_date: today, drink_type: preset.drink_type, amount_ml: preset.amount_ml,
        calories: preset.calories||0, protein: preset.protein||0, carbs: preset.carbs||0, fat: preset.fat||0,
        sugar_g: preset.sugar_g||0, sodium_mg: preset.sodium_mg||0, fiber_g: preset.fiber_g||0, logged_at: new Date().toISOString()
      });
      setDayData(prev => ({ ...prev, drinks: [...(prev.drinks||[]), d] }));
    } catch (err) { setError(L("Failed to log drink: ","记录饮品失败：") + err.message); }
  };
  const removeDrink = async (id) => {
    setDayData(d => ({ ...d, drinks: (d.drinks||[]).filter(x=>x.id!==id) }));
    try { await DataAPI.deleteDrink(id); } catch (err) { setError(L("Failed to delete: ","删除失败：") + err.message); refreshToday(); }
  };
  const adjustWater = async (delta) => {
    if (delta > 0) { addDrink({ drink_type:"Water", amount_ml:delta, calories:0, sugar_g:0 }); return; }
    // Negative adjust: reduce the most recent water entries by the exact amount, walking
    // backward through them. A whole entry is only deleted once it's fully consumed by the
    // remaining amount — otherwise it's proportionally shrunk (macros scaled down with it)
    // rather than deleting an entire entry that's bigger than what the user asked to remove.
    let remaining = Math.abs(delta);
    const waterEntries = (dayData.drinks||[]).filter(d => d.drink_type === "Water")
      .slice().sort((a,b) => new Date(b.logged_at||0) - new Date(a.logged_at||0));
    for (const entry of waterEntries) {
      if (remaining <= 0) break;
      const entryMl = Number(entry.amount_ml||0);
      if (entryMl <= remaining) {
        remaining -= entryMl;
        await removeDrink(entry.id);
      } else {
        const newMl = entryMl - remaining;
        const ratio = newMl / entryMl;
        const patch = {
          amount_ml: newMl,
          calories: Math.round((entry.calories||0)*ratio),
          protein: Math.round((entry.protein||0)*ratio*10)/10,
          carbs: Math.round((entry.carbs||0)*ratio*10)/10,
          fat: Math.round((entry.fat||0)*ratio*10)/10,
          sugar_g: Math.round((entry.sugar_g||0)*ratio*10)/10,
          sodium_mg: Math.round((entry.sodium_mg||0)*ratio)
        };
        setDayData(d => ({ ...d, drinks: (d.drinks||[]).map(x => x.id===entry.id ? {...x, ...patch} : x) }));
        try { await DataAPI.updateDrink(entry.id, patch); } catch (err) { setError(L("Failed to update: ","更新失败：") + err.message); refreshToday(); }
        remaining = 0;

    }

  })();

  };

  const applyMacrosForCalories = (calories, isGain) => {
    // Lose/maintain: balanced 30/40/30. Gain: higher carbs to fuel training, lower fat —
    // evidence-based range for healthy weight/muscle gain (ISSN/ACSM-aligned: ~25-30% protein,
    // 45-55% carbs, 20-25% fat), rather than just scaling up the same ratio.
    const split = isGain ? { p:0.30, c:0.50, f:0.20 } : { p:0.30, c:0.40, f:0.30 };
    return {
      calories,
      protein: Math.round((calories*split.p)/4),
      carbs: Math.round((calories*split.c)/4),
      fat: Math.round((calories*split.f)/9)

  };

  const applyCalorieTier = async (tdee, delta) => {

  const applyCustomDelta = async (tdee) => {

        : "That's a larger surplus than typical for steady weight gain. Make sure that's intentional.");
    } else if (tdee + delta < 1000) {
      setCustomDeltaWarning("This would put your daily calories quite low. Consider relying more on exercise instead of cutting food this much.");
    } else {
      setCustomDeltaWarning(null);
    }
    const isGain = delta > 0;
    const finalCalories = Math.max(800, Math.round(tdee + delta));
    const macros = applyMacrosForCalories(finalCalories, isGain);
    const updated = { ...baseTargets, ...macros, plan_active: true };
    setBaseTargets(updated);
    const waterNeeded = calcWaterTarget(currentWeightForCalc, baseTargets.activity_level, burned);
    setPlanConfirmation({ ...macros, waterNeeded });
    try { await DataAPI.setTargets(userId, updated); } catch (err) { setError(L("Failed to save: ","保存失败：") + err.message); }
  };

  const openPlanEditor = () => {
    setEditCal(Math.round(baseTargets.calories).toString());
    setEditProt(Math.round(baseTargets.protein).toString());
    setEditCarb(Math.round(baseTargets.carbs).toString());

    setEditSugar(Math.round(baseTargets.sugar_limit_g||50).toString());

  };

  const saveCustomTargets = async () => {
    const up = {
      calories:parseInt(tempCal)||baseTargets.calories, protein:parseInt(tempProt)||baseTargets.protein,
      carbs:parseInt(tempCarb)||baseTargets.carbs, fat:parseInt(tempFat)||baseTargets.fat,
      gender: tempGender||null, height_cm: parseFloat(tempHeight)||null, birth_year: parseInt(tempBirthYear)||null,
      activity_level: tempActivity, goal: tempGoal, auto_calc: tempAutoCalc,
      display_name: tempDisplayName.trim()||null, avatar_url: baseTargets.avatar_url||null,
      day_cutoff_hour: baseTargets.day_cutoff_hour||0,
      plan_active: baseTargets.plan_active||false, plan_goal_kg: baseTargets.plan_goal_kg||null,
      plan_weeks: baseTargets.plan_weeks||null, plan_daily_exercise_kcal: baseTargets.plan_daily_exercise_kcal||0
    };
    setBaseTargets(up);
    setShowTargetModal(false);
    try {
      await DataAPI.setTargets(userId, up);
      const wInput = parseFloat(weightInput);
      if (wInput && wInput > 0) {
        await DataAPI.setWeight(userId, today, wInput);
        setTodayWeight(wInput);
        setShowWeightReminder(false);
        setWeightInput("");
        const end = new Date(); const start = new Date(); start.setDate(start.getDate()-180);
        const hist = await DataAPI.getWeightRange(userId, localDateKey(start), localDateKey(end));
        setWeightHistory(hist);
      }
    } catch (err) { setError(L("Failed to save targets: ","保存目标失败：") + err.message); }
  };

  // ── AI calls (Gemini, BYO key) ──
  const { callGemini, friendlyGeminiError } = useGeminiClient(geminiKey);

  const {
    manualCal, setManualCal, manualDesc, setManualDesc, manualProt, setManualProt,
    manualCarb, setManualCarb, manualFat, setManualFat, manualSugar, setManualSugar,
    manualSodium, setManualSodium, manualFiber, setManualFiber,
    isSuggesting, suggestManualDiet, addManualMeal
  } = useManualMealForm({ userId, today, activeSlot, setDayData, setError, callGemini, friendlyGeminiError, L });

  } = useCustomDrinkForm({ userId, today, setDayData, setError, callGemini, friendlyGeminiError, L });

  const {

  } = useManualWorkoutForm({ userId, today, setDayData, setError, callGemini, friendlyGeminiError, currentWeightForCalc, L });


  const analyzeImage = useCallback(async (file, type) => {
    if (!file) return;

    let statusTimer = null;
    if (type === "meal") {
      const messages = ["Reading your photo...", "Identifying ingredients...", "Estimating portion sizes...", "Calculating calories & macros...", "Almost done..."];
      let idx = 0;
      setAnalyzeStatusMsg(messages[0]);
      statusTimer = setInterval(() => { idx = Math.min(idx+1, messages.length-1); setAnalyzeStatusMsg(messages[idx]); }, 2200);
    }
    try {
      const { dataUrl, base64, blob } = await compressImage(file, 1024, 0.75);
      const prompt = type === "meal"
        ? `You are a careful nutrition estimator. Look at this food photo and identify each distinct visible component (e.g. chicken, mashed potato, egg, salad, sauce). For each component, estimate a realistic portion size based on what's visible on the plate (use standard serving sizes as a reference point — e.g. a typical chicken thigh is ~120-150g, a scoop of mashed potato is ~150g — do not assume oversized restaurant portions unless the plate clearly shows one). Estimate calories, macros, sugar, sodium, and fiber for each component based on that portion size. IMPORTANT: the overall "calories"/"protein"/"carbs"/"fat"/"sugar"/"sodium"/"fiber" fields MUST equal the exact sum of the "items" array values — do not estimate the total separately. Output ONLY raw JSON, no code fences: {"name":"overall meal name","calories":number,"protein":number,"carbs":number,"fat":number,"sugar":number,"sodium":number,"fiber":number,"items":[{"item":"chicken","grams_estimate":number,"calories":number,"protein":number,"carbs":number,"fat":number,"sugar":number,"sodium":number,"fiber":number}],"confidence":"high"}${geminiLangInstruction(lang)}`
        : `Apple Watch workout summary. Output ONLY raw JSON, no code fences: {"calories":number,"activity":"activity name","duration":"45 min","heartRate":null}${geminiLangInstruction(lang)}`;
      const raw = await callGemini({
        contents:[{ role:"user", parts:[{ text:prompt },{ inlineData:{ mimeType:"image/jpeg", data:base64 } }] }]
      });
      const parsed = JSON.parse(raw.replace(/```json|```/gi,"").trim());
      // Safety net: if itemized breakdown exists, the displayed/saved total is ALWAYS
      // recomputed as the exact sum of items — never trust two independently-estimated numbers.
      if (Array.isArray(parsed.items) && parsed.items.length > 0) {
        parsed.calories = parsed.items.reduce((s,it)=>s+Number(it.calories||0),0);
        parsed.protein  = parsed.items.reduce((s,it)=>s+Number(it.protein||0),0);
        parsed.carbs    = parsed.items.reduce((s,it)=>s+Number(it.carbs||0),0);
        parsed.fat      = parsed.items.reduce((s,it)=>s+Number(it.fat||0),0);
        parsed.sugar    = parsed.items.reduce((s,it)=>s+Number(it.sugar||0),0);
        parsed.sodium   = parsed.items.reduce((s,it)=>s+Number(it.sodium||0),0);
        parsed.fiber    = parsed.items.reduce((s,it)=>s+Number(it.fiber||0),0);
      }
      setPendingEntry({ ...parsed, type, image: dataUrl, _blob: blob });
    } catch(err) {
      setError(friendlyGeminiError(err));
    } finally {
      if (statusTimer) clearInterval(statusTimer);
      setAnalyzing(false);
    }

  const exportCSV = () => {

  const pct = (v,t) => Math.min(100, Math.round((v/t)*100));
  const [todayQuote] = useState(() => MOTIVATIONAL_QUOTES[Math.floor(Math.random() * MOTIVATIONAL_QUOTES.length)]);

  useEffect(() => {

    DataAPI.getWeightRange(userId, localDateKey(start), localDateKey(end)).then(setWeightHistory).catch(err => setError(L("Failed to load weight history: ","加载体重历史失败：") + err.message));
  }, [activeTab, historyView, historyDate, userId]);

  const histConsumed = histDayData.meals.reduce((a,m)=>a+Number(m.calories),0) + (histDayData.drinks||[]).reduce((a,d)=>a+Number(d.calories||0),0);
  const histBurned = (histDayData.workouts||[]).reduce((a,w)=>a+Number(w.calories),0);
  const histMacros = (() => {
    const m = histDayData.meals.reduce((a,x)=>({ protein:a.protein+Number(x.protein||0), carbs:a.carbs+Number(x.carbs||0), fat:a.fat+Number(x.fat||0), sugar:a.sugar+Number(x.sugar_g||0), sodium:a.sodium+Number(x.sodium_mg||0) }), { protein:0, carbs:0, fat:0, sugar:0, sodium:0 });
    const d = (histDayData.drinks||[]).reduce((a,x)=>({ protein:a.protein+Number(x.protein||0), carbs:a.carbs+Number(x.carbs||0), fat:a.fat+Number(x.fat||0), sugar:a.sugar+Number(x.sugar_g||0), sodium:a.sodium+Number(x.sodium_mg||0) }), { protein:0, carbs:0, fat:0, sugar:0, sodium:0 });
    return { protein:m.protein+d.protein, carbs:m.carbs+d.carbs, fat:m.fat+d.fat, sugar:m.sugar+d.sugar, sodium:m.sodium+d.sodium };
  })();
  const histTargets = computeTargetsLocal(histBurned);

  const last7Days = (() => {
    const byDate = {};
    histRangeData.meals.forEach(m => { (byDate[m.log_date] ||= {cons:0,burn:0,water:0}).cons += Number(m.calories||0); });
    histRangeData.workouts.forEach(w => { (byDate[w.log_date] ||= {cons:0,burn:0,water:0}).burn += Number(w.calories||0); });
    (histRangeData.drinks||[]).forEach(d => { const e = (byDate[d.log_date] ||= {cons:0,burn:0,water:0}); e.water += Number(d.amount_ml||0); e.cons += Number(d.calories||0); });
    const out = [];
    for (let i=6;i>=0;i--) {
      const d = new Date(); d.setDate(d.getDate()-i);
      const key = localDateKey(d);
      const entry = byDate[key] || {cons:0,burn:0,water:0};
      out.push({ label: d.toLocaleDateString("en-US",{weekday:"short"}).slice(0,1), consumed: entry.cons, burned: entry.burn, water: entry.water, key });
    }

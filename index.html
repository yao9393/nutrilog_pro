function CoachFoodCard({ food, expanded, onToggle, onLogThis, C, lang, L }) {
  const dishName = lang === "zh" ? food.name_zh : food.name;

  return (
    <div style={{ padding:"12px 14px", borderRadius:18, background:C.card, border:`1px solid ${C.border}66` }}>
      <div onClick={() => food.components && onToggle(food.id)} style={{ display:"flex", alignItems:"flex-start", gap:10, cursor: food.components?"pointer":"default" }}>
        <CoachDishIcon visual={food.visual} C={C} size={50} />
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:14, fontWeight:"600", color:C.text, marginBottom:2, display:"-webkit-box", WebkitLineClamp:2, WebkitBoxOrient:"vertical", overflow:"hidden", lineHeight:1.3 }}>
            {dishName}{food.components && <span style={{ fontSize:10, color:C.textDim, marginLeft:6 }}>{expanded ? "▲" : "▼"}</span>}
          </div>
          <div style={{ fontSize:11, color:C.textMuted }}>{lang==="zh"?food.name:food.name_zh} · {food.portion}</div>
        </div>
        <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:16, color:C.pink, fontWeight:"800", flexShrink:0 }}>{Math.round(food.kcal)}</div>
      </div>

      <div style={{ display:"flex", gap:10, flexWrap:"wrap", marginTop:10, paddingTop:10, borderTop:`1px dashed ${C.border}66` }}>
        <span style={{ fontSize:11, color:C.protein, fontWeight:"600" }}>P 🥩 {Math.round(food.protein)}g</span>
        <span style={{ fontSize:11, color:C.carbs, fontWeight:"600" }}>C 🍞 {Math.round(food.carbs)}g</span>
        <span style={{ fontSize:11, color:C.fat, fontWeight:"600" }}>F 🥑 {Math.round(food.fat)}g</span>
        <span style={{ fontSize:11, color:C.sugar, fontWeight:"600" }}>S 🍬 {food.sugar}g</span>
        <span style={{ fontSize:11, color:C.sodium, fontWeight:"600" }}>NA 🧂 {food.sodium}mg</span>
        <span style={{ fontSize:11, color:C.fiber, fontWeight:"600" }}>Fbr 🌾 {food.fiber}g</span>
      </div>

      <button
        onClick={(e) => { e.stopPropagation(); onLogThis(food); }}
        style={{ marginTop:12, width:"100%", padding:"9px 0", borderRadius:10, border:`1px solid ${C.pink}`, background:C.pinkGlow, color:C.pink, fontSize:12.5, fontWeight:700, cursor:"pointer" }}
      >
        {L("+ Add as meal","+ 添加为一餐")}
      </button>

      {food.components && (
        <div style={{ marginTop:8, fontSize:11, color:C.textDim, display:"flex", alignItems:"center", gap:4, cursor:"pointer" }} onClick={() => onToggle(food.id)}>
          {expanded ? `▲ ${L("Hide breakdown","隐藏明细")}` : `▼ ${L("See what makes up these calories","查看热量构成")}`}
        </div>
      )}

      {expanded && food.components && (
        <div style={{ marginTop:10, paddingTop:10, borderTop:`1px dashed ${C.border}66` }}>
          <div style={{ fontSize:10, color:C.textMuted, fontWeight:"700", letterSpacing:"0.05em", marginBottom:6 }}>{L("BREAKDOWN BY COMPONENT","按成分细分")}</div>
          {food.components.map((c,i) => (
            <div key={i} style={{ display:"flex", justifyContent:"space-between", fontSize:12, padding:"4px 0" }}>
              <span style={{ color:C.text, textTransform:"capitalize" }}>{lang==="zh" ? (c.name_zh||c.name) : c.name}{c.grams ? ` (~${c.grams}g)` : ""}</span>
              <span style={{ color:C.pink, fontWeight:600 }}>{c.kcal} kcal</span>
            </div>
          ))}
          <div style={{ fontSize:10, color:C.textDim, fontStyle:"italic", marginTop:6 }}>
            {L("Tap \"Add as meal\" to adjust exact grams and add extra ingredients before logging.","点击「添加为一餐」即可在记录前调整具体克数并添加额外食材。")}
          </div>
          <CoachTipRows tips={food.tips} C={C} lang={lang} />
        </div>
      )}
    </div>
  );
}

function DietCoachModal({ onClose, onLogThis, C, lang, L }) {
  const [section, setSection] = useState("measurement"); // "measurement" | "library" — measurement first
  const [activeCategory, setActiveCategory] = useState("protein");
  const [search, setSearch] = useState("");
  const [expandedId, setExpandedId] = useState(null);

  const categories = section === "measurement" ? MEASUREMENT_CATEGORIES : FOOD_LIBRARY_CATEGORIES;
  const switchSection = (key) => {
    setSection(key);
    setActiveCategory(key === "measurement" ? "protein" : "chinese");
    setExpandedId(null);
  };

  const filtered = COACH_FOODS.filter(f => {
    const inCat = f.category === activeCategory;
    const q = search.trim().toLowerCase();
    const matches = !q || f.name.toLowerCase().includes(q) || f.name_zh.includes(search.trim());
    return inCat && matches;
  });

  return (
    <div style={{ position:"fixed", inset:0, background:C.bg, zIndex:1200, display:"flex", flexDirection:"column" }}>
      <div style={{ width:"100%", maxWidth:500, margin:"0 auto", padding:"14px 16px", display:"flex", alignItems:"center", justifyContent:"space-between", borderBottom:`1px solid ${C.border}`, boxSizing:"border-box" }}>
        <div style={{ fontSize:18, fontWeight:800, color:C.text, fontFamily:"'DM Sans',sans-serif" }}>📖 {L("Diet Coach","饮食教练")}</div>
        <button onClick={onClose} style={{ background:"rgba(120,120,130,0.15)", border:"none", borderRadius:"50%", width:34, height:34, color:C.text, fontSize:18, cursor:"pointer", lineHeight:1, flexShrink:0 }}>×</button>
      </div>

      <div style={{ width:"100%", maxWidth:500, margin:"0 auto", padding:"12px 16px 0", boxSizing:"border-box" }}>
        <div style={{ display:"flex", gap:8, marginBottom:12 }}>
          {COACH_SECTIONS.map(s => (
            <button
              key={s.key}
              onClick={() => switchSection(s.key)}
              style={{ flex:1, padding:"9px 0", borderRadius:10, border:`1px solid ${section===s.key?C.pink:C.border}`, background:section===s.key?C.pinkGlow:"transparent", color:section===s.key?C.pink:C.textMuted, fontSize:13, fontWeight:700, cursor:"pointer" }}
            >
              {s.emoji} {lang==="zh"?s.label_zh:s.label}
            </button>
          ))}
        </div>
        {section === "measurement" && (
          <div style={{ fontSize:11, color:C.textMuted, fontStyle:"italic", marginBottom:10, lineHeight:1.4 }}>
            {L("How much is \"1 piece\" or \"1 glass\", really? Grams and ml for common everyday units.","「1颗」或「1杯」到底是多少？常见单位的实际克数与毫升数。")}
          </div>
        )}
        <input
          value={search} onChange={e => setSearch(e.target.value)}
          placeholder={section==="measurement" ? L("Search an ingredient…","搜索食材…") : L("Search a dish…","搜索菜肴…")}
          className="inp"
          style={{ width:"100%", boxSizing:"border-box", marginBottom:12 }}
        />
        <div style={{ display:"flex", gap:6, overflowX:"auto", paddingBottom:4, marginBottom:12 }}>
          {categories.map(cat => (
            <button
              key={cat.key}
              onClick={() => { setActiveCategory(cat.key); setExpandedId(null); }}
              style={{ flexShrink:0, padding:"7px 12px", borderRadius:999, border:`1px solid ${activeCategory===cat.key?C.pink:C.border}`, background:activeCategory===cat.key?C.pink:"transparent", color:activeCategory===cat.key?"#fff":C.textMuted, fontSize:12, fontWeight:600, cursor:"pointer", whiteSpace:"nowrap" }}
            >
              {cat.emoji} {lang==="zh"?cat.label_zh:cat.label}
            </button>
          ))}
        </div>
      </div>

      <div style={{ flex:1, overflowY:"auto" }}>
        <div style={{ width:"100%", maxWidth:500, margin:"0 auto", padding:"0 16px 24px", boxSizing:"border-box", display:"flex", flexDirection:"column", gap:10 }}>
          {filtered.length === 0 && (
            <div style={{ textAlign:"center", color:C.textDim, fontSize:13, padding:"30px 0" }}>{L("No items found here yet.","这里还没有相关项目。")}</div>
          )}
          {filtered.map(food => (
            <CoachFoodCard
              key={food.id} food={food} expanded={expandedId===food.id}
              onToggle={id => setExpandedId(expandedId===id ? null : id)}
              onLogThis={onLogThis} C={C} lang={lang} L={L}
            />
          ))}
        </div>
      </div>
    </div>
  );
}

// DRINK COACH — same pattern as Diet Coach: curated reference library,
// opened from the Water tab's 4-quadrant chooser. Reuses the same MealCard-style

function DrinkCard({ drink, C, lang, L, onAdd }) {
  const dishName = lang === "zh" ? drink.name_zh : drink.name;
  // Icon color varies by category so tea/coffee/local/soda read as visually distinct
  // even when they share the same cup/can archetype — all theme-driven, no fixed hex.
  const iconColor = { tea: C.green, coffee: C.gold, local: C.carbs, soda: C.pink }[drink.category] || C.pink;

  return (
    <div style={{ padding:"12px 14px", borderRadius:18, background:C.card, border:`1px solid ${C.border}66` }}>
      <div style={{ display:"flex", alignItems:"flex-start", gap:10 }}>
        <CoachDishIcon visual={{ ...drink.visual, color: iconColor }} C={C} size={50} />

        </div>
        <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:16, color:C.pink, fontWeight:"800", flexShrink:0 }}>{drink.kcal}</div>
      </div>

      <div style={{ display:"flex", gap:10, flexWrap:"wrap", marginTop:10, paddingTop:10, borderTop:`1px dashed ${C.border}66` }}>
        <span style={{ fontSize:11, color:C.protein, fontWeight:"600" }}>P 🥩 {drink.protein}g</span>
        <span style={{ fontSize:11, color:C.carbs, fontWeight:"600" }}>C 🍞 {drink.carbs}g</span>
        <span style={{ fontSize:11, color:C.fat, fontWeight:"600" }}>F 🥑 {drink.fat}g</span>
        <span style={{ fontSize:11, color:C.sugar, fontWeight:"600" }}>S 🍬 {drink.sugar}g</span>

function DrinkCoachModal({ onClose, onAdd, C, lang, L }) {

// WORKOUT COACH — same pattern as Diet/Drink Coach. Calorie estimates use the
// standard MET formula (kcal = MET × weight(kg) × hours) against the person's
// actual logged weight, not a flat guess. Time-based activities (cardio, yoga,
// sports) take a duration in minutes; set-based ones (gym, power training)
// assume ~90 seconds of work+rest per set, which is the usual ballpark for a
// working set, then apply the same MET formula to that per-set duration.
// ════════════════════════════════════════════════════════════
const WORKOUT_CATEGORIES = [

  { key: "other", label: "Others", label_zh: "其他", emoji: "⚡" },
];

const SET_DURATION_HOURS = 90 / 3600; // ~90 seconds of work + brief rest per set

const WORKOUT_COACH_ITEMS = [

function WorkoutCoachCard({ item, C, lang, L, weightKg, onAdd }) {
  const isTime = item.mode === "time";
  const [minutes, setMinutes] = useState(20);
  const [sets, setSets] = useState(3);
  const w = weightKg || 70;
  const kcal = isTime
    ? Math.round(item.met * w * (minutes / 60))
    : Math.round(item.met * w * SET_DURATION_HOURS * sets);
  const name = lang === "zh" ? item.name_zh : item.name;

  return (
    <div style={{ padding:"12px 14px", borderRadius:18, background:C.card, border:`1px solid ${C.border}66` }}>
      <div style={{ display:"flex", alignItems:"flex-start", gap:10 }}>
        <WorkoutIllustration description={item.name} color={C.workoutAccent} size={50} />
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:14, fontWeight:"600", color:C.text, marginBottom:2, display:"-webkit-box", WebkitLineClamp:2, WebkitBoxOrient:"vertical", overflow:"hidden", lineHeight:1.3 }}>{name}</div>
          <div style={{ fontSize:11, color:C.textMuted }}>{lang==="zh"?item.name:item.name_zh}</div>
        </div>
        <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:16, color:C.workoutAccent, fontWeight:"800", flexShrink:0 }}>{kcal}</div>
      </div>

      <div style={{ marginTop:10, paddingTop:10, borderTop:`1px dashed ${C.border}66` }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", background:C.surface, borderRadius:8, padding:"7px 10px" }}>
          <span style={{ fontSize:12, color:C.text }}>{isTime ? L("Duration","时长") : L("Sets","组数")}</span>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <button onClick={() => isTime ? setMinutes(Math.max(5, minutes-5)) : setSets(Math.max(1, sets-1))} style={{ width:22, height:22, borderRadius:6, border:`1px solid ${C.border}`, background:"transparent", color:C.textMuted, cursor:"pointer", fontSize:13, lineHeight:1 }}>−</button>
            <span style={{ fontSize:12.5, fontWeight:700, color:C.text, minWidth:44, textAlign:"center" }}>{isTime ? `${minutes} ${L("min","分钟")}` : `${sets} ${L("sets","组")}`}</span>
            <button onClick={() => isTime ? setMinutes(Math.min(120, minutes+5)) : setSets(Math.min(10, sets+1))} style={{ width:22, height:22, borderRadius:6, border:`1px solid ${C.workoutAccent}`, background:"transparent", color:C.workoutAccent, cursor:"pointer", fontSize:13, lineHeight:1 }}>+</button>
          </div>
        </div>
        <div style={{ fontSize:10, color:C.textDim, marginTop:6, fontStyle:"italic" }}>
          {L(`Estimated from your logged weight (${w}kg)`,`根据您记录的体重（${w}kg）估算`)}
        </div>
      </div>

      <button
        onClick={() => onAdd(item, { kcal, minutes, sets, mode: item.mode })}
        style={{ marginTop:10, width:"100%", padding:"9px 0", borderRadius:10, border:`1px solid ${C.workoutAccent}`, background:`${C.workoutAccent}18`, color:C.workoutAccent, fontSize:12.5, fontWeight:700, cursor:"pointer" }}
      >
        {L("+ Log this workout","+ 记录此运动")}
      </button>
    </div>
  );
}

        <div style={{ width:"100%", maxWidth:500, margin:"0 auto", padding:"0 16px 24px", boxSizing:"border-box", display:"flex", flexDirection:"column", gap:10 }}>
          {filtered.length === 0 && (
            <div style={{ textAlign:"center", color:C.textDim, fontSize:13, padding:"30px 0" }}>{L("No items found here yet.","这里还没有相关项目。")}</div>
          )}
          {filtered.map(item => (
            <WorkoutCoachCard key={item.id} item={item} C={C} lang={lang} L={L} weightKg={weightKg} onAdd={onAdd} />
          ))}
        </div>
      </div>
    </div>
  );
}

  const addIngredientsToEditingItem = async (descriptions) => {
    if (!editingItem || !descriptions || descriptions.length === 0) return false;
    setAddingEditIngredients(true);
    setError(null);
    try {
      const raw = await callGemini({
        contents: [{ role:"user", parts:[{ text:
          `For each of these food items a person is adding to an existing meal, estimate its nutrition. Items (in order): ${JSON.stringify(descriptions)}. Output ONLY a raw JSON array, no code fences, one object per item in the same order: [{"item":string,"calories":number,"grams_estimate":number,"protein":number,"carbs":number,"fat":number,"sugar":number,"sodium":number,"fiber":number}]`
        }] }]
      });
      const parsed = JSON.parse(raw.replace(/```json|```/gi,"").trim());
      if (!Array.isArray(parsed)) throw new Error("Unexpected AI response");
      const newItems = [...(Array.isArray(editingItem.items) ? editingItem.items : []), ...parsed];
      const add = parsed.reduce((acc,p) => ({
        calories: acc.calories+(p.calories||0), protein: acc.protein+(p.protein||0), carbs: acc.carbs+(p.carbs||0),
        fat: acc.fat+(p.fat||0), sugar: acc.sugar+(p.sugar||0), sodium: acc.sodium+(p.sodium||0), fiber: acc.fiber+(p.fiber||0)
      }), { calories:0, protein:0, carbs:0, fat:0, sugar:0, sodium:0, fiber:0 });
      setEditingItem(prev => ({
        ...prev, items: newItems,
        calories: Math.round((prev.calories||0) + add.calories),
        protein: Math.round(((prev.protein||0) + add.protein)*10)/10,

  const [expandedMonth, setExpandedMonth] = useState(null);

  const avatarRef = useRef();

  useEffect(() => { localStorage.setItem("nutrilog_theme", theme); }, [theme]);

  useEffect(() => {

      setLoading(true);

        const targets = await DataAPI.getTargets(userId);

      try {

  // The Monday of the most recently COMPLETED week — used both by the leaderboard (below) and
  // by "Best Meal of the Week" further down, so both always highlight a finished week (same
  // completed-week convention as the Previous Week Review card), never the current in-progress one.
  const prevWeekMondayKey = useMemo(() => {
    const now = new Date();
    const dow = now.getDay();
    const mondayOffset = dow === 0 ? -6 : 1 - dow;
    const thisMonday = new Date(now); thisMonday.setDate(now.getDate() + mondayOffset);
    const prevMonday = new Date(thisMonday); prevMonday.setDate(thisMonday.getDate() - 7);
    return localDateKey(prevMonday);
  }, []);

  // Rolling "-1 day" leaderboard window: on Monday, this week has no concluded days yet, so we
  // fall back to last week's complete (Day 7) result. Tue-Sun show THIS week, with the label
  // counting only the days that have actually concluded (yesterday and earlier) — Tue = Day 1,
  // Wed = Day 2, ... Sun = Day 6 — so the board only ever reflects finished days, never today's
  // still-in-progress one.
  const leaderboardWeekInfo = useMemo(() => {
    const now = new Date();
    const dow = now.getDay(); // 0=Sun..6=Sat
    if (dow === 1) return { weekStart: prevWeekMondayKey, dayLabel: 7 };
    const mondayOffset = dow === 0 ? -6 : 1 - dow;
    const thisMonday = new Date(now); thisMonday.setDate(now.getDate() + mondayOffset);
    return { weekStart: localDateKey(thisMonday), dayLabel: dow === 0 ? 6 : dow - 1 };
  }, [prevWeekMondayKey]);

  // Lazily load the leaderboard the first time the Social > Leaderboard sub-tab is opened,
  // rather than fetching it on every app load (most sessions won't visit it). Shows only

  useEffect(() => {

  // Lazily load past monthly report cards the first time Social > Achievements is opened —

  useEffect(() => {

  // Candidate photos for "Best Meal of the Week": the user's own logged meals from last week
  // that have a saved photo — reusing the already-uploaded image rather than a fresh upload.
  const lastWeekPhotoMeals = useMemo(() => {
    const prevSunday = new Date(prevWeekMondayKey+"T00:00:00"); prevSunday.setDate(prevSunday.getDate()+6);
    const prevSundayKey = localDateKey(prevSunday);
    return histRangeData.meals
      .filter(m => m.image_url && m.log_date >= prevWeekMondayKey && m.log_date <= prevSundayKey)
      .slice()
      .sort((a,b) => new Date(b.logged_at||b.log_date) - new Date(a.logged_at||a.log_date));
  }, [histRangeData, prevWeekMondayKey]);

  const myMealPost = mealPosts ? mealPosts.find(p => p.user_id === userId) || null : null;

  const submitMealPost = useCallback(async () => {
    const meal = lastWeekPhotoMeals.find(m => m.id === mealPostSelectedId);
    // Falls back to the existing post's own saved fields when the user is only editing the
    // comment (no new photo re-selected) — this used to silently fail whenever mealPostSelectedId
    // wasn't a fresh pick, e.g. before meal_id was exposed by the feed RPC, or if the original
    // meal had since been deleted from the log.
    const base = meal
      ? { meal_id: meal.id, image_url: meal.image_url, meal_name: meal.name, calories: meal.calories }

    if (!base) return;
    setMealPostSaving(true);
    setMealPostSaveError(null);
    try {
      const saved = await DataAPI.upsertMealPost(userId, prevWeekMondayKey, {
        ...base, comment: mealPostComment.trim() || null

      setMealPostSaveError(err.message);

  const toggleMealPostLike = useCallback(async (post) => {
    const wasLiked = post.liked_by_me;
    // Optimistic update — feels instant; reverted below if the request fails.
    setMealPosts(prev => (prev||[]).map(p => p.post_id===post.post_id ? { ...p, liked_by_me: !wasLiked, like_count: p.like_count + (wasLiked ? -1 : 1) } : p));
    try {
      if (wasLiked) await DataAPI.unlikeMealPost(post.post_id, userId);
      else await DataAPI.likeMealPost(post.post_id, userId);
    } catch (err) {
      setMealPosts(prev => (prev||[]).map(p => p.post_id===post.post_id ? { ...p, liked_by_me: wasLiked, like_count: p.like_count + (wasLiked ? 1 : -1) } : p));
      setError(L("Failed to save like: ","保存点赞失败：") + err.message);
    }
  }, [userId]);

  const deleteMyMealPost = useCallback(async () => {
    if (!myMealPost) return;
    try {
      await DataAPI.deleteMealPost(myMealPost.post_id);
      setMealPosts(prev => (prev||[]).filter(p => p.user_id !== userId));
    } catch (err) {
      setError(L("Failed to delete post: ","删除帖子失败：") + err.message);
    }
  }, [myMealPost, userId]);

  const mealTotals = dayData.meals.reduce((a,m) => ({ calories:a.calories+Number(m.calories), protein:a.protein+Number(m.protein), carbs:a.carbs+Number(m.carbs), fat:a.fat+Number(m.fat), sugar:a.sugar+Number(m.sugar_g||0), sodium:a.sodium+Number(m.sodium_mg||0), fiber:a.fiber+Number(m.fiber_g||0) }), { calories:0, protein:0, carbs:0, fat:0, sugar:0, sodium:0, fiber:0 });
  const drinkTotals = (dayData.drinks||[]).reduce((a,d) => ({ calories:a.calories+Number(d.calories||0), protein:a.protein+Number(d.protein||0), carbs:a.carbs+Number(d.carbs||0), fat:a.fat+Number(d.fat||0), sugar:a.sugar+Number(d.sugar_g||0), sodium:a.sodium+Number(d.sodium_mg||0), fiber:a.fiber+Number(d.fiber_g||0) }), { calories:0, protein:0, carbs:0, fat:0, sugar:0, sodium:0, fiber:0 });
  const consumed = { calories: mealTotals.calories+drinkTotals.calories, protein: mealTotals.protein+drinkTotals.protein, carbs: mealTotals.carbs+drinkTotals.carbs, fat: mealTotals.fat+drinkTotals.fat, sugar: mealTotals.sugar+drinkTotals.sugar, sodium: mealTotals.sodium+drinkTotals.sodium, fiber: mealTotals.fiber+drinkTotals.fiber };
  const burned = (dayData.workouts||[]).reduce((a,w) => a+Number(w.calories), 0);

  const currentWeightForCalc = todayWeight || (weightHistory.length ? weightHistory[weightHistory.length-1].weight_kg : null);
  const tdeeInfo = calcBMRTargets({ gender: baseTargets.gender, heightCm: baseTargets.height_cm, birthYear: baseTargets.birth_year, weightKg: currentWeightForCalc, activityLevel: baseTargets.activity_level, goal:"maintain" });

  const applyMacrosForCalories = (calories, isGain, weightKg, activityLevel) => {
    // Protein is bodyweight-anchored — this works well across the whole calorie range, since
    // muscle needs are about lean mass, not total energy intake, so it doesn't need to scale with
    // calories the way fat/carbs do. Both protein and fat now also scale with activity level (see
    // macroProfileForActivity) — someone training hard needs meaningfully more protein than a
    // sedentary person at the same weight/goal, with fat giving up the room to make space for it.
    //
    // Fat is a % of calories (not fixed grams) — simulated across 1200-4000 kcal before landing
    // here: a fixed-gram fat baseline looked fine at moderate calories, but broke down at both
    // extremes. At an aggressive cut it could crowd out carbs; at a large surplus its FIXED grams
    // became a shrinking % of an ever-larger total (e.g. just 13% of calories at 4000kcal) — an
    // unusually low-fat, unusually high-carb split that would look bizarre to anyone bulking.
    const { proteinPerKg, fatPct } = macroProfileForActivity(activityLevel, isGain);
    const minFatPerKg = 0.5; // hard floor for essential-fatty-acid/hormonal health at very low calories
    const w = weightKg || 70; // fallback if no weight logged yet
    const protein = Math.round(proteinPerKg * w);
    const fat = Math.max(Math.round(minFatPerKg * w), Math.round((calories*fatPct)/9));
    const carbs = Math.round(Math.max(0, calories - protein*4 - fat*9)/4);
    // Sugar and fiber scale with calorie level (WHO: added sugar ~10% of calories; USDA: ~14g
    // fiber per 1000kcal) instead of staying flat regardless of how much the person actually eats —
    // a flat 50g/25g default is a mismatch at both very low and very high calorie levels.
    const sugarLimit = Math.round((calories*0.10)/4);
    const fiberTarget = Math.round((calories/1000)*14);
    return { calories, protein, carbs, fat, sugarLimit, fiberTarget };
  };

  // Finds the weight logged closest to dateKey: exact match if logged that day, otherwise the
  // most recent prior entry (carrying the last known weight forward), otherwise the earliest
  // entry after it (for dates before any weight was ever logged), otherwise today's weight.
  const weightForDate = useCallback((dateKey) => {
    if (!weightHistory || weightHistory.length === 0) return currentWeightForCalc;
    const sorted = weightHistory.slice().sort((a,b) => a.log_date.localeCompare(b.log_date));
    const exact = sorted.find(w => w.log_date === dateKey);
    if (exact) return exact.weight_kg;
    const before = sorted.filter(w => w.log_date < dateKey).pop();
    if (before) return before.weight_kg;
    const after = sorted.find(w => w.log_date > dateKey);
    if (after) return after.weight_kg;
    return currentWeightForCalc;
  }, [weightHistory, currentWeightForCalc]);

  const tdeeForDate = useCallback((dateKey) => {
    const w = weightForDate(dateKey);
    return calcBMRTargets({ gender: baseTargets.gender, heightCm: baseTargets.height_cm, birthYear: baseTargets.birth_year, weightKg: w, activityLevel: baseTargets.activity_level, goal:"maintain" }).tdee;
  }, [weightForDate, baseTargets.gender, baseTargets.height_cm, baseTargets.birth_year, baseTargets.activity_level]);

  // Looks up what calorie/macro target applies for the week containing dateKey. The WEEKLY PLAN
  // (the deficit/surplus delta, e.g. -200) is what's fixed for the week — but TDEE itself still
  // depends on weight, which fluctuates daily, so the actual calorie target is recalculated here
  // using that specific date's logged weight, not frozen at whatever weight was current when the
  // plan was last saved. This also applies to TODAY (see computeTargetsLocal below), so logging a
  // new weight today updates today's target immediately without needing to re-save the plan.
  const targetsForWeek = useCallback((dateKey) => {
    const monday = getMondayKey(dateKey);
    let applicable = null;
    for (const snap of weeklyTargets) { // sorted ascending by week_start
      if (snap.week_start <= monday) applicable = snap;
      else break;
    }
    if (!applicable) {
      // No plan history yet (brand new user, or before this feature existed) — fall back to
      // today's live stored plan, same as before this change.
      return { calories: baseTargets.calories, protein: baseTargets.protein, carbs: baseTargets.carbs, fat: baseTargets.fat, goal: baseTargets.goal, delta: null };
    }
    if (applicable.delta === null || applicable.delta === undefined) {
      // Legacy snapshot saved before delta-tracking existed — use its flat stored values as-is.
      return { calories: applicable.calories, protein: applicable.protein, carbs: applicable.carbs, fat: applicable.fat, goal: applicable.goal || baseTargets.goal, delta: null };
    }
    const dayTdee = tdeeForDate(dateKey);
    const isGain = applicable.delta > 0;
    const calories = Math.max(1200, Math.round(dayTdee + applicable.delta));
    const macros = applyMacrosForCalories(calories, isGain, weightForDate(dateKey), baseTargets.activity_level);
    return { calories: macros.calories, protein: macros.protein, carbs: macros.carbs, fat: macros.fat, goal: applicable.goal || baseTargets.goal, delta: applicable.delta };
  }, [weeklyTargets, baseTargets.calories, baseTargets.protein, baseTargets.carbs, baseTargets.fat, baseTargets.goal, baseTargets.activity_level, tdeeForDate, weightForDate]);

  // Workout boost: burning calories raises your daily allowance, but NOT evenly across
  // macros — protein (repair) and carbs (glycogen/fuel) are what training actually demands more
  // of; fat has no real physiological reason to grow just because you exercised, so it gets only
  // a token share. Sodium gets a small, capped bump for real sweat/electrolyte loss — not
  // proportional growth, just enough to reflect genuine replacement needs.
  const computeTargetsLocal = (burnedKcal, dateKey) => {
    const base = targetsForWeek(dateKey || today); // that date's weight + its week's plan delta — defaults to today
    const extraCalories = burnedKcal; // 1:1 — burn 100kcal, get 100kcal more allowance
    const extraProtein = (extraCalories * 0.35) / 4; // 4 kcal/g protein — supports repair
    const extraCarbs   = (extraCalories * 0.60) / 4; // 4 kcal/g carbs — the dial that should move most
    const extraFat     = (extraCalories * 0.05) / 9; // 9 kcal/g fat — token share only, not a growth lever
    return {
      calories: base.calories + extraCalories,
      protein: base.protein + extraProtein,
      carbs: base.carbs + extraCarbs,
      fat: base.fat + extraFat
    };
  };

  // Water target for any date: uses that date's actual logged weight (via weightForDate), same
  // day-aware approach as calories/macros. A manual override (water_target_ml) is a flat number
  // regardless of date, same as it already was for today.
  const waterTargetForDate = useCallback((dateKey, burnedKcal) => {
    if (baseTargets.water_target_ml) return baseTargets.water_target_ml;
    return calcWaterTarget(weightForDate(dateKey), baseTargets.activity_level, burnedKcal||0);
  }, [weightForDate, baseTargets.water_target_ml, baseTargets.activity_level]);

  const targets = computeTargetsLocal(burned);
  const net = consumed.calories - burned;
  const deficit = net < targets.calories;
  const totalDrinkMl = (dayData.drinks||[]).reduce((s,d) => s + Number(d.amount_ml||0), 0);
  const isGainPlan = targetsForWeek(today).goal === "gain";
  const waterTarget = waterTargetForDate(today, burned);
  const waterMilestones = getWaterMilestones(waterTarget, lang);
  const achievedMilestone = waterMilestones.slice().reverse().find(m => totalDrinkMl >= m.ml) || null;

  const addDrink = async (preset) => {
    try {
      const d = await DataAPI.addDrink(userId, {
        log_date: today, drink_type: preset.drink_type, amount_ml: preset.amount_ml,
        calories: preset.calories||0, protein: preset.protein||0, carbs: preset.carbs||0, fat: preset.fat||0,
        sugar_g: preset.sugar_g||0, sodium_mg: preset.sodium_mg||0, fiber_g: preset.fiber_g||0, logged_at: new Date().toISOString()
      });
      setDayData(prev => ({ ...prev, drinks: [...(prev.drinks||[]), d] }));
    } catch (err) { setError(L("Failed to log drink: ","记录饮品失败：") + err.message); }
  };
  const removeDrink = async (id) => {
    setDayData(d => ({ ...d, drinks: (d.drinks||[]).filter(x=>x.id!==id) }));
    try { await DataAPI.deleteDrink(id); } catch (err) { setError(L("Failed to delete: ","删除失败：") + err.message); refreshToday(); }
  };
  const adjustWater = async (delta) => {
    if (delta > 0) { addDrink({ drink_type:"Water", amount_ml:delta, calories:0, sugar_g:0 }); return; }
    // Negative adjust: reduce the most recent water entries by the exact amount, walking
    // backward through them. A whole entry is only deleted once it's fully consumed by the
    // remaining amount — otherwise it's proportionally shrunk (macros scaled down with it)
    // rather than deleting an entire entry that's bigger than what the user asked to remove.
    let remaining = Math.abs(delta);
    const waterEntries = (dayData.drinks||[]).filter(d => d.drink_type === "Water")
      .slice().sort((a,b) => new Date(b.logged_at||0) - new Date(a.logged_at||0));
    for (const entry of waterEntries) {
      if (remaining <= 0) break;
      const entryMl = Number(entry.amount_ml||0);
      if (entryMl <= remaining) {
        remaining -= entryMl;
        await removeDrink(entry.id);
      } else {
        const newMl = entryMl - remaining;
        const ratio = newMl / entryMl;
        const patch = {
          amount_ml: newMl,
          calories: Math.round((entry.calories||0)*ratio),
          protein: Math.round((entry.protein||0)*ratio*10)/10,
          carbs: Math.round((entry.carbs||0)*ratio*10)/10,
          fat: Math.round((entry.fat||0)*ratio*10)/10,
          sugar_g: Math.round((entry.sugar_g||0)*ratio*10)/10,
          sodium_mg: Math.round((entry.sodium_mg||0)*ratio)
        };
        setDayData(d => ({ ...d, drinks: (d.drinks||[]).map(x => x.id===entry.id ? {...x, ...patch} : x) }));
        try { await DataAPI.updateDrink(entry.id, patch); } catch (err) { setError(L("Failed to update: ","更新失败：") + err.message); refreshToday(); }
        remaining = 0;
      }
    }
  };

  const openTargetModal = () => {
    setTempGender(baseTargets.gender||"");
    setTempHeight(baseTargets.height_cm?baseTargets.height_cm.toString():"");
    setTempBirthYear(baseTargets.birth_year?baseTargets.birth_year.toString():"");
    setTempActivity(baseTargets.activity_level||"moderate");
    setTempGoal(baseTargets.goal||"maintain");
    setTempAutoCalc(!!baseTargets.auto_calc);
    setTempDisplayName(baseTargets.display_name||"");
    setWeightInput("");
    setShowTargetModal(true);
  };
  const bmiInfo = calcBMI(currentWeightForCalc, baseTargets.height_cm);
  const weightTrendMessage = (() => {
    if (weightHistory.length < 2) return null;
    const first = weightHistory[0].weight_kg;
    const last = weightHistory[weightHistory.length-1].weight_kg;
    const diff = Math.round((last-first)*10)/10;
    if (Math.abs(diff) < 0.2) return L("Holding steady over this period.","这段时间体重保持稳定。");
    return diff < 0 ? L(`Down ${Math.abs(diff)}kg over this period — great progress!`, `这段时间下降了 ${Math.abs(diff)}kg —— 进步很棒！`) : L(`Up ${diff}kg over this period.`, `这段时间上升了 ${diff}kg。`);
  })();
  const uploadAvatar = async (file) => {
    if (!file) return;
    setError(null);
    setAvatarUploading(true);
    try {
      const { blob } = await compressImage(file, 256, 0.8);
      const url = await uploadPhoto(userId, blob, "avatar");
      if (!url) throw new Error("Upload failed");
      const updated = { ...baseTargets, avatar_url: url };
      setBaseTargets(updated);
      await DataAPI.setTargets(userId, updated);
    } catch (err) { setError(L("Failed to upload photo: ","上传照片失败：") + err.message); }
    finally { setAvatarUploading(false); }
  };

  const updateDayCutoff = async (hour) => {
    const updated = { ...baseTargets, day_cutoff_hour: hour };
    setBaseTargets(updated);
    try { await DataAPI.setTargets(userId, updated); } catch (err) { setError(L("Failed to save: ","保存失败：") + err.message); }
  };

  // Saves (or updates) a snapshot of the plan for the CURRENT week only — this is what makes the
  // plan "weekly": changing it today updates this week going forward, but never rewrites past
  // weeks' snapshots, so history/streaks keep reflecting whatever was actually active back then.
  const saveWeeklyPlanSnapshot = async (macros, goal, delta) => {
    const thisMonday = getMondayKey(todayKey(baseTargets.day_cutoff_hour));
    const snapshot = { calories: macros.calories, protein: macros.protein, carbs: macros.carbs, fat: macros.fat, goal, delta: (delta===undefined?null:delta) };
    setWeeklyTargets(prev => {
      const withoutThisWeek = prev.filter(w => w.week_start !== thisMonday);
      return [...withoutThisWeek, { week_start: thisMonday, ...snapshot }].sort((a,b) => a.week_start.localeCompare(b.week_start));
    });
    try { await DataAPI.saveWeeklyTargetSnapshot(userId, thisMonday, snapshot); } catch (err) { /* non-fatal — table may not be set up yet */ }
  };

  const applyCalorieTier = async (tdee, delta) => {
    const isGain = delta > 0;
    const finalCalories = Math.max(1200, Math.round(tdee + delta));
    const macros = applyMacrosForCalories(finalCalories, isGain, currentWeightForCalc, baseTargets.activity_level);
    // Same spirit of guardrail the custom-delta input already had — but the preset tier buttons
    // previously had none at all, regardless of how extreme a choice was relative to someone's
    // actual TDEE or current BMI. These are informational nudges only — never blocking — since
    // the person may have context (e.g. covering part of a gap with exercise) that the app doesn't.
    if (delta !== 0 && tdee + delta < 1200) {
      setCustomDeltaWarning(L("This tier puts your daily calories at the safety floor (1200 kcal) for your profile — a lighter tier, or covering part of the gap with exercise, may be easier to sustain.", "该档位会让您的每日热量触及安全下限（1200 千卡）—— 建议选择更温和的档位，或搭配运动来补足差额，会更容易长期坚持。"));
    } else if (tdee && Math.abs(delta)/tdee > 0.25) {
      setCustomDeltaWarning(L("This is a fairly steep change relative to your maintenance calories (over 25%) — many people find this hard to sustain long-term.", "相对于您的维持热量，这个调整幅度较大（超过 25%）—— 许多人发现这种程度较难长期坚持。"));
    } else if (delta < 0 && calcBMI(currentWeightForCalc, baseTargets.height_cm)?.key === "under") {
      setCustomDeltaWarning(L("Your BMI is currently in the underweight range — a calorie deficit isn't usually recommended here. Consider Maintain or a Surplus tier instead.", "您目前的 BMI 处于偏瘦范围 —— 通常不建议在此情况下设定热量缺口，建议改选「维持」或「盈余」档位。"));
    } else if (delta < 0 && macros.carbs < 50) {
      // Protein and fat are fixed to bodyweight regardless of tier — on a steep enough cut for a
      // larger person, those two alone can eat up most of the calorie budget, leaving very little
      // for carbs. Worth surfacing since it's a side effect of body size + tier choice, not
      // something the person would necessarily anticipate from the tier label alone.
      setCustomDeltaWarning(L(`This tier leaves only about ${macros.carbs}g of carbs once your protein and fat needs are covered — that's quite low. A lighter tier would leave more room.`, `在满足蛋白质与脂肪需求后，该档位仅剩约 ${macros.carbs}g 碳水额度 —— 偏低。选择更温和的档位会留出更多空间。`));
    } else {
      setCustomDeltaWarning(null);
    }
    const updated = { ...baseTargets, calories:macros.calories, protein:macros.protein, carbs:macros.carbs, fat:macros.fat, sugar_limit_g:macros.sugarLimit, fiber_target_g:macros.fiberTarget, plan_active: true };
    setBaseTargets(updated);
    setCustomDeltaInput(delta.toString());
    const waterNeeded = calcWaterTarget(currentWeightForCalc, baseTargets.activity_level, burned);
    setPlanConfirmation({ ...macros, waterNeeded });
    try { await DataAPI.setTargets(userId, updated); } catch (err) { setError(L("Failed to save: ","保存失败：") + err.message); }
    saveWeeklyPlanSnapshot(macros, isGain ? "gain" : (delta === 0 ? "maintain" : "lose"), delta);
  };

  const applyCustomDelta = async (tdee) => {
    const delta = parseFloat(customDeltaInput);
    if (isNaN(delta)) { setError(L("Enter a number, e.g. -300 or +250.","请输入数字，例如 -300 或 +250。")); return; }
    setError(null);
    const isGain = delta > 0;
    const finalCalories = Math.max(1200, Math.round(tdee + delta));
    const macros = applyMacrosForCalories(finalCalories, isGain, currentWeightForCalc, baseTargets.activity_level);
    // Soft warnings only — never blocks the user, since they may plan to cover the gap with
    // exercise or have other context the app doesn't. Same checks as the preset tier buttons.
    if (Math.abs(delta) > 750) {
      setCustomDeltaWarning(delta < 0
        ? L("That's a larger deficit than usually recommended without medical supervision. If you're planning to cover part of it with extra exercise, that's fine — just keep an eye on how you feel.", "这个热量缺口比通常在无医疗监督下建议的幅度更大。如果您计划通过额外运动来补足一部分，也是可以的 —— 但请留意自己的身体感受。")
        : L("That's a larger surplus than typical for steady weight gain. Make sure that's intentional.", "这个热量盈余比稳健增重通常建议的幅度更大，请确认这是您有意为之的选择。"));
    } else if (tdee + delta < 1200) {
      setCustomDeltaWarning(L("This would put your daily calories quite low. Consider relying more on exercise instead of cutting food this much.", "这会让您的每日热量偏低 —— 建议更多依靠运动，而非大幅减少饮食摄入。"));
    } else if (delta < 0 && calcBMI(currentWeightForCalc, baseTargets.height_cm)?.key === "under") {
      setCustomDeltaWarning(L("Your BMI is currently in the underweight range — a calorie deficit isn't usually recommended here.", "您目前的 BMI 处于偏瘦范围 —— 通常不建议在此情况下设定热量缺口。"));
    } else if (delta < 0 && macros.carbs < 50) {
      setCustomDeltaWarning(L(`This leaves only about ${macros.carbs}g of carbs once your protein and fat needs are covered — that's quite low.`, `在满足蛋白质与脂肪需求后，仅剩约 ${macros.carbs}g 碳水额度 —— 偏低。`));
    } else {
      setCustomDeltaWarning(null);
    }
    const updated = { ...baseTargets, calories:macros.calories, protein:macros.protein, carbs:macros.carbs, fat:macros.fat, sugar_limit_g:macros.sugarLimit, fiber_target_g:macros.fiberTarget, plan_active: true };
    setBaseTargets(updated);
    const waterNeeded = calcWaterTarget(currentWeightForCalc, baseTargets.activity_level, burned);
    setPlanConfirmation({ ...macros, waterNeeded });
    try { await DataAPI.setTargets(userId, updated); } catch (err) { setError(L("Failed to save: ","保存失败：") + err.message); }
    saveWeeklyPlanSnapshot(macros, isGain ? "gain" : (delta === 0 ? "maintain" : "lose"), delta);
  };

  const openPlanEditor = () => {
    const live = targetsForWeek(today);
    setEditCal(Math.round(live.calories).toString());
    setEditProt(Math.round(live.protein).toString());
    setEditCarb(Math.round(live.carbs).toString());
    setEditFat(Math.round(live.fat).toString());
    setEditSugar(Math.round(baseTargets.sugar_limit_g||50).toString());
    setEditSodium(Math.round(baseTargets.sodium_limit_mg||2300).toString());
    setEditFiber(Math.round(baseTargets.fiber_target_g||25).toString());
    setEditWater(Math.round(waterTarget).toString());
    setShowPlanEditor(true);
  };

  const savePlanEdits = async () => {
    const updated = {
      ...baseTargets,
      calories: parseFloat(editCal)||baseTargets.calories,
      protein: parseFloat(editProt)||baseTargets.protein,
      carbs: parseFloat(editCarb)||baseTargets.carbs,
      fat: parseFloat(editFat)||baseTargets.fat,
      sugar_limit_g: parseFloat(editSugar)||50,
      sodium_limit_mg: parseFloat(editSodium)||2300,
      fiber_target_g: parseFloat(editFiber)||25,
      water_target_ml: parseFloat(editWater)||null,
      plan_active: true
    };
    setBaseTargets(updated);
    setShowPlanEditor(false);
    try { await DataAPI.setTargets(userId, updated); } catch (err) { setError(L("Failed to save: ","保存失败：") + err.message); }
    const editDelta = (tdeeInfo && tdeeInfo.tdee) ? Math.round(updated.calories - tdeeInfo.tdee) : null;
    saveWeeklyPlanSnapshot({ calories:updated.calories, protein:updated.protein, carbs:updated.carbs, fat:updated.fat }, baseTargets.goal, editDelta);
  };

  const resetWaterToAuto = () => {
    setEditWater(Math.round(calcWaterTarget(currentWeightForCalc, baseTargets.activity_level, burned)).toString());
  };

  const saveCustomTargets = async () => {
    // Recalculates fresh from the profile (weight/height/activity/goal) every time this is saved,
    // using the same activity-aware formula as the tier picker — this used to read tempCal/
    // tempProt/tempCarb/tempFat, but those were never actually wired to any input field the user
    // could edit (always empty), so this silently preserved stale numbers even when someone
    // changed their activity level or goal right here in the same save. Manual macro editing has
    // its own dedicated, working editor elsewhere (the ✏️ plan editor), so this modal now always
    // reflects the current profile rather than pretending to offer a second, broken editing path.
    const freshTargets = calcBMRTargets({
      gender: tempGender||null, heightCm: parseFloat(tempHeight)||null, birthYear: parseInt(tempBirthYear)||null,
      weightKg: currentWeightForCalc, activityLevel: tempActivity, goal: tempGoal
    });
    const calories = freshTargets ? freshTargets.calories : baseTargets.calories;
    const protein = freshTargets ? freshTargets.protein : baseTargets.protein;
    const carbs = freshTargets ? freshTargets.carbs : baseTargets.carbs;
    const fat = freshTargets ? freshTargets.fat : baseTargets.fat;
    const sugarLimit = Math.round((calories*0.10)/4);
    const fiberTarget = Math.round((calories/1000)*14);
    const up = {
      calories, protein, carbs, fat,
      sugar_limit_g: sugarLimit, fiber_target_g: fiberTarget,
      gender: tempGender||null, height_cm: parseFloat(tempHeight)||null, birth_year: parseInt(tempBirthYear)||null,
      activity_level: tempActivity, goal: tempGoal, auto_calc: tempAutoCalc,
      display_name: tempDisplayName.trim()||null, avatar_url: baseTargets.avatar_url||null,
      day_cutoff_hour: baseTargets.day_cutoff_hour||0,
      plan_active: baseTargets.plan_active||false, plan_goal_kg: baseTargets.plan_goal_kg||null,
      plan_weeks: baseTargets.plan_weeks||null, plan_daily_exercise_kcal: baseTargets.plan_daily_exercise_kcal||0
    };
    setBaseTargets(up);
    setShowTargetModal(false);
    try {
      await DataAPI.setTargets(userId, up);
      const wInput = parseFloat(weightInput);
      if (wInput && wInput > 0) {
        await DataAPI.setWeight(userId, today, wInput);
        setTodayWeight(wInput);
        setShowWeightReminder(false);
        setWeightInput("");
        const end = new Date(); const start = new Date(); start.setDate(start.getDate()-180);
        const hist = await DataAPI.getWeightRange(userId, localDateKey(start), localDateKey(end));
        setWeightHistory(hist);
      }
    } catch (err) { setError(L("Failed to save targets: ","保存目标失败：") + err.message); }
    const customDelta = freshTargets ? Math.round(up.calories - freshTargets.tdee) : null;
    saveWeeklyPlanSnapshot({ calories:up.calories, protein:up.protein, carbs:up.carbs, fat:up.fat }, up.goal, customDelta);
  };

  // ── AI calls (Gemini, BYO key) ──
  const { callGemini, friendlyGeminiError } = useGeminiClient(geminiKey, geminiFallbackKey, aiDailyLimit, anthropicKey);

  const {
    manualCal, setManualCal, manualDesc, setManualDesc, manualProt, setManualProt,
    manualCarb, setManualCarb, manualFat, setManualFat, manualSugar, setManualSugar,
    manualSodium, setManualSodium, manualFiber, setManualFiber,
    manualFlagged, setManualFlagged, manualFlagOccasion, setManualFlagOccasion,
    manualFlagLocation, setManualFlagLocation, manualFlagComment, setManualFlagComment,
    isSuggesting, suggestManualDiet, addManualMeal,
    entryPhoto, attachEntryPhoto, clearEntryPhoto, entryPhotoUploading, setEntryPhoto,
    cropSource, confirmCrop, skipCrop, cancelCrop
  } = useManualMealForm({ userId, today, activeSlot, setDayData, setError, callGemini, friendlyGeminiError, L });

  const {
    customDrinkName, setCustomDrinkName, customDrinkMl, setCustomDrinkMl, customDrinkCal, setCustomDrinkCal,
    customDrinkProt, setCustomDrinkProt, customDrinkCarb, setCustomDrinkCarb, customDrinkFat, setCustomDrinkFat,
    customDrinkSugar, setCustomDrinkSugar, customDrinkSodium, setCustomDrinkSodium,
    isSuggestingDrink, drinkRatePer100ml, setDrinkRatePer100ml,
    addCustomDrink, suggestDrinkNutrition, onCustomDrinkMlChange
  } = useCustomDrinkForm({ userId, today, setDayData, setError, callGemini, friendlyGeminiError, L });

  const {
    manualBurn, setManualBurn, manualWorkoutDesc, setManualWorkoutDesc, stepCount, setStepCount,
    isSuggestingWorkout, applyStepConversion, suggestWorkoutCalories, addManualBurn
  } = useManualWorkoutForm({ userId, today, setDayData, setError, callGemini, friendlyGeminiError, currentWeightForCalc, L });


  // Which of the 3 logging methods is active for the NEXT meal about to be logged (photo is
  // captured once, up front, shared by all three — see the unified entry card below).
  // null = still choosing.
  const [mealEntryMethod, setMealEntryMethod] = useState(null); // null | "photo" | "text" | "manual"

  const startPhotoSearch = () => {

  // Runs (or re-runs, on retry) the AI analysis against an already-captured photo, updating the
  // existing pending entry in place rather than creating/gating it — so a failure here never
  // removes the photo or blocks logging, and retrying doesn't require re-taking the picture.
  const runAIAnalysis = useCallback(async (entry) => {
    if (!entry) return;
    setAnalyzing(true);
    setPendingEntry(prev => (prev && prev.image === entry.image) ? { ...prev, aiStatus:"loading", aiError:null } : prev);
    let statusTimer = null;
    if (entry.type === "meal") {
      const messages = ["Reading your photo...", "Identifying ingredients...", "Estimating portion sizes...", "Calculating calories & macros...", "Almost done..."];
      let idx = 0;
      setAnalyzeStatusMsg(messages[0]);
      statusTimer = setInterval(() => { idx = Math.min(idx+1, messages.length-1); setAnalyzeStatusMsg(messages[idx]); }, 2200);
    }
    try {
      const prompt = entry.type === "meal"
        ? buildMealAnalysisPrompt(lang)
        : `Apple Watch workout summary. Output ONLY raw JSON, no code fences: {"calories":number,"activity":"activity name","duration":"45 min","heartRate":null}${geminiLangInstruction(lang)}`;
      const raw = await callGemini({
        contents:[{ role:"user", parts:[{ text:prompt },{ inlineData:{ mimeType:"image/jpeg", data:entry._base64 } }] }]
      });
      const parsed = entry.type === "meal" ? parseMealAnalysis(raw) : JSON.parse(raw.replace(/```json|```/gi,"").trim());
      addAiBytesToday(entry._blob.size);
      setPendingEntry(prev => (prev && prev.image === entry.image) ? { ...prev, ...parsed, aiStatus:"success", aiError:null } : prev);
    } catch (err) {
      setPendingEntry(prev => (prev && prev.image === entry.image) ? { ...prev, aiStatus:"error", aiError: friendlyGeminiError(err) } : prev);
    } finally {
      if (statusTimer) clearInterval(statusTimer);
      setAnalyzing(false);
    }
  }, [geminiKey, lang]);

  const blobToBase64 = (blob) => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });


  // AI Retry inside the edit modal: re-analyzes the entry's saved photo and refreshes the edit
  // form's fields in place — nothing is written to the server here, so a bad re-analysis is just
  // as easy to tweak or discard as any other edit, and only "Save Changes" actually persists it.
  const [editAiStatus, setEditAiStatus] = useState("idle"); // idle | loading | error
  const [editAiError, setEditAiError] = useState(null);
  useEffect(() => { setEditAiStatus("idle"); setEditAiError(null); }, [editingItem?.id]);
  const retryEditAI = useCallback(async () => {

    setEditAiStatus("loading");
    setEditAiError(null);
    try {
      const imgRes = await fetch(editingItem.image_url);
      if (!imgRes.ok) throw new Error("Couldn't re-fetch the saved photo.");
      const blob = await imgRes.blob();
      const base64 = await blobToBase64(blob);
      const raw = await callGemini({
        contents:[{ role:"user", parts:[{ text:buildMealAnalysisPrompt(lang) },{ inlineData:{ mimeType:"image/jpeg", data:base64 } }] }]
      });
      const parsed = parseMealAnalysis(raw);
      setEditingItem(prev => prev ? {
        ...prev,
        name: parsed.name || prev.name,
        calories: parsed.calories||0, protein: parsed.protein||0, carbs: parsed.carbs||0, fat: parsed.fat||0,
        sugar_g: parsed.sugar||0, sodium_mg: parsed.sodium||0, fiber_g: parsed.fiber||0,
        confidence: parsed.confidence || prev.confidence, items: Array.isArray(parsed.items) ? parsed.items : prev.items
      } : prev);
      setEditAiStatus("idle");
    } catch (err) {
      setEditAiStatus("error");
      setEditAiError(friendlyGeminiError(err));
    }
  }, [editingItem, callGemini, lang]);

    setEditTextAiStatus("loading");
    setEditTextAiError(null);
    try {
      const raw = await callGemini({
        contents:[{ role:"user", parts:[{ text:`Analyze this food: "${editingItem.name}". Output ONLY raw JSON, no code fences: {"calories":number,"protein":number,"carbs":number,"fat":number,"sugar":number,"sodium":number,"fiber":number}` }] }]
      });

      setEditingItem(prev => prev ? {
        ...prev,
        calories: metrics.calories||0, protein: metrics.protein||0, carbs: metrics.carbs||0, fat: metrics.fat||0,

  const updatePendingEntry = useCallback((patch) => {
    setPendingEntry(prev => prev ? { ...prev, ...patch } : prev);

  const confirmEntry = async () => {
    if (!pendingEntry) return;
    setSavingEntry(true);
    try {
      let imageUrl = null;
      if (pendingEntry._blob) {
        imageUrl = await uploadPhoto(userId, pendingEntry._blob, pendingEntry.type);
      }

        const meal = await DataAPI.addMeal(userId, {
          log_date: today, slot: activeSlot, name: pendingEntry.name, calories: pendingEntry.calories,
          protein: pendingEntry.protein||0, carbs: pendingEntry.carbs||0, fat: pendingEntry.fat||0,
          sugar_g: pendingEntry.sugar||0, sodium_mg: pendingEntry.sodium||0, fiber_g: pendingEntry.fiber||0,
          confidence: pendingEntry.confidence||"high", image_url: imageUrl,
          items: Array.isArray(pendingEntry.items) ? pendingEntry.items : null,
          flagged: !!pendingEntry.flagged, flag_occasion: pendingEntry.flagged ? (pendingEntry.flag_occasion||null) : null,
          flag_location: pendingEntry.flagged ? (pendingEntry.flag_location||null) : null, flag_comment: pendingEntry.flagged ? (pendingEntry.flag_comment||null) : null,

        });

      } else {

  const removeMeal = async (id) => {

  const removeMealFromHistory = async (id) => {

    try { await DataAPI.deleteMeal(id); } catch (err) { setError(L("Failed to delete: ","删除失败：") + err.message); }

  // ── Stable callback refs for MealCard ──
  // MealCard is wrapped in React.memo, but every call site used to pass fresh inline arrow
  // functions (`onRemove={() => removeMeal(m.id)}` etc.) — a brand new function reference every
  // single render, which defeats memo's shallow prop comparison entirely. That meant every meal
  // card on screen fully re-rendered on any keystroke or unrelated state change anywhere in the
  // app, not just when that specific meal actually changed — the likely cause of the reported
  // lag while logging/scrolling with several meals on screen. Fix: keep the latest version of

  const latestHandlersRef = useRef({});

  const stableRemoveMeal = useCallback((id) => latestHandlersRef.current.removeMeal(id), []);
  const stableRemoveMealFromHistory = useCallback((id) => latestHandlersRef.current.removeMealFromHistory(id), []);
  const stableChangeMealSlot = useCallback((id, dir) => latestHandlersRef.current.changeMealSlot(id, dir), []);
  const stableEditMeal = useCallback((meal) => latestHandlersRef.current.editMeal(meal), []);

  const removeWorkoutFromHistory = async (id) => {

    };

      if (backdateType === "meal") {

        });

  const exportCSV = () => {
    const rows = [["Date","Type","Name","Calories","Protein(g)","Carbs(g)","Fat(g)","Sugar(g)","Sodium(mg)","Fiber(g)","Amount(ml)","Notes"]];
    histRangeData.meals.forEach(m => rows.push([m.log_date,"Meal",m.name,m.calories,m.protein,m.carbs,m.fat,m.sugar_g||0,m.sodium_mg||0,m.fiber_g||0,"",m.slot||""]));

    (histRangeData.drinks||[]).forEach(d => rows.push([d.log_date,"Drink",d.drink_type,d.calories||0,d.protein||0,d.carbs||0,d.fat||0,d.sugar_g||0,d.sodium_mg||0,d.fiber_g||0,d.amount_ml,""]));
    rows.sort((a,b) => a[0]<b[0] ? -1 : a[0]>b[0] ? 1 : 0);

  const changeMealSlot = async (mealId, direction) => {

  const commitEdit = async () => {
    if (!editingItem) return;

    const calOverPct = totalTarget ? ((totalNet - totalTarget)/totalTarget)*100 : 0;
    const calStatus = calOverPct > 20 ? "red" : calOverPct > 0 ? "yellow" : null;
    // Weekly-aggregate version of the same goal-aware offPct used per-day above — feeds the
    // calorie score curve (negative = achieved further in the healthy direction than required).
    const avgOffPct = totalTarget ? (wt.goal === "gain" ? ((totalTarget-totalNet)/totalTarget)*100 : ((totalNet-totalTarget)/totalTarget)*100) : 0;

    // Sugar and fiber are derived from THAT WEEK's calorie target (wt.calories), same formula as
    // the tier picker — not today's current baseTargets values, which could differ if the plan
    // has changed since. Sodium stays a flat guideline-based ceiling (it doesn't scale with
    // calorie intake the way sugar/fiber do), so the current baseline value is fine there.
    const sugarLimit = wt.calories ? Math.round((wt.calories*0.10)/4) : (baseTargets.sugar_limit_g || 50);
    const avgSugarPct = sugarLimit ? Math.round((totalSugar/(sugarLimit*tracked))*100) : null;
    const sodiumLimit = baseTargets.sodium_limit_mg || 2300;
    const avgSodiumPct = sodiumLimit ? Math.round((totalSodium/(sodiumLimit*tracked))*100) : null;
    const fiberTarget = wt.calories ? Math.round((wt.calories/1000)*14) : (baseTargets.fiber_target_g || 25);
    const avgFiberPct = fiberTarget ? Math.round((totalFiber/(fiberTarget*tracked))*100) : null;

    // devPct is still tracked for protein/carbs/fat (used by "need to improve" and macroIssues),
    // even though protein/fat now score via their own directional curves below.
    const RED_THRESHOLD = 20;
    const macroDev = {};
    const macroIssues = [];
    [["protein",totalProtein,wt.protein],["carbs",totalCarbs,wt.carbs],["fat",totalFat,wt.fat]].forEach(([name,total,perDayTarget]) => {
      const targetTotal = perDayTarget * tracked;
      const devPct = targetTotal ? ((total - targetTotal)/targetTotal)*100 : 0;
      macroDev[name] = devPct;
      if (Math.abs(devPct) > RED_THRESHOLD) macroIssues.push({ name, devPct });
    });

    const ratio = hits / tracked;
    const tone = (hits === 7 && tracked === 7) ? "perfect" : ratio >= 0.7 ? "good" : ratio >= 0.4 ? "mixed" : "tough";

    // Uses the actual delta stored with the plan snapshot (now that plans store their weekly
    // deficit/surplus delta directly). Only falls back to a TDEE approximation for legacy
    // snapshots saved before delta-tracking existed.
    const planDelta = (wt.delta !== null && wt.delta !== undefined)
      ? wt.delta
      : (tdeeInfo ? Math.round(wt.calories - tdeeInfo.tdee) : 0);

    // Per-category 0-100 scores feeding the report card grade.
    // - Calories: goal-aware curve on offPct — rewards achieving further in the healthy direction
    //   (up to a cap), penalizes drifting the wrong way, hits C once 120%+ off (asks to recalibrate).
    // - Protein & fiber: higher-is-better — exceeding generously maxes out at SSS.
    // - Fat, sugar, sodium: lower-is-better — staying comfortably under caps at SSS.
    // - Carbs: kept as the original "closer to target is better either direction" scoring, since
    //   carbs isn't inherently "more/less is better" the way the others are.
    const macroScore = deviationScore;
    const proteinTargetTotal = wt.protein * tracked;
    const fatTargetTotal = wt.fat * tracked;
    const proteinRatioPct = proteinTargetTotal ? (totalProtein/proteinTargetTotal)*100 : 100;
    const fatRatioPct = fatTargetTotal ? (totalFat/fatTargetTotal)*100 : 100;
    const fiberTargetTotal = fiberTarget * tracked;
    const fiberRatioPct = fiberTargetTotal ? (totalFiber/fiberTargetTotal)*100 : 100;

    const waterRatioPct = totalWaterTarget ? (totalWater/totalWaterTarget)*100 : 100;
    const avgWorkoutBurn = tracked ? totalWorkoutBurn/tracked : 0;

    const categoryScores = {
      calories: interpolateScore(avgOffPct, CAL_CURVE),
      protein: interpolateScore(proteinRatioPct, HIGHER_BETTER_CURVE),
      carbs: macroScore(macroDev.carbs),
      fat: interpolateScore(fatRatioPct, LOWER_BETTER_CURVE),
      sugar: avgSugarPct===null ? 100 : interpolateScore(avgSugarPct, LOWER_BETTER_CURVE),
      sodium: avgSodiumPct===null ? 100 : interpolateScore(avgSodiumPct, LOWER_BETTER_CURVE),
      fiber: interpolateScore(fiberRatioPct, HIGHER_BETTER_CURVE),
      // Water: weekly aggregate (total drunk / total target) run through the same "higher is
      // better" curve as protein/fiber — so 50%/75%/etc. of target now earns partial credit
      // instead of only a flat pass/fail on hitting 100% each day.
      water: interpolateScore(waterRatioPct, HIGHER_BETTER_CURVE),
      // Workout: average daily calories burned, not just "did you log anything" — see WORKOUT_CURVE.
      workout: interpolateScore(avgWorkoutBurn, WORKOUT_CURVE),
    };

    return { weekNum, wt, planDelta, hits, tracked, avgCalPct, calOverPct, calStatus, avgSugarPct, avgSodiumPct, avgFiberPct, macroIssues, macroDev, waterHitDays, workoutDays, waterRatioPct, avgWorkoutBurn, tone, tierCounts, categoryScores };
  }, [histRangeData, targetsForWeek, waterTargetForDate, baseTargets.sodium_limit_mg, tdeeInfo]);

  // Coach's Note content — computed once here (rather than inside the report card's render) so it
  // can be shown right after "This Week's Plan" (where it's immediately useful when setting a new
  // plan) as well as referenced by the report card section further down.
  const weekCoaching = useMemo(() => {
    if (!previousWeekAnalysis) return null;
    const a = previousWeekAnalysis;
    const macroLabel = { protein:L("protein","蛋白质"), carbs:L("carbs","碳水"), fat:L("fat","脂肪") };
    const focusIssue = (() => {
      const candidates = [];
      if (a.calStatus) candidates.push({ label:L("calories","热量"), icon:"🔥", pct:a.calOverPct, over:true });
      a.macroIssues.forEach(mi => candidates.push({ label:macroLabel[mi.name], icon: mi.name==="protein"?"🥩":mi.name==="carbs"?"🍞":"🥑", pct:Math.abs(mi.devPct), over:mi.devPct>0 }));
      if (a.avgSugarPct !== null && a.avgSugarPct > 100) candidates.push({ label:L("sugar","糖分"), icon:"🍬", pct:a.avgSugarPct-100, over:true });
      if (candidates.length === 0) return null;
      candidates.sort((x,y) => y.pct - x.pct);
      return candidates[0];
    })();
    const focusLine = focusIssue
      ? L(`🎯 This week's focus: ${focusIssue.over ? "ease off" : "bring up"} ${focusIssue.label} ${focusIssue.icon}`,
          `🎯 本周焦点：${focusIssue.over ? "稍微减少" : "提高"}${focusIssue.label}摄入 ${focusIssue.icon}`)
      : L("🎯 Nothing to fix — just keep doing exactly this!","🎯 无需调整 —— 保持现在的状态就好！");
    const closer = focusIssue
      ? L("Let's improve again this week!!!","这周继续加油改善！！！")
      : L("Keep up the great work!","继续保持这份出色的状态！");
    return { focusLine, closer };
  }, [previousWeekAnalysis, lang]);

  // Plan Tracker: shows the fixed plan delta chosen for each of the last 6 weeks (e.g. Week 26:
  // -200, Week 27: -300) — not live performance. Just a readout of the plan itself over time,
  // for motivation ("look how much more committed the deficit has gotten").
  // Achievements: scans all available history to find the single best-graded week and best-graded
  // month (by the same composite score as the weekly report card), for a "personal best" showcase.
  const achievementsData = useMemo(() => {
    const blankDay = blankDayStats;
    const byDate = {};
    histRangeData.meals.forEach(m => { const e = (byDate[m.log_date] ||= blankDay()); e.cons += Number(m.calories||0); e.protein += Number(m.protein||0); e.carbs += Number(m.carbs||0); e.fat += Number(m.fat||0); e.sugar += Number(m.sugar_g||0); e.sodium += Number(m.sodium_mg||0); e.fiber += Number(m.fiber_g||0); });
    histRangeData.workouts.forEach(w => { const e = (byDate[w.log_date] ||= blankDay()); e.burn += Number(w.calories||0); e.workedOut = true; });
    (histRangeData.drinks||[]).forEach(d => { const e = (byDate[d.log_date] ||= blankDay()); e.cons += Number(d.calories||0); e.protein += Number(d.protein||0); e.carbs += Number(d.carbs||0); e.fat += Number(d.fat||0); e.sugar += Number(d.sugar_g||0); e.sodium += Number(d.sodium_mg||0); e.fiber += Number(d.fiber_g||0); e.water += Number(d.amount_ml||0); });

    const sodiumLimit = baseTargets.sodium_limit_mg || 2300;

    const scoreDays = (dayKeys) => {
      let tracked=0, totalNet=0, totalTarget=0, totalProtein=0, totalProteinTarget=0, totalCarbs=0, totalCarbsTarget=0, totalFat=0, totalFatTarget=0, totalSugar=0, totalSugarTarget=0, totalSodium=0, totalFiber=0, totalFiberTarget=0, totalWater=0, totalWaterTarget=0, totalWorkoutBurn=0;
      let weekGoal = null;
      dayKeys.forEach(key => {
        const e = byDate[key];
        if (!e) return;
        tracked++;
        const wt = targetsForWeek(key); // each day scored against the plan active for ITS week
        weekGoal = wt.goal;
        const net = e.cons - e.burn;
        totalNet += net; totalTarget += wt.calories;
        totalProtein += e.protein; totalProteinTarget += wt.protein;
        totalCarbs += e.carbs; totalCarbsTarget += wt.carbs;
        totalFat += e.fat; totalFatTarget += wt.fat;
        // Sugar/fiber scale with THAT DAY's own calorie target (may differ across a date range that
        // spans multiple weeks with different plans), same formula as the tier picker.
        totalSugar += e.sugar; totalSugarTarget += wt.calories ? (wt.calories*0.10)/4 : 50;
        totalSodium += e.sodium;
        totalFiber += e.fiber; totalFiberTarget += wt.calories ? (wt.calories/1000)*14 : 25;
        totalWater += e.water; totalWaterTarget += waterTargetForDate(key, e.burn);
        totalWorkoutBurn += e.burn;
      });
      if (tracked === 0) return null;
      const macroScore = (total, targetTotal) => targetTotal ? deviationScore(((total-targetTotal)/targetTotal)*100) : 100;
      const avgOffPct = totalTarget ? (weekGoal==="gain" ? ((totalTarget-totalNet)/totalTarget)*100 : ((totalNet-totalTarget)/totalTarget)*100) : 0;
      const fatRatioPct = totalFatTarget ? (totalFat/totalFatTarget)*100 : 100;
      const proteinRatioPct = totalProteinTarget ? (totalProtein/totalProteinTarget)*100 : 100;
      const fiberRatioPct = totalFiberTarget ? (totalFiber/totalFiberTarget)*100 : 100;
      const sugarRatioPct = totalSugarTarget ? (totalSugar/totalSugarTarget)*100 : 100;
      const sodiumRatioPct = sodiumLimit ? (totalSodium/(sodiumLimit*tracked))*100 : 100;
      const waterRatioPct = totalWaterTarget ? (totalWater/totalWaterTarget)*100 : 100;
      const avgWorkoutBurn = tracked ? totalWorkoutBurn/tracked : 0;
      const categoryScores = {
        calories: interpolateScore(avgOffPct, CAL_CURVE),
        protein: interpolateScore(proteinRatioPct, HIGHER_BETTER_CURVE),
        carbs: macroScore(totalCarbs, totalCarbsTarget),
        fat: interpolateScore(fatRatioPct, LOWER_BETTER_CURVE),
        sugar: interpolateScore(sugarRatioPct, LOWER_BETTER_CURVE),
        sodium: interpolateScore(sodiumRatioPct, LOWER_BETTER_CURVE),
        fiber: interpolateScore(fiberRatioPct, HIGHER_BETTER_CURVE),
        water: interpolateScore(waterRatioPct, HIGHER_BETTER_CURVE),
        workout: interpolateScore(avgWorkoutBurn, WORKOUT_CURVE),
      };
      const compositeScore = Math.round((categoryScores.calories+categoryScores.protein+categoryScores.carbs+categoryScores.fat+categoryScores.sugar+categoryScores.sodium+categoryScores.fiber+categoryScores.water+categoryScores.workout)/9);
      return { tracked, categoryScores, compositeScore };
    };

    // Group logged days by week (Monday key) and by calendar month
    const weekGroups = {}, monthGroups = {};
    Object.keys(byDate).forEach(key => {
      const monday = getMondayKey(key);
      (weekGroups[monday] ||= []).push(key);
      const month = key.slice(0,7); // "YYYY-MM"
      (monthGroups[month] ||= []).push(key);
    });

    let bestWeek = null, bestMonth = null;
    Object.entries(weekGroups).forEach(([monday, keys]) => {
      const result = scoreDays(keys);
      if (result && (!bestWeek || result.compositeScore > bestWeek.compositeScore)) bestWeek = { ...result, label: monday };
    });
    Object.entries(monthGroups).forEach(([month, keys]) => {
      const result = scoreDays(keys);
      if (result && (!bestMonth || result.compositeScore > bestMonth.compositeScore)) bestMonth = { ...result, label: month };
    });
    return { bestWeek, bestMonth };
  }, [histRangeData, targetsForWeek, waterTargetForDate, baseTargets.sodium_limit_mg]);

  const planTrend = useMemo(() => {
    const weeks = [];
    const now = new Date();
    const curDay = now.getDay();
    const mondayOffset = curDay === 0 ? -6 : 1 - curDay;
    for (let w=5; w>=0; w--) {
      const monday = new Date(now);
      monday.setDate(now.getDate() + mondayOffset - (w*7));
      const mondayKeyStr = localDateKey(monday);
      const wt = targetsForWeek(mondayKeyStr);
      const weekNum = getWeekNumOf(monday);
      weeks.push({ label: lang==="zh" ? `第${weekNum}周` : `W${weekNum}`, delta: (wt.delta === null || wt.delta === undefined) ? null : Math.round(wt.delta) });
    }
    return weeks;
  }, [targetsForWeek, lang]);

  const monthsData = useMemo(() => {
    const groups = {};
    const byDate = {};
    histRangeData.meals.forEach(m => { (byDate[m.log_date] ||= {meals:[],workouts:[],water:0,drinkCal:0,drinkProt:0,drinkCarb:0,drinkFat:0}).meals.push(m); });
    histRangeData.workouts.forEach(w => { (byDate[w.log_date] ||= {meals:[],workouts:[],water:0,drinkCal:0,drinkProt:0,drinkCarb:0,drinkFat:0}).workouts.push(w); });
    (histRangeData.drinks||[]).forEach(d => { const e = (byDate[d.log_date] ||= {meals:[],workouts:[],water:0,drinkCal:0,drinkProt:0,drinkCarb:0,drinkFat:0}); e.water = (e.water||0) + Number(d.amount_ml||0); e.drinkCal = (e.drinkCal||0) + Number(d.calories||0); e.drinkProt = (e.drinkProt||0) + Number(d.protein||0); e.drinkCarb = (e.drinkCarb||0) + Number(d.carbs||0); e.drinkFat = (e.drinkFat||0) + Number(d.fat||0); });
    Object.keys(byDate).forEach(k => {
      const date = new Date(k+"T00:00:00"); if (isNaN(date.getTime())) return;
      const label = date.toLocaleDateString("en-US",{month:"long",year:"numeric"});
      if (!groups[label]) groups[label] = { days:[], totalConsumed:0, totalBurned:0, totalProtein:0, totalCarbs:0, totalFat:0, totalWater:0, totalWorkouts:0 };
      const dData = byDate[k];
      const cons = dData.meals.reduce((s,m)=>s+Number(m.calories),0) + (dData.drinkCal||0);
      const burn = dData.workouts.reduce((s,w)=>s+Number(w.calories),0);
      groups[label].days.push({ key:k, dateStr:date.toLocaleDateString("en-US",{month:'short',day:'numeric'}), consumed:cons, burned:burn, water:dData.water });
      groups[label].totalConsumed += cons;
      groups[label].totalBurned += burn;
      groups[label].totalProtein += dData.meals.reduce((s,m)=>s+Number(m.protein),0) + (dData.drinkProt||0);
      groups[label].totalCarbs += dData.meals.reduce((s,m)=>s+Number(m.carbs),0) + (dData.drinkCarb||0);
      groups[label].totalFat += dData.meals.reduce((s,m)=>s+Number(m.fat),0) + (dData.drinkFat||0);
      groups[label].totalWater += dData.water;
      groups[label].totalWorkouts += dData.workouts.length;
    });
    return groups;
  }, [histRangeData]);

  // Every palette is now a "mono family" theme — shared components read all accent
  // colors from palette keys instead of hardcoded hexes (the _pink flag gates this).
  const C = useMemo(() => ({ ...(PALETTES[palette] || PALETTES.sweet)[theme], _pink: true }), [palette, theme]);

  if (loading) {
    return (
      <div style={{ minHeight:"100vh", background:C.bg, display:"flex", alignItems:"center", justifyContent:"center" }}>
        <div className="auth-spin" style={{ width:32, height:32, border:`3px solid ${C.border}`, borderTopColor:C.pink, borderRadius:"50%" }} />
      </div>
    );
  }

  return (
    <div style={{ minHeight:"100vh", background:C.bg, color:C.text, fontFamily:"'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" }}>
      <style>{`
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{width:3px}
        ::-webkit-scrollbar-thumb{background:${C.border};border-radius:6px}
        input,textarea{outline:none;font-family:inherit}
        .card{background:${C.card};border:1px solid ${C.border};border-radius:18px;transition:all .25s ease-out}
        .card:hover{border-color:${C.borderGlow};box-shadow:0 4px 16px ${theme==='dark'?'rgba(232,68,122,0.08)':'rgba(196,32,95,0.06)'}}
        .card-primary{background:${theme==='dark'?`linear-gradient(165deg, ${C.card}, #16161b)`:`linear-gradient(165deg, ${C.card}, #fdfcfd)`};border:1px solid ${C.border};border-radius:20px;box-shadow:0 2px 14px ${theme==='dark'?'rgba(0,0,0,0.25)':'rgba(40,30,40,0.06)'};transition:all .25s ease-out}
        .card-primary:hover{border-color:${C.borderGlow};box-shadow:0 6px 22px ${theme==='dark'?'rgba(232,68,122,0.1)':'rgba(196,32,95,0.08)'}}
        .card-nested{background:${theme==='dark'?C.bg:`${C.border}22`};border:1px solid ${theme==='dark'?'transparent':C.border};border-radius:14px;transition:all .2s ease-out}
        .pink-btn{background:linear-gradient(135deg,${C.pink},${C.pinkDim});color:${C.onAccent||"#fff"};border:none;border-radius:12px;padding:10px 20px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:.02em;transition:opacity .2s,transform .15s;box-shadow:0 4px 16px ${C.pinkDim}47}
        .pink-btn:hover{opacity:.88;transform:translateY(-1px)}
        .pink-btn:disabled{opacity:.5;cursor:not-allowed}
        .ghost-btn{background:transparent;color:${C.textMuted};border:1px solid ${C.border};border-radius:12px;padding:10px 18px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .2s}
        .ghost-btn:hover{border-color:${C.pinkDim};color:${C.pink}}
        .tab{background:none;border:none;color:${C.textMuted};font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;padding:8px 10px;border-radius:12px;transition:all .2s;letter-spacing:.02em}
        .tab.on{color:${C.pink};background:${C.pinkDeep};border-bottom:2px solid ${C.pinkDim}}
        .tab:hover{color:${C.text}}
        .slot-btn{background:transparent;border:1px solid ${C.border};border-radius:12px;padding:7px 14px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:${C.textMuted};cursor:pointer;transition:all .2s}
        .slot-btn.on{background:${C.pinkGlow};border-color:${C.pinkDim};color:${C.pink}}
        .inp{background:${C.surface};border:1px solid ${C.border};border-radius:12px;padding:10px 14px;color:${C.text};font-family:'DM Sans',sans-serif;font-size:14px;width:100%;transition:border-color .2s}
        .inp:focus{border-color:${C.pinkDim}}
        .inp::placeholder{color:${C.textDim}}
        .upload-zone{border:1.5px dashed ${C.border};border-radius:18px;padding:22px;text-align:center;cursor:pointer;transition:all .25s;background:${C.card}}
        .upload-zone:hover{border-color:${C.pinkDim};background:${C.pinkDeep}}
        .wave-box{position:relative;width:100%;height:100px;background:${theme==='dark'?'#0f172a':'#e0f2fe'};border-radius:18px;overflow:hidden;border:1px solid ${C.border}}
        .wave{position:absolute;bottom:0;left:0;width:200%;height:100%;background:linear-gradient(0deg,${C.waterDeep} 0%,${C.water} 100%);border-top-left-radius:40% 60%;border-top-right-radius:60% 40%;animation:waveShift 12s linear infinite;opacity:0.85;transition:top 0.6s ease-out}
        .wave-overlay{position:absolute;bottom:0;left:-50%;width:200%;height:100%;background:#0ea5e9;border-top-left-radius:50% 45%;border-top-right-radius:45% 50%;animation:waveShift 8s linear infinite reverse;opacity:0.5;transition:top 0.6s ease-out}
        @keyframes waveShift{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        @keyframes tabIn{from{opacity:0;transform:translateY(6px) scale(.99)}to{opacity:1;transform:translateY(0) scale(1)}}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes progressSlide{0%{transform:translateX(-150%)}100%{transform:translateX(350%)}}
        .animate-pop{animation:fadeUp .25s cubic-bezier(0.175,0.885,0.32,1.275) forwards}
        .fade{animation:tabIn .3s cubic-bezier(0.22,1,0.36,1) forwards}
        .spin{animation:spin .7s linear infinite}
        .hist-sub-row{display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-bottom:1px dashed ${C.border}}
      `}</style>

      <div style={{ background:C.surface, borderBottom:`1px solid ${C.border}`, padding:"18px 20px 0", position:"sticky", top:0, zIndex:50, backdropFilter:"blur(12px)" }}>
        <div style={{ maxWidth:500, margin:"0 auto" }}>
          <div style={{ display:"flex", alignItems:"baseline", gap:8, marginBottom:14 }}>
            <span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:26, fontWeight:800, color:C.pink, letterSpacing:"-0.04em", lineHeight:1 }}>{T("app_name")}</span>
            <span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:13, fontStyle:"italic", fontWeight:300, color:C.textMuted, letterSpacing:".04em" }}>{T("app_tagline")}</span>
            <div style={{ marginLeft:"auto", position:"relative" }}>
              <div onClick={() => setShowSettings(!showSettings)} style={{ fontSize:16, cursor:"pointer", userSelect:"none", padding:"7px 11px", borderRadius:12, background:showSettings?C.pinkGlow:C.pinkDeep, border:`1px solid ${showSettings?C.pinkDim:C.border}`, color:C.pink }}>
                ⚙️
              </div>

              {showSettings && (
                <React.Fragment>
                  <div onClick={() => setShowSettings(false)} style={{ position:"fixed", inset:0, zIndex:49 }} />
                  <div className="card fade" style={{ position:"absolute", top:"calc(100% + 8px)", right:0, zIndex:50, width:280, maxHeight:"70vh", overflowY:"auto", padding:14, background:C.card, borderColor:C.border, boxShadow:"0 8px 28px rgba(0,0,0,0.22)" }}>
                    <div style={{ fontSize:11, color:C.textMuted, marginBottom:12 }}>{T("logged_in_as")} <strong style={{color:C.text}}>{userEmail}</strong></div>

                    <div style={{ padding:"8px 0" }}>
                      <div style={{ fontSize:10, fontWeight:"700", color:C.textDim, letterSpacing:"0.07em", marginBottom:8 }}>{T("settings_theme").toUpperCase()}</div>
                      <div style={{ display:"flex", gap:8 }}>
                        <button onClick={() => setTheme("dark")} className={theme==="dark"?"":"ghost-btn"} style={theme==="dark"?{ flex:1, background:C.pinkGlow, border:`1px solid ${C.pinkDim}`, color:C.pink, borderRadius:12, padding:"8px", fontSize:12.5, fontWeight:"700", cursor:"pointer" }:{ flex:1, fontSize:12.5, padding:"8px" }}>🌙 {T("settings_theme_dark")}</button>
                        <button onClick={() => setTheme("light")} className={theme==="light"?"":"ghost-btn"} style={theme==="light"?{ flex:1, background:C.pinkGlow, border:`1px solid ${C.pinkDim}`, color:C.pink, borderRadius:12, padding:"8px", fontSize:12.5, fontWeight:"700", cursor:"pointer" }:{ flex:1, fontSize:12.5, padding:"8px" }}>☀️ {T("settings_theme_light")}</button>
                      </div>

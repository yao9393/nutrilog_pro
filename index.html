function todayKey(cutoffHour) {
  const now = new Date();
  // If a cutoff hour is set (e.g. 2am for late-night supper), treat times before
  // that hour as still belonging to the previous day.
  if (cutoffHour && now.getHours() < cutoffHour) {
    now.setDate(now.getDate() - 1);
  }
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}
function localDateKey(dateObj) {

  return `${y}-${m}-${d}`;
}

// ── BMR (Mifflin-St Jeor) + activity multiplier → daily calorie target ──
const ACTIVITY_MULTIPLIERS = { sedentary:1.2, light:1.375, moderate:1.55, active:1.725, very_active:1.9 };
const ACTIVITY_LABELS = { sedentary:"Sedentary (little/no exercise)", light:"Light (1-3 days/week)", moderate:"Moderate (3-5 days/week)", active:"Active (6-7 days/week)", very_active:"Very active (physical job/2x day)" };
function calcBMRTargets({ gender, heightCm, birthYear, weightKg, activityLevel, goal }) {
  if (!gender || !heightCm || !weightKg) return null;
  const age = birthYear ? (new Date().getFullYear() - birthYear) : 30;
  const bmr = gender === "male"
    ? 10*weightKg + 6.25*heightCm - 5*age + 5
    : 10*weightKg + 6.25*heightCm - 5*age - 161;
  const tdee = bmr * (ACTIVITY_MULTIPLIERS[activityLevel] || 1.55);
  const calorieAdjust = goal === "lose" ? -500 : goal === "gain" ? 300 : 0;
  const calories = Math.max(1200, Math.round(tdee + calorieAdjust));
  // Standard macro split: 30% protein, 40% carbs, 30% fat (reasonable general default)
  const protein = Math.round((calories*0.30)/4);
  const carbs = Math.round((calories*0.40)/4);
  const fat = Math.round((calories*0.30)/9);
  return { calories, protein, carbs, fat, bmr: Math.round(bmr), tdee: Math.round(tdee) };
}

function calcBMI(weightKg, heightCm) {
  if (!weightKg || !heightCm) return null;
  const heightM = heightCm / 100;
  const bmi = weightKg / (heightM*heightM);
  let category, color;
  if (bmi < 18.5) { category = "Underweight"; color = "#3b9ee0"; }
  else if (bmi < 25) { category = "Healthy range"; color = "#1f8a63"; }
  else if (bmi < 30) { category = "Overweight"; color = "#c98a1f"; }
  else { category = "Obese range"; color = "#c5414d"; }
  return { value: Math.round(bmi*10)/10, category, color };
}
// ── Recommended daily water intake, personalized by body weight (~33ml/kg, standard guidance) ──
function calcWaterTarget(weightKg, activityLevel, workoutBurnedKcal) {
  const base = weightKg ? weightKg * 33 : 2000; // fallback to 2000ml if no weight logged yet
  const activityBonus = { sedentary:0, light:150, moderate:300, active:500, very_active:700 }[activityLevel] || 300;
  // Extra hydration for today's actual logged workouts — roughly 500ml per 350kcal burned through
  // exercise, a standard sports-science rule of thumb (replacing sweat losses), on top of the
  // baseline activity-level bonus above.
  const workoutBonus = workoutBurnedKcal ? Math.round((workoutBurnedKcal / 350) * 500) : 0;
  const target = Math.round((base + activityBonus + workoutBonus) / 50) * 50; // round to nearest 50ml
  return Math.max(1500, Math.min(target, 5000)); // sensible floor/ceiling
}

const getWeekRangeString = (dateObj) => {
  const current = new Date(dateObj);
  const day = current.getDay();
  const diff = current.getDate() - day + (day === 0 ? -6 : 1);
  const monday = new Date(current.setDate(diff));
  const sunday = new Date(current.setDate(monday.getDate() + 6));
  return `${monday.toLocaleDateString("en-US",{month:"short",day:"numeric"})} - ${sunday.toLocaleDateString("en-US",{month:"short",day:"numeric"})}`;
};

// ── Image compression helper (resize before upload to save storage) ──
function compressImage(file, maxDim = 1024, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) { height = height * (maxDim/width); width = maxDim; }
        else if (height > maxDim) { width = width * (maxDim/height); height = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        canvas.toBlob((blob) => {
          const fr = new FileReader();
          fr.onload = () => resolve({ blob, dataUrl: fr.result, base64: fr.result.split(",")[1] });
          fr.readAsDataURL(blob);
        }, 'image/jpeg', quality);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function uploadPhoto(userId, blob, prefix) {

  const { data } = supabase.storage.from('diet-photos').getPublicUrl(fileName);
  return data.publicUrl;
}

function AuthScreen({ onAuthed }) {
  const [mode, setMode] = useState("login"); // login | signup

    setLoading(true);
    try {
      if (mode === "signup") {
        const { data, error } = await supabase.auth.signUp({ email: email.trim(), password });
        if (error) throw error;
        if (data.user && !data.session) {
          setInfo("Check your email to confirm your account, then log in.");
          setMode("login");
        } else if (data.session) {
          onAuthed(data.session);
        }
      } else {
        const { data, error } = await supabase.auth.signInWithPassword({ email: email.trim(), password });
        if (error) throw error;
        onAuthed(data.session);
      }
    } catch (err) {
      setError(err.message || "Something went wrong.");
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{ minHeight:"100vh", background:C.bg, color:C.text, fontFamily:"'DM Sans',-apple-system,sans-serif", display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>

        .inp::placeholder{color:${C.textDim}}

        .pink-btn:disabled{opacity:.6;cursor:not-allowed}
        .link-btn{background:none;border:none;color:${C.pink};font-size:13px;cursor:pointer;text-decoration:underline;font-family:'DM Sans',sans-serif}
      `}</style>
      <div style={{ width:"100%", maxWidth:380 }}>
        <div style={{ textAlign:"center", marginBottom:28 }}>

          <div style={{ fontSize:13, color:C.textMuted, marginTop:6 }}>{mode === "login" ? "Welcome back" : "Create your account"}</div>
        </div>
        <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:18, padding:24 }}>
          <div style={{ display:"flex", flexDirection:"column", gap:12, marginBottom:16 }}>
            <input className="inp" type="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} autoComplete="email" />
            <input className="inp" type="password" placeholder="Password (min 6 characters)" value={password} onChange={e=>setPassword(e.target.value)} autoComplete={mode==="login"?"current-password":"new-password"} onKeyDown={e=>e.key==="Enter"&&submit()} />
          </div>
          {error && <div style={{ fontSize:13, color:C.red, marginBottom:12, fontStyle:"italic" }}>{error}</div>}
          {info && <div style={{ fontSize:13, color:C.green, marginBottom:12, fontStyle:"italic" }}>{info}</div>}
          <button className="pink-btn" onClick={submit} disabled={loading}>
            {loading ? "Please wait..." : mode==="login" ? "Log In" : "Sign Up"}
          </button>
          <div style={{ textAlign:"center", marginTop:16 }}>
            {mode === "login" ? (
              <span style={{ fontSize:13, color:C.textMuted }}>No account? <button className="link-btn" onClick={()=>{setMode("signup");setError("");setInfo("");}}>Sign up</button></span>

const DataAPI = {
  async getDayData(userId, dateKey) {
    const [mealsRes, workoutsRes, drinksRes] = await Promise.all([
      supabase.from('meals').select('*').eq('user_id', userId).eq('log_date', dateKey).order('logged_at'),
      supabase.from('workouts').select('*').eq('user_id', userId).eq('log_date', dateKey).order('logged_at'),
      supabase.from('drink_logs').select('*').eq('user_id', userId).eq('log_date', dateKey).order('logged_at')
    ]);
    return {
      meals: mealsRes.data || [],
      workouts: workoutsRes.data || [],
      drinks: drinksRes.data || []
    };
  },

  async getRangeData(userId, startDate, endDate) {
    const [mealsRes, workoutsRes, drinksRes] = await Promise.all([
      supabase.from('meals').select('*').eq('user_id', userId).gte('log_date', startDate).lte('log_date', endDate),
      supabase.from('workouts').select('*').eq('user_id', userId).gte('log_date', startDate).lte('log_date', endDate),
      supabase.from('drink_logs').select('*').eq('user_id', userId).gte('log_date', startDate).lte('log_date', endDate)
    ]);
    return { meals: mealsRes.data || [], workouts: workoutsRes.data || [], drinks: drinksRes.data || [] };
  },

  async addMeal(userId, meal) {
    const { data, error } = await supabase.from('meals').insert({ user_id: userId, ...meal }).select().single();
    if (error) throw error;
    return data;
  },
  async deleteMeal(id) {
    const { error } = await supabase.from('meals').delete().eq('id', id);
    if (error) throw error;
  },
  async updateMeal(id, patch) {
    const { error } = await supabase.from('meals').update(patch).eq('id', id);
    if (error) throw error;
  },

  async addWorkout(userId, workout) {
    const { data, error } = await supabase.from('workouts').insert({ user_id: userId, ...workout }).select().single();
    if (error) throw error;
    return data;
  },
  async deleteWorkout(id) {
    const { error } = await supabase.from('workouts').delete().eq('id', id);
    if (error) throw error;
  },
  async updateWorkout(id, patch) {
    const { error } = await supabase.from('workouts').update(patch).eq('id', id);
    if (error) throw error;
  },

  async addDrink(userId, drink) {
    const { data, error } = await supabase.from('drink_logs').insert({ user_id: userId, ...drink }).select().single();
    if (error) throw error;
    return data;
  },
  async deleteDrink(id) {
    const { error } = await supabase.from('drink_logs').delete().eq('id', id);
    if (error) throw error;
  },

  async getTargets(userId) {
    const { data } = await supabase.from('user_targets').select('*').eq('user_id', userId).maybeSingle();
    if (!data) return { ...DEFAULT_TARGETS, gender:null, height_cm:null, birth_year:null, activity_level:'moderate', auto_calc:false, goal:'maintain', display_name:null, avatar_url:null, day_cutoff_hour:0, plan_active:false, plan_goal_kg:null, plan_weeks:null, plan_daily_exercise_kcal:0, sugar_limit_g:50, sodium_limit_mg:2300, fiber_target_g:25 };
    return {
      calories: data.calories, protein: data.protein, carbs: data.carbs, fat: data.fat,
      gender: data.gender, height_cm: data.height_cm, birth_year: data.birth_year,
      activity_level: data.activity_level||'moderate', auto_calc: !!data.auto_calc, goal: data.goal||'maintain',
      display_name: data.display_name||null, avatar_url: data.avatar_url||null,
      day_cutoff_hour: data.day_cutoff_hour ?? 0,
      plan_active: !!data.plan_active, plan_goal_kg: data.plan_goal_kg||null, plan_weeks: data.plan_weeks||null,
      plan_daily_exercise_kcal: data.plan_daily_exercise_kcal||0,
      sugar_limit_g: data.sugar_limit_g||50, sodium_limit_mg: data.sodium_limit_mg||2300, fiber_target_g: data.fiber_target_g||25
    };
  },
  async setTargets(userId, targets) {
    const { error } = await supabase.from('user_targets').upsert({ user_id: userId, ...targets, updated_at: new Date().toISOString() });
    if (error) throw error;
  },

  async getWeightLog(userId, dateKey) {
    const { data } = await supabase.from('weight_logs').select('*').eq('user_id', userId).eq('log_date', dateKey).maybeSingle();
    return data || null;
  },
  async getWeightRange(userId, startDate, endDate) {
    const { data } = await supabase.from('weight_logs').select('*').eq('user_id', userId).gte('log_date', startDate).lte('log_date', endDate).order('log_date');
    return data || [];
  },
  async setWeight(userId, dateKey, weightKg) {
    const { error } = await supabase.from('weight_logs').upsert(
      { user_id: userId, log_date: dateKey, weight_kg: weightKg, logged_at: new Date().toISOString() },
      { onConflict: 'user_id,log_date' }
    );
    if (error) throw error;
  }
};

function StatusBanner({ net, target, deficit, burned, large, theme }) {
  const isDark = theme !== "light";
  const successBg = isDark ? "rgba(94,201,160,.08)" : "rgba(31,138,99,.07)";
  const successBorder = isDark ? "rgba(94,201,160,.25)" : "rgba(31,138,99,.22)";
  const successText = isDark ? "#5ec9a0" : "#1f8a63";
  const successSub = isDark ? "#5ec9a0bb" : "#1f8a63cc";
  const failBg = isDark ? "rgba(232,97,111,.08)" : "rgba(197,65,77,.07)";
  const failBorder = isDark ? "rgba(232,97,111,.25)" : "rgba(197,65,77,.22)";
  const failText = isDark ? "#e8616f" : "#c5414d";
  const failSub = isDark ? "#e8616fbb" : "#c5414dcc";
  return (
    <div style={{ background:deficit?successBg:failBg, border:`1px solid ${deficit?successBorder:failBorder}`, borderRadius:18, padding:large?"16px 20px":"12px 16px", marginBottom:14, textAlign:"center", backdropFilter:"blur(6px)" }}>
      <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:large?24:18, fontWeight:"800", color:deficit?successText:failText, marginBottom:2, letterSpacing:"-0.02em" }}>
        {deficit ? "✨ Calorie Deficit" : "⚠️ Over Target Limit"}
      </div>
      <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:13, color:deficit?successSub:failSub }}>
        {deficit ? `${Math.round(target-net)} kcal below target${burned>0?` · ${burned} kcal burned`:""}` : `${Math.round(net-target)} kcal over target — stay strong! 💪`}
      </div>
    </div>
  );
}

function ProgressBar({ val, target, color, theme, mode, unit }) {
  const p = Math.min(100, Math.round((val/target)*100));
  const actualPct = target ? (val/target)*100 : 0;
  const bg = theme==="light" ? "#ece8ea" : "#212126";
  const textMuted = theme==="light" ? "#6f6a73" : "#8b8794";
  const u = unit || "kcal";
  let overColor, statusLabel;
  if (mode === "gain-band") {
    // For gain-weight plans — under-eating is the concern; hitting/exceeding target is the win
    overColor = actualPct >= 100 ? (theme==="light"?"#1f8a63":"#5ec9a0") : actualPct >= 80 ? (theme==="light"?"#a3790f":"#dbb868") : (theme==="light"?"#c5414d":"#e8616f");
    statusLabel = actualPct >= 100 ? `${Math.round(val-target)} over goal 🎉` : `${Math.round(target-val)} more to go`;
  } else if (mode === "caution-band") {
    // For things with a real ceiling (calories) — going over is something to watch, escalating past 120%
    overColor = actualPct <= 100 ? (theme==="light"?"#1f8a63":"#5ec9a0") : actualPct <= 120 ? (theme==="light"?"#a3790f":"#dbb868") : (theme==="light"?"#c5414d":"#e8616f");
    statusLabel = actualPct <= 100 ? `${Math.round(target-val)} left` : actualPct <= 120 ? `${Math.round(val-target)} over (fine)` : `${Math.round(val-target)} over (caution)`;
  } else {
    // For things where more is simply better (water) — exceeding target is good news, not a warning
    overColor = theme==="light"?"#1f8a63":"#5ec9a0";
    statusLabel = target-val>0 ? `${Math.round(target-val)} left` : `${Math.round(val-target)} over goal 🎉`;
  }
  return (
    <div>
      <div style={{ height:8, background:bg, borderRadius:6, overflow:"hidden" }}>
        <div style={{ height:"100%", width:`${p}%`, background:`linear-gradient(90deg,${color}88,${color})`, borderRadius:6, transition:"width .6s ease", boxShadow:`0 0 6px ${color}40` }} />
      </div>
      <div style={{ display:"flex", justifyContent:"space-between", marginTop:4 }}>
        <span style={{ fontSize:11, color:textMuted }}>{p}% of {Math.round(target)} {u}</span>
        <span style={{ fontSize:11, color:overColor, fontWeight:"600" }}>{statusLabel}</span>
      </div>
    </div>
  );
}

function MealCard({ meal, onRemove, onEdit, readonly, theme, onSlotChange }) {
  const isDark = theme !== "light";
  const cardBg = isDark ? "#1a1a1f" : "#ffffff";
  const cardBgDragging = isDark ? "#212126" : "#f7f4f6";
  const textColor = isDark ? "#f3f1f4" : "#1d1b1f";
  const textMuted = isDark ? "#8b8794" : "#6f6a73";
  const btnColor = isDark ? "#454249" : "#aaa5ab";
  const pinkColor = isDark ? "#e8447a" : "#c4205f";
  const hasItems = Array.isArray(meal.items) && meal.items.length > 0;
  const [expanded, setExpanded] = useState(false);
  const [dragY, setDragY] = useState(0);
  const [isDragging, setIsDragging] = useState(false);
  const dragRef = useRef({ active:false, startY:0, longPressTimer:null, triggered:false });

  const clearLongPress = () => { clearTimeout(dragRef.current.longPressTimer); };

  const onPointerDown = (e) => {
    if (readonly || !onSlotChange) return;
    const startY = e.touches ? e.touches[0].clientY : e.clientY;
    dragRef.current.triggered = false;
    dragRef.current.longPressTimer = setTimeout(() => {
      dragRef.current.active = true;
      dragRef.current.startY = startY;
      setIsDragging(true);
      if (navigator.vibrate) navigator.vibrate(12);
      document.body.style.userSelect = "none";
    }, 400);
  };
  const onPointerMove = (e) => {
    if (!dragRef.current.active) return;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    const delta = y - dragRef.current.startY;
    // Follow the finger smoothly, with slight resistance past the trigger threshold
    const THRESHOLD = 56;
    const clamped = Math.abs(delta) <= THRESHOLD ? delta : THRESHOLD * Math.sign(delta) + (delta - THRESHOLD*Math.sign(delta)) * 0.25;
    setDragY(clamped);
    if (!dragRef.current.triggered && Math.abs(delta) > THRESHOLD) {
      dragRef.current.triggered = true;
      if (navigator.vibrate) navigator.vibrate(8);
      onSlotChange(delta > 0 ? 1 : -1);
    }
  };
  const onPointerUp = () => {
    clearLongPress();
    dragRef.current.active = false;
    setIsDragging(false);
    setDragY(0);
    document.body.style.userSelect = "";
  };

  return (
    <div
      className="animate-pop"
      style={{
        padding:"12px 14px", marginBottom:8, borderRadius:18,
        background: isDragging ? cardBgDragging : cardBg,
        border:`1px solid ${isDragging ? (isDark?"#454249":"#aaa5ab") : (isDark?"#26262d":"#e8e4e8")}`,
        cursor: onSlotChange && !readonly ? (isDragging?"grabbing":"grab") : "default",
        touchAction: onSlotChange && !readonly ? "none" : "auto",
        transform: `translateY(${dragY}px) scale(${isDragging?1.02:1})`,
        boxShadow: isDragging ? "0 8px 24px rgba(0,0,0,0.18)" : "none",
        transition: isDragging ? "border-color .15s, background .15s" : "transform .25s cubic-bezier(.2,.8,.2,1), box-shadow .25s",
        position: "relative", zIndex: isDragging ? 10 : 1
      }}
      onMouseDown={onPointerDown} onMouseMove={onPointerMove} onMouseUp={onPointerUp} onMouseLeave={onPointerUp}
      onTouchStart={onPointerDown} onTouchMove={onPointerMove} onTouchEnd={onPointerUp}
    >
      <div style={{ display:"flex", alignItems:"flex-start", gap:10 }}>
        {meal.image_url && <img src={meal.image_url} alt={meal.name} style={{ width:50, height:50, borderRadius:12, objectFit:"cover", flexShrink:0 }} />}
        <div style={{ flex:1, minWidth:0 }} onClick={() => hasItems && setExpanded(!expanded)}>
          <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:14, fontWeight:"600", color:textColor, marginBottom:2, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", display:"flex", alignItems:"center", gap:6 }}>
            {meal.name}
            {hasItems && <span style={{ fontSize:10, color:btnColor }}>{expanded ? "▲" : "▼"}</span>}
          </div>
          <div style={{ fontSize:11, color:textMuted }}>{meal.logged_at ? new Date(meal.logged_at).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}) : ""}{meal.confidence==="manual"?" · manual entry":meal.confidence?` · ${meal.confidence} confidence`:""}</div>
          <div style={{ display:"flex", gap:10, marginTop:5 }}>
            {[["P 🥩",meal.protein,isDark?"#a98fe0":"#7752c9"],["C 🍞",meal.carbs,isDark?"#e8a4bd":"#b8366b"],["F 🥑",meal.fat,isDark?"#e0a868":"#b9740f"]].map(([l,v,c]) => (
              <span key={l} style={{ fontSize:11, color:c, fontWeight:"600" }}>{l} {Math.round(v)}g</span>
            ))}
          </div>
        </div>
        <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:16, color:pinkColor, fontWeight:"800", flexShrink:0, marginRight:4 }}>{Math.round(meal.calories)}</div>
        {!readonly && (
          <div style={{ display:"flex", gap:6, alignSelf:"flex-start" }}>
            <button onClick={onEdit} style={{ background:"none", border:"none", color:btnColor, fontSize:14, cursor:"pointer", padding:"6px" }}>✏️</button>
            <button onClick={onRemove} style={{ background:"none", border:"none", color:btnColor, fontSize:18, cursor:"pointer", padding:"4px" }}>×</button>
          </div>
        )}
      </div>
      {hasItems && expanded && (
        <div className="fade" style={{ marginTop:10, paddingTop:10, borderTop:`1px dashed ${isDark?"#26262d":"#e8e4e8"}` }}>
          <div style={{ fontSize:10, color:textMuted, fontWeight:"700", letterSpacing:"0.05em", marginBottom:6 }}>WHAT'S IN THIS MEAL</div>
          {meal.items.slice().sort((a,b)=>(b.calories||0)-(a.calories||0)).map((it,idx) => (
            <div key={idx} style={{ display:"flex", justifyContent:"space-between", padding:"4px 0" }}>
              <span style={{ fontSize:12, color:textColor, textTransform:"capitalize" }}>{it.item}</span>
              <span style={{ fontSize:12, color:pinkColor, fontWeight:"600" }}>{Math.round(it.calories||0)} kcal</span>
            </div>
          ))}
        </div>
      )}
      {onSlotChange && !readonly && !isDragging && (
        <div style={{ textAlign:"center", fontSize:9, color:btnColor, marginTop:6, fontStyle:"italic" }}>hold &amp; drag up/down to change meal time</div>
      )}
      {isDragging && (
        <div style={{ textAlign:"center", fontSize:10, color:pinkColor, marginTop:6, fontWeight:"600" }}>release to drop</div>
      )}
    </div>
  );
}

function PendingCard({ entry, onConfirm, onCancel, slot, theme, saving }) {
  const isWorkout = entry.type === "workout";
  const isDark = theme !== "light";
  const bg = isDark ? "#141418" : "#ffffff";
  const border = isWorkout ? (isDark ? "rgba(94,201,160,.3)" : "rgba(31,138,99,.28)") : (isDark ? "#b6285c" : "#e8e4e8");
  const titleColor = isWorkout ? (isDark ? "#5ec9a0" : "#1f8a63") : (isDark ? "#e8447a" : "#c4205f");
  const textColor = isDark ? "#f3f1f4" : "#1d1b1f";
  const textMuted = isDark ? "#8b8794" : "#6f6a73";
  const textDim = isDark ? "#454249" : "#aaa5ab";
  const subCardBg = isDark ? "#0a0a0d" : "#faf9fa";
  const hasItems = !isWorkout && Array.isArray(entry.items) && entry.items.length > 0;
  const [itemsExpanded, setItemsExpanded] = useState(true);
  return (
    <div className="fade" style={{ background:bg, border:`1px solid ${border}`, borderRadius:18, padding:16, marginTop:12 }}>
      <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:18, fontWeight:"800", color:titleColor, marginBottom:12 }}>
        {isWorkout ? "⌚ Workout Detected" : `🍽 ${slot} Detected`}
      </div>
      <div style={{ display:"flex", gap:12, marginBottom:14 }}>
        {entry.image && <img src={entry.image} alt="entry" style={{ width:64, height:64, borderRadius:12, objectFit:"cover" }} />}
        <div style={{ flex:1 }}>
          <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:15, fontWeight:"700", marginBottom:4, color:textColor }}>{entry.name||entry.activity}</div>
          {isWorkout && entry.duration && <div style={{ fontSize:12, color:textMuted }}>Duration: {entry.duration}{entry.heartRate?` · ♥ ${entry.heartRate}`:""}</div>}
          <div style={{ marginTop:6 }}>
            <span style={{ fontSize:14, color:isWorkout?(isDark?"#5ec9a0":"#1f8a63"):(isDark?"#e8447a":"#c4205f"), fontFamily:"'DM Sans',sans-serif", fontWeight:"800" }}>
              {isWorkout?`−${entry.calories}`:entry.calories} kcal
            </span>
            {entry.confidence && <span style={{ fontSize:11, color:textDim, marginLeft:8, fontStyle:"italic" }}>({entry.confidence} confidence)</span>}
          </div>
        </div>
      </div>
      {hasItems && (
        <div style={{ marginBottom:14, background:subCardBg, borderRadius:12, padding:"10px 12px", border:isDark?"none":"1px solid #e8e4e8" }}>
          <div onClick={() => setItemsExpanded(!itemsExpanded)} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", cursor:"pointer", marginBottom: itemsExpanded ? 8 : 0 }}>
            <span style={{ fontSize:10, color:textMuted, fontWeight:"700", letterSpacing:"0.05em" }}>BREAKDOWN BY COMPONENT</span>
            <span style={{ fontSize:10, color:textMuted }}>{itemsExpanded ? "▲ minimize" : "▼ expand"}</span>
          </div>
          {itemsExpanded && entry.items.slice().sort((a,b)=>(b.calories||0)-(a.calories||0)).map((it,idx) => (
            <div key={idx} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"5px 0", borderBottom: idx < entry.items.length-1 ? `1px dashed ${isDark?"#26262d":"#e8e4e8"}` : "none" }}>
              <span style={{ fontSize:12, color:textColor, textTransform:"capitalize" }}>{it.item}{it.grams_estimate ? ` (~${Math.round(it.grams_estimate)}g)` : ""}</span>
              <span style={{ fontSize:12, color:isDark?"#e8447a":"#c4205f", fontWeight:"700" }}>{Math.round(it.calories||0)} kcal</span>
            </div>
          ))}
        </div>
      )}
      {!isWorkout && (
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:14 }}>
          {[["Protein",entry.protein,isDark?"#a98fe0":"#7752c9"],["Carbs",entry.carbs,isDark?"#e8a4bd":"#b8366b"],["Fat",entry.fat,isDark?"#e0a868":"#b9740f"]].map(([l,v,c]) => (
            <div key={l} style={{ background:subCardBg, borderRadius:12, padding:"8px", textAlign:"center", border:isDark?"none":"1px solid #e8e4e8" }}>
              <div style={{ fontSize:10, color:textMuted, fontWeight:"700" }}>{l.toUpperCase()}</div>
              <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:17, color:c, fontWeight:"700" }}>{Math.round(v)}g</div>

      )}
      <div style={{ display:"flex", gap:8 }}>
        <button className="ghost-btn" style={{ flex:1 }} onClick={onCancel} disabled={saving}>Discard</button>
        <button className="pink-btn" style={{ flex:2, background:isWorkout?"linear-gradient(135deg,#1f8a63,#15634a)":undefined, boxShadow:isWorkout?"0 4px 20px rgba(31,138,99,.28)":undefined }} onClick={onConfirm} disabled={saving}>
          {saving ? "Saving..." : "✓ Add to Log"}
        </button>
      </div>
    </div>
  );
}

function MacroDonutChart({ consumed, theme }) {
  const totalGrams = consumed.protein + consumed.carbs + consumed.fat;
  const pPct = totalGrams ? (consumed.protein/totalGrams)*100 : 0;
  const cPct = totalGrams ? (consumed.carbs/totalGrams)*100 : 0;
  const fPct = totalGrams ? (consumed.fat/totalGrams)*100 : 0;
  const radius = 35;
  const circ = 2*Math.PI*radius;
  const pLen = (pPct/100)*circ;
  const cLen = (cPct/100)*circ;
  const fLen = (fPct/100)*circ;
  const isDark = theme !== "light";
  const innerBg = isDark ? "#212126" : "#f7f4f6";
  const strokeBg = isDark ? "#26262d" : "#e8e4e8";
  const textMain = isDark ? "#f3f1f4" : "#1d1b1f";
  const textSub = isDark ? "#8b8794" : "#6f6a73";
  const proteinC = isDark ? "#a98fe0" : "#7752c9";
  const carbsC = isDark ? "#e8a4bd" : "#b8366b";
  const fatC = isDark ? "#e0a868" : "#b9740f";
  return (
    <div style={{ position:"relative", width:"120px", height:"120px" }}>
      <svg width="100%" height="100%" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r={radius} fill="transparent" stroke={innerBg} strokeWidth="7" />
        {totalGrams > 0 ? (
          <React.Fragment>
            <circle cx="50" cy="50" r={radius} fill="transparent" stroke={proteinC} strokeWidth="7" strokeLinecap="round" strokeDasharray={`${pLen} ${circ}`} strokeDashoffset="0" transform="rotate(-90 50 50)" />
            <circle cx="50" cy="50" r={radius} fill="transparent" stroke={carbsC} strokeWidth="7" strokeLinecap="round" strokeDasharray={`${cLen} ${circ}`} strokeDashoffset={-pLen} transform="rotate(-90 50 50)" />
            <circle cx="50" cy="50" r={radius} fill="transparent" stroke={fatC} strokeWidth="7" strokeLinecap="round" strokeDasharray={`${fLen} ${circ}`} strokeDashoffset={-(pLen+cLen)} transform="rotate(-90 50 50)" />
          </React.Fragment>
        ) : (
          <circle cx="50" cy="50" r={radius} fill="transparent" stroke={strokeBg} strokeWidth="8" />
        )}
      </svg>
      <div style={{ position:"absolute", top:"50%", left:"50%", transform:"translate(-50%,-50%)", textAlign:"center" }}>
        <div style={{ fontSize:"16px", fontWeight:"800", fontFamily:"'DM Sans',sans-serif", color:textMain }}>{totalGrams>0?`${Math.round(totalGrams)}g`:"0g"}</div>
        <div style={{ fontSize:"9px", color:textSub, fontFamily:"'DM Sans',sans-serif", letterSpacing:"0.02em" }}>total</div>
      </div>
    </div>
  );
}

// ── Simple SVG bar chart: consumed vs burned per day, with target line ──
function TrendChart({ days, target, theme }) {
  const isDark = theme !== "light";
  const gridColor = isDark ? "#26262d" : "#e8e4e8";
  const textColor = isDark ? "#8b8794" : "#6f6a73";
  const consumedColor = isDark ? "#e8447a" : "#c4205f";
  const burnedColor = isDark ? "#5ec9a0" : "#1f8a63";
  if (!days.length) return <div style={{ fontSize:12, color:textColor, textAlign:"center", padding:"20px 0" }}>Not enough data yet</div>;

  const maxVal = Math.max(target, ...days.map(d=>d.consumed), ...days.map(d=>d.burned), 100) * 1.15;
  const w = 320, h = 140, padBottom = 20, padTop = 6;
  const barW = (w / days.length) * 0.62;
  const gap = (w / days.length) - barW;
  const targetY = padTop + (1 - target/maxVal) * (h-padBottom-padTop);

  return (
    <svg viewBox={`0 0 ${w} ${h+18}`} style={{ width:"100%", height:"auto" }}>
      <line x1="0" y1={targetY} x2={w} y2={targetY} stroke={textColor} strokeWidth="1" strokeDasharray="3,3" opacity="0.5" />
      {days.map((d,i) => {
        const x = i * (barW+gap) + gap/2;
        const consH = (d.consumed/maxVal) * (h-padBottom-padTop);
        const burnH = (d.burned/maxVal) * (h-padBottom-padTop);
        const baseY = h - padBottom;
        return (
          <g key={i}>
            <rect x={x} y={baseY-consH} width={barW*0.46} height={consH} fill={consumedColor} rx="2" />
            <rect x={x+barW*0.5} y={baseY-burnH} width={barW*0.46} height={burnH} fill={burnedColor} rx="2" />
            <text x={x+barW/2} y={h+14} textAnchor="middle" fontSize="9" fill={textColor} fontFamily="'DM Sans',sans-serif">{d.label}</text>
          </g>
        );
      })}
    </svg>
  );
}

// ── Simple SVG line chart: weekly burned calories trend, going up = motivating ──
function LineChart({ points, color, theme, minScaleFloor }) {
  const isDark = theme !== "light";
  const textColor = isDark ? "#8b8794" : "#6f6a73";
  const gridColor = isDark ? "#26262d" : "#e8e4e8";
  if (!points.length) return <div style={{ fontSize:12, color:textColor, textAlign:"center", padding:"20px 0" }}>Not enough data yet</div>;

  const w = 320, h = 120, padBottom = 20, padTop = 10, padX = 8;
  const vals = points.map(p=>p.burned);
  const dataMax = Math.max(...vals, minScaleFloor!==undefined ? 0 : 100);
  const dataMin = minScaleFloor!==undefined ? Math.min(...vals) : 0;
  const range = Math.max(dataMax - dataMin, 1);
  const maxVal = minScaleFloor!==undefined ? dataMax + range*0.15 : dataMax * 1.2;
  const minVal = minScaleFloor!==undefined ? Math.max(0, dataMin - range*0.15) : 0;
  const stepX = (w - padX*2) / Math.max(1, points.length-1);
  const coords = points.map((p,i) => ({
    x: padX + i*stepX,
    y: padTop + (1 - (p.burned-minVal)/(maxVal-minVal)) * (h-padBottom-padTop),
    label: p.label, val: p.burned
  }));
  const pathD = coords.map((c,i) => `${i===0?"M":"L"} ${c.x},${c.y}`).join(" ");
  const areaD = `${pathD} L ${coords[coords.length-1].x},${h-padBottom} L ${coords[0].x},${h-padBottom} Z`;

  return (
    <svg viewBox={`0 0 ${w} ${h+18}`} style={{ width:"100%", height:"auto" }}>
      <line x1={padX} y1={h-padBottom} x2={w-padX} y2={h-padBottom} stroke={gridColor} strokeWidth="1" />
      <path d={areaD} fill={color} opacity="0.08" />
      <path d={pathD} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
      {coords.map((c,i) => (
        <g key={i}>
          <circle cx={c.x} cy={c.y} r="3.5" fill={color} />
          <text x={c.x} y={h+14} textAnchor="middle" fontSize="9" fill={textColor} fontFamily="'DM Sans',sans-serif">{c.label}</text>
        </g>
      ))}
    </svg>
  );
}

// ── Lightweight illustrative icon matched to the workout description ──
// (No real photo/AI image generation — a simple themed graphic, fast and free)
function detectWorkoutType(text) {
  const t = (text||"").toLowerCase();
  if (/(run|jog|sprint|marathon)/.test(t)) return "running";
  if (/(push.?up|sit.?up|squat|lunge|plank|burpee|hiit|strength|weight|gym|dumbbell|bench)/.test(t)) return "strength";
  if (/(cycle|cycling|bike|biking|spin)/.test(t)) return "cycling";
  if (/(swim|pool)/.test(t)) return "swimming";
  if (/(yoga|stretch|pilates)/.test(t)) return "yoga";
  if (/(walk|hike|step)/.test(t)) return "walking";
  return "general";
}
function WorkoutIllustration({ description, color, size }) {
  const type = detectWorkoutType(description);
  const s = size || 56;
  const icons = {
    running: "🏃",
    strength: "🏋️",
    cycling: "🚴",
    swimming: "🏊",
    yoga: "🧘",
    walking: "🚶",
    general: "⚡"
  };
  return (
    <div style={{ width:s, height:s, borderRadius:14, background:`${color}18`, border:`1px solid ${color}40`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:s*0.5, flexShrink:0 }}>
      {icons[type]}
    </div>
  );
}

    // Global request spacing: ensures we never fire requests faster than ~1 every 4s,
    // which keeps us safely under typical free-tier RPM limits even with rapid back-to-back uploads.
    const now = Date.now();
    const minGapMs = 4200;

    let lastErr = null;

          const data = await res.json();

            lastErr = new Error("RATE_LIMITED");
            continue;
          }
          throw new Error("RATE_LIMITED");
        }
        throw new Error(msg);
      } catch (err) {
        if (err.message === "KEY_RESTRICTED" || err.message === "QUOTA_EXHAUSTED") throw err;

      groups[label].totalWater += dData.water;
      groups[label].totalWorkouts += dData.workouts.length;
    });
    return groups;
  })();

        .wave-box{position:relative;width:100%;height:100px;background:${theme==='dark'?'#0f172a':'#e0f2fe'};border-radius:18px;overflow:hidden;border:1px solid ${C.border}}
        .wave{position:absolute;bottom:0;left:0;width:200%;height:100%;background:linear-gradient(0deg,#0284c7 0%,#38bdf8 100%);border-top-left-radius:40% 60%;border-top-right-radius:60% 40%;animation:waveShift 12s linear infinite;opacity:0.85;transition:top 0.6s ease-out}
        .wave-overlay{position:absolute;bottom:0;left:-50%;width:200%;height:100%;background:#0ea5e9;border-top-left-radius:50% 45%;border-top-right-radius:45% 50%;animation:waveShift 8s linear infinite reverse;opacity:0.5;transition:top 0.6s ease-out}
        @keyframes waveShift{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

            {(() => {
              const winBoxes = [

                    const pct = (net / targets.calories) * 100;
                    if (isGainPlan) {
                      if (pct >= 80) return "good";
                      return "caution";

                    if (pct <= 100) return "good";
                    if (pct <= 120) return "caution";
                    return "bad";

                  detail: (() => {

                    if (isGainPlan) {

                      if (pct >= 80) return `${Math.round(targets.calories-net)} kcal left to fully hit your gain target.`;
                      return `${Math.round(targets.calories-net)} kcal short of your gain target — you still need to eat some more.`;

                    if (pct <= 100) return `${Math.round(targets.calories-net)} kcal of headroom left today.`;
                    if (pct <= 120) return `${Math.round(net-targets.calories)} kcal over — still within a fine range (up to 120%).`;
                    return `${Math.round(net-targets.calories)} kcal over — that's over-consumption (120%+).`;
                  })(),
                  advice: (() => {
                    const pct = targets.calories ? (net / targets.calories) * 100 : 0;
                    if (isGainPlan) {
                      if (pct >= 100) return "Nice work — that's what fuels the gains!";
                      if (pct >= 80) return "Add a snack or a bigger portion to close the gap.";
                      return "You're under your gain target — try an extra meal or a calorie-dense snack today.";
                    }
                    if (pct <= 100) return "Nice pacing — keep it up!";
                    if (pct <= 120) return "A little over, but no need for caution yet — just keep an eye on it.";
                    return "Caution: that's a meaningful over-consumption. Try a lighter next meal, or log a workout to balance it out.";
                  })()

                {
                  key:"hydration", label:"Hydration", icon:"💧",
                  status: totalDrinkMl===0 ? "neutral" : totalDrinkMl >= waterTarget ? "good" : "bad",

// ROOT — handles auth session state
// ════════════════════════════════════════════════════════════
function Root() {
  const [session, setSession] = useState(undefined); // undefined = checking, null = logged out
  const [authError, setAuthError] = useState(null);

  useEffect(() => {
    let settled = false;
    const timeout = setTimeout(() => {
      if (settled) return;
      // Known supabase-js bug: getSession() can hang indefinitely with no error/network log.
      // Workaround: check localStorage directly for a cached session token before giving up.
      try {
        const storageKey = Object.keys(localStorage).find(k => k.startsWith('sb-') && k.endsWith('-auth-token'));
        if (storageKey) {
          const cached = JSON.parse(localStorage.getItem(storageKey));
          if (cached?.access_token && cached?.user) {
            settled = true;
            setSession(cached);
            return;
          }
        }
      } catch (e) { /* fall through to error state */ }
      setAuthError("Connection to Supabase timed out after 10s. This can happen due to a known Supabase client issue — try reloading. If it persists, check your internet connection or Supabase project status.");
    }, 10000);

    supabase.auth.getSession()
      .then(({ data, error }) => {
        settled = true;
        clearTimeout(timeout);
        if (error) { setAuthError(error.message); return; }
        setSession(data.session);
      })
      .catch((err) => {
        settled = true;
        clearTimeout(timeout);
        setAuthError(err.message || String(err));
      });

    const { data: listener } = supabase.auth.onAuthStateChange((_event, sess) => setSession(sess));
    return () => { clearTimeout(timeout); listener.subscription.unsubscribe(); };
  }, []);

  if (authError) {
    return (
      <div style={{ minHeight:"100vh", background:"#0a0a0d", color:"#f3f1f4", display:"flex", alignItems:"center", justifyContent:"center", padding:20, textAlign:"center", fontFamily:"-apple-system,sans-serif" }}>
        <div>
          <div style={{ fontSize:15, fontWeight:700, marginBottom:10, color:"#e8616f" }}>⚠️ Couldn't connect</div>
          <div style={{ fontSize:13, color:"#9b96a1", marginBottom:16, maxWidth:320 }}>{authError}</div>
          <button onClick={() => window.location.reload()} style={{ background:"#e8447a", color:"#fff", border:"none", borderRadius:10, padding:"10px 20px", fontSize:14, cursor:"pointer" }}>Retry</button>
        </div>
      </div>
    );
  }

  if (session === undefined) {
    return (
      <div style={{ minHeight:"100vh", background:"#0a0a0d", display:"flex", alignItems:"center", justifyContent:"center" }}>
        <div className="auth-spin" style={{ width:32, height:32, border:"3px solid #26262d", borderTopColor:"#e8447a", borderRadius:"50%" }} />
      </div>
    );
  }
  if (!session) {
    return <AuthScreen onAuthed={setSession} />;
  }
  return <NutriLogPro session={session} onLogout={() => supabase.auth.signOut()} />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Root />);

    </script>

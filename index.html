      window.__bootErrorMsg = '';
      window.addEventListener('error', function(e) {
        var detail = e.message || 'Unknown error';
        if (e.filename) detail += '\n  at ' + e.filename + ':' + e.lineno + ':' + e.colno;
        if (e.error && e.error.stack) detail += '\n' + e.error.stack;
        window.__bootErrorMsg = 'Error: ' + detail;
        var el = document.getElementById('boot-error');
        if (el) el.textContent = window.__bootErrorMsg;
      });
      window.addEventListener('unhandledrejection', function(e) {
        var msg = e.reason && e.reason.message ? e.reason.message : String(e.reason);
        window.__bootErrorMsg = 'Promise rejection: ' + msg;
        var el = document.getElementById('boot-error');
        if (el) el.textContent = window.__bootErrorMsg;
      });
      window.SUPABASE_URL = "%%SUPABASE_URL%%";
      window.SUPABASE_ANON_KEY = "%%SUPABASE_ANON_KEY%%";

const getDrinkColor = (drinkType) => drinkType === "Water" ? C.pink : DRINK_BROWN;

function getWaterMilestones(targetMl) {
  return [
    { pct:50, ml:Math.round(targetMl*0.5), label:"50%", comment:"Halfway there — keep sipping! 💧" },
    { pct:75, ml:Math.round(targetMl*0.75), label:"75%", comment:"Almost there — you're so close! 🌊" },
    { pct:100, ml:targetMl, label:"100%", comment:"Congratulations!! You hit your hydration goal today! 🎉" }
  ];
}

function todayKey(cutoffHour) {
  const now = new Date();
  // If a cutoff hour is set (e.g. 2am for late-night supper), treat times before
  // that hour as still belonging to the previous day.
  if (cutoffHour && now.getHours() < cutoffHour) {
    now.setDate(now.getDate() - 1);
  }
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}
function localDateKey(dateObj) {
  const y = dateObj.getFullYear();
  const m = String(dateObj.getMonth()+1).padStart(2,'0');
  const d = String(dateObj.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}
function getGreeting() {
  const h = new Date().getHours();
  if (h < 5) return "Still up?";
  if (h < 12) return "Good morning";
  if (h < 17) return "Good afternoon";
  if (h < 21) return "Good evening";
  return "Good night";
}

// ── BMR (Mifflin-St Jeor) + activity multiplier → daily calorie target ──
const ACTIVITY_MULTIPLIERS = { sedentary:1.2, light:1.375, moderate:1.55, active:1.725, very_active:1.9 };
const ACTIVITY_LABELS = { sedentary:"Sedentary (little/no exercise)", light:"Light (1-3 days/week)", moderate:"Moderate (3-5 days/week)", active:"Active (6-7 days/week)", very_active:"Very active (physical job/2x day)" };
function calcBMRTargets({ gender, heightCm, birthYear, weightKg, activityLevel, goal }) {
  if (!gender || !heightCm || !weightKg) return null;
  const age = birthYear ? (new Date().getFullYear() - birthYear) : 30;
  const bmr = gender === "male"
    ? 10*weightKg + 6.25*heightCm - 5*age + 5
    : 10*weightKg + 6.25*heightCm - 5*age - 161;
  const tdee = bmr * (ACTIVITY_MULTIPLIERS[activityLevel] || 1.55);
  const calorieAdjust = goal === "lose" ? -500 : goal === "gain" ? 300 : 0;
  const calories = Math.max(1200, Math.round(tdee + calorieAdjust));
  // Standard macro split: 30% protein, 40% carbs, 30% fat (reasonable general default)
  const protein = Math.round((calories*0.30)/4);
  const carbs = Math.round((calories*0.40)/4);
  const fat = Math.round((calories*0.30)/9);
  return { calories, protein, carbs, fat, bmr: Math.round(bmr), tdee: Math.round(tdee) };
}

function calcBMI(weightKg, heightCm) {
  if (!weightKg || !heightCm) return null;
  const heightM = heightCm / 100;
  const bmi = weightKg / (heightM*heightM);
  let category, color;
  if (bmi < 18.5) { category = "Underweight"; color = "#3b9ee0"; }
  else if (bmi < 25) { category = "Healthy range"; color = C.pink; }
  else if (bmi < 30) { category = "Overweight"; color = "#c98a1f"; }
  else { category = "Obese range"; color = "#c5414d"; }
  return { value: Math.round(bmi*10)/10, category, color };
}
// ── Recommended daily water intake, personalized by body weight (~33ml/kg, standard guidance) ──
function calcWaterTarget(weightKg, activityLevel, workoutBurnedKcal) {
  const base = weightKg ? weightKg * 33 : 2000; // fallback to 2000ml if no weight logged yet
  const activityBonus = { sedentary:0, light:150, moderate:300, active:500, very_active:700 }[activityLevel] || 300;
  // Extra hydration for today's actual logged workouts — roughly 500ml per 350kcal burned through
  // exercise, a standard sports-science rule of thumb (replacing sweat losses), on top of the
  // baseline activity-level bonus above.
  const workoutBonus = workoutBurnedKcal ? Math.round((workoutBurnedKcal / 350) * 500) : 0;
  const target = Math.round((base + activityBonus + workoutBonus) / 50) * 50; // round to nearest 50ml
  return Math.max(1500, Math.min(target, 5000)); // sensible floor/ceiling
}

const getWeekRangeString = (dateObj) => {
  const current = new Date(dateObj);
  const day = current.getDay();
  const diff = current.getDate() - day + (day === 0 ? -6 : 1);
  const monday = new Date(current.setDate(diff));
  const sunday = new Date(current.setDate(monday.getDate() + 6));
  return `${monday.toLocaleDateString("en-US",{month:"short",day:"numeric"})} - ${sunday.toLocaleDateString("en-US",{month:"short",day:"numeric"})}`;
};

// ── Image compression helper (resize before upload to save storage) ──
function compressImage(file, maxDim = 1024, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) { height = height * (maxDim/width); width = maxDim; }
        else if (height > maxDim) { width = width * (maxDim/height); height = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        canvas.toBlob((blob) => {
          const fr = new FileReader();
          fr.onload = () => resolve({ blob, dataUrl: fr.result, base64: fr.result.split(",")[1] });
          fr.readAsDataURL(blob);
        }, 'image/jpeg', quality);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function uploadPhoto(userId, blob, prefix) {
  const fileName = `${userId}/${prefix}_${Date.now()}.jpg`;
  const { error } = await supabase.storage.from('diet-photos').upload(fileName, blob, { contentType: 'image/jpeg' });
  if (error) { console.error('Upload failed:', error); return null; }
  const { data } = supabase.storage.from('diet-photos').getPublicUrl(fileName);
  return data.publicUrl;
}

function ProgressBar({ val, target, color, theme, mode, unit }) {
  const p = Math.min(100, Math.round((val/target)*100));
  const actualPct = target ? (val/target)*100 : 0;
  const bg = theme==="light" ? "#ece8ea" : "#212126";
  const textMuted = theme==="light" ? "#6f6a73" : "#8b8794";
  const u = unit || "kcal";
  let overColor, statusLabel;
  if (mode === "gain-band") {
    overColor = actualPct >= 100 ? C.pink : actualPct >= 80 ? (theme==="light"?"#a3790f":"#dbb868") : C.red;
    statusLabel = actualPct >= 100 ? `${Math.round(val-target)} over goal 🎉` : `${Math.round(target-val)} more to go`;
  } else if (mode === "caution-band") {
    overColor = actualPct <= 100 ? C.pink : actualPct <= 120 ? (theme==="light"?"#a3790f":"#dbb868") : C.red;
    statusLabel = actualPct <= 100 ? `${Math.round(target-val)} left` : actualPct <= 120 ? `${Math.round(val-target)} over (fine)` : `${Math.round(val-target)} over (caution)`;
  } else {
    overColor = C.pink;
    statusLabel = target-val>0 ? `${Math.round(target-val)} left` : `${Math.round(val-target)} over goal 🎉`;
  }
  // Bar fill width is always capped at 100% so the bar never overflows visually.
  // The displayed percentage text is the real, uncapped value, and its position
  // tracks the right edge of the fill (so at 80% it sits near the right, not dead-center).
  const labelInside = p >= 14; // enough room to fit text inside the fill
  return (
    <div>
      <div style={{ position:"relative", height:18, background:bg, borderRadius:9, overflow:"hidden" }}>
        <div style={{ height:"100%", width:`${p}%`, background:`linear-gradient(90deg,${color}88,${color})`, borderRadius:9, transition:"width .6s ease", boxShadow:`0 0 6px ${color}40` }} />
        <div style={{
          position:"absolute", top:0, bottom:0, display:"flex", alignItems:"center",
          left: labelInside ? "auto" : `calc(${p}% + 6px)`,
          right: labelInside ? `calc(${100-p}% + 6px)` : "auto",
          fontSize:10, fontWeight:"800",
          color: labelInside ? "#fff" : (theme==="light"?"#1d1b1f":"#f3f1f4"),
          textShadow: labelInside ? "0 1px 2px rgba(0,0,0,0.5)" : "none",
          letterSpacing:"0.01em", whiteSpace:"nowrap"
        }}>
          {Math.round(actualPct)}%
        </div>
      </div>
      <div style={{ display:"flex", justifyContent:"space-between", marginTop:4 }}>
        <span style={{ fontSize:11, color:textMuted }}>of {Math.round(target)} {u}</span>
        <span style={{ fontSize:11, color:overColor, fontWeight:"600" }}>{statusLabel}</span>
      </div>
    </div>
  );
}

function MealCard({ meal, onRemove, onEdit, readonly, theme, onSlotChange, onSaveFavorite, isFavorited }) {
  const isDark = theme !== "light";
  const cardBg = isDark ? "#1a1a1f" : "#ffffff";
  const cardBgDragging = isDark ? "#212126" : "#f7f4f6";
  const textColor = isDark ? "#f3f1f4" : "#1d1b1f";
  const textMuted = isDark ? "#8b8794" : "#6f6a73";
  const btnColor = isDark ? "#454249" : "#aaa5ab";
  const pinkColor = isDark ? "#e8447a" : "#c4205f";
  const hasItems = Array.isArray(meal.items) && meal.items.length > 0;
  const [expanded, setExpanded] = useState(false);
  const [dragY, setDragY] = useState(0);
  const [isDragging, setIsDragging] = useState(false);
  const dragRef = useRef({ active:false, startY:0, longPressTimer:null, triggered:false });

  const clearLongPress = () => { clearTimeout(dragRef.current.longPressTimer); };

  const onPointerDown = (e) => {
    if (readonly || !onSlotChange) return;
    const startY = e.touches ? e.touches[0].clientY : e.clientY;
    dragRef.current.triggered = false;
    dragRef.current.longPressTimer = setTimeout(() => {
      dragRef.current.active = true;
      dragRef.current.startY = startY;
      setIsDragging(true);
      if (navigator.vibrate) navigator.vibrate(12);
      document.body.style.userSelect = "none";
    }, 400);
  };
  const onPointerMove = (e) => {
    if (!dragRef.current.active) return;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    const delta = y - dragRef.current.startY;
    // Follow the finger smoothly, with slight resistance past the trigger threshold
    const THRESHOLD = 56;
    const clamped = Math.abs(delta) <= THRESHOLD ? delta : THRESHOLD * Math.sign(delta) + (delta - THRESHOLD*Math.sign(delta)) * 0.25;
    setDragY(clamped);
    if (!dragRef.current.triggered && Math.abs(delta) > THRESHOLD) {
      dragRef.current.triggered = true;
      if (navigator.vibrate) navigator.vibrate(8);
      onSlotChange(delta > 0 ? 1 : -1);
    }
  };
  const onPointerUp = () => {
    clearLongPress();
    dragRef.current.active = false;
    setIsDragging(false);
    setDragY(0);
    document.body.style.userSelect = "";
  };

  const [menuOpen, setMenuOpen] = useState(false);
  const hasMacros = (meal.protein!==undefined&&meal.protein!==null) || (meal.carbs!==undefined&&meal.carbs!==null) || (meal.fat!==undefined&&meal.fat!==null) || (meal.sugar_g!==undefined&&meal.sugar_g!==null) || (meal.sodium_mg!==undefined&&meal.sodium_mg!==null);

  return (
    <div
      className="animate-pop"
      style={{
        padding:"12px 14px", marginBottom:8, borderRadius:18,
        background: isDragging ? cardBgDragging : cardBg,
        border:`1px solid ${isDragging ? (isDark?"#454249":"#aaa5ab") : (isDark?"#26262d":"#e8e4e8")}`,
        cursor: onSlotChange && !readonly ? (isDragging?"grabbing":"grab") : "default",
        touchAction: onSlotChange && !readonly ? "none" : "auto",

function MacroDonutChart({ consumed, theme }) {
  const totalGrams = consumed.protein + consumed.carbs + consumed.fat;
  const pPct = totalGrams ? (consumed.protein/totalGrams)*100 : 0;
  const cPct = totalGrams ? (consumed.carbs/totalGrams)*100 : 0;
  const fPct = totalGrams ? (consumed.fat/totalGrams)*100 : 0;
  const radius = 35;
  const circ = 2*Math.PI*radius;
  const pLen = (pPct/100)*circ;
  const cLen = (cPct/100)*circ;
  const fLen = (fPct/100)*circ;
  const isDark = theme !== "light";
  const innerBg = isDark ? "#212126" : "#f7f4f6";
  const strokeBg = isDark ? "#26262d" : "#e8e4e8";
  const textMain = isDark ? "#f3f1f4" : "#1d1b1f";
  const textSub = isDark ? "#8b8794" : "#6f6a73";
  const proteinC = isDark ? "#a98fe0" : "#7752c9";
  const carbsC = isDark ? "#e8a4bd" : "#b8366b";
  const fatC = isDark ? "#e0a868" : "#b9740f";
  return (
    <div style={{ position:"relative", width:"120px", height:"120px" }}>
      <svg width="100%" height="100%" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r={radius} fill="transparent" stroke={innerBg} strokeWidth="7" />
        {totalGrams > 0 ? (
          <React.Fragment>
            <circle cx="50" cy="50" r={radius} fill="transparent" stroke={proteinC} strokeWidth="7" strokeLinecap="round" strokeDasharray={`${pLen} ${circ}`} strokeDashoffset="0" transform="rotate(-90 50 50)" />
            <circle cx="50" cy="50" r={radius} fill="transparent" stroke={carbsC} strokeWidth="7" strokeLinecap="round" strokeDasharray={`${cLen} ${circ}`} strokeDashoffset={-pLen} transform="rotate(-90 50 50)" />
            <circle cx="50" cy="50" r={radius} fill="transparent" stroke={fatC} strokeWidth="7" strokeLinecap="round" strokeDasharray={`${fLen} ${circ}`} strokeDashoffset={-(pLen+cLen)} transform="rotate(-90 50 50)" />
          </React.Fragment>
        ) : (
          <circle cx="50" cy="50" r={radius} fill="transparent" stroke={strokeBg} strokeWidth="8" />
        )}
      </svg>
      <div style={{ position:"absolute", top:"50%", left:"50%", transform:"translate(-50%,-50%)", textAlign:"center" }}>
        <div style={{ fontSize:"16px", fontWeight:"800", fontFamily:"'DM Sans',sans-serif", color:textMain }}>{totalGrams>0?`${Math.round(totalGrams)}g`:"0g"}</div>
        <div style={{ fontSize:"9px", color:textSub, fontFamily:"'DM Sans',sans-serif", letterSpacing:"0.02em" }}>total</div>
      </div>
    </div>
  );
}

// ── Simple SVG bar chart: consumed vs burned per day, with target line ──
function TrendChart({ days, target, theme }) {
  const isDark = theme !== "light";
  const gridColor = isDark ? "#26262d" : "#e8e4e8";
  const textColor = isDark ? "#8b8794" : "#6f6a73";
  const consumedColor = isDark ? "#e8447a" : "#c4205f";
  const burnedColor = C.pinkDim;
  if (!days.length) return <div style={{ fontSize:12, color:textColor, textAlign:"center", padding:"20px 0" }}>Not enough data yet</div>;

  const maxVal = Math.max(target, ...days.map(d=>d.consumed), ...days.map(d=>d.burned), 100) * 1.15;
  const w = 320, h = 140, padBottom = 20, padTop = 6;
  const barW = (w / days.length) * 0.62;
  const gap = (w / days.length) - barW;
  const targetY = padTop + (1 - target/maxVal) * (h-padBottom-padTop);

  return (
    <svg viewBox={`0 0 ${w} ${h+18}`} style={{ width:"100%", height:"auto" }}>
      <line x1="0" y1={targetY} x2={w} y2={targetY} stroke={textColor} strokeWidth="1" strokeDasharray="3,3" opacity="0.5" />
      {days.map((d,i) => {
        const x = i * (barW+gap) + gap/2;
        const consH = (d.consumed/maxVal) * (h-padBottom-padTop);
        const burnH = (d.burned/maxVal) * (h-padBottom-padTop);
        const baseY = h - padBottom;
        return (
          <g key={i}>
            <rect x={x} y={baseY-consH} width={barW*0.46} height={consH} fill={consumedColor} rx="2" />
            <rect x={x+barW*0.5} y={baseY-burnH} width={barW*0.46} height={burnH} fill={burnedColor} rx="2" />
            <text x={x+barW/2} y={h+14} textAnchor="middle" fontSize="9" fill={textColor} fontFamily="'DM Sans',sans-serif">{d.label}</text>
          </g>
        );
      })}
    </svg>
  );
}

// ── Simple SVG line chart: weekly burned calories trend, going up = motivating ──
function LineChart({ points, color, theme, minScaleFloor }) {
  const isDark = theme !== "light";
  const textColor = isDark ? "#8b8794" : "#6f6a73";
  const gridColor = isDark ? "#26262d" : "#e8e4e8";
  if (!points.length) return <div style={{ fontSize:12, color:textColor, textAlign:"center", padding:"20px 0" }}>Not enough data yet</div>;

  const w = 320, h = 120, padBottom = 20, padTop = 10, padX = 8;
  const vals = points.map(p=>p.burned);
  const dataMax = Math.max(...vals, minScaleFloor!==undefined ? 0 : 100);
  const dataMin = minScaleFloor!==undefined ? Math.min(...vals) : 0;
  const range = Math.max(dataMax - dataMin, 1);
  const maxVal = minScaleFloor!==undefined ? dataMax + range*0.15 : dataMax * 1.2;
  const minVal = minScaleFloor!==undefined ? Math.max(0, dataMin - range*0.15) : 0;
  const stepX = (w - padX*2) / Math.max(1, points.length-1);
  const coords = points.map((p,i) => ({
    x: padX + i*stepX,
    y: padTop + (1 - (p.burned-minVal)/(maxVal-minVal)) * (h-padBottom-padTop),
    label: p.label, val: p.burned
  }));
  const pathD = coords.map((c,i) => `${i===0?"M":"L"} ${c.x},${c.y}`).join(" ");
  const areaD = `${pathD} L ${coords[coords.length-1].x},${h-padBottom} L ${coords[0].x},${h-padBottom} Z`;

  return (
    <svg viewBox={`0 0 ${w} ${h+18}`} style={{ width:"100%", height:"auto" }}>
      <line x1={padX} y1={h-padBottom} x2={w-padX} y2={h-padBottom} stroke={gridColor} strokeWidth="1" />
      <path d={areaD} fill={color} opacity="0.08" />
      <path d={pathD} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
      {coords.map((c,i) => (
        <g key={i}>
          <circle cx={c.x} cy={c.y} r="3.5" fill={color} />
          <text x={c.x} y={h+14} textAnchor="middle" fontSize="9" fill={textColor} fontFamily="'DM Sans',sans-serif">{c.label}</text>
        </g>
      ))}
    </svg>
  );
}

// ── Lightweight illustrative icon matched to the workout description ──
// (No real photo/AI image generation — a simple themed graphic, fast and free)
function detectWorkoutType(text) {
  const t = (text||"").toLowerCase();
  if (/(run|jog|sprint|marathon)/.test(t)) return "running";
  if (/(push.?up|sit.?up|squat|lunge|plank|burpee|hiit|strength|weight|gym|dumbbell|bench)/.test(t)) return "strength";
  if (/(cycle|cycling|bike|biking|spin)/.test(t)) return "cycling";
  if (/(swim|pool)/.test(t)) return "swimming";
  if (/(yoga|stretch|pilates)/.test(t)) return "yoga";
  if (/(walk|hike|step)/.test(t)) return "walking";
  return "general";
}
function WorkoutIllustration({ description, color, size }) {
  const type = detectWorkoutType(description);
  const s = size || 56;
  const icons = {
    running: "🏃",
    strength: "🏋️",
    cycling: "🚴",
    swimming: "🏊",
    yoga: "🧘",
    walking: "🚶",
    general: "⚡"
  };
  return (
    <div style={{ width:s, height:s, borderRadius:14, background:`${color}18`, border:`1px solid ${color}40`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:s*0.5, flexShrink:0 }}>
      {icons[type]}
    </div>
  );
}

  const callGemini = async (body) => {
    const key = geminiKey.trim();
    if (!key) throw new Error(T.noApiKey);

    // Global request spacing: ensures we never fire requests faster than ~1 every 4s,
    // which keeps us safely under typical free-tier RPM limits even with rapid back-to-back uploads.
    const now = Date.now();
    const minGapMs = 4200;
    const waitMs = Math.max(0, (window.__lastGeminiCallAt||0) + minGapMs - now);
    if (waitMs > 0) await new Promise(r => setTimeout(r, waitMs));
    window.__lastGeminiCallAt = Date.now();

    const model = "gemini-2.5-flash-lite"; // higher free-tier RPM/RPD than 2.5-flash, plenty capable for this use case
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;

    const maxRetries = 3;
    let lastErr = null;
    for (let attempt = 0; attempt <= maxRetries; attempt++) {
      try {
        const res = await fetch(url, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body) });
        if (res.ok) {
          const data = await res.json();
          return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
        }
        const errBody = await res.json().catch(() => ({}));
        const msg = errBody?.error?.message || `HTTP ${res.status}`;
        if (msg.includes("allowlist")) throw new Error("KEY_RESTRICTED");
        if (res.status === 429) {
          // Distinguish "burst too fast, retry shortly" from "out of daily quota entirely"
          const isDailyQuota = /day|daily|RESOURCE_EXHAUSTED.*per.?day/i.test(msg);
          if (isDailyQuota) throw new Error("QUOTA_EXHAUSTED");
          if (attempt < maxRetries) {
            const backoff = 1500 * Math.pow(2, attempt); // 1.5s, 3s, 6s
            await new Promise(r => setTimeout(r, backoff));
            lastErr = new Error("RATE_LIMITED");
            continue;
          }
          throw new Error("RATE_LIMITED");
        }
        throw new Error(msg);
      } catch (err) {
        if (err.message === "KEY_RESTRICTED" || err.message === "QUOTA_EXHAUSTED") throw err;
        lastErr = err;
        if (attempt >= maxRetries) throw err;
      }
    }
    throw lastErr || new Error("Request failed after retries");
  };

    } catch(err) {

      const deviation = evaluated
        ? (baseTargets.goal === "gain" ? (target - dayNet) / target : (dayNet - target) / target)
        : 0;
      days.push({
        key, isToday, isFuture,
        net: dayNet, deviation,
        label: d.toLocaleDateString("en-US",{weekday:"short"}).slice(0,1),
        hasData: evaluated,
        hit: evaluated && deviation <= 0
      });
    }

    const weekNum = (() => {
      const onejan = new Date(monday.getFullYear(),0,1);
      return Math.ceil((((monday - onejan) / 86400000) + onejan.getDay()+1) / 7);
    })();
    const sunday = new Date(monday); sunday.setDate(monday.getDate()+6);
    const dateRangeLabel = (() => {
      const sameMonth = monday.getMonth() === sunday.getMonth();
      const sameYear = monday.getFullYear() === sunday.getFullYear();
      const startDay = monday.getDate();
      const endDay = sunday.getDate();
      const startMonth = monday.toLocaleDateString("en-US",{month:"long"});
      const endMonth = sunday.toLocaleDateString("en-US",{month:"long"});
      const startYear = monday.getFullYear();
      const endYear = sunday.getFullYear();
      if (sameMonth) return `${startDay} - ${endDay} ${startMonth}`;
      if (sameYear) return `${startDay} ${startMonth} - ${endDay} ${endMonth}`;
      return `${startDay} ${startMonth} ${startYear} - ${endDay} ${endMonth} ${endYear}`;
    })();

    const tracked = days.filter(d => d.hasData);
    const hits = tracked.filter(d => d.hit).length;
    const isWeekOver = days.every(d => d.hasData || d.isFuture) && !days.some(d=>d.isToday && !d.hasData);
    const sundayEnd = new Date(sunday); sundayEnd.setHours(23,59,59,999);
    const weekComplete = new Date() > sundayEnd;

    let message = "";
    if (tracked.length === 0) {
      message = T.streakNewWeek;
    } else if (hits === 7 && weekComplete) {
      const perfect = T.streakPerfect;
      message = perfect[Math.floor(Math.random()*perfect.length)];
    } else if (weekComplete) {
      const ratio = hits / 7;
      if (ratio >= 0.7) {
        const good = T.streakGood;
        message = good[Math.floor(Math.random()*good.length)];
      } else if (ratio >= 0.4) {
        const mid = T.streakMid;
        message = mid[Math.floor(Math.random()*mid.length)];
      } else {
        const low = T.streakLow;
        message = low[Math.floor(Math.random()*low.length)];
      }
    } else {
      message = hits === tracked.length ? T.streakOnTrack : T.streakMixed;
    }

    return { days, weekNum, dateRangeLabel, hits, tracked: tracked.length, message };
  })();
  const streakCount = (() => {
    const byDate = {};
    histRangeData.meals.forEach(m => { byDate[m.log_date] = (byDate[m.log_date]||0) + Number(m.calories||0); });
    histRangeData.workouts.forEach(w => { byDate[w.log_date] = (byDate[w.log_date]||0) - Number(w.calories||0); });
    (histRangeData.drinks||[]).forEach(d => { byDate[d.log_date] = (byDate[d.log_date]||0) + Number(d.calories||0); });
    let streak = 0;
    for (let i=1; i<=180; i++) {
      const d = new Date(); d.setDate(d.getDate()-i);
      const key = localDateKey(d);
      if (byDate[key] === undefined) break; // no data logged that day — streak ends
      if (byDate[key] <= baseTargets.calories) streak++;
      else break;
    }
    return streak;
  })();

  const hydrationMessage = (() => {
    if (achievedMilestone) return achievedMilestone.comment;
    const pct = waterTarget ? (totalDrinkMl/waterTarget)*100 : 0;
    if (pct > 0) return `${Math.round(pct)}% of today's ${waterTarget}ml goal — keep going!`;
    return `Log your first drink to start tracking today's hydration (goal: ${waterTarget}ml).`;
  })();

  const weeksData = (() => {
    const groups = {};
    const byDate = {};
    histRangeData.meals.forEach(m => { (byDate[m.log_date] ||= {meals:[],workouts:[],water:0,drinkCal:0}).meals.push(m); });
    histRangeData.workouts.forEach(w => { (byDate[w.log_date] ||= {meals:[],workouts:[],water:0,drinkCal:0}).workouts.push(w); });
    (histRangeData.drinks||[]).forEach(d => { const e = (byDate[d.log_date] ||= {meals:[],workouts:[],water:0,drinkCal:0}); e.water = (e.water||0) + Number(d.amount_ml||0); e.drinkCal = (e.drinkCal||0) + Number(d.calories||0); });
    Object.keys(byDate).forEach(k => {
      const date = new Date(k+"T00:00:00"); if (isNaN(date.getTime())) return;
      const range = getWeekRangeString(date);
      if (!groups[range]) groups[range] = { days:[], totalConsumed:0, totalBurned:0, totalWater:0, daysTracked:0 };
      const dData = byDate[k];
      const cons = dData.meals.reduce((s,m)=>s+Number(m.calories),0) + (dData.drinkCal||0);
      const burn = dData.workouts.reduce((s,w)=>s+Number(w.calories),0);
      groups[range].days.push({ key:k, dateStr:date.toLocaleDateString("en-US",{weekday:'short',day:'numeric'}), consumed:cons, burned:burn, water:dData.water });
      groups[range].totalConsumed+=cons; groups[range].totalBurned+=burn; groups[range].totalWater+=dData.water; groups[range].daysTracked+=1;
    });
    return groups;
  })();

  // ── Workout weekly trend: last 6 calendar weeks, chronological, for the dashboard chart ──
  const workoutWeeklyTrend = (() => {
    const byDate = {};
    histRangeData.workouts.forEach(w => { byDate[w.log_date] = (byDate[w.log_date]||0) + Number(w.calories||0); });
    const weeks = [];
    const now = new Date();
    const curDay = now.getDay();
    const mondayOffset = curDay === 0 ? -6 : 1 - curDay;
    for (let w=5; w>=0; w--) {
      const monday = new Date(now);
      monday.setDate(now.getDate() + mondayOffset - (w*7));
      let total = 0;
      for (let d=0; d<7; d++) {
        const day = new Date(monday); day.setDate(monday.getDate()+d);
        if (day > now) continue;
        total += byDate[localDateKey(day)] || 0;
      }
      weeks.push({ label: monday.toLocaleDateString("en-US",{month:"short",day:"numeric"}), burned: Math.round(total) });
    }
    return weeks;
  })();

  const monthsData = (() => {
    const groups = {};
    const byDate = {};
    histRangeData.meals.forEach(m => { (byDate[m.log_date] ||= {meals:[],workouts:[],water:0,drinkCal:0,drinkProt:0,drinkCarb:0,drinkFat:0}).meals.push(m); });
    histRangeData.workouts.forEach(w => { (byDate[w.log_date] ||= {meals:[],workouts:[],water:0,drinkCal:0,drinkProt:0,drinkCarb:0,drinkFat:0}).workouts.push(w); });
    (histRangeData.drinks||[]).forEach(d => { const e = (byDate[d.log_date] ||= {meals:[],workouts:[],water:0,drinkCal:0,drinkProt:0,drinkCarb:0,drinkFat:0}); e.water = (e.water||0) + Number(d.amount_ml||0); e.drinkCal = (e.drinkCal||0) + Number(d.calories||0); e.drinkProt = (e.drinkProt||0) + Number(d.protein||0); e.drinkCarb = (e.drinkCarb||0) + Number(d.carbs||0); e.drinkFat = (e.drinkFat||0) + Number(d.fat||0); });
    Object.keys(byDate).forEach(k => {
      const date = new Date(k+"T00:00:00"); if (isNaN(date.getTime())) return;
      const label = date.toLocaleDateString("en-US",{month:"long",year:"numeric"});
      if (!groups[label]) groups[label] = { days:[], totalConsumed:0, totalBurned:0, totalProtein:0, totalCarbs:0, totalFat:0, totalWater:0, totalWorkouts:0 };
      const dData = byDate[k];
      const cons = dData.meals.reduce((s,m)=>s+Number(m.calories),0) + (dData.drinkCal||0);
      const burn = dData.workouts.reduce((s,w)=>s+Number(w.calories),0);
      groups[label].days.push({ key:k, dateStr:date.toLocaleDateString("en-US",{month:'short',day:'numeric'}), consumed:cons, burned:burn, water:dData.water });
      groups[label].totalConsumed += cons;
      groups[label].totalBurned += burn;
      groups[label].totalProtein += dData.meals.reduce((s,m)=>s+Number(m.protein),0) + (dData.drinkProt||0);
      groups[label].totalCarbs += dData.meals.reduce((s,m)=>s+Number(m.carbs),0) + (dData.drinkCarb||0);
      groups[label].totalFat += dData.meals.reduce((s,m)=>s+Number(m.fat),0) + (dData.drinkFat||0);
      groups[label].totalWater += dData.water;
      groups[label].totalWorkouts += dData.workouts.length;
    });
    return groups;
  })();

  const C = (PALETTES[palette] || PALETTES.sweet)[theme];

  if (loading) {
    return (
      <div style={{ minHeight:"100vh", background:C.bg, display:"flex", alignItems:"center", justifyContent:"center" }}>
        <div className="auth-spin" style={{ width:32, height:32, border:`3px solid ${C.border}`, borderTopColor:C.pink, borderRadius:"50%" }} />
      </div>
    );
  }

  return (
    <div style={{ minHeight:"100vh", background:C.bg, color:C.text, fontFamily:"'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" }}>
      <style>{`
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{width:3px}
        ::-webkit-scrollbar-thumb{background:${C.border};border-radius:6px}
        input,textarea{outline:none;font-family:inherit}
        .card{background:${C.card};border:1px solid ${C.border};border-radius:18px;transition:all .25s ease-out}
        .card:hover{border-color:${C.borderGlow};box-shadow:0 4px 16px ${theme==='dark'?'rgba(232,68,122,0.08)':'rgba(196,32,95,0.06)'}}
        .card-primary{background:${theme==='dark'?`linear-gradient(165deg, ${C.card}, #16161b)`:`linear-gradient(165deg, ${C.card}, #fdfcfd)`};border:1px solid ${C.border};border-radius:20px;box-shadow:0 2px 14px ${theme==='dark'?'rgba(0,0,0,0.25)':'rgba(40,30,40,0.06)'};transition:all .25s ease-out}
        .card-primary:hover{border-color:${C.borderGlow};box-shadow:0 6px 22px ${theme==='dark'?'rgba(232,68,122,0.1)':'rgba(196,32,95,0.08)'}}
        .card-nested{background:${theme==='dark'?'#0a0a0d':'#f0ecee'};border:1px solid ${theme==='dark'?'transparent':'#ddd6da'};border-radius:14px;transition:all .2s ease-out}
        .pink-btn{background:linear-gradient(135deg,${C.pinkDim},#9d174d);color:${C.text};border:none;border-radius:12px;padding:10px 20px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:.02em;transition:opacity .2s,transform .15s;box-shadow:0 4px 16px rgba(184,40,92,.28)}
        .pink-btn:hover{opacity:.88;transform:translateY(-1px)}
        .pink-btn:disabled{opacity:.5;cursor:not-allowed}
        .ghost-btn{background:transparent;color:${C.textMuted};border:1px solid ${C.border};border-radius:12px;padding:10px 18px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .2s}
        .ghost-btn:hover{border-color:${C.pinkDim};color:${C.pink}}
        .tab{background:none;border:none;color:${C.textMuted};font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;padding:8px 10px;border-radius:12px;transition:all .2s;letter-spacing:.02em}
        .tab.on{color:${C.pink};background:${C.pinkDeep};border-bottom:2px solid ${C.pinkDim}}
        .tab:hover{color:${C.text}}
        .slot-btn{background:transparent;border:1px solid ${C.border};border-radius:12px;padding:7px 14px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:${C.textMuted};cursor:pointer;transition:all .2s}
        .slot-btn.on{background:${C.pinkGlow};border-color:${C.pinkDim};color:${C.pink}}
        .inp{background:${C.surface};border:1px solid ${C.border};border-radius:12px;padding:10px 14px;color:${C.text};font-family:'DM Sans',sans-serif;font-size:14px;width:100%;transition:border-color .2s}
        .inp:focus{border-color:${C.pinkDim}}
        .inp::placeholder{color:${C.textDim}}
        .upload-zone{border:1.5px dashed ${C.border};border-radius:18px;padding:22px;text-align:center;cursor:pointer;transition:all .25s;background:${C.card}}
        .upload-zone:hover{border-color:${C.pinkDim};background:${C.pinkDeep}}
        .wave-box{position:relative;width:100%;height:100px;background:${theme==='dark'?'#0f172a':'#e0f2fe'};border-radius:18px;overflow:hidden;border:1px solid ${C.border}}
        .wave{position:absolute;bottom:0;left:0;width:200%;height:100%;background:linear-gradient(0deg,${C.pinkDim} 0%,${C.pink} 100%);border-top-left-radius:40% 60%;border-top-right-radius:60% 40%;animation:waveShift 12s linear infinite;opacity:0.85;transition:top 0.6s ease-out}
        .wave-overlay{position:absolute;bottom:0;left:-50%;width:200%;height:100%;background:${C.pinkDim};border-top-left-radius:50% 45%;border-top-right-radius:45% 50%;animation:waveShift 8s linear infinite reverse;opacity:0.5;transition:top 0.6s ease-out}
        @keyframes waveShift{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        @keyframes tabIn{from{opacity:0;transform:translateY(6px) scale(.99)}to{opacity:1;transform:translateY(0) scale(1)}}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes progressSlide{0%{transform:translateX(-150%)}100%{transform:translateX(350%)}}
        .animate-pop{animation:fadeUp .25s cubic-bezier(0.175,0.885,0.32,1.275) forwards}
        .fade{animation:tabIn .3s cubic-bezier(0.22,1,0.36,1) forwards}
        .spin{animation:spin .7s linear infinite}
        .hist-sub-row{display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-bottom:1px dashed ${C.border}}
      `}</style>

      <div style={{ background:C.surface, borderBottom:`1px solid ${C.border}`, padding:"18px 20px 0", position:"sticky", top:0, zIndex:50, backdropFilter:"blur(12px)" }}>
        <div style={{ maxWidth:500, margin:"0 auto" }}>
          <div style={{ display:"flex", alignItems:"baseline", gap:8, marginBottom:14 }}>
            <span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:26, fontWeight:800, color:C.pink, letterSpacing:"-0.04em", lineHeight:1 }}>NutriLog</span>
            <span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:13, fontStyle:"italic", fontWeight:300, color:C.textMuted, letterSpacing:".04em" }}>{T.appSub}</span>
            <div style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:8 }}>
              <button onClick={() => setShowSettings(true)} style={{ background:C.pinkDeep, border:`1px solid ${C.border}`, color:C.pink, fontSize:18, cursor:"pointer", padding:"6px 12px", borderRadius:12, lineHeight:1 }}>⚙️</button>
            </div>
          </div>

          <div style={{ display:"flex", gap:2, overflowX:"auto" }}>
            {TABS.map(t => (
              <button key={t} className={`tab ${activeTab===t?"on":""}`} onClick={() => setActiveTab(t)}>{TAB_LABELS[lang][t]}</button>
            ))}
          </div>
        </div>
      </div>

      <div style={{ maxWidth:500, margin:"0 auto", padding:"22px 16px 100px" }}>
        {error && (
          <div className="fade" style={{ background:"rgba(251,113,133,0.1)", border:`1px solid ${C.red}`, borderRadius:12, padding:"10px 14px", marginBottom:14, fontSize:13, color:C.red, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <span>{error}</span>
            <button onClick={()=>setError(null)} style={{ background:"none", border:"none", color:C.red, cursor:"pointer", fontSize:16 }}>×</button>
          </div>
        )}

        {activeTab==="main" && (
          <div className="fade">
            <div className="card-primary animate-pop" style={{ padding:"16px", marginBottom:14 }}>
              <div style={{ display:"flex", alignItems:"center", gap:14 }}>
                <div onClick={() => avatarRef.current?.click()} style={{ position:"relative", cursor:"pointer", flexShrink:0 }}>
                  <input ref={avatarRef} type="file" accept="image/*" style={{ display:"none" }} onChange={e=>uploadAvatar(e.target.files[0])} />
                  {baseTargets.avatar_url ? (
                    <img src={baseTargets.avatar_url} alt="Profile" style={{ width:56, height:56, borderRadius:"50%", objectFit:"cover", border:`2px solid ${C.pink}` }} />
                  ) : (
                    <div style={{ width:56, height:56, borderRadius:"50%", background:C.pinkGlow, border:`2px solid ${C.pinkDim}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:22 }}>
                      {baseTargets.gender === "female" ? "👩" : baseTargets.gender === "male" ? "👨" : "🙂"}
                    </div>
                  )}
                  <div style={{ position:"absolute", bottom:-2, right:-2, width:20, height:20, borderRadius:"50%", background:C.pink, display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, border:`2px solid ${C.surface}` }}>
                    {avatarUploading ? <div className="spin" style={{ width:8, height:8, border:"1.5px solid #fff", borderTopColor:"transparent", borderRadius:"50%" }} /> : "📷"}
                  </div>
                </div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:12, color:C.textMuted }}>{getGreeting()}{baseTargets.display_name?",":""}</div>
                  <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:19, fontWeight:"800", color:C.text, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                    {baseTargets.display_name || "Welcome!"}
                  </div>
                </div>
                <button onClick={openTargetModal} style={{ background:"none", border:"none", color:C.textMuted, fontSize:18, cursor:"pointer", padding:6, flexShrink:0 }}>⚙️</button>
              </div>
              <div style={{ borderTop:`1px solid ${C.border}`, marginTop:12, paddingTop:10, fontStyle:"italic", textAlign:"center", fontSize:12, color:C.textMuted }}>
                "{todayQuote.quote}" — <strong style={{ color:C.pink }}>{todayQuote.author}</strong>
              </div>
            </div>

            {showWeightReminder && (
              <div className="card fade" style={{ padding:"14px 16px", marginBottom:14, background:C.pinkDeep, borderColor:C.pinkDim }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                  <div style={{ fontSize:13, fontWeight:"700", color:C.text }}>⚖️ Log today's weight</div>
                  <button onClick={()=>setShowWeightReminder(false)} style={{ background:"none", border:"none", color:C.textMuted, fontSize:16, cursor:"pointer" }}>×</button>
                </div>
                <div style={{ display:"flex", gap:8 }}>
                  <input className="inp" type="number" placeholder={lang==="zh"?"体重（千克）":"Weight in kg"} value={weightInput} onChange={e=>setWeightInput(e.target.value)} style={{ flex:1 }} onKeyDown={e=>e.key==="Enter"&&saveWeight()} />
                  <button className="pink-btn" style={{ flexShrink:0 }} onClick={saveWeight}>Log</button>
                </div>
                <div style={{ fontSize:10, color:C.textMuted, marginTop:6, fontStyle:"italic" }}>Helps track your trend and keep calorie targets accurate. Skip a day and we'll assume it stayed the same.</div>
              </div>
            )}

            <div className="card animate-pop" style={{ padding:"16px 18px", marginBottom:14, background:C.pinkDeep, borderColor:C.pinkDim }}>
              <div style={{ marginBottom:18 }}>
                <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:16, fontWeight:"800", color:C.text, marginBottom:4 }}>Daily Login</div>
                <div style={{ display:"flex", alignItems:"baseline", justifyContent:"space-between" }}>
                  <span style={{ fontSize:12, color:C.pink, fontWeight:"700" }}>{lang==="zh" ? `第 ${streakWeek.weekNum} 周` : `${T.weekLabel} ${streakWeek.weekNum}`}</span>
                  <span style={{ fontSize:11, color:C.textMuted, fontWeight:"600" }}>{streakWeek.dateRangeLabel}</span>
                </div>
              </div>
              <div style={{ position:"relative", margin:"0 4px 8px" }}>
                {/* Bar sits at the exact vertical center of the 32px circles (16px from top of this row), and each
                    segment spans from one circle's center to the next circle's center so it visually "flows"
                    from day to day rather than floating as separate chips under each dot. */}
                <div style={{ position:"absolute", left:16, right:16, top:16, height:6, borderRadius:3, background:theme==="light"?"#e3dee2":"#2a2a30", transform:"translateY(-50%)", zIndex:0, display:"flex", overflow:"hidden" }}>
                  {streakWeek.days.slice(0,6).map((day,i) => {
                    // Colour the segment by the earlier (left) day's result, since that's the day "flowing into" the next.
                    const segColor = !day.hasData ? "transparent"
                      : day.hit ? C.pink
                      : day.deviation <= 0.20 ? (theme==="light"?"#c98a12":"#e0b84a")
                      : C.red;
                    return <div key={day.key} style={{ flex:1, background:segColor }} />;
                  })}
                </div>
                <div style={{ position:"relative", display:"flex", justifyContent:"space-between", alignItems:"center", zIndex:1 }}>
                  {streakWeek.days.map(day => {
                  // Tiered result colour: green = hit target, yellow = within 20% tolerance band, red = beyond that.
                  const resultColor = !day.hasData ? null
                    : day.hit ? C.pink
                    : day.deviation <= 0.20 ? (theme==="light"?"#c98a12":"#e0b84a")
                    : C.red;
                  const neutral = theme==="light" ? "#d8d3d8" : "#3a3a42";
                  const isPending = !day.hasData; // today (not yet evaluated) or future day
                  return (
                    <div key={day.key} style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:8, flex:1, position:"relative", zIndex:1 }}>
                      <div style={{
                        width:32, height:32, borderRadius:"50%",
                        display:"flex", alignItems:"center", justifyContent:"center",
                        background: isPending ? (theme==="light"?"#fff":C.surface) : resultColor,
                        border: isPending ? `2px solid ${day.isToday?C.pink:neutral}` : "none",
                        boxShadow: day.isToday
                          ? `0 0 0 5px ${C.pink}26`
                          : (!isPending ? `0 0 6px ${resultColor}55` : "none"),
                        transition:"all .3s ease"
                      }}>
                        {isPending ? (
                          <span style={{ fontSize:12, fontWeight:"800", color:day.isToday?C.pink:C.textDim }}>{day.label}</span>
                        ) : (
                          <span style={{ fontSize:14, fontWeight:"900", color:"#fff", lineHeight:1 }}>✓</span>
                        )}
                      </div>
                      <span style={{ fontSize:10, color:day.isToday?C.pink:C.textDim, fontWeight:"700" }}>{day.label}</span>
                    </div>
                  );
                })}
                </div>
              </div>
              <div style={{ fontSize:12, color:C.textMuted, fontStyle:"italic", textAlign:"center", marginTop:10, lineHeight:1.4 }}>{streakWeek.message}</div>
            </div>

            {streakCount > 0 && (
              <div className="card" style={{ padding:"12px 16px", marginBottom:14, background:C.pinkDeep, borderColor:C.pinkDim, display:"flex", alignItems:"center", gap:10 }}>
                <div style={{ fontSize:22 }}>🔥</div>
                <div style={{ fontSize:12, color:C.textMuted }}><span style={{ color:C.pink, fontWeight:"800" }}>{streakCount} day{streakCount===1?"":"s"}</span> streak — you've hit your calorie target {streakCount} day{streakCount===1?"":"s"} in a row.</div>
              </div>
            )}

            {(() => {

// ROOT — handles auth session state
// ════════════════════════════════════════════════════════════
function Root() {
  const [session, setSession] = useState(undefined); // undefined = checking, null = logged out
  const [authError, setAuthError] = useState(null);

  useEffect(() => {
    let settled = false;
    const timeout = setTimeout(() => {
      if (settled) return;
      // Known supabase-js bug: getSession() can hang indefinitely with no error/network log.
      // Workaround: check localStorage directly for a cached session token before giving up.
      try {
        const storageKey = Object.keys(localStorage).find(k => k.startsWith('sb-') && k.endsWith('-auth-token'));
        if (storageKey) {
          const cached = JSON.parse(localStorage.getItem(storageKey));
          if (cached?.access_token && cached?.user) {
            settled = true;
            setSession(cached);
            return;
          }
        }
      } catch (e) { /* fall through to error state */ }
      setAuthError("Connection to Supabase timed out after 10s. This can happen due to a known Supabase client issue — try reloading. If it persists, check your internet connection or Supabase project status.");
    }, 10000);

    supabase.auth.getSession()
      .then(({ data, error }) => {
        settled = true;
        clearTimeout(timeout);
        if (error) { setAuthError(error.message); return; }
        setSession(data.session);
      })
      .catch((err) => {
        settled = true;
        clearTimeout(timeout);
        setAuthError(err.message || String(err));
      });

    const { data: listener } = supabase.auth.onAuthStateChange((_event, sess) => setSession(sess));
    return () => { clearTimeout(timeout); listener.subscription.unsubscribe(); };
  }, []);

  if (authError) {
    return (
      <div style={{ minHeight:"100vh", background:"#0a0a0d", color:"#f3f1f4", display:"flex", alignItems:"center", justifyContent:"center", padding:20, textAlign:"center", fontFamily:"-apple-system,sans-serif" }}>
        <div>
          <div style={{ fontSize:15, fontWeight:700, marginBottom:10, color:"#e8616f" }}>⚠️ Couldn't connect</div>
          <div style={{ fontSize:13, color:"#9b96a1", marginBottom:16, maxWidth:320 }}>{authError}</div>
          <button onClick={() => window.location.reload()} style={{ background:"#e8447a", color:"#fff", border:"none", borderRadius:10, padding:"10px 20px", fontSize:14, cursor:"pointer" }}>Retry</button>
        </div>
      </div>
    );
  }

  if (session === undefined) {
    return (
      <div style={{ minHeight:"100vh", background:"#0a0a0d", display:"flex", alignItems:"center", justifyContent:"center" }}>
        <div className="auth-spin" style={{ width:32, height:32, border:"3px solid #26262d", borderTopColor:"#e8447a", borderRadius:"50%" }} />
      </div>
    );
  }
  if (!session) {
    return <AuthScreen onAuthed={setSession} />;
  }
  return <NutriLogPro session={session} onLogout={() => supabase.auth.signOut()} />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Root />);

    </script>
